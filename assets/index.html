function AppInner() {
  const toast = useToast();
  const [page, setPage]         = useState("dashboard");
  const [data, setData]         = useState(() => {
    try {
      const saved = localStorage.getItem("pharma_data");
      return saved ? JSON.parse(saved) : INIT;
    } catch { return INIT; }
  });
  const [settings, setSettings] = useState(() => {
    try {
      const saved = localStorage.getItem("pharma_settings");
      return saved ? JSON.parse(saved) : DEFAULT_SETTINGS;
    } catch { return DEFAULT_SETTINGS; }
  });
  const [users, setUsers]       = useState(() => {
    try {
      const saved = localStorage.getItem("pharma_users");
      return saved ? JSON.parse(saved) : DEFAULT_USERS;
    } catch { return DEFAULT_USERS; }
  });
  const [currentUser, setCurrentUser] = useState(() => {
    try {
      const saved = localStorage.getItem("pharma_session");
      return saved ? JSON.parse(saved) : null;
    } catch { return null; }
  });
  const [sideOpen, setSideOpen] = useState(true);
  const [showDB, setShowDB]     = useState(false);
  const [dbStatus, setDbStatus] = useState("offline");
  const [dbConfig, setDbConfig] = useState(getSbConfig());
  const sbRef = useRef(null);
  const syncRef = useRef(false);

  // ── Pending sync queue ──
  const pendingRef = useRef(false);

  // ── Save to localStorage on every change ──
  useEffect(() => {
    try { localStorage.setItem("pharma_data", JSON.stringify(data)); } catch {}
    // Mark as pending sync if online
    pendingRef.current = true;
  }, [data]);

  useEffect(() => {
    try { localStorage.setItem("pharma_settings", JSON.stringify(settings)); } catch {}
  }, [settings]);

  useEffect(() => {
    try { localStorage.setItem("pharma_users", JSON.stringify(users)); } catch {}
  }, [users]);

  // ── Auto sync to Supabase when data changes & online ──
  useEffect(() => {
    if (!pendingRef.current) return;
    if (!sbRef.current || dbStatus !== "online") return;
    const timer = setTimeout(() => {
      if (!sbRef.current || dbStatus !== "online") return;
      pendingRef.current = false;
      Promise.all([
        sbRef.current.upsert("products",     data.products).catch(()=>{}),
        sbRef.current.upsert("customers",    data.customers).catch(()=>{}),
        sbRef.current.upsert("invoices",     data.invoices).catch(()=>{}),
        sbRef.current.upsert("accounts",     data.accounts).catch(()=>{}),
        (data.distributors||[]).length ? sbRef.current.upsert("distributors", data.distributors).catch(()=>{}) : Promise.resolve(),
      ]).then(() => {
        toast("☁️ Supabase sync complete!", "success");
      }).catch(() => {});
    }, 1500); // 1.5 sec debounce
    return () => clearTimeout(timer);
  }, [data, dbStatus]);

  // ── Watch for internet reconnection → sync pending data ──
  useEffect(() => {
    const handleOnline = () => {
      if (!sbRef.current) return;
      toast("🌐 Internet connect hua — syncing...", "info");
      setDbStatus("connecting");
      sbRef.current.testConnection()
        .then(() => {
          setDbStatus("online");
          // Push all local data to Supabase
          return Promise.all([
            sbRef.current.upsert("products",     data.products).catch(()=>{}),
            sbRef.current.upsert("customers",    data.customers).catch(()=>{}),
            sbRef.current.upsert("invoices",     data.invoices).catch(()=>{}),
            sbRef.current.upsert("accounts",     data.accounts).catch(()=>{}),
            (data.distributors||[]).length ? sbRef.current.upsert("distributors", data.distributors).catch(()=>{}) : Promise.resolve(),
          ]);
        })
        .then(() => toast("✅ Sab data Supabase mein sync ho gaya!", "success"))
        .catch(() => { setDbStatus("error"); });
    };
    const handleOffline = () => {
      toast("📴 Internet disconnect — data locally save ho raha hai", "warning");
      setDbStatus("offline");
    };
    window.addEventListener("online",  handleOnline);
    window.addEventListener("offline", handleOffline);
    return () => {
      window.removeEventListener("online",  handleOnline);
      window.removeEventListener("offline", handleOffline);
    };
  }, [data]);

  const expiringSoon = data.products.filter((p) => { const d=daysUntil(p.expiry); return d>0 && d<=(settings.app.expiryAlertDays||195); }).length;
  const lowStock     = data.products.filter((p) => p.stock <= (settings.app.lowStockThreshold || 50)).length;
  const pharmName    = settings.pharmacy.name || "PharmaPro";
  const can = (section) => currentUser && (CAN[currentUser.role] || []).includes(section);

  // ── Called from Settings when config is saved ──
  const onDbConfigSaved = (cfg) => {
    setDbConfig(cfg);
    syncRef.current = false;
    setDbStatus("offline");
  };

  // ── Init Supabase when config changes ──
  useEffect(() => {
    const { url, key, enabled } = dbConfig;
    if (!enabled || !url || !key) { sbRef.current = null; setDbStatus("offline"); return; }
    sbRef.current = makeSb(url, key);
    if (syncRef.current) return;
    syncRef.current = true;
    setDbStatus("connecting");
    toast("🔗 Supabase se connect ho raha hai...", "info");

    sbRef.current.testConnection()
      .then(() => Promise.all([
        sbRef.current.select("products").catch(() => null),
        sbRef.current.select("customers").catch(() => null),
        sbRef.current.select("invoices").catch(() => null),
        sbRef.current.select("accounts").catch(() => null),
      ]))
      .then(([products, customers, invoices, accounts]) => {
        const anyData = products?.length || customers?.length || invoices?.length || accounts?.length;
        if (anyData) {
          setData({ products: products || INIT.products, customers: customers || INIT.customers, invoices: invoices || INIT.invoices, accounts: accounts || INIT.accounts });
          toast("✅ Database se data load ho gaya!", "success");
        } else {
          Promise.all([
            sbRef.current.insert("products",  INIT.products),
            sbRef.current.insert("customers", INIT.customers),
            sbRef.current.insert("invoices",  INIT.invoices),
            sbRef.current.insert("accounts",  INIT.accounts),
          ]).then(() => toast("✅ Supabase mein initial data push ho gaya!", "success"))
            .catch(() => {});
        }
        setDbStatus("online");
      })
      .catch((e) => {
        setDbStatus("error");
        const msg = e.message || "Connection failed";
        toast(`❌ DB Connect fail: ${msg}`, "error");
        console.error("Supabase error:", e);
      });
  }, [dbConfig]);

  // ── Auto sync data to Supabase ──
  useEffect(() => {
    const sb = sbRef.current;
    if (!sb || dbStatus !== "online") return;
    const sync = async () => {
      try {
        await Promise.all([
          sb.upsert("products",  data.products),
          sb.upsert("customers", data.customers),
          sb.upsert("accounts",  data.accounts),
        ]);
      } catch { /* silent */ }
    };
    const t = setTimeout(sync, 800);
    return () => clearTimeout(t);
  }, [data, dbStatus]);

  const ROLE_COLOR = { administrator: "#7c3aed", user: "#1d4ed8", employee: "#16a34a" };
  const ROLE_LABEL = { administrator: "Admin", user: "User", employee: "Employee" };
  const DB_STATUS  = {
    offline:    { color: "#6b7280", bg: "rgba(255,255,255,.1)", label: "Offline" },
    connecting: { color: "#fbbf24", bg: "rgba(251,191,36,.2)",  label: "Connecting..." },
    online:     { color: "#34d399", bg: "rgba(52,211,153,.2)",  label: "Online ✓" },
    error:      { color: "#f87171", bg: "rgba(248,113,113,.2)", label: "DB Error" },
  };

  // Login screen (no toast context needed here, login handled inside)
  if (!currentUser) return <LoginScreen users={users} onLogin={(u) => {
    try { localStorage.setItem("pharma_session", JSON.stringify(u)); } catch {}
    setCurrentUser(u);
    setPage("dashboard");
    toast(`👋 Welcome back, ${u.name}! (${ROLE_LABEL[u.role]})`, "success");
  }} pharmName={pharmName} />;

  return (
    <div style={{ display: "flex", height: "100vh", fontFamily: "'Segoe UI', system-ui, sans-serif", background: "#f1f5f9", overflow: "hidden" }}>

      {/* ── Sidebar ── */}
      <div className="no-print" style={{ width: sideOpen ? 240 : 64, background: "linear-gradient(180deg,#1e3a8a 0%,#1d4ed8 100%)", color: "#fff", display: "flex", flexDirection: "column", transition: "width .2s", flexShrink: 0, overflow: "hidden", height: "100vh" }}>

        {/* Logo */}
        <div style={{ padding: "14px 14px", borderBottom: "1px solid rgba(255,255,255,.1)", display: "flex", alignItems: "center", gap: 10, flexShrink: 0 }}>
          <div style={{ fontSize: 24, flexShrink: 0 }}>💊</div>
          {sideOpen && (
            <div style={{ overflow: "hidden" }}>
              <div style={{ fontWeight: 800, fontSize: 13, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{pharmName}</div>
              <div style={{ fontSize: 10, opacity: .7 }}>Management System</div>
            </div>
          )}
        </div>

        {/* DB Status indicator */}
        {sideOpen && (
          <div style={{ margin: "8px 10px 0", background: DB_STATUS[dbStatus].bg, borderRadius: 8, padding: "5px 10px", display: "flex", alignItems: "center", gap: 6, flexShrink: 0 }}>
            <div style={{ width: 7, height: 7, borderRadius: "50%", background: DB_STATUS[dbStatus].color,
              ...(dbStatus === "connecting" ? { animation: "pulse 1s infinite" } : {}) }} />
            <span style={{ fontSize: 11, color: "#fff", fontWeight: 600 }}>
              {dbConfig.enabled && dbConfig.url ? `DB: ${DB_STATUS[dbStatus].label}` : "DB: Not Configured"}
            </span>
          </div>
        )}

        {/* Current user badge */}
        {sideOpen && (
          <div style={{ margin: "8px 10px 4px", background: "rgba(255,255,255,.12)", borderRadius: 10, padding: "8px 12px", flexShrink: 0 }}>
            <div style={{ fontSize: 12, fontWeight: 700 }}>👤 {currentUser.name}</div>
            <div style={{ fontSize: 10, marginTop: 2 }}>
              <span style={{ background: ROLE_COLOR[currentUser.role], padding: "1px 8px", borderRadius: 20, fontSize: 10, fontWeight: 700 }}>
                {ROLE_LABEL[currentUser.role]}
              </span>
            </div>
          </div>
        )}

        {/* Nav */}
        <nav style={{ flex: 1, padding: "8px 6px", overflowY: "auto", overflowX: "hidden" }}>
          {NAV_ITEMS.filter((n) => can(n.id)).map((n) => (
            <button key={n.id} onClick={() => setPage(n.id)} style={{
              display: "flex", alignItems: "center", gap: 12, width: "100%", padding: "10px 10px",
              borderRadius: 10, border: "none", cursor: "pointer",
              background: page === n.id ? "rgba(255,255,255,.22)" : "none", color: "#fff",
              fontWeight: page === n.id ? 700 : 400, fontSize: 14, marginBottom: 2, textAlign: "left",
            }}>
              <span style={{ fontSize: 18, flexShrink: 0 }}>{n.icon}</span>
              {sideOpen && <span style={{ whiteSpace: "nowrap" }}>{n.label}</span>}
            </button>
          ))}

          {can("database") && (
            <button onClick={() => setShowDB(true)} style={{
              display: "flex", alignItems: "center", gap: 12, width: "100%", padding: "10px 10px",
              borderRadius: 10, border: "1px solid rgba(255,255,255,.22)", cursor: "pointer",
              background: "rgba(255,255,255,.08)", color: "#fff",
              fontSize: 14, marginTop: 6, textAlign: "left",
            }}>
              <span style={{ fontSize: 18, flexShrink: 0 }}>🗄️</span>
              {sideOpen && <span style={{ whiteSpace: "nowrap" }}>Database 🔒</span>}
            </button>
          )}
        </nav>

        {/* Alerts */}
        {sideOpen && (expiringSoon > 0 || lowStock > 0) && (
          <div style={{ margin: "0 8px 8px", background: "rgba(255,255,255,.1)", borderRadius: 10, padding: "8px 10px", fontSize: 11, flexShrink: 0 }}>
            {expiringSoon > 0 && <div>⚠️ {expiringSoon} expiring soon</div>}
            {lowStock > 0    && <div>📦 {lowStock} low stock</div>}
          </div>
        )}

        {/* Logout */}
        <button onClick={() => {
          toast(`👋 ${currentUser.name} logout ho gaye!`, "info");
          try { localStorage.removeItem("pharma_session"); } catch {}
          setTimeout(() => { setCurrentUser(null); setPage("dashboard"); }, 600);
        }}
          style={{ margin: "0 6px 6px", background: "rgba(220,38,38,.4)", border: "1px solid rgba(220,38,38,.6)", color: "#fff", borderRadius: 8, padding: "8px 10px", cursor: "pointer", fontSize: 13, fontWeight: 700, display: "flex", alignItems: "center", gap: 8, flexShrink: 0 }}>
          <span>🚪</span>{sideOpen && <span>Logout</span>}
        </button>

        <button onClick={() => setSideOpen(!sideOpen)}
          style={{ margin:"0 6px 12px", background:"rgba(255,255,255,.15)", border:"1.5px solid rgba(255,255,255,.25)", color:"#fff", borderRadius:8, padding:"8px 10px", cursor:"pointer", fontSize:15, flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center", gap:4 }}>
          {sideOpen ? "◀" : "▶"}
        </button>
      </div>

      {/* ── Main Content ── */}
      <div style={{ flex: 1, overflowY: "auto", padding: 24 }}>
        {page === "dashboard" && can("dashboard")  && <Dashboard data={data} />}
        {page === "products"  && can("products")   && <Products data={data} setData={setData} />}
        {page === "stock"     && can("stock")       && <StockExpiry data={data} setData={setData} settings={settings} />}
        {page === "invoices"  && can("invoices")    && <Invoices data={data} setData={setData} settings={settings} currentUser={currentUser} />}
        {page === "customers" && can("customers")   && <Customers data={data} setData={setData} />}
        {page === "accounts"  && can("accounts")    && <Accounts data={data} setData={setData} />}
        {page === "stockdist"    && can("stockdist")    && <StockDistribution data={data} setData={setData} />}
        {page === "distributors"  && can("distributors")  && <Distributors data={data} setData={setData} />}
        {page === "clinic"    && can("clinic")      && <Clinic data={data} setData={setData} currentUser={currentUser} />}
        {page === "employees" && can("employees")   && <Employees data={data} setData={setData} currentUser={currentUser} />}
        {page === "reports"   && can("reports")     && <Reports data={data} />}
        {page === "users"     && can("users")       && <UserManagement users={users} setUsers={setUsers} currentUser={currentUser} />}
        {page === "settings"  && can("settings")    && <Settings settings={settings} setSettings={setSettings} data={data} setData={setData} users={users} onDbConfigSaved={onDbConfigSaved} dbStatus={dbStatus} />}


        {!can(page) && (
          <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "60vh", flexDirection: "column", gap: 16 }}>
            <div style={{ fontSize: 64 }}>🔒</div>
            <div style={{ fontSize: 20, fontWeight: 800, color: "#374151" }}>Access Denied</div>
            <div style={{ color: "#6b7280" }}>Aapke role ({ROLE_LABEL[currentUser.role]}) ke paas yeh page dekhne ki permission nahi hai.</div>
          </div>
        )}
      </div>

      {showDB && can("database") && <DatabaseViewer data={data} settings={settings} onClose={() => setShowDB(false)} />}

      {/* ── Floating Invoice Button (bottom right) ── */}
      {can("invoices") && !showDB && (
        <button
          onClick={() => { setPage("invoices"); }}
          title="New Invoice"
          style={{
            position:"fixed", bottom:28, right:28, zIndex:999,
            width:64, height:64, borderRadius:"50%",
            background:"linear-gradient(135deg,#1d4ed8,#7c3aed)",
            border:"3px solid #fff",
            cursor:"pointer",
            boxShadow:"0 6px 24px rgba(29,78,216,0.45)",
            display:"flex", flexDirection:"column",
            alignItems:"center", justifyContent:"center",
            color:"#fff", transition:"transform 0.15s, box-shadow 0.15s",
          }}
          onMouseEnter={e=>{e.currentTarget.style.transform="scale(1.13)";e.currentTarget.style.boxShadow="0 8px 30px rgba(29,78,216,0.6)";}}
          onMouseLeave={e=>{e.currentTarget.style.transform="scale(1)";e.currentTarget.style.boxShadow="0 6px 24px rgba(29,78,216,0.45)";}}
        >
          <span style={{fontSize:24}}>🧾</span>
          <span style={{fontSize:9,fontWeight:800,letterSpacing:0.5}}>INVOICE</span>
        </button>
      )}

      <style>{`@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }`}</style>
    </div>
  );
}

function App() {
  return (
    <>
      <style>{`
        *, *::before, *::after { box-sizing: border-box; }
        body { margin: 0; overflow: hidden; }

        /* ── Scrollable tab bars ── */
        .tab-bar {
          display: flex; gap: 6px; overflow-x: auto;
          padding-bottom: 4px; margin-bottom: 16px;
          scrollbar-width: none; -ms-overflow-style: none;
          flex-wrap: nowrap !important;
        }
        .tab-bar::-webkit-scrollbar { display: none; }
        .tab-bar button { flex-shrink: 0; }

        /* ── Text overflow in table cells ── */
        td { max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        td:hover { white-space: normal; word-break: break-word; }

        /* ── Responsive tables ── */
        .tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

        /* ── Modal scroll ── */
        .modal-body { overflow-y: auto; max-height: calc(90vh - 120px); }

        /* ── Card text wrap ── */
        .card-text { word-break: break-word; overflow-wrap: break-word; }

        /* ── Sidebar label truncate ── */
        .nav-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 150px; }

        /* ── Input focus ring ── */
        input:focus, select:focus, textarea:focus {
          outline: none !important;
          border-color: #3b82f6 !important;
          box-shadow: 0 0 0 3px rgba(59,130,246,.15) !important;
        }

        /* ── Button no outline ── */
        button:focus { outline: none; }
        button:focus-visible { outline: 2px solid #3b82f6; }

        /* ── Smooth scrolling ── */
        * { scroll-behavior: smooth; }

        /* ── Print hide sidebar ── */
        @media print { .no-print { display: none !important; } }

        /* ── Responsive tables ── */
        table { table-layout: auto; }
        th, td { overflow: hidden; text-overflow: ellipsis; }
        .tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        
        /* ── Mobile sidebar ── */
        @media (max-width: 768px) {
          .sidebar-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,.5);
            z-index: 998; display: block;
          }
          .mobile-sidebar {
            position: fixed !important; z-index: 999 !important;
            height: 100vh !important; top: 0 !important; left: 0 !important;
          }
          .mobile-hamburger { display: flex !important; }
        }
        @media (min-width: 769px) {
          .sidebar-overlay { display: none !important; }
          .mobile-hamburger { display: none !important; }
        }
      `}</style>
      <ToastProvider>
        <AppInner />
      </ToastProvider>
    </>
  );
}

var __root=ReactDOM.createRoot(document.getElementById("root"));
__root.render(React.createElement(App));
document.getElementById("splash").style.display="none";
  </script>
</body>
