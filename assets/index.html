        .hdr{background:linear-gradient(135deg,#1e3a8a,#1d4ed8);color:#fff;padding:${size==="a5"?"16px 20px":"22px 28px"};display:flex;justify-content:space-between;align-items:flex-start}
        table{width:100%;border-collapse:collapse}
        thead tr{background:#e0e7ff}
        th{padding:9px 10px;text-align:left;font-size:11px;font-weight:800;color:#1e40af}
        th:nth-child(2),th:nth-child(3),th:nth-child(4){text-align:right}
        .ftr{background:#f8fafc;border-top:1px solid #e5e7eb;padding:12px;text-align:center;font-size:11px;color:#6b7280}
        @media print{@page{size:${pgSize} portrait;margin:10mm}body{background:#fff;padding:0}.page{box-shadow:none;border-radius:0;max-width:100%}}
      </style></head><body>
      <div class="page">
        <div class="hdr">
          <div>
            <div style="font-weight:900;font-size:${size==="a5"?"18px":"22px"}">💊 ${pharmName}</div>
            ${pharmAddr ? `<div style="font-size:10px;opacity:.8;margin-top:2px">${pharmAddr}</div>` : ""}
            ${pharmPhone ? `<div style="font-size:10px;opacity:.75;margin-top:1px">📞 ${pharmPhone}</div>` : ""}
            ${ph.license ? `<div style="font-size:10px;opacity:.7;margin-top:1px">Lic: ${ph.license}</div>` : ""}
          </div>
          <div style="text-align:right">
            <div style="font-weight:900;font-size:${size==="a5"?"18px":"22px"}">${inv.id}</div>
            <div style="font-size:11px;opacity:.75;margin-top:2px">${fmtDate(inv.date)}</div>
            <div style="display:inline-block;margin-top:5px;padding:3px 12px;border-radius:20px;font-size:11px;font-weight:800;background:${statusBg[inv.status]};color:${statusColor[inv.status]}">${inv.status.toUpperCase()}</div>
          </div>
        </div>
        <div style="padding:${size==="a5"?"16px 20px":"22px 28px"}">
          <div style="display:flex;gap:12px;margin-bottom:18px">
            <div style="flex:1;background:#f8fafc;border-radius:8px;padding:10px 12px;border:1px solid #e5e7eb">
              <div style="font-size:9px;font-weight:700;color:#6b7280;text-transform:uppercase;margin-bottom:3px">Bill To</div>
              <div style="font-weight:700;font-size:13px">${inv.customerName}</div>
            </div>
            <div style="flex:1;background:#f8fafc;border-radius:8px;padding:10px 12px;border:1px solid #e5e7eb">
              <div style="font-size:9px;font-weight:700;color:#6b7280;text-transform:uppercase;margin-bottom:3px">Invoice No</div>
              <div style="font-weight:700;font-size:13px">${inv.id}</div>
              <div style="font-size:11px;color:#6b7280">${fmtDate(inv.date)}</div>
            </div>
            <div style="flex:1;background:#f8fafc;border-radius:8px;padding:10px 12px;border:1px solid #e5e7eb">
              <div style="font-size:9px;font-weight:700;color:#6b7280;text-transform:uppercase;margin-bottom:3px">Status</div>
              <div style="font-weight:700;font-size:13px;color:${statusColor[inv.status]}">${inv.status.toUpperCase()}</div>
              <div style="font-size:11px;color:#6b7280">Paid: Rs.${Number(inv.paid).toFixed(2)}</div>
            </div>
          </div>
          <table>
            <thead><tr><th>Item</th><th style="text-align:center">Qty</th><th style="text-align:right">Rate/pc</th><th style="text-align:right">Amount</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
          <div style="display:flex;justify-content:flex-end;margin-top:16px">
            <div style="width:${size==="a5"?"200px":"260px"};background:#f8fafc;border-radius:10px;padding:14px;border:1px solid #e5e7eb">
              <div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #f3f4f6;font-size:12px"><span style="color:#6b7280">Subtotal</span><span>Rs.${Number(inv.subtotal).toFixed(2)}</span></div>
              <div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #f3f4f6;font-size:12px"><span style="color:#6b7280">Discount</span><span style="color:#dc2626">-Rs.${Number(inv.discount).toFixed(2)}</span></div>
              <div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #f3f4f6;font-size:12px"><span style="color:#6b7280">Tax(${inv.tax}%)</span><span style="color:#d97706">+Rs.${Number(taxAmt).toFixed(2)}</span></div>
              <div style="display:flex;justify-content:space-between;padding:9px 0 5px;font-size:18px;font-weight:900;color:#1d4ed8;border-top:2px solid #1d4ed8;margin-top:4px"><span>Total</span><span>Rs.${Number(inv.total).toFixed(2)}</span></div>
              <div style="display:flex;justify-content:space-between;font-size:12px;font-weight:700;color:#16a34a;padding:3px 0"><span>✓ Paid</span><span>Rs.${Number(inv.paid).toFixed(2)}</span></div>
              <div style="display:flex;justify-content:space-between;font-size:12px;font-weight:700;color:${balance>0?"#dc2626":"#16a34a"};padding:3px 0"><span>Balance</span><span>Rs.${Number(balance).toFixed(2)}</span></div>
            </div>
          </div>
        </div>
        <div class="ftr">${pharmFooter} · ${pharmName}</div>
      </div>
    </body></html>`;
  };

  // ── PRINT — new window approach (most reliable) ──
  const handlePrint = () => {
    if (printing) return;
    setPrinting(true);
    const html = buildHTML(printSize);
    const win = window.open("", "_blank", "width=900,height=700");
    if (!win) {
      // popup blocked — fallback to iframe
      const old = document.getElementById("pharma-print-iframe");
      if (old) old.remove();
      const f = document.createElement("iframe");
      f.id = "pharma-print-iframe";
      f.style.cssText = "position:fixed;left:-9999px;top:0;width:800px;height:600px;border:none;opacity:0;pointer-events:none";
      document.body.appendChild(f);
      const d = f.contentDocument || f.contentWindow.document;
      d.open(); d.write(html); d.close();
      setTimeout(() => { f.contentWindow.focus(); f.contentWindow.print(); setPrinting(false); }, 600);
      return;
    }
    win.document.open();
    win.document.write(html);
    win.document.close();
    win.onload = () => { win.focus(); win.print(); setPrinting(false); };
    // fallback if onload doesn't fire
    setTimeout(() => { try { win.focus(); win.print(); } catch {} setPrinting(false); }, 800);
  };

  // ── PDF — same as print but titles it for Save-as-PDF ──
  const handlePDF = () => {
    if (printing) return;
    setPrinting(true);
    const html = buildHTML(printSize).replace("</title>", ` — ${inv.id}</title>`);
    const win = window.open("", "_blank", "width=900,height=700");
    if (!win) {
      const old = document.getElementById("pharma-pdf-iframe");
      if (old) old.remove();
      const f = document.createElement("iframe");
      f.id = "pharma-pdf-iframe";
      f.style.cssText = "position:fixed;left:-9999px;top:0;width:800px;height:600px;border:none;opacity:0;pointer-events:none";
      document.body.appendChild(f);
      const d = f.contentDocument || f.contentWindow.document;
      d.open(); d.write(html); d.close();
      setTimeout(() => { f.contentWindow.focus(); f.contentWindow.print(); setPrinting(false); }, 600);
      return;
    }
    win.document.open();
    win.document.write(html);
    win.document.close();
    win.onload = () => { win.focus(); win.print(); setPrinting(false); };
    setTimeout(() => { try { win.focus(); win.print(); } catch {} setPrinting(false); }, 800);
  };

  const isThm = printSize.startsWith("thermal");

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.65)", zIndex:1000, display:"flex", alignItems:"center", justifyContent:"center" }}>
      <div style={{ background:"#fff", borderRadius:18, width:"min(800px,97vw)", maxHeight:"93vh", display:"flex", flexDirection:"column", boxShadow:"0 28px 90px rgba(0,0,0,.35)", overflow:"hidden" }}>

        {/* ══ TOP BAR ══ */}
        <div style={{ background:"linear-gradient(135deg,#1e3a8a,#1d4ed8)", padding:"12px 18px", flexShrink:0, zIndex:10 }}>

          {/* Row 1: title + close */}
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
            <div style={{ color:"#fff" }}>
              <div style={{ fontWeight:900, fontSize:17 }}>🧾 {inv.id}</div>
              <div style={{ fontSize:11, opacity:.75 }}>{fmtDate(inv.date)} · {inv.customerName}</div>
            </div>
            <button onClick={onClose}
              style={{ background:"rgba(255,255,255,.2)", border:"1.5px solid rgba(255,255,255,.3)", color:"#fff", borderRadius:8, width:36, height:36, cursor:"pointer", fontSize:18, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>✕</button>
          </div>

          {/* Row 2: size picker + print buttons */}
          <div style={{ display:"flex", gap:8, alignItems:"center", flexWrap:"wrap" }}>

            {/* Size picker */}
            <div ref={sizeRef} style={{ position:"relative" }}>
              <button
                onClick={(e) => { e.stopPropagation(); setShowSizes(v => !v); }}
                style={{ background:"rgba(255,255,255,.15)", border:"1.5px solid rgba(255,255,255,.35)", color:"#fff", borderRadius:8, padding:"7px 14px", cursor:"pointer", fontWeight:700, fontSize:13, whiteSpace:"nowrap" }}>
                📐 {SIZES[printSize].label} ▾
              </button>
              {showSizes && (
                <div style={{ position:"absolute", top:"calc(100% + 6px)", left:0, background:"#fff", borderRadius:10, boxShadow:"0 8px 32px rgba(0,0,0,.25)", zIndex:9999, minWidth:200, overflow:"hidden" }}>
                  {Object.entries(SIZES).map(([key, s]) => (
                    <button key={key}
                      onClick={(e) => { e.stopPropagation(); setPrintSize(key); setShowSizes(false); }}
                      style={{ display:"flex", flexDirection:"column", width:"100%", padding:"10px 14px", border:"none", background:printSize===key?"#eff6ff":"#fff", cursor:"pointer", textAlign:"left", borderBottom:"1px solid #f3f4f6" }}>
                      <span style={{ fontWeight:700, fontSize:14, color:printSize===key?"#1d4ed8":"#111" }}>{printSize===key?"✓ ":""}{s.label}</span>
                      <span style={{ fontSize:11, color:"#6b7280" }}>{s.desc}</span>
                    </button>
                  ))}
                </div>
              )}
            </div>

            <div style={{ width:1, height:28, background:"rgba(255,255,255,.25)", flexShrink:0 }} />

            {/* Print button */}
            <button
              onClick={(e) => { e.stopPropagation(); handlePrint(); }}
              disabled={printing}
              style={{ background:"#fff", color:"#1d4ed8", border:"none", borderRadius:9, padding:"8px 22px", cursor:printing?"wait":"pointer", fontWeight:800, fontSize:14, boxShadow:"0 2px 8px rgba(0,0,0,.12)", opacity:printing?.7:1, flexShrink:0 }}>
              {printing ? "⏳ Opening..." : "🖨️ Print"}
            </button>

            {/* PDF button */}
            <button
              onClick={(e) => { e.stopPropagation(); handlePDF(); }}
              disabled={printing}
              style={{ background:"#dc2626", color:"#fff", border:"none", borderRadius:9, padding:"8px 22px", cursor:printing?"wait":"pointer", fontWeight:800, fontSize:14, boxShadow:"0 2px 8px rgba(0,0,0,.12)", opacity:printing?.7:1, flexShrink:0 }}>
              📄 Save as PDF
            </button>

            {/* WhatsApp Share button */}
            <button
              onClick={(e) => {
                e.stopPropagation();
                const ph = settings.pharmacy || {};
                const balance = inv.total - inv.paid;
                const taxAmt2 = ((inv.tax||0)/100)*(inv.subtotal||0);
                // Thermal 80mm style — compact receipt format
                const sep = "────────────────────";
                const pharmLine = ph.name ? `*${ph.name}*` : "*PharmaPro*";
                const addrLine  = [ph.address, ph.city].filter(Boolean).join(", ");
                const phoneLine = [ph.phone, ph.mobile].filter(Boolean).join(" | ");
                const itemLines = (inv.items||[]).map(i=>{
                  const amt = (i.qty*(i.perUnitPrice||i.price)).toFixed(0);
                  return `${i.name}\n  ${i.qty} x Rs.${(i.perUnitPrice||i.price).toFixed(0)} = *Rs.${amt}*`;
                }).join("\n");
                let msg = pharmLine + "\n";
                if(addrLine)  msg += addrLine + "\n";
                if(phoneLine) msg += phoneLine + "\n";
                msg += sep + "\n";
                msg += `Invoice: *${inv.id}*\n`;
                msg += `Date: ${inv.date}\n`;
                msg += `Customer: ${inv.customerName}\n`;
                msg += sep + "\n";
                msg += itemLines + "\n";
                msg += sep + "\n";
                if(inv.discount>0) msg += `Discount: -Rs.${Number(inv.discount).toFixed(0)}\n`;
                if(taxAmt2>0)      msg += `Tax(${inv.tax}%): Rs.${taxAmt2.toFixed(0)}\n`;
                msg += `*TOTAL: Rs.${Number(inv.total).toFixed(0)}*\n`;
                msg += `Paid:   Rs.${Number(inv.paid).toFixed(0)}\n`;
                if(balance>0) msg += `*Balance: Rs.${Number(balance).toFixed(0)}* ⚠️\n`;
                msg += sep + "\n";
                msg += (ph.footer||"Thank you for your business!");
                const url = `https://wa.me/?text=${encodeURIComponent(msg)}`;
                window.open(url, "_blank");
              }}
              style={{ background:"#25D366", color:"#fff", border:"none", borderRadius:9, padding:"8px 16px", cursor:"pointer", fontWeight:800, fontSize:13, boxShadow:"0 2px 8px rgba(0,0,0,.12)", flexShrink:0, display:"flex", alignItems:"center", gap:5 }}>
              <span style={{fontSize:15}}>📱</span> WhatsApp
            </button>

            {/* Direct phone send */}
            <button
              onClick={(e)=>{
                e.stopPropagation();
                const ph2 = settings.pharmacy || {};
                const balance2 = inv.total - inv.paid;
                const taxAmt3 = ((inv.tax||0)/100)*(inv.subtotal||0);
                const sep2 = "────────────────────";
                const pharmLine2 = ph2.name ? `*${ph2.name}*` : "*PharmaPro*";
                const addrLine2  = [ph2.address, ph2.city].filter(Boolean).join(", ");
                const phoneLine2 = [ph2.phone, ph2.mobile].filter(Boolean).join(" | ");
                const itemLines2 = (inv.items||[]).map(i=>{
                  const amt2 = (i.qty*(i.perUnitPrice||i.price)).toFixed(0);
                  return `${i.name}\n  ${i.qty} x Rs.${(i.perUnitPrice||i.price).toFixed(0)} = *Rs.${amt2}*`;
                }).join("\n");
                let msg2 = pharmLine2 + "\n";
                if(addrLine2)  msg2 += addrLine2 + "\n";
                if(phoneLine2) msg2 += phoneLine2 + "\n";
                msg2 += sep2 + "\n";
                msg2 += `Invoice: *${inv.id}*\n`;
                msg2 += `Date: ${inv.date}\n`;
                msg2 += `Customer: ${inv.customerName}\n`;
                msg2 += sep2 + "\n";
                msg2 += itemLines2 + "\n";
                msg2 += sep2 + "\n";
                if(inv.discount>0) msg2 += `Discount: -Rs.${Number(inv.discount).toFixed(0)}\n`;
                if(taxAmt3>0)      msg2 += `Tax(${inv.tax}%): Rs.${taxAmt3.toFixed(0)}\n`;
                msg2 += `*TOTAL: Rs.${Number(inv.total).toFixed(0)}*\n`;
                msg2 += `Paid:   Rs.${Number(inv.paid).toFixed(0)}\n`;
                if(balance2>0) msg2 += `*Balance: Rs.${Number(balance2).toFixed(0)}* ⚠️\n`;
                msg2 += sep2 + "\n";
                msg2 += (ph2.footer||"Thank you for your business!");
                const phone = window.prompt("Customer ka WhatsApp number (92xxxxxxxxxx ya 0xxxxxxxxxx):", "");
                if (!phone) return;
                const cleaned = phone.replace(/[^0-9]/g,"").replace(/^0/,"92");
                const url2 = `https://wa.me/${cleaned}?text=${encodeURIComponent(msg2)}`;
                window.open(url2, "_blank");
              }}
              style={{ background:"#128C7E", color:"#fff", border:"none", borderRadius:9, padding:"8px 14px", cursor:"pointer", fontWeight:800, fontSize:13, boxShadow:"0 2px 8px rgba(0,0,0,.12)", flexShrink:0, display:"flex", alignItems:"center", gap:5 }}>
              <span style={{fontSize:15}}>📲</span> Send to No.
            </button>

            <span style={{ color:"rgba(255,255,255,.55)", fontSize:11 }}>{SIZES[printSize].desc}</span>
          </div>
        </div>

        {/* ══ PREVIEW ══ */}
        <div style={{ overflowY:"auto", flex:1, padding:"20px", background:"#e2e8f0" }}>

          {/* Tip */}
          <div style={{ background:"#fff7ed", border:"1px solid #fed7aa", borderRadius:8, padding:"8px 14px", marginBottom:14, fontSize:12, color:"#92400e", textAlign:"center" }}>
            💡 <strong>Print:</strong> Seedha printer pe bhejta hai &nbsp;|&nbsp; <strong>Save as PDF:</strong> Print dialog mein <strong>"Save as PDF"</strong> select karein
          </div>

          {/* Invoice preview card */}
          <div style={{ background: "#fff", borderRadius: 14, overflow: "hidden", boxShadow: "0 2px 14px rgba(0,0,0,.1)", maxWidth: isThm ? (printSize === "thermal58" ? 260 : 340) : "100%", margin: "0 auto" }}>

            {/* Header */}
            <div style={{ background: "linear-gradient(135deg,#1e3a8a,#1d4ed8)", padding: isThm ? "12px 16px" : "18px 24px", display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
              <div>
                <div style={{ color: "#fff", fontWeight: 900, fontSize: isThm ? 15 : 20 }}>💊 {pharmName}</div>
                {!isThm && pharmAddr && <div style={{ color: "rgba(255,255,255,.7)", fontSize: 10, marginTop: 2 }}>{pharmAddr}</div>}
              </div>
              <div style={{ textAlign: "right" }}>
                <div style={{ color: "#fff", fontWeight: 900, fontSize: isThm ? 13 : 18 }}>{inv.id}</div>
                <div style={{ color: "rgba(255,255,255,.7)", fontSize: 10, marginTop: 2 }}>{fmtDate(inv.date)}</div>
                <div style={{ display: "inline-block", marginTop: 4, padding: "2px 9px", borderRadius: 20, background: statusBg[inv.status], color: statusColor[inv.status], fontWeight: 800, fontSize: 10 }}>
                  {inv.status.toUpperCase()}
                </div>
              </div>
            </div>

            <div style={{ padding: isThm ? "12px 14px" : "18px 22px" }}>
              {/* Thermal preview */}
              {isThm ? (
                <div style={{ fontFamily: "'Courier New',monospace", fontSize: printSize === "thermal58" ? 11 : 12 }}>
                  <div style={{ borderBottom: "1px dashed #ccc", paddingBottom: 6, marginBottom: 6 }}>
                    <div style={{ display: "flex", justifyContent: "space-between" }}><span>Customer:</span><strong>{inv.customerName}</strong></div>
                  </div>
                  {inv.items.map((item, i) => {
                    const rate = item.perUnitPrice || item.price;
                    return (
                      <div key={i} style={{ borderBottom: "1px dashed #eee", paddingBottom: 4, marginBottom: 4 }}>
                        <div style={{ fontWeight: 700 }}>{item.name}</div>
                        {item.unitQty > 1 && <div style={{ fontSize: 9, color: "#666" }}>{item.unitQty}pcs/pk · Rs.{Number(item.packPrice).toFixed(2)}/pk</div>}
                        <div style={{ display: "flex", justifyContent: "space-between" }}>
                          <span>{item.qty}{item.unitQty > 1 ? "pcs" : item.unit} × Rs.{Number(rate).toFixed(2)}</span>
                          <strong>Rs.{Number(item.qty * rate).toFixed(2)}</strong>
                        </div>
                      </div>
                    );
                  })}
                  <div style={{ borderTop: "1px dashed #ccc", paddingTop: 5, marginTop: 3 }}>
                    {inv.discount > 0 && <div style={{ display: "flex", justifyContent: "space-between" }}><span>Discount</span><span>-Rs.{Number(inv.discount).toFixed(2)}</span></div>}
                    {inv.tax > 0 && <div style={{ display: "flex", justifyContent: "space-between" }}><span>Tax({inv.tax}%)</span><span>+Rs.{Number(taxAmt).toFixed(2)}</span></div>}
                    <div style={{ display: "flex", justifyContent: "space-between", fontWeight: 900, fontSize: 15, borderTop: "2px solid #000", paddingTop: 3, margin: "3px 0" }}>
                      <span>TOTAL</span><span>Rs.{Number(inv.total).toFixed(2)}</span>
                    </div>
                    <div style={{ display: "flex", justifyContent: "space-between", color: "#16a34a", fontWeight: 700 }}><span>Paid</span><span>Rs.{Number(inv.paid).toFixed(2)}</span></div>
                    <div style={{ display: "flex", justifyContent: "space-between", fontWeight: 700, color: balance > 0 ? "#dc2626" : "#16a34a" }}><span>Balance</span><span>Rs.{Number(balance).toFixed(2)}</span></div>
                  </div>
                  <div style={{ textAlign: "center", marginTop: 8, fontSize: 10, color: "#6b7280" }}>Thank you!</div>
                </div>
              ) : (
                /* A4 / A5 preview */
                <div>
                  <div style={{ display: "flex", gap: 10, marginBottom: 16, flexWrap: "wrap" }}>
                    {[["Bill To", inv.customerName, null, null], ["Invoice No", inv.id, fmtDate(inv.date), null], ["Status", inv.status.toUpperCase(), `Paid: ${fmt(inv.paid)}`, statusColor[inv.status]]].map(([l,v,s,c]) => (
                      <div key={l} style={{ flex: 1, minWidth: 110, background: "#f8fafc", borderRadius: 8, padding: "9px 11px", border: "1px solid #e5e7eb" }}>
                        <div style={{ fontSize: 9, fontWeight: 700, color: "#6b7280", textTransform: "uppercase", marginBottom: 3 }}>{l}</div>
                        <div style={{ fontWeight: 700, fontSize: 12, color: c || "#111" }}>{v}</div>
                        {s && <div style={{ fontSize: 10, color: "#6b7280", marginTop: 1 }}>{s}</div>}
                      </div>
                    ))}
                  </div>
                  <table style={{ width: "100%", borderCollapse: "collapse", marginBottom: 14, fontSize: 12 }}>
                    <thead>
                      <tr style={{ background: "#e0e7ff" }}>
                        {["Item", "Qty", "Rate/pc", "Amount"].map((h, i) => (
                          <th key={h} style={{ padding: "7px 8px", textAlign: i > 0 ? "right" : "left", fontWeight: 800, fontSize: 10, color: "#1e40af" }}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {inv.items.map((item, idx) => {
                        const rate = item.perUnitPrice || item.price;
                        return (
                          <tr key={idx} style={{ background: idx % 2 === 0 ? "#fff" : "#fafafa" }}>
                            <td style={{ padding: "7px 8px", fontWeight: 600, borderBottom: "1px solid #f3f4f6" }}>
                              {item.name}
                              {item.unitQty > 1 && <div style={{ fontSize: 9, color: "#7c3aed" }}>{item.unitQty}pcs·{fmt(item.packPrice)}</div>}
                            </td>
                            <td style={{ padding: "7px 8px", textAlign: "right", borderBottom: "1px solid #f3f4f6" }}>{item.qty} {item.unitQty > 1 ? "pcs" : item.unit}</td>
                            <td style={{ padding: "7px 8px", textAlign: "right", color: "#1d4ed8", fontWeight: 700, borderBottom: "1px solid #f3f4f6" }}>Rs.{Number(rate).toFixed(2)}</td>
                            <td style={{ padding: "7px 8px", textAlign: "right", fontWeight: 800, color: "#16a34a", borderBottom: "1px solid #f3f4f6" }}>{fmt(item.qty * rate)}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                  <div style={{ display: "flex", justifyContent: "flex-end" }}>
                    <div style={{ width: 240, background: "#f8fafc", borderRadius: 10, padding: "12px 14px", border: "1px solid #e5e7eb" }}>
                      {[["Subtotal", fmt(inv.subtotal), "#111"], ["Discount", `− ${fmt(inv.discount)}`, "#dc2626"], [`Tax (${inv.tax}%)`, `+ ${fmt(taxAmt)}`, "#d97706"]].map(([l,v,c]) => (
                        <div key={l} style={{ display: "flex", justifyContent: "space-between", padding: "3px 0", fontSize: 11, borderBottom: "1px solid #f3f4f6" }}>
                          <span style={{ color: "#6b7280" }}>{l}</span><span style={{ fontWeight: 600, color: c }}>{v}</span>
                        </div>
                      ))}
                      <div style={{ display: "flex", justifyContent: "space-between", padding: "8px 0 4px", fontSize: 16, fontWeight: 900, color: "#1d4ed8", borderTop: "2px solid #1d4ed8", marginTop: 3 }}>
                        <span>Total</span><span>{fmt(inv.total)}</span>
                      </div>
                      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, fontWeight: 700, color: "#16a34a", padding: "2px 0" }}><span>✓ Paid</span><span>{fmt(inv.paid)}</span></div>
                      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, fontWeight: 700, color: balance > 0 ? "#dc2626" : "#16a34a", padding: "2px 0" }}><span>Balance</span><span>{fmt(balance)}</span></div>
                    </div>
                  </div>
                </div>
              )}
            </div>

            <div style={{ background: "#f8fafc", borderTop: "1px solid #e5e7eb", padding: "10px", textAlign: "center", fontSize: 11, color: "#6b7280" }}>
              {pharmFooter} · {pharmName}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}


// ─── ACCOUNTS ─────────────────────────────────────────────────────────────────
function Accounts({ data, setData }) {
  const toast = useToast();
  const [modal, setModal] = useState(false);
  const [form, setForm] = useState({ type: "income", category: "", description: "", amount: "", date: new Date().toISOString().split("T")[0] });

  const income = data.accounts.filter((a) => a.type === "income").reduce((s, a) => s + a.amount, 0);
  const expense = data.accounts.filter((a) => a.type === "expense").reduce((s, a) => s + a.amount, 0);

  const save = () => {
    if (!form.amount || !form.description) return toast("Amount aur description zaroori hain!", "error");
    if (!form._payMethod?.method) return toast("Payment method select karein!", "error");
    if (form._payMethod.method!=="cash"&&(!form._payMethod.accountDesc||!form._payMethod.accountName))
      return toast("Account details likhein!", "error");
    const pmDetail = form._payMethod.method!=="cash"
      ? ` | ${form._payMethod.label} — ${form._payMethod.accountDesc} (${form._payMethod.accountName})`
      : "";
    const entry = {
      ...form, id: Date.now(), amount: +form.amount,
      paymentMethod: form._payMethod.method,
      paymentDetail: form._payMethod.accountDesc||"",
      paymentName:   form._payMethod.accountName||"",
      description:   form.description + pmDetail,
    };
    delete entry._payMethod;
    setData((d) => ({ ...d, accounts: [...d.accounts, entry] }));
    toast(`✅ Transaction "${form.description}" add ho gaya!`, "success");
    setModal(false);
    setForm({ type: "income", category: "", description: "", amount: "", date: new Date().toISOString().split("T")[0] });
  };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
        <h2 style={{ margin: 0, fontSize: 22, fontWeight: 800 }}>💼 Accounts Management</h2>
        <Btn onClick={() => setModal(true)}>+ Add Transaction</Btn>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 16, marginBottom: 20 }}>
        <Card style={{ background: "#d1fae5", boxShadow: "none" }}>
          <div style={{ fontSize: 13, fontWeight: 600, color: "#065f46" }}>Total Income</div>
          <div style={{ fontSize: 24, fontWeight: 800, color: "#16a34a" }}>{fmt(income)}</div>
        </Card>
        <Card style={{ background: "#fee2e2", boxShadow: "none" }}>
          <div style={{ fontSize: 13, fontWeight: 600, color: "#991b1b" }}>Total Expenses</div>
          <div style={{ fontSize: 24, fontWeight: 800, color: "#dc2626" }}>{fmt(expense)}</div>
        </Card>
        <Card style={{ background: income - expense >= 0 ? "#dbeafe" : "#fee2e2", boxShadow: "none" }}>
          <div style={{ fontSize: 13, fontWeight: 600, color: "#1e40af" }}>Net Balance</div>
          <div style={{ fontSize: 24, fontWeight: 800, color: income - expense >= 0 ? "#1d4ed8" : "#dc2626" }}>{fmt(income - expense)}</div>
        </Card>
        <Card style={{ background: "#fef3c7", boxShadow: "none" }}>
          <div style={{ fontSize: 13, fontWeight: 600, color: "#92400e" }}>Distributor Payable</div>
          <div style={{ fontSize: 22, fontWeight: 800, color: "#d97706" }}>
            {fmt((data.distributors||[]).filter(d=>+d.balance>0).reduce((s,d)=>s+(+d.balance||0),0))}
          </div>
          <div style={{fontSize:11,color:"#9ca3af"}}>{(data.distributors||[]).filter(d=>+d.balance>0).length} distributors</div>
        </Card>
      </div>

      {/* Distributor Quick Pay */}
      {(data.distributors||[]).filter(d=>+d.balance>0).length > 0 && (
        <Card style={{marginBottom:16,border:"1.5px solid #fde68a",background:"#fffbeb"}}>
          <div style={{fontWeight:700,fontSize:14,color:"#92400e",marginBottom:10}}>🚚 Distributor Payments Due</div>
          {(data.distributors||[]).filter(d=>+d.balance>0).map(dist=>(
            <div key={dist.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
              padding:"8px 0",borderBottom:"1px solid #fde68a"}}>
              <div>
                <div style={{fontWeight:600,fontSize:13}}>{dist.name}</div>
                {dist.company && <div style={{fontSize:11,color:"#9ca3af"}}>{dist.company}</div>}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{fontWeight:800,color:"#dc2626",fontSize:14}}>{fmt(+dist.balance||0)}</div>
                <button onClick={()=>{
                  const amt = prompt("Kitna payment karna hai? (Rs.)", dist.balance);
                  if(!amt || isNaN(amt)) return;
                  setData(d=>({
                    ...d,
                    accounts:[...d.accounts,{
                      id:Date.now(), date:new Date().toISOString().split("T")[0],
                      type:"expense", category:"Distributor Payment",
                      description:"Payment to " + dist.name + (dist.company?" ("+dist.company+")":""),
                      amount:+amt, reference:"DIST-"+dist.id
                    }],
                    distributors:(d.distributors||[]).map(x=>
                      x.id===dist.id ? {...x, balance: Math.max(0,(+x.balance||0)-(+amt))} : x

                  padding:"5px 12px",cursor:"pointer",fontSize:12,fontWeight:700}}>

      )}

      <Card>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 14 }}>
          <thead>
            <tr style={{ background: "#f8fafc" }}>
              {["Date", "Type", "Category", "Description", "Amount"].map((h) => (

          <tbody>

                <td style={{ padding: "10px 12px" }}>{fmtDate(a.date)}</td>
                <td style={{ padding: "10px 12px" }}>{badge(a.type === "income" ? "Income" : "Expense", a.type === "income" ? "green" : "red")}</td>
                <td style={{ padding: "10px 12px" }}>{a.category}</td>
                <td style={{ padding: "10px 12px" }}>
                {a.description}
                {a.paymentMethod && a.paymentMethod !== "cash" && (
                  <div style={{fontSize:11,marginTop:2,color:"#6b7280"}}>
                    💳 {PAYMENT_METHODS.find(p=>p.id===a.paymentMethod)?.label||a.paymentMethod}
                    {a.paymentDetail ? ` — ${a.paymentDetail}` : ""}
                    {a.paymentName ? ` (${a.paymentName})` : ""}
                  </div>
                )}
              </td>
                <td style={{ padding: "10px 12px", fontWeight: 700, color: a.type === "income" ? "#16a34a" : "#dc2626" }}>
                  {a.type === "income" ? "+" : "-"}{fmt(a.amount)}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </Card>

      {modal && (
        <Modal title="Add Transaction" onClose={() => setModal(false)}>
          <Select label="Type" value={form.type} onChange={(v) => setForm((f) => ({ ...f, type: v }))}
            options={[{ value: "income", label: "Income" }, { value: "expense", label: "Expense" }]} />
          <div style={{marginBottom:12}}>
            <label style={{fontSize:12,fontWeight:700,color:"#374151",display:"block",marginBottom:4}}>Category</label>
            <select value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))}
              style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"1.5px solid #e5e7eb",fontSize:14}}>
              <option value="">-- Select Category --</option>
              <optgroup label="Income">
                <option>Sales</option>
                <option>Cash Sales</option>
                <option>Invoice Payment</option>
                <option>Clinic Income</option>
                <option>Other Income</option>
              </optgroup>
              <optgroup label="Expenses">
                <option>Distributor Payment</option>
                <option>Stock Purchase</option>
                <option>Salary</option>
                <option>Advance</option>
                <option>Doctor Payment</option>
                <option>Rent</option>
                <option>Utilities</option>
                <option>Transport</option>
                <option>Miscellaneous</option>

            </select>
          </div>

          <Input label="Amount (Rs.) *" type="number" value={form.amount} onChange={(v) => setForm((f) => ({ ...f, amount: v }))} />
          <Input label="Date" type="date" value={form.date} onChange={(v) => setForm((f) => ({ ...f, date: v }))} />
          <PaymentMethodPicker
            value={form._payMethod}
            direction={form.type==="income"?"receive":"send"}
            onChange={pm=>setForm(f=>({...f,_payMethod:pm}))}
            required />
          <div style={{ display: "flex", justifyContent: "flex-end", gap: 10 }}>
            <Btn color="gray" onClick={() => setModal(false)}>Cancel</Btn>

        </Modal>
      )}
    </div>
  );
}

// ─── ADD PRODUCT FROM DISTRIBUTOR ────────────────────────────────────────────
function AddProductFromDist({ dist, data, setData, onClose }) {
  const toast = useToast();
  const EMPTY_ROW = { productId:"", name:"", batchNo:"", expiry:"", qty:"", costPrice:"", isNew:false };
  const [invoiceNo, setInvoiceNo]   = useState(`DIST-${Date.now().toString().slice(-6)}`);
  const [paymentClear, setPaymentClear] = useState(null); // null | "yes" | "no"
  const [rows, setRows]             = useState([{...EMPTY_ROW}]);
  const [productSearch, setProductSearch] = useState([""]);

  const setRow = (i, k, v) => setRows(rs => rs.map((r,j) => j===i ? {...r,[k]:v} : r));

  // When product selected from dropdown
  const selectProduct = (i, pid) => {
    if (!pid) { setRow(i,"productId",""); setRow(i,"name",""); return; }
    const p = data.products.find(x => String(x.id) === String(pid));
    if (p) {
      setRows(rs => rs.map((r,j) => j===i ? {...r, productId:String(p.id), name:p.name, costPrice:String(p.cost||"")} : r));
    }
  };

  // Press Enter on last row → add new row
  const handleRowKeyDown = (e, i) => {
    if (e.key === "Enter" && i === rows.length - 1) {
      setRows(r => [...r, {...EMPTY_ROW}]);
      setProductSearch(s => [...s, ""]);
      setTimeout(() => {
        const inputs = document.querySelectorAll(".dist-row-product");
        if (inputs[i+1]) inputs[i+1].focus();
      }, 50);
    }
  };

  const removeRow = i => {
    if (rows.length === 1) return;
    setRows(r => r.filter((_,j)=>j!==i));
    setProductSearch(s => s.filter((_,j)=>j!==i));
  };

  const totalCost = rows.reduce((s,r) => s + ((+r.costPrice||0)*(+r.qty||0)), 0);

  const save = () => {
    const validRows = rows.filter(r => r.name && +r.qty > 0);
    if (!invoiceNo) return toast("Invoice number daakhil karein!", "error");
    if (!validRows.length) return toast("Kam az kam ek product add karein!", "error");
    if (paymentClear === null) return toast("Payment clear select karein!", "error");

    // Update product stocks
    setData(d => {
      let products = [...d.products];
      validRows.forEach(r => {
        const idx = products.findIndex(p => String(p.id) === String(r.productId));
        if (idx >= 0) {
          // Update existing product stock + expiry
          products[idx] = {
            ...products[idx],
            stock: products[idx].stock + (+r.qty||0),
            ...(r.expiry ? {expiry: r.expiry} : {}),
            ...(r.costPrice ? {cost: +r.costPrice} : {}),
            supplier: dist.name,
          };
        } else if (r.name) {
          // New product
          products.push({
            id: Date.now() + Math.random(),
            name: r.name, supplier: dist.name,
            category: "General", unit: "Tablets",
            price: 0, cost: +r.costPrice||0, margin: 0,
            stock: +r.qty||0, reorder: 50,
            expiry: r.expiry||"", barcode: "",
          });
        }
      });

      // Add to accounts if payment clear
      const accounts = paymentClear === "yes"
        ? [...d.accounts, {
            id: Date.now(), date: new Date().toISOString().split("T")[0],
            type: "expense", category: "Purchase",
            description: `${invoiceNo} - Purchase from ${dist.name}`,
            amount: totalCost,
          }]
        : d.accounts;

      // Update distributor balance if not paid
      const distributors = (d.distributors||[]).map(x =>
        x.id === dist.id
          ? {...x, balance: (x.balance||0) + (paymentClear==="no" ? totalCost : 0)}
          : x
      );

      // Add to dist history
      const distHistory = [...(d.distHistory||[]), {
        id: invoiceNo, date: new Date().toISOString().split("T")[0],
        distributor: dist.name, items: validRows,
        totalCost, paymentClear, type:"purchase",
      }];

      return {...d, products, accounts, distributors, distHistory};
    });

    toast(`✅ ${invoiceNo} — ${validRows.length} products added from ${dist.name}!`, "success");
    onClose();
  };

  return (
    <Modal wide title={`🚚 Purchase from ${dist.name}`} onClose={onClose}>
      {/* Header */}
      <div style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:10,padding:"10px 14px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontSize:13,color:"#1e40af",fontWeight:700}}>🚚 {dist.name} {dist.company?`(${dist.company})`:""}</span>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:13,fontWeight:700,color:"#374151"}}>Invoice #</span>
          <input value={invoiceNo} onChange={e=>setInvoiceNo(e.target.value)}
            style={{padding:"6px 10px",border:"1.5px solid #93c5fd",borderRadius:7,fontSize:13,fontWeight:700,width:160,outline:"none"}}/>
        </div>
      </div>

      {/* Rows Table */}
      <div style={{overflowX:"auto",marginBottom:14}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
          <thead>
            <tr style={{background:"#f8fafc"}}>
              {["#","Product Name *","Batch No","Expiry","Qty (Packs) *","Cost Price",""].map(h=>(
                <th key={h} style={{padding:"8px 10px",textAlign:"left",fontWeight:700,borderBottom:"2px solid #e5e7eb",whiteSpace:"nowrap"}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {rows.map((row,i) => (
              <tr key={i} style={{borderBottom:"1px solid #f3f4f6"}}>
                <td style={{padding:"6px 8px",color:"#9ca3af",fontWeight:700}}>{i+1}</td>
                <td style={{padding:"4px 6px",minWidth:180}}>
                  <select
                    className="dist-row-product"
                    value={row.productId}
                    onChange={e=>selectProduct(i,e.target.value)}
                    onKeyDown={e=>handleRowKeyDown(e,i)}
                    style={{width:"100%",padding:"7px 8px",border:"1.5px solid #d1d5db",borderRadius:7,fontSize:13,outline:"none"}}>
                    <option value="">-- Select Product --</option>
                    {data.products.map(p=>(
                      <option key={p.id} value={p.id}>{p.name}</option>
                    ))}
                    <option value="__new__">➕ New Product...</option>
                  </select>
                  {row.productId==="__new__" && (
                    <input placeholder="New product name" value={row.name}
                      onChange={e=>setRow(i,"name",e.target.value)}
                      style={{marginTop:4,width:"100%",padding:"6px 8px",border:"1.5px solid #fbbf24",borderRadius:7,fontSize:12,outline:"none"}}/>
                  )}
                </td>
                <td style={{padding:"4px 6px"}}>
                  <input value={row.batchNo||""} onChange={e=>setRow(i,"batchNo",e.target.value)}
                    placeholder="e.g. B001"
                    style={{width:90,padding:"7px 8px",border:"1.5px solid #d1d5db",borderRadius:7,fontSize:13,outline:"none"}}/>
                </td>
                <td style={{padding:"4px 6px"}}>
                  <input type="date" value={row.expiry||""} onChange={e=>setRow(i,"expiry",e.target.value)}
                    style={{width:130,padding:"7px 8px",border:"1.5px solid #d1d5db",borderRadius:7,fontSize:13,outline:"none"}}/>
                </td>
                <td style={{padding:"4px 6px"}}>
                  <input type="number" min="1" value={row.qty||""}
                    onChange={e=>setRow(i,"qty",e.target.value)}
                    onKeyDown={e=>handleRowKeyDown(e,i)}
                    placeholder="Qty"
                    style={{width:80,padding:"7px 8px",border:"1.5px solid #d1d5db",borderRadius:7,fontSize:13,outline:"none",fontWeight:700}}/>
                </td>
                <td style={{padding:"4px 6px"}}>
                  <input type="number" min="0" value={row.costPrice||""}
                    onChange={e=>setRow(i,"costPrice",e.target.value)}
                    placeholder="Cost"
                    style={{width:90,padding:"7px 8px",border:"1.5px solid #d1d5db",borderRadius:7,fontSize:13,outline:"none"}}/>
                </td>
                <td style={{padding:"4px 6px"}}>
                  <button onClick={()=>removeRow(i)}
                    style={{background:"#fee2e2",color:"#dc2626",border:"none",borderRadius:6,padding:"5px 10px",cursor:"pointer",fontWeight:700,fontSize:12}}>✕</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <button onClick={()=>{setRows(r=>[...r,{...EMPTY_ROW}]);setProductSearch(s=>[...s,""]); }}
        style={{padding:"7px 16px",background:"#f0fdf4",color:"#16a34a",border:"1.5px dashed #86efac",borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:13,marginBottom:16}}>
        + Add Row
      </button>

      {/* Total */}
      <div style={{background:"#f8fafc",borderRadius:10,padding:"10px 16px",marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontWeight:700,color:"#374151"}}>Total Purchase Cost:</span>
        <span style={{fontWeight:800,fontSize:16,color:"#1d4ed8"}}>{fmt(totalCost)}</span>
      </div>

      {/* Payment Clear */}
      <div style={{marginBottom:16}}>
        <div style={{fontWeight:700,fontSize:13,color:"#374151",marginBottom:8}}>💳 Payment Clear?</div>
        <div style={{display:"flex",gap:12}}>
          <button onClick={()=>setPaymentClear("yes")}
            style={{flex:1,padding:"10px",borderRadius:9,fontWeight:700,fontSize:14,cursor:"pointer",
              border: paymentClear==="yes"?"2px solid #16a34a":"2px solid #e5e7eb",
              background: paymentClear==="yes"?"#d1fae5":"#fff",
              color: paymentClear==="yes"?"#16a34a":"#374151"}}>
            ✅ Yes — Payment Done
          </button>
          <button onClick={()=>setPaymentClear("no")}
            style={{flex:1,padding:"10px",borderRadius:9,fontWeight:700,fontSize:14,cursor:"pointer",
              border: paymentClear==="no"?"2px solid #dc2626":"2px solid #e5e7eb",
              background: paymentClear==="no"?"#fee2e2":"#fff",
              color: paymentClear==="no"?"#dc2626":"#374151"}}>
            ❌ No — Baki Hai (Credit)
          </button>
        </div>
        {paymentClear==="no" && (
          <div style={{marginTop:8,padding:"8px 12px",background:"#fef3c7",borderRadius:8,fontSize:12,color:"#92400e",fontWeight:600}}>
            ⚠️ {fmt(totalCost)} distributor ke account mein pending add ho jaega
          </div>
        )}
      </div>

      <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
        <Btn color="gray" onClick={onClose}>Cancel</Btn>
        <Btn onClick={save}>✅ Save Purchase</Btn>
      </div>
    </Modal>
  );
}

function Distributors({ data, setData }) {
  const toast = useToast();
  const [modal, setModal] = useState(null);
  const [search, setSearch] = useState("");
  const EMPTY = { name:"", company:"", phone:"", mobile:"", email:"", address:"", city:"", ntn:"", creditLimit:"", paymentTerms:"30 days", notes:"", balance:0 };
  const [form, setForm] = useState({...EMPTY});

  const filtered = (data.distributors||[]).filter(d =>
    d.name.toLowerCase().includes(search.toLowerCase()) ||
    (d.company||"").toLowerCase().includes(search.toLowerCase())
  );

  const sf = k => v => setForm(f => ({...f, [k]: v}));

  const save = () => {
    if (!form.name) return toast("Distributor name zaroori hai!", "error");
    if (modal === "add") {
      const newDist = {...form, id: Date.now(), balance: +form.balance||0, createdAt: new Date().toISOString().split("T")[0]};
      setData(d => ({...d, distributors: [...(d.distributors||[]), newDist]}));
      toast(`✅ "${form.name}" distributor add ho gaya!`, "success");
    } else {
      setData(d => ({...d, distributors: (d.distributors||[]).map(x => x.id===form.id ? {...form, balance:+form.balance||0} : x)}));
      toast(`✅ "${form.name}" update ho gaya!`, "success");
    }
    setModal(null);
    setForm({...EMPTY});
  };

  const del = (dist) => {
    if (!window.confirm(`"${dist.name}" delete karein?`)) return;
    setData(d => ({...d, distributors: (d.distributors||[]).filter(x => x.id !== dist.id)}));
    toast("🗑️ Distributor delete ho gaya", "warning");
  };

  const totalBalance = (data.distributors||[]).reduce((s,d) => s + (+d.balance||0), 0);

        </Card>
        <Card style={{background: totalBalance>=0?"#d1fae5":"#fee2e2",boxShadow:"none"}}>
          <div style={{fontSize:13,fontWeight:600,color:"#065f46"}}>Total Balance</div>
          <div style={{fontSize:22,fontWeight:800,color:totalBalance>=0?"#16a34a":"#dc2626"}}>{fmt(Math.abs(totalBalance))}</div>
          <div style={{fontSize:11,color:"#6b7280"}}>{totalBalance>=0?"We owe them":"They owe us"}</div>
        </Card>
        <Card style={{background:"#f0fdf4",boxShadow:"none"}}>
          <div style={{fontSize:13,fontWeight:600,color:"#065f46"}}>Active Suppliers</div>
          <div style={{fontSize:28,fontWeight:800,color:"#16a34a"}}>{(data.distributors||[]).length}</div>
        </Card>
      </div>

      {/* Search */}
      <input value={search} onChange={e=>setSearch(e.target.value)}
        placeholder="🔍 Distributor search..." 
        style={{width:"100%",border:"1.5px solid #e5e7eb",borderRadius:9,padding:"9px 14px",fontSize:14,marginBottom:16,outline:"none"}}/>

      {/* List */}
      {filtered.map(dist => (
        <Card key={dist.id} style={{marginBottom:12}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div style={{flex:1}}>
              <div style={{fontWeight:800,fontSize:15}}>{dist.name}</div>
              {dist.company && <div style={{color:"#6b7280",fontSize:13}}>🏢 {dist.company}</div>}
              <div style={{display:"flex",gap:16,marginTop:6,fontSize:13,color:"#374151",flexWrap:"wrap"}}>
                {dist.phone && <span>📞 {dist.phone}</span>}
                {dist.mobile && <span>📱 {dist.mobile}</span>}
                {dist.city && <span>📍 {dist.city}</span>}
                {dist.paymentTerms && <span>⏱️ {dist.paymentTerms}</span>}
              </div>
              {dist.address && <div style={{fontSize:12,color:"#9ca3af",marginTop:4}}>📮 {dist.address}</div>}
            </div>
            <div style={{textAlign:"right",minWidth:120}}>
              <div style={{fontWeight:800,fontSize:16,color:+dist.balance>=0?"#dc2626":"#16a34a"}}>
                {fmt(Math.abs(+dist.balance||0))}
              </div>
              <div style={{fontSize:11,color:"#9ca3af",marginBottom:8}}>{+dist.balance>=0?"Payable":"Receivable"}</div>
              <div style={{display:"flex",gap:6,justifyContent:"flex-end"}}>
                <Btn small color="success" onClick={()=>setModal({type:"addproduct",dist})}>+ Product</Btn>
                <Btn small onClick={()=>{setForm({...dist,balance:String(dist.balance||0)});setModal("edit");}}>Edit</Btn>
                <Btn small color="danger" onClick={()=>del(dist)}>Del</Btn>
              </div>
            </div>
          </div>
          {dist.notes && <div style={{marginTop:8,padding:"6px 10px",background:"#f9fafb",borderRadius:6,fontSize:12,color:"#6b7280"}}>📝 {dist.notes}</div>}
        </Card>
      ))}

      {filtered.length===0 && (
        <div style={{textAlign:"center",padding:60,color:"#9ca3af"}}>
          <div style={{fontSize:48,marginBottom:12}}>🚚</div>
          <div style={{fontWeight:600}}>Koi distributor nahi mila</div>
          <div style={{fontSize:13,marginTop:4}}>+ Add Distributor button se add karein</div>
        </div>
      )}

      {/* Add Product from Distributor modal */}
      {modal?.type === "addproduct" && (
        <AddProductFromDist dist={modal.dist} data={data} setData={setData} onClose={()=>setModal(null)} />
      )}

      {modal && typeof modal === "string" && (
        <Modal wide title={modal==="add"?"➕ Add Distributor":"✏️ Edit Distributor"} onClose={()=>setModal(null)}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 16px"}}>
            <Input label="Distributor Name *" value={form.name} onChange={sf("name")}/>
            <Input label="Company Name" value={form.company} onChange={sf("company")}/>
            <Input label="Phone" value={form.phone} onChange={sf("phone")}/>
            <Input label="Mobile" value={form.mobile} onChange={sf("mobile")}/>
            <Input label="Email" value={form.email} onChange={sf("email")}/>
            <Input label="City" value={form.city} onChange={sf("city")}/>
            <Input label="NTN Number" value={form.ntn} onChange={sf("ntn")}/>
            <Input label="Credit Limit (Rs.)" value={form.creditLimit} onChange={sf("creditLimit")} type="number"/>
            <Input label="Payment Terms" value={form.paymentTerms} onChange={sf("paymentTerms")} placeholder="e.g. 30 days"/>
            <Input label="Current Balance (Rs.)" value={form.balance} onChange={sf("balance")} type="number"/>
          </div>
          <Input label="Full Address" value={form.address} onChange={sf("address")}/>
          <Input label="Notes" value={form.notes} onChange={sf("notes")}/>
          <div style={{background:"#eff6ff",borderRadius:8,padding:"10px 14px",fontSize:12,color:"#1e40af",marginBottom:12}}>
            💡 <strong>Balance:</strong> Positive = aap unhe paisa dete ho (Payable) | Negative = woh aap ko paisa dete hain (Receivable)
          </div>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
            <Btn color="gray" onClick={()=>setModal(null)}>Cancel</Btn>
            <Btn onClick={save}>💾 Save Distributor</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}

function Settings({ settings, setSettings, data, setData, onDbConfigSaved, dbStatus }) {
  const toast = useToast();
  const [tab, setTab]         = useState("pharmacy");
  const [saved, setSaved]     = useState(false);
  const [pharma, setPharma]   = useState({ ...settings.pharmacy });
  const [appCfg, setAppCfg]   = useState({ ...settings.app });

  // DB Config state — loaded from localStorage
  const initCfg = getSbConfig();
  const [dbCfg, setDbCfg] = useState({ url: initCfg.url, key: initCfg.key, enabled: initCfg.enabled });
  const [testing, setTesting] = useState(false);
  const [testResult, setTestResult] = useState(null); // null | "ok" | "fail"

  const savePharmacy = () => {
    if (!pharma.name) return toast("Pharmacy ka naam zaroori hai!", "error");
    setSettings((s) => ({ ...s, pharmacy: { ...pharma } }));
    toast("✅ Pharmacy information save ho gayi!", "success");
  };
  const saveApp = () => {
    setSettings((s) => ({ ...s, app: { ...appCfg } }));
    toast("✅ App settings save ho gayi!", "success");
  };

  // ── Backup: download full JSON ──
  const handleBackup = () => {
    const payload = JSON.stringify({ data, settings, exportedAt: new Date().toISOString() }, null, 2);
    const blob = new Blob([payload], { type: "application/json" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url; a.download = `PharmaPro-Backup-${new Date().toISOString().split("T")[0]}.json`;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
    toast("✅ Backup file download ho gayi!", "success");
  };

  // ── Restore: import JSON backup ──
  const handleRestore = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const parsed = JSON.parse(ev.target.result);
        if (!parsed.data || !parsed.settings) return toast("❌ Invalid backup file!", "error");
        setData(parsed.data);
        setSettings(parsed.settings);
        toast("✅ Data successfully restore ho gaya!", "success");
      } catch { toast("❌ Invalid backup file format!", "error"); }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  const TABS = [
    { id: "pharmacy", label: "🏥 Pharmacy Info" },
    { id: "app",      label: "⚙️ App Settings" },
    { id: "backup",   label: "💾 Backup & Restore" },

          placeholder={opts.placeholder || ""}
          style={{ width: "100%", padding: "9px 12px", border: "1px solid #d1d5db", borderRadius: 9, fontSize: 14, boxSizing: "border-box", outline: "none", resize: "vertical" }} />

        {TABS.map((t) => (
          <button key={t.id} onClick={() => setTab(t.id)}
            style={{ padding: "8px 18px", borderRadius: 9, border: "none", cursor: "pointer", fontWeight: 700, fontSize: 13, flexShrink: 0,
              background: tab === t.id ? "#fff" : "transparent", color: tab === t.id ? "#1d4ed8" : "#6b7280",

const DB_PASSWORD = "pharma1234"; // default password

function DatabaseViewer({ data, settings, onClose }) {
  const [entered, setEntered]   = useState("");
  const [unlocked, setUnlocked] = useState(false);
  const [error, setError]       = useState("");
  const [dbTab, setDbTab]       = useState("products");

  const [pwForm, setPwForm]     = useState({ old: "", newPw: "", confirm: "" });
  const [pwError, setPwError]   = useState("");
  const [dbPassword, setDbPassword] = useState(
    (() => { try { return localStorage.getItem("pharma_db_pw") || DB_PASSWORD; } catch { return DB_PASSWORD; } })()
  );

  const tryUnlock = () => {
    if (entered === dbPassword) { setUnlocked(true); setError(""); }
    else { setError("❌ Wrong password!"); setEntered(""); }
  };

  const handleChangePw = () => {
    if (pwForm.old !== dbPassword) return setPwError("Old password galat hai");

    if (pwForm.newPw !== pwForm.confirm) return setPwError("Passwords match nahi kar rahe");
    try { localStorage.setItem("pharma_db_pw", pwForm.newPw); } catch {}
    setDbPassword(pwForm.newPw);

                style={{ background: "rgba(255,255,255,.15)", border: "1px solid rgba(255,255,255,.3)", color: "#fff", borderRadius: 8, padding: "7px 14px", cursor: "pointer", fontSize: 13, fontWeight: 600 }}>
