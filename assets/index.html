// ─── PATIENT CHECKUP FORM ────────────────────────────────────────────────────
function PatientCheckup({ data, setData, currentUser }) {
  const toast = useToast();
  const EMPTY = {
    doctorId:"", patientName:"", checkupFee:"", bp:"",
    serviceFee:"", diagnosis:"", medicines:[], notes:"",
  };
  const [form, setForm]         = useState({...EMPTY});
  const [medSearch, setMedSearch] = useState("");
  const [viewRec, setViewRec]   = useState(null);

  const doctors = data.doctors || [];
  const records = data.patientRecords || [];

  const sf = k => v => setForm(f=>({...f,[k]:v}));

  const addMedicine = (prod) => {
    if (form.medicines.find(m=>String(m.productId)===String(prod.id))) {
      toast("Already added!", "warning"); return;
    }
    const unitQty   = prod.unitQty || 1;
    const packPrice = prod.price;
    const unitPrice = unitQty > 1 ? packPrice / unitQty : packPrice;
    setForm(f=>({...f, medicines:[...f.medicines, {
      productId: String(prod.id),
      name:      prod.name,
      unit:      prod.unit || "",
      unitQty:   unitQty,
      packPrice: packPrice,
      unitPrice: unitPrice,
      qty:       1,                // default 1 unit (piece)
      qtyMode:   "units",          // "units" | "packs"
      price:     unitPrice,        // price charged per unit
    }]}));
    setMedSearch("");
  };

  const updateMedQty = (pid, qty) => {
    setForm(f=>({...f, medicines:f.medicines.map(m=>{
      if (String(m.productId)!==String(pid)) return m;
      const newQty = Math.max(1, +qty||1);
      return {...m, qty: newQty};
    })}));
  };

  const toggleQtyMode = (pid) => {
    setForm(f=>({...f, medicines:f.medicines.map(m=>{
      if (String(m.productId)!==String(pid)) return m;
      const newMode = m.qtyMode==="units" ? "packs" : "units";
      const newPrice= newMode==="packs" ? m.packPrice : m.unitPrice;
      return {...m, qtyMode:newMode, price:newPrice, qty:1};
    })}));
  };

  const removeMed = pid => setForm(f=>({...f, medicines:f.medicines.filter(m=>String(m.productId)!==String(pid))}));

  const medTotal = form.medicines.reduce((s,m)=>{
    if (m.qtyMode==="packs") return s + (m.packPrice * m.qty);
    return s + (m.unitPrice * m.qty);
  },0);
  const checkupFee = +form.checkupFee||0;
  const serviceFee = +form.serviceFee||0;
  const grandTotal = checkupFee + serviceFee + medTotal;

  const filteredProds = medSearch.length>1
    ? data.products.filter(p=>p.name.toLowerCase().includes(medSearch.toLowerCase())).slice(0,8)
    : [];

  const submit = () => {
    if (!form.doctorId)    return toast("Doctor select karein!", "error");
    if (!form.patientName) return toast("Patient name likhein!", "error");
    if (!checkupFee)       return toast("Checkup fee likhein!", "error");

    const doctor = doctors.find(d=>String(d.id)===String(form.doctorId));
    if (!doctor) return toast("Doctor nahi mila!", "error");

    const recId   = `PAT-${String((records.length+1)).padStart(4,"0")}`;
    const invId   = `INV-PAT-${String((data.invoices.length+1)).padStart(3,"0")}`;
    const today   = new Date().toISOString().split("T")[0];

    // Doctor fee share
    const sharePercent = +(doctor.feeShare||0);
    const doctorShare  = (checkupFee * sharePercent / 100);
    const storeShare   = checkupFee - doctorShare;

    const record = {
      id: recId, date: today,
      doctorId: String(form.doctorId), doctorName: doctor.name,
      patientName: form.patientName,
      checkupFee, serviceFee, bp: form.bp,
      diagnosis: form.diagnosis, notes: form.notes,
      medicines: form.medicines,
      medTotal, grandTotal,
      invoiceId: invId,
      doctorShare, storeShare, sharePercent,
      createdBy: currentUser?.name||"System",
    };

    // Invoice for medicines
    const invoice = form.medicines.length > 0 ? {
      id: invId, date: today,
      customerId: "clinic", customerName: form.patientName,
      items: form.medicines.map(m=>({
        productId: m.productId, name: m.name,
        qty:       m.qty,
        qtyMode:   m.qtyMode||"units",
        price:     m.price,
        unitQty:   m.unitQty||1,
        packPrice: m.packPrice,
        unitPrice: m.unitPrice||m.price,
      })),
      subtotal: medTotal, discount:0, tax:0,
      total: grandTotal, paid: grandTotal,
      status:"paid",
      notes:`Patient: ${form.patientName} | Dr. ${doctor.name} | ${form.diagnosis||""}`,
      createdBy: currentUser?.name||"System",
    } : null;

    setData(d => ({
      ...d,
      patientRecords: [...(d.patientRecords||[]), record],
      // Deduct medicine stock — units mode → convert to packs for stock
      products: d.products.map(p=>{
        const m = form.medicines.find(x=>String(x.productId)===String(p.id));
        if (!m) return p;
        let packsToDeduct;
        if (m.qtyMode==="packs") {
          packsToDeduct = m.qty;
        } else {
          // units mode → convert to packs (ceil so partial pack counts)
          packsToDeduct = Math.ceil(m.qty / (m.unitQty||1));
        }
        return {...p, stock: Math.max(0, p.stock - packsToDeduct)};
      }),
      // Add invoice
      invoices: invoice ? [...d.invoices, invoice] : d.invoices,
      // Add to accounts
      accounts: [...d.accounts,
        { id:Date.now(), date:today, type:"income", category:"Clinic",
          description:`${recId} - Checkup: ${form.patientName} | Dr.${doctor.name}`,
          amount: checkupFee + serviceFee },
        ...(medTotal>0 ? [{
          id:Date.now()+1, date:today, type:"income", category:"Sales",
          description:`${invId} - Medicine: ${form.patientName}`, amount:medTotal,
        }] : []),
      ],
      // Add doctor pending share
      doctors: (d.doctors||[]).map(doc=>
        String(doc.id)===String(form.doctorId)
          ? {...doc, pendingAmount:(+doc.pendingAmount||0)+doctorShare}
          : doc
      ),
    }));

    toast(`✅ ${recId} — ${form.patientName} checkup complete! Dr.${doctor.name} share: ${fmt(doctorShare)}`, "success");
    setViewRec(record);
    setForm({...EMPTY});
  };

  return (
    <div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
        {/* Left: Form */}
        <Card>
          <div style={{fontWeight:800,fontSize:15,marginBottom:16,color:"#1d4ed8"}}>🩺 New Patient Checkup</div>

          {/* Doctor */}
          <div style={{marginBottom:12}}>
            <label style={{display:"block",fontSize:13,fontWeight:700,marginBottom:5}}>Doctor *</label>
            <select value={form.doctorId} onChange={e=>sf("doctorId")(e.target.value)}
              style={{width:"100%",padding:"9px 12px",border:"1.5px solid #d1d5db",borderRadius:8,fontSize:14,outline:"none"}}>
              <option value="">-- Doctor Select Karein --</option>
              {doctors.map(d=>(
                <option key={d.id} value={d.id}>Dr. {d.name} ({d.feeShare||0}% share)</option>
              ))}
            </select>
            {doctors.length===0 && <div style={{fontSize:11,color:"#dc2626",marginTop:4}}>⚠️ Pehle Doctor List mein doctor add karein</div>}
          </div>

          {/* Patient Name */}
          <div style={{marginBottom:12}}>
            <label style={{display:"block",fontSize:13,fontWeight:700,marginBottom:5}}>Patient Name *</label>
            <input value={form.patientName} onChange={e=>sf("patientName")(e.target.value)}
              placeholder="Patient ka naam"
              style={{width:"100%",padding:"9px 12px",border:"1.5px solid #d1d5db",borderRadius:8,fontSize:14,outline:"none"}}/>
          </div>

          {/* Fees row */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
            <div style={{marginBottom:12}}>
              <label style={{display:"block",fontSize:13,fontWeight:700,marginBottom:5}}>Checkup Fee *</label>
              <input type="number" value={form.checkupFee} onChange={e=>sf("checkupFee")(e.target.value)}
                placeholder="e.g. 500"
                style={{width:"100%",padding:"9px 12px",border:"1.5px solid #d1d5db",borderRadius:8,fontSize:14,outline:"none"}}/>
            </div>
            <div style={{marginBottom:12}}>
              <label style={{display:"block",fontSize:13,fontWeight:700,marginBottom:5}}>BP</label>
              <input value={form.bp} onChange={e=>sf("bp")(e.target.value)}
                placeholder="e.g. 120/80"
                style={{width:"100%",padding:"9px 12px",border:"1.5px solid #d1d5db",borderRadius:8,fontSize:14,outline:"none"}}/>
            </div>
            <div style={{marginBottom:12}}>
              <label style={{display:"block",fontSize:13,fontWeight:700,marginBottom:5}}>Service Fee</label>
              <input type="number" value={form.serviceFee} onChange={e=>sf("serviceFee")(e.target.value)}
                placeholder="e.g. 100"
                style={{width:"100%",padding:"9px 12px",border:"1.5px solid #d1d5db",borderRadius:8,fontSize:14,outline:"none"}}/>
            </div>
            <div style={{marginBottom:12}}>
              <label style={{display:"block",fontSize:13,fontWeight:700,marginBottom:5}}>Diagnosis</label>
              <input value={form.diagnosis} onChange={e=>sf("diagnosis")(e.target.value)}
                placeholder="e.g. Flu, Diabetes..."
                style={{width:"100%",padding:"9px 12px",border:"1.5px solid #d1d5db",borderRadius:8,fontSize:14,outline:"none"}}/>
            </div>
          </div>

          {/* Medicine Search */}
          <div style={{marginBottom:8}}>
            <label style={{display:"block",fontSize:13,fontWeight:700,marginBottom:5}}>💊 Medicine Add Karein</label>
            <div style={{position:"relative"}}>
              <input value={medSearch} onChange={e=>setMedSearch(e.target.value)}
                placeholder="Product name type karein..."
                style={{width:"100%",padding:"9px 12px",border:"1.5px solid #93c5fd",borderRadius:8,fontSize:14,outline:"none"}}/>
              {filteredProds.length>0 && (
                <div style={{position:"absolute",top:"100%",left:0,right:0,background:"#fff",border:"1.5px solid #e5e7eb",borderRadius:8,zIndex:100,boxShadow:"0 4px 16px rgba(0,0,0,.1)",maxHeight:200,overflowY:"auto"}}>
                  {filteredProds.map(p=>(
                    <div key={p.id} onClick={()=>addMedicine(p)}
                      style={{padding:"9px 14px",cursor:"pointer",borderBottom:"1px solid #f3f4f6",fontSize:13,fontWeight:600}}
                      onMouseEnter={e=>e.currentTarget.style.background="#eff6ff"}
                      onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
                      💊 {p.name} — {fmt(p.price)} — Stock:{p.stock}
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>

          {/* Medicine List */}
          {form.medicines.length>0 && (
            <div style={{background:"#f8fafc",borderRadius:9,padding:"10px",marginBottom:12}}>
              {form.medicines.map(m=>{
                const isPacks = m.qtyMode==="packs";
                const lineTotal = isPacks ? (m.packPrice||m.price)*m.qty : (m.unitPrice||m.price)*m.qty;
                const hasUnits  = (m.unitQty||1) > 1;
                return (
                  <div key={m.productId} style={{marginBottom:8,padding:"8px 10px",background:"#fff",borderRadius:8,border:"1px solid #e5e7eb"}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:hasUnits?5:0}}>
                      <span style={{flex:1,fontSize:13,fontWeight:700}}>💊 {m.name}</span>
                      <button onClick={()=>removeMed(m.productId)}
                        style={{background:"none",border:"none",color:"#dc2626",cursor:"pointer",fontWeight:700,fontSize:14}}>✕</button>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                      {hasUnits && (
                        <button onClick={()=>toggleQtyMode(m.productId)}
                          style={{padding:"3px 10px",borderRadius:20,border:"2px solid",cursor:"pointer",fontSize:11,fontWeight:700,transition:"all .15s",
                            borderColor: isPacks?"#7c3aed":"#1d4ed8",
                            background:  isPacks?"#ede9fe":"#dbeafe",
                            color:       isPacks?"#7c3aed":"#1d4ed8"}}>
                          {isPacks?"📦 Packs":"💊 Units"}
                        </button>
                      )}
                      <input type="number" min="1" value={m.qty}
                        onChange={e=>updateMedQty(m.productId,e.target.value)}
                        style={{width:65,padding:"5px 8px",border:"1.5px solid #d1d5db",borderRadius:6,fontSize:13,textAlign:"center",fontWeight:700}}/>
                      <span style={{fontSize:12,color:"#6b7280"}}>{isPacks?"pack(s)":"unit(s)"}</span>
                      {hasUnits && (
                        <span style={{fontSize:11,color:"#7c3aed",background:"#f5f3ff",padding:"2px 8px",borderRadius:12}}>
                          {isPacks
                            ? `${m.qty} pack × Rs.${Number(m.packPrice).toFixed(2)}`
                            : `${m.qty} unit${m.qty>1?"s":""} × Rs.${Number(m.unitPrice||m.price).toFixed(2)} (${m.unitQty} units/pack)`}
                        </span>
                      )}
                      <div style={{display:"flex",alignItems:"center",gap:4,marginLeft:"auto"}}>
                        <span style={{fontSize:11,color:"#6b7280"}}>Rate:</span>
                        <input
                          type="number" min="0" step="0.01"
                          value={isPacks ? (m.packPrice||m.price) : (m.unitPrice||m.price)}
                          onChange={e => {
                            const newRate = parseFloat(e.target.value)||0;
                            setForm(f=>({...f, medicines:f.medicines.map(mx=>
                              String(mx.productId)===String(m.productId)
                                ? isPacks
                                  ? {...mx, packPrice:newRate, price:newRate}
                                  : {...mx, unitPrice:newRate, price:newRate}
                                : mx
                            )}));
                          }}
                          style={{width:80,padding:"4px 7px",border:"1.5px solid #93c5fd",borderRadius:6,
                            fontSize:13,textAlign:"center",fontWeight:700,background:"#eff6ff",outline:"none"}}
                        />
                        <span style={{fontSize:13,fontWeight:800,color:"#1d4ed8"}}>{fmt(lineTotal)}</span>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* Summary */}
          <div style={{background:"#eff6ff",borderRadius:9,padding:"10px 14px",marginBottom:14,fontSize:13}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
              <span>Checkup Fee:</span><span style={{fontWeight:700}}>{fmt(checkupFee)}</span>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
              <span>Service Fee:</span><span style={{fontWeight:700}}>{fmt(serviceFee)}</span>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
              <span>Medicine:</span><span style={{fontWeight:700}}>{fmt(medTotal)}</span>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",borderTop:"1px solid #bfdbfe",paddingTop:6,marginTop:4}}>
              <span style={{fontWeight:800}}>Grand Total:</span>
              <span style={{fontWeight:800,color:"#1d4ed8",fontSize:15}}>{fmt(grandTotal)}</span>
            </div>
            {form.doctorId && doctors.find(d=>String(d.id)===String(form.doctorId)) && (
              <div style={{marginTop:6,padding:"5px 8px",background:"#fef3c7",borderRadius:6,fontSize:12,color:"#92400e"}}>
                👨‍⚕️ Doctor share ({doctors.find(d=>String(d.id)===String(form.doctorId))?.feeShare||0}%):
                {fmt(checkupFee*(+(doctors.find(d=>String(d.id)===String(form.doctorId))?.feeShare||0))/100)}
              </div>
            )}
          </div>

          <Btn onClick={submit} style={{width:"100%"}}>✅ Submit Checkup & Generate Invoice</Btn>
        </Card>

        {/* Right: Records */}
        <div>
          <Card style={{marginBottom:12}}>
            <div style={{fontWeight:800,fontSize:14,marginBottom:10}}>📋 Recent Checkups</div>
            {records.length===0 && <div style={{color:"#9ca3af",fontSize:13,textAlign:"center",padding:20}}>Koi record nahi</div>}
            {[...records].reverse().slice(0,8).map(r=>(
              <div key={r.id} onClick={()=>setViewRec(r)}
                style={{padding:"10px 12px",borderRadius:9,border:"1px solid #e5e7eb",marginBottom:8,cursor:"pointer",
                  background:viewRec?.id===r.id?"#eff6ff":"#fff"}}
                onMouseEnter={e=>e.currentTarget.style.background="#f8fafc"}
                onMouseLeave={e=>e.currentTarget.style.background=viewRec?.id===r.id?"#eff6ff":"#fff"}>
                <div style={{display:"flex",justifyContent:"space-between"}}>
                  <span style={{fontWeight:700,fontSize:13}}>{r.patientName}</span>
                  <span style={{fontSize:12,color:"#6b7280"}}>{r.date}</span>
                </div>
                <div style={{fontSize:12,color:"#6b7280"}}>Dr. {r.doctorName} | {r.diagnosis||"—"} | {fmt(r.grandTotal)}</div>
              </div>
            ))}
          </Card>

          {/* Receipt */}
          {viewRec && (
            <Card style={{background:"#fafafa"}}>
              <div style={{fontWeight:800,fontSize:14,marginBottom:10,color:"#1d4ed8"}}>🧾 Receipt — {viewRec.id}</div>
              <div style={{fontSize:13,lineHeight:1.8}}>
                <div><b>Patient:</b> {viewRec.patientName}</div>
                <div><b>Doctor:</b> Dr. {viewRec.doctorName}</div>
                <div><b>Date:</b> {viewRec.date}</div>
                {viewRec.bp && <div><b>BP:</b> {viewRec.bp}</div>}
                {viewRec.diagnosis && <div><b>Diagnosis:</b> {viewRec.diagnosis}</div>}
                <div style={{marginTop:8,paddingTop:8,borderTop:"1px solid #e5e7eb"}}>
                  <div style={{display:"flex",justifyContent:"space-between"}}><span>Checkup Fee:</span><b>{fmt(viewRec.checkupFee)}</b></div>
                  {viewRec.serviceFee>0 && <div style={{display:"flex",justifyContent:"space-between"}}><span>Service Fee:</span><b>{fmt(viewRec.serviceFee)}</b></div>}
                  {viewRec.medTotal>0 && <div style={{display:"flex",justifyContent:"space-between"}}><span>Medicine:</span><b>{fmt(viewRec.medTotal)}</b></div>}
                  <div style={{display:"flex",justifyContent:"space-between",fontWeight:800,fontSize:14,borderTop:"1px solid #e5e7eb",marginTop:4,paddingTop:4}}>
                    <span>Total:</span><span style={{color:"#1d4ed8"}}>{fmt(viewRec.grandTotal)}</span>
                  </div>
                  <div style={{fontSize:11,color:"#16a34a",marginTop:4}}>👨‍⚕️ Doctor share: {fmt(viewRec.doctorShare)} ({viewRec.sharePercent}%)</div>
                </div>
                {viewRec.medicines?.length>0 && (
                  <div style={{marginTop:8}}>
                    <b style={{fontSize:12}}>Medicines:</b>
                    {viewRec.medicines.map((m,i)=>{
                      const isPacks = m.qtyMode==="packs";
                      const lineTotal = isPacks ? (m.packPrice||m.price)*m.qty : (m.unitPrice||m.price)*m.qty;
                      return (
                        <div key={i} style={{fontSize:12,color:"#374151"}}>
                          • {m.name} — {m.qty} {isPacks?"pack(s)":"unit(s)"} = {fmt(lineTotal)}
                          {m.unitQty>1 && <span style={{color:"#7c3aed",marginLeft:4}}>({m.unitQty} units/pack)</span>}
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            </Card>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── DOCTOR LIST ─────────────────────────────────────────────────────────────
function DoctorList({ data, setData }) {
  const toast = useToast();
  const confirm = useConfirm();
  const EMPTY = { name:"", phone:"", specialization:"", feeShare:"", notes:"" };
  const [modal, setModal] = useState(null);
  const [form, setForm]   = useState({...EMPTY});
  const [payModal, setPayModal] = useState(null);
  const [payAmt, setPayAmt] = useState("");
  const doctors = data.doctors || [];
  const records = data.patientRecords || [];

  const sf = k => v => setForm(f=>({...f,[k]:v}));

  const save = () => {
    if (!form.name) return toast("Doctor name zaroori!", "error");
    if (modal==="add") {
      setData(d=>({...d, doctors:[...(d.doctors||[]),{...form,id:Date.now(),feeShare:+form.feeShare||0,pendingAmount:0}]}));
      toast(`✅ Dr. ${form.name} add ho gaya!`,"success");
    } else {
      setData(d=>({...d, doctors:(d.doctors||[]).map(x=>x.id===form.id?{...x,...form,feeShare:+form.feeShare||0}:x)}));
      toast(`✅ Dr. ${form.name} update ho gaya!`,"success");
    }
    setModal(null); setForm({...EMPTY});
  };

  const del = async doc => {
    const ok = await confirm(`Dr. ${doc.name} delete karein?`);
    if (!ok) return;
    setData(d=>({...d,doctors:(d.doctors||[]).filter(x=>x.id!==doc.id)}));
    toast("🗑️ Doctor delete ho gaya","warning");
  };

  const payDoctor = (doc) => {
    if (!payAmt || +payAmt<=0) return toast("Amount likhein!","error");
    setData(d=>({
      ...d,
      doctors:(d.doctors||[]).map(x=>x.id===doc.id?{...x,pendingAmount:Math.max(0,(+x.pendingAmount||0)-(+payAmt))}:x),
      accounts:[...d.accounts,{
        id:Date.now(),date:new Date().toISOString().split("T")[0],
        type:"expense",category:"Doctor Payment",
        description:`Dr. ${doc.name} ko payment — Rs.${payAmt}`,
        amount:+payAmt,
      }],
    }));
    toast(`✅ Dr. ${doc.name} ko ${fmt(+payAmt)} payment ho gaya!`,"success");
    setPayModal(null); setPayAmt("");
  };

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div style={{fontWeight:800,fontSize:16}}>👨‍⚕️ Doctor List</div>
        <Btn onClick={()=>{setForm({...EMPTY});setModal("add");}}>+ Add Doctor</Btn>
      </div>

      {doctors.length===0 && (
        <div style={{textAlign:"center",padding:60,color:"#9ca3af"}}>
          <div style={{fontSize:48,marginBottom:12}}>👨‍⚕️</div>
          <div style={{fontWeight:600}}>Koi doctor nahi hai</div>
          <div style={{fontSize:13,marginTop:4}}>+ Add Doctor button se add karein</div>
        </div>
      )}

      {doctors.map(doc=>{
        const docRecs = records.filter(r=>String(r.doctorId)===String(doc.id));
        const totalEarned = docRecs.reduce((s,r)=>s+r.doctorShare,0);
        return (
          <Card key={doc.id} style={{marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:800,fontSize:15}}>Dr. {doc.name}</div>
                {doc.specialization && <div style={{color:"#6b7280",fontSize:13}}>🔬 {doc.specialization}</div>}
                {doc.phone && <div style={{color:"#374151",fontSize:13}}>📞 {doc.phone}</div>}
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:12,color:"#6b7280"}}>Fee Share</div>
                <div style={{fontWeight:800,fontSize:18,color:"#1d4ed8"}}>{doc.feeShare||0}%</div>
              </div>
            </div>

            {/* Stats */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginTop:12}}>
              <div style={{background:"#eff6ff",borderRadius:8,padding:"8px 12px",textAlign:"center"}}>
                <div style={{fontSize:11,color:"#6b7280"}}>Total Patients</div>
                <div style={{fontWeight:800,fontSize:18,color:"#1d4ed8"}}>{docRecs.length}</div>
              </div>
              <div style={{background:"#d1fae5",borderRadius:8,padding:"8px 12px",textAlign:"center"}}>
                <div style={{fontSize:11,color:"#6b7280"}}>Total Earned</div>
                <div style={{fontWeight:800,fontSize:14,color:"#16a34a"}}>{fmt(totalEarned)}</div>
              </div>
              <div style={{background:+doc.pendingAmount>0?"#fee2e2":"#f0fdf4",borderRadius:8,padding:"8px 12px",textAlign:"center"}}>
                <div style={{fontSize:11,color:"#6b7280"}}>Pending (Store Owes)</div>
                <div style={{fontWeight:800,fontSize:14,color:+doc.pendingAmount>0?"#dc2626":"#16a34a"}}>{fmt(+doc.pendingAmount||0)}</div>

function EmployeeSalary({ data, setData, currentUser }) {
  const toast = useToast();
  const employees = data.employees || [];
  const salaryRecs = data.salaryRecords || [];
  const [empId, setEmpId]     = useState("");
  const [month, setMonth]     = useState(new Date().toISOString().slice(0,7));
  const [amount, setAmount]   = useState("");
  const [deduct, setDeduct]   = useState("");
  const [note, setNote]       = useState("");

  const selEmp = employees.find(e=>String(e.id)===String(empId));
  const alreadyPaid = salaryRecs.find(r=>String(r.empId)===String(empId)&&r.month===month);

  const pay = () => {
    if (!empId)  return toast("Employee select karein!","error");
    if (!amount) return toast("Amount likhein!","error");
    if (alreadyPaid) return toast(`${month} ki salary pehle se dedi hai!`,"warning");
    const rec = {
      id:Date.now(), empId:String(empId), empName:selEmp?.name,
      month, amount:+amount, deduction:+deduct||0,
      net:(+amount)-(+deduct||0), note,
      date:new Date().toISOString().split("T")[0],
      paidBy:currentUser?.name||"Admin",
    };
    setData(d=>({
      ...d,
      salaryRecords:[...(d.salaryRecords||[]),rec],
      accounts:[...d.accounts,{
        id:Date.now(),date:rec.date,type:"expense",category:"Salary",
        description:`${selEmp?.name} — ${month} salary${deduct>0?` (Deduction: ${fmt(deduct)})`:""}`,
        amount:rec.net,
      }],
    }));
    toast(`✅ ${selEmp?.name} ko ${month} salary ${fmt(rec.net)} dedi!`,"success");
    setEmpId(""); setAmount(""); setDeduct(""); setNote("");
  };

  return (
    <div style={{display:"grid",gridTemplateColumns:"1fr 1.5fr",gap:16}}>
      <Card>
        <div style={{fontWeight:800,fontSize:15,marginBottom:16,color:"#1d4ed8"}}>💵 Pay Salary</div>
        <div style={{marginBottom:12}}>
          <label style={{display:"block",fontSize:13,fontWeight:700,marginBottom:5}}>Employee *</label>

            style={{width:"100%",padding:"9px 12px",border:"1.5px solid #d1d5db",borderRadius:8,fontSize:14,outline:"none"}}>
            <option value="">-- Select Employee --</option>
            {employees.filter(e=>e.status==="active").map(e=>(
              <option key={e.id} value={e.id}>{e.name} — {fmt(e.salary||0)}/month</option>
            ))}
          </select>
        </div>
        <div style={{marginBottom:12}}>
          <label style={{display:"block",fontSize:13,fontWeight:700,marginBottom:5}}>Month *</label>
          <input type="month" value={month} onChange={e=>setMonth(e.target.value)}
            style={{width:"100%",padding:"9px 12px",border:"1.5px solid #d1d5db",borderRadius:8,fontSize:14,outline:"none"}}/>
        </div>
        <div style={{marginBottom:12}}>
          <label style={{display:"block",fontSize:13,fontWeight:700,marginBottom:5}}>Salary Amount *</label>
          <input type="number" value={amount} onChange={e=>setAmount(e.target.value)}
            style={{width:"100%",padding:"9px 12px",border:"1.5px solid #d1d5db",borderRadius:8,fontSize:14,outline:"none"}}/>
        </div>

            <div style={{display:"flex",justifyContent:"space-between"}}><span>Salary:</span><b>{fmt(+amount||0)}</b></div>
            {deduct>0 && <div style={{display:"flex",justifyContent:"space-between",color:"#dc2626"}}><span>Deduction:</span><b>-{fmt(+deduct)}</b></div>}
            <div style={{display:"flex",justifyContent:"space-between",fontWeight:800,borderTop:"1px solid #bfdbfe",marginTop:4,paddingTop:4}}>
              <span>Net Pay:</span><span style={{color:"#1d4ed8"}}>{fmt((+amount||0)-(+deduct||0))}</span>

          </div>

        <input value={note} onChange={e=>setNote(e.target.value)} placeholder="Note (optional)"

        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
            <thead><tr style={{background:"#f8fafc"}}>

              ))}
            </tr></thead>
            <tbody>
              {[...(data.salaryRecords||[])].reverse().map(r=>(
                <tr key={r.id} style={{borderBottom:"1px solid #f3f4f6"}}>

                  <td style={{padding:"8px 10px"}}>{r.month}</td>
                  <td style={{padding:"8px 10px"}}>{fmt(r.amount)}</td>
                  <td style={{padding:"8px 10px",color:"#dc2626"}}>{r.deduction>0?fmt(r.deduction):"—"}</td>
                  <td style={{padding:"8px 10px",fontWeight:700,color:"#16a34a"}}>{fmt(r.net)}</td>
                  <td style={{padding:"8px 10px",color:"#6b7280"}}>{r.date}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </Card>
    </div>
  );
}

function EmployeeAdvance({ data, setData, currentUser }) {
  const toast = useToast();
  const employees = data.employees || [];
  const [empId, setEmpId]   = useState("");
  const [amount, setAmount] = useState("");
  const [reason, setReason] = useState("");
  const [recoverIn, setRecoverIn] = useState("");

  const selEmp = employees.find(e=>String(e.id)===String(empId));

  const give = () => {
    if (!empId)  return toast("Employee select karein!","error");
    if (!amount||+amount<=0) return toast("Amount likhein!","error");
    const rec = {
      id:Date.now(), empId:String(empId), empName:selEmp?.name,
      amount:+amount, reason, recoverIn,
      date:new Date().toISOString().split("T")[0],
      status:"pending", paidBy:currentUser?.name||"Admin",
    };
    setData(d=>({
      ...d,
      advanceRecords:[...(d.advanceRecords||[]),rec],
      employees:(d.employees||[]).map(e=>
        String(e.id)===String(empId)?{...e,pendingAdvance:(+e.pendingAdvance||0)+(+amount)}:e
      ),
      accounts:[...d.accounts,{
        id:Date.now(),date:rec.date,type:"expense",category:"Advance",
        description:`${selEmp?.name} — Advance ${reason?`(${reason})`:""}`,
        amount:+amount,
      }],
    }));
    toast(`✅ ${selEmp?.name} ko ${fmt(+amount)} advance diya!`,"success");
    setEmpId(""); setAmount(""); setReason(""); setRecoverIn("");
  };

  const recover = (rec) => {
    setData(d=>({
      ...d,
      advanceRecords:(d.advanceRecords||[]).map(r=>r.id===rec.id?{...r,status:"recovered"}:r),
      employees:(d.employees||[]).map(e=>
        String(e.id)===String(rec.empId)?{...e,pendingAdvance:Math.max(0,(+e.pendingAdvance||0)-rec.amount)}:e
      ),
    }));
    toast(`✅ ${rec.empName} ka advance recover ho gaya!`,"success");
  };

  return (
    <div style={{display:"grid",gridTemplateColumns:"1fr 1.5fr",gap:16}}>
      <Card>
        <div style={{fontWeight:800,fontSize:15,marginBottom:16,color:"#d97706"}}>💳 Give Advance</div>
        <div style={{marginBottom:12}}>
          <label style={{display:"block",fontSize:13,fontWeight:700,marginBottom:5}}>Employee *</label>
          <select value={empId} onChange={e=>setEmpId(e.target.value)}
            style={{width:"100%",padding:"9px 12px",border:"1.5px solid #d1d5db",borderRadius:8,fontSize:14,outline:"none"}}>
            <option value="">-- Select Employee --</option>
            {employees.filter(e=>e.status==="active").map(e=>(
              <option key={e.id} value={e.id}>{e.name} — Pending: {fmt(e.pendingAdvance||0)}</option>
            ))}
          </select>
        </div>
        <div style={{marginBottom:12}}>
          <label style={{display:"block",fontSize:13,fontWeight:700,marginBottom:5}}>Amount *</label>
          <input type="number" value={amount} onChange={e=>setAmount(e.target.value)} placeholder="e.g. 5000"
            style={{width:"100%",padding:"9px 12px",border:"1.5px solid #d1d5db",borderRadius:8,fontSize:14,outline:"none"}}/>
        </div>
        <div style={{marginBottom:12}}>
          <label style={{display:"block",fontSize:13,fontWeight:700,marginBottom:5}}>Reason</label>
          <input value={reason} onChange={e=>setReason(e.target.value)} placeholder="e.g. Medical, Personal"
            style={{width:"100%",padding:"9px 12px",border:"1.5px solid #d1d5db",borderRadius:8,fontSize:14,outline:"none"}}/>
        </div>
        <div style={{marginBottom:12}}>
          <label style={{display:"block",fontSize:13,fontWeight:700,marginBottom:5}}>Recover In</label>
          <input value={recoverIn} onChange={e=>setRecoverIn(e.target.value)} placeholder="e.g. 3 months"
            style={{width:"100%",padding:"9px 12px",border:"1.5px solid #d1d5db",borderRadius:8,fontSize:14,outline:"none"}}/>
        </div>
        <Btn color="warning" onClick={give} style={{width:"100%"}}>💳 Give Advance</Btn>
      </Card>

      <Card>
        <div style={{fontWeight:800,fontSize:15,marginBottom:12}}>📋 Advance Records</div>
        {(data.advanceRecords||[]).length===0 && <div style={{color:"#9ca3af",textAlign:"center",padding:30}}>Koi record nahi</div>}
        {[...(data.advanceRecords||[])].reverse().map(r=>(
          <div key={r.id} style={{padding:"10px 12px",borderRadius:9,border:"1px solid #e5e7eb",marginBottom:8,
            background:r.status==="recovered"?"#f0fdf4":"#fff"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div>
                <div style={{fontWeight:700}}>{r.empName}</div>
                <div style={{fontSize:12,color:"#6b7280"}}>{r.date} {r.reason?`· ${r.reason}`:""}</div>
                {r.recoverIn && <div style={{fontSize:11,color:"#d97706"}}>Recover in: {r.recoverIn}</div>}
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontWeight:800,fontSize:15,color:r.status==="recovered"?"#16a34a":"#dc2626"}}>{fmt(r.amount)}</div>
                <span style={{fontSize:11,padding:"2px 8px",borderRadius:20,fontWeight:700,
                  background:r.status==="recovered"?"#d1fae5":"#fee2e2",
                  color:r.status==="recovered"?"#065f46":"#991b1b"}}>
                  {r.status==="recovered"?"✅ Recovered":"⏳ Pending"}
                </span>
              </div>
            </div>
            {r.status==="pending" && (
              <button onClick={()=>recover(r)}
                style={{marginTop:8,padding:"5px 14px",background:"#d1fae5",color:"#065f46",border:"1px solid #86efac",
                  borderRadius:7,cursor:"pointer",fontWeight:700,fontSize:12}}>
                ✅ Mark Recovered
              </button>
            )}
          </div>
        ))}
      </Card>
    </div>
  );
}

const NAV_ITEMS = [
  { id: "dashboard", label: "Dashboard",       icon: "🏠" },
  { id: "products",  label: "Products",        icon: "💊" },
  { id: "stock",     label: "Stock & Expiry",  icon: "📦" },
  { id: "invoices",  label: "Invoices",        icon: "🧾" },
  { id: "customers", label: "Customers",       icon: "👥" },
  { id: "accounts",  label: "Accounts",        icon: "💼" },
  { id: "stockdist", label: "Stock Dist.",     icon: "🏭" },
  { id: "distributors", label: "Distributors",   icon: "🚚" },
  { id: "clinic",    label: "Clinic",          icon: "🏥" },
  { id: "employees", label: "Employees",       icon: "👨‍💼" },
  { id: "reports",   label: "Reports",         icon: "📈" },
  { id: "users",     label: "Users",           icon: "🔐", adminOnly: true },
  { id: "settings",  label: "Settings",        icon: "⚙️", adminOnly: true },
];

function AppInner() {
  const toast = useToast();
  const [page, setPage]         = useState("dashboard");
  const [data, setData]         = useState(() => {
    try {
      const saved = localStorage.getItem("pharma_data");
      if (!saved) return INIT;
      const parsed = JSON.parse(saved);
      return {
        products:       parsed.products       ?? INIT.products,
        customers:      parsed.customers      ?? INIT.customers,
        invoices:       parsed.invoices       ?? INIT.invoices,
        accounts:       parsed.accounts       ?? INIT.accounts,
        distributors:   parsed.distributors   ?? [],
        distHistory:    parsed.distHistory    ?? [],
        returns:        parsed.returns        ?? [],
        doctors:        parsed.doctors        ?? [],
        patientRecords: parsed.patientRecords ?? [],
        employees:      parsed.employees      ?? [],
        salaryRecords:  parsed.salaryRecords  ?? [],
        advanceRecords: parsed.advanceRecords ?? [],
      };
    } catch { return INIT; }
  });
  const [idbStatus, setIdbStatus] = useState("idle"); // idle | saving | saved | error
  const [settings, setSettings] = useState(() => {
    try {
      const saved = localStorage.getItem("pharma_settings");
      return saved ? JSON.parse(saved) : DEFAULT_SETTINGS;
    } catch { return DEFAULT_SETTINGS; }
  });
  const [users, setUsers]       = useState(() => {
    try {
      const saved = localStorage.getItem("pharma_users");
      return saved ? JSON.parse(saved) : DEFAULT_USERS;
    } catch { return DEFAULT_USERS; }
  });
  const [currentUser, setCurrentUser] = useState(() => {
    try {
      const saved = localStorage.getItem("pharma_session");
      return saved ? JSON.parse(saved) : null;
    } catch { return null; }
  });
  const [sideOpen, setSideOpen] = useState(true);
  const [showDB, setShowDB]     = useState(false);
  const [dbStatus, setDbStatus] = useState("offline");
  const [dbConfig, setDbConfig]   = useState(getSbConfig());
  const [autoConfigLoading, setAutoConfigLoading] = useState(false);
  const sbRef    = useRef(null);
  const syncRef  = useRef(false);

  // ── Auto-load config from Supabase on startup if configCode set but no URL/key ──
  useEffect(() => {
    const cfg = getSbConfig();
    // Already have URL+Key → nothing to do
    if (cfg.url && cfg.key) return;
    // Have a configCode but no URL → try to auto-load
    // NOTE: For auto-load to work, we need a "bootstrap" URL+key stored separately
    // User can use the "Load Config" button in Settings manually
    // OR we can prompt them for their config code on startup
  }, []);

  // ── Pending sync queue ──
  const pendingRef = useRef(false);

  // ── Save to localStorage + IndexedDB on every change ──
  useEffect(() => {
    try { localStorage.setItem("pharma_data", JSON.stringify(data)); } catch {}
    // Sync to IndexedDB (local database)
    setIdbStatus("saving");
    idbSaveAll(data, null, null)
      .then(() => setIdbStatus("saved"))
      .catch(() => setIdbStatus("error"));
    pendingRef.current = true;
  }, [data]);

  useEffect(() => {
    try { localStorage.setItem("pharma_settings", JSON.stringify(settings)); } catch {}
    idbPut("app_settings", { id: "main", data: settings }).catch(() => {});
  }, [settings]);

  useEffect(() => {
    try { localStorage.setItem("pharma_users", JSON.stringify(users)); } catch {}
    if (users.length) idbPutAll("app_users", users).catch(() => {});
  }, [users]);

  // ═══════════════════════════════════════════════════════════
  // SUPABASE SYNC ENGINE (v4 — ref-based, no stale closures)
  // ═══════════════════════════════════════════════════════════
  const prevRef     = useRef(null);
  const dbStatRef   = useRef("offline");
  const settSbRef   = useRef(settings);
  const userSbRef   = useRef(users);
  const timerRef    = useRef(null);

  useEffect(() => { dbStatRef.current  = dbStatus;  }, [dbStatus]);
  useEffect(() => { settSbRef.current  = settings;  }, [settings]);
  useEffect(() => { userSbRef.current  = users;     }, [users]);

  const SB_TABLES = [
    { tbl:"products",        key:"products",       txt:false },
    { tbl:"customers",       key:"customers",      txt:false },
    { tbl:"invoices",        key:"invoices",       txt:true  },
    { tbl:"accounts",        key:"accounts",       txt:false },
    { tbl:"distributors",    key:"distributors",   txt:false },
    { tbl:"dist_history",    key:"distHistory",    txt:true  },
    { tbl:"returns",         key:"returns",        txt:true  },
    { tbl:"doctors",         key:"doctors",        txt:false },
    { tbl:"patient_records", key:"patientRecords", txt:true  },
    { tbl:"employees",       key:"employees",      txt:false },
    { tbl:"salary_records",  key:"salaryRecords",  txt:false },
    { tbl:"advance_records", key:"advanceRecords", txt:false },
  ];

  const snapData = (d) => {
    if (!d) return null;
    const out = {};
    SB_TABLES.forEach(({key}) => { out[key] = (d[key]||[]).map(r=>({...r})); });
    return out;
  };

  // Core push — all via sbRef (never stale)
  const pushSb = useCallback(async (newD, prevD, force) => {
    const sb = sbRef.current;
    if (!sb || dbStatRef.current !== "online") return;
    const errors = [];
    const jobs = [];

    for (const {tbl, key, txt} of SB_TABLES) {
      const nArr = newD[key] || [];
      const oArr = (!force && prevD && prevD[key]) ? prevD[key] : [];

      // DELETE removed rows
      if (oArr.length) {
        const keep = new Set(nArr.map(r=>String(r.id)));
        oArr.filter(r=>!keep.has(String(r.id))).forEach(r => {
          const f = txt ? "id=eq."+encodeURIComponent(r.id) : "id=eq."+r.id;
          jobs.push(sb.del(tbl, f)
            .then(()=>console.log("✅ SB DEL",tbl,r.id))
            .catch(e=>{ const msg=tbl+" DELETE: "+e.message; errors.push(msg); console.error(msg); }));
        });
      }

      // UPSERT all current rows
      for (let i=0; i<nArr.length; i+=100) {
        const chunk = nArr.slice(i, i+100);
        jobs.push(sb.upsert(tbl, chunk)
          .then(()=>console.log("✅ SB UPSERT",tbl,chunk.length,"rows"))
          .catch(e=>{ const msg=tbl+" UPSERT: "+e.message; errors.push(msg); console.error(msg); }));
      }
    }

    // settings + users
    jobs.push(sb.upsert("app_settings",[{id:"main",data:settSbRef.current}])
      .catch(e=>{ errors.push("app_settings: "+e.message); }));
    const u = userSbRef.current;
    if (u&&u.length) jobs.push(sb.upsert("app_users",u)
      .catch(e=>{ errors.push("app_users: "+e.message); }));

    await Promise.allSettled(jobs);

    if (errors.length > 0) {
      // Show first error visibly
      const firstErr = errors[0].slice(0, 120);
      toast("❌ Sync error: " + firstErr, "error");
      console.error("ALL SYNC ERRORS:", errors);
    }
  }, []);

  // Auto-sync on data change
  useEffect(() => {
    if (!sbRef.current || dbStatRef.current !== "online") return;
    if (timerRef.current) clearTimeout(timerRef.current);
    timerRef.current = setTimeout(async () => {
      if (!sbRef.current || dbStatRef.current !== "online") return;
      const prev = prevRef.current;
      prevRef.current = snapData(data);
      await pushSb(data, prev, false);
      toast("☁️ Supabase sync!", "success");
    }, 1500);
  }, [data]);

  // Settings sync
  useEffect(() => {
    if (!sbRef.current || dbStatRef.current !== "online") return;
    const t = setTimeout(() => {
      if (!sbRef.current || dbStatRef.current !== "online") return;
      sbRef.current.upsert("app_settings",[{id:"main",data:settings}]).catch(()=>{});
    }, 1000);
    return () => clearTimeout(t);
  }, [settings]);

  // Users sync
  useEffect(() => {
    if (!sbRef.current || dbStatRef.current !== "online" || !users.length) return;
    const t = setTimeout(() => {
      if (!sbRef.current || dbStatRef.current !== "online") return;
      sbRef.current.upsert("app_users", users).catch(()=>{});
    }, 1000);
    return () => clearTimeout(t);
  }, [users]);

  // Online/Offline
  useEffect(() => {
    const goOnline = () => {
      if (!sbRef.current) return;
      toast("🌐 Internet aa gaya — sync ho raha hai...", "info");
      setDbStatus("connecting");
      sbRef.current.test()
        .then(() => { setDbStatus("online"); dbStatRef.current="online"; return pushSb(data, null, true); })
        .then(() => toast("✅ Sab data sync!", "success"))
        .catch(() => setDbStatus("error"));
    };
    const goOffline = () => {
      setDbStatus("offline"); dbStatRef.current="offline";
      toast("📴 Offline — local save ho raha hai", "warning");
    };
    window.addEventListener("online",  goOnline);
    window.addEventListener("offline", goOffline);
    return () => { window.removeEventListener("online",goOnline); window.removeEventListener("offline",goOffline); };
  }, [data, pushSb]);

  const expiringSoon = data.products.filter((p) => { const d=daysUntil(p.expiry); return d>0 && d<=(settings.app.expiryAlertDays||195); }).length;
  const lowStock     = data.products.filter((p) => p.stock <= (settings.app.lowStockThreshold || 50)).length;
  const pharmName    = settings.pharmacy.name || "PharmaPro";
  const can = (section) => currentUser && (CAN[currentUser.role] || []).includes(section);

  // ── Called from Settings when config is saved ──
  const onDbConfigSaved = (cfg) => {
    setDbConfig(cfg);
    syncRef.current = false;
    setDbStatus("offline");
  };

  // ── Init Supabase when config changes ──
  useEffect(() => {
    const { url, key, enabled } = dbConfig;
    if (!enabled || !url || !key) { sbRef.current = null; setDbStatus("offline"); return; }
    sbRef.current = (window.PHARMA_USE_FIREBASE && window.__firestore) ? makeFirebaseDb() : makeSb(url, key);
    if (syncRef.current) return;
    syncRef.current = true;
    setDbStatus("connecting");
    toast(window.PHARMA_USE_FIREBASE ? "🔗 Firebase se connect ho raha hai..." : "🔗 Supabase se connect ho raha hai...", "info");

    const sb = sbRef.current;
    sb.test()
      .then(() => Promise.all([
        sb.loadAll("products").catch(()=>null),
        sb.loadAll("customers").catch(()=>null),
        sb.loadAll("invoices").catch(()=>null),
        sb.loadAll("accounts").catch(()=>null),
        sb.loadAll("distributors").catch(()=>null),
        sb.loadAll("dist_history").catch(()=>null),
        sb.loadAll("returns").catch(()=>null),
        sb.loadAll("doctors").catch(()=>null),
        sb.loadAll("patient_records").catch(()=>null),
        sb.loadAll("employees").catch(()=>null),
        sb.loadAll("salary_records").catch(()=>null),
        sb.loadAll("advance_records").catch(()=>null),
        sb.loadAll("app_settings").catch(()=>null),
        sb.loadAll("app_users").catch(()=>null),
      ]))
      .then(([products, customers, invoices, accounts, distributors,
              distHistory, returns_, doctors, patientRecords,
              employees, salaryRecords, advanceRecords,
              appSettingsRows, appUsersRows]) => {

        const anyData = products?.length || customers?.length ||
                        invoices?.length || accounts?.length ||
                        doctors?.length || employees?.length;

        // Get current localStorage data to merge with
        const localData = (() => {
          try { return JSON.parse(localStorage.getItem("pharma_data")) || {}; } catch { return {}; }
        })();

        if (anyData) {
          // Merge: prefer Supabase for core tables, keep localStorage for tables not in Supabase yet
          const merged = {
            products:       products?.length       ? products       : (localData.products       || INIT.products),
            customers:      customers?.length      ? customers      : (localData.customers      || INIT.customers),
            invoices:       invoices?.length       ? invoices       : (localData.invoices       || INIT.invoices),
            accounts:       accounts?.length       ? accounts       : (localData.accounts       || INIT.accounts),
            distributors:   distributors?.length   ? distributors   : (localData.distributors   || []),
            distHistory:    distHistory?.length    ? distHistory    : (localData.distHistory    || []),
            returns:        returns_?.length       ? returns_       : (localData.returns        || []),
            doctors:        doctors?.length        ? doctors        : (localData.doctors        || []),
            patientRecords: patientRecords?.length ? patientRecords : (localData.patientRecords || []),
            employees:      employees?.length      ? employees      : (localData.employees      || []),
            salaryRecords:  salaryRecords?.length  ? salaryRecords  : (localData.salaryRecords  || []),
            advanceRecords: advanceRecords?.length ? advanceRecords : (localData.advanceRecords || []),
          };
          setData(merged);
          prevRef.current = snapData(merged); // deep copy so delete tracking works
          // Load settings from Supabase if available
          if (appSettingsRows?.length && appSettingsRows[0]?.data) {
            setSettings(appSettingsRows[0].data);
            settSbRef.current = appSettingsRows[0].data;
          }
          // Load users from Supabase if available
          if (appUsersRows?.length) {
            setUsers(appUsersRows);
            userSbRef.current = appUsersRows;
          }
          toast("✅ Database se data load ho gaya!", "success");
        } else {
          // No data in Supabase — push all local data using upsert (safe for duplicates)
          const localFull = localData;
          const uIf = (t,a) => a?.length ? sb.upsert(t, a).catch(e => console.warn("INIT push", t, e)) : Promise.resolve();
          Promise.all([
            uIf("products",        localFull.products       || INIT.products),
            uIf("customers",       localFull.customers      || INIT.customers),
            uIf("invoices",        localFull.invoices       || INIT.invoices),
            uIf("accounts",        localFull.accounts       || INIT.accounts),
            uIf("distributors",    localFull.distributors   || []),
            uIf("dist_history",    localFull.distHistory    || []),
            uIf("returns",         localFull.returns        || []),
            uIf("doctors",         localFull.doctors        || []),
            uIf("patient_records", localFull.patientRecords || []),
            uIf("employees",       localFull.employees      || []),
            uIf("salary_records",  localFull.salaryRecords  || []),
            uIf("advance_records", localFull.advanceRecords || []),
          ]).then(()=>toast("✅ Local data Supabase mein push ho gaya!","success"))
            .catch(()=>{});
          prevRef.current = snapData(localFull);
        }
        setDbStatus("online");
      })
      .catch((e) => {
        setDbStatus("error");
        const msg = e.message || "Connection failed";
        toast(`❌ DB Connect fail: ${msg}`, "error");
        console.error("Supabase error:", e);
      });
  }, [dbConfig]);

  // ── Auto sync data to Supabase (all tables) handled above ──

  const ROLE_COLOR = { administrator: "#7c3aed", user: "#1d4ed8", employee: "#16a34a" };
  const ROLE_LABEL = { administrator: "Admin", user: "User", employee: "Employee" };
  const DB_STATUS  = {
    offline:    { color: "#6b7280", bg: "rgba(255,255,255,.1)", label: "Offline" },
    connecting: { color: "#fbbf24", bg: "rgba(251,191,36,.2)",  label: "Connecting..." },
    online:     { color: "#34d399", bg: "rgba(52,211,153,.2)",  label: "Online ✓" },
    error:      { color: "#f87171", bg: "rgba(248,113,113,.2)", label: "DB Error" },
  };

  // Login screen (no toast context needed here, login handled inside)
  if (!currentUser) return <LoginScreen users={users} onLogin={(u) => {
    try { localStorage.setItem("pharma_session", JSON.stringify(u)); } catch {}
    setCurrentUser(u);
    setPage("dashboard");
    toast(`👋 Welcome back, ${u.name}! (${ROLE_LABEL[u.role]})`, "success");
  }} pharmName={pharmName} />;

  return (
    <div className="app-outer" style={{ display: "flex", height: "100vh", fontFamily: "'Segoe UI', system-ui, sans-serif", background: "#f1f5f9", overflow: "hidden" }}>

      {/* ── Sidebar ── */}
      <div className="no-print desktop-sidebar" style={{ width: sideOpen ? 240 : 64, background: "linear-gradient(180deg,#1e3a8a 0%,#1d4ed8 100%)", color: "#fff", display: "flex", flexDirection: "column", transition: "width .2s", flexShrink: 0, overflow: "hidden", height: "100vh" }}>

        {/* Logo */}
        <div style={{ padding: "14px 14px", borderBottom: "1px solid rgba(255,255,255,.1)", display: "flex", alignItems: "center", gap: 10, flexShrink: 0 }}>
          <div style={{ fontSize: 24, flexShrink: 0 }}>💊</div>
          {sideOpen && (
            <div style={{ overflow: "hidden" }}>
              <div style={{ fontWeight: 800, fontSize: 13, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{pharmName}</div>
              <div style={{ fontSize: 10, opacity: .7 }}>Management System</div>
            </div>
          )}
        </div>

        {/* DB Status indicator */}
        {sideOpen && (
          <div style={{ margin: "8px 10px 0", background: DB_STATUS[dbStatus].bg, borderRadius: 8, padding: "5px 10px", display: "flex", alignItems: "center", gap: 6, flexShrink: 0 }}>
            <div style={{ width: 7, height: 7, borderRadius: "50%", background: DB_STATUS[dbStatus].color,
              ...(dbStatus === "connecting" ? { animation: "pulse 1s infinite" } : {}) }} />
            <span style={{ fontSize: 11, color: "#fff", fontWeight: 600 }}>
              {dbConfig.enabled && dbConfig.url ? `☁️ ${DB_STATUS[dbStatus].label}` : "☁️ Not Configured"}
            </span>
          </div>
        )}

        {/* Local IDB status */}
        {sideOpen && (
          <div style={{ margin: "4px 10px 0", background: "rgba(255,255,255,.08)", borderRadius: 8, padding: "5px 10px", display: "flex", alignItems: "center", gap: 6, flexShrink: 0 }}>
            <div style={{ width: 7, height: 7, borderRadius: "50%",
              background: idbStatus==="saved"?"#34d399":idbStatus==="saving"?"#fbbf24":idbStatus==="error"?"#f87171":"#6b7280",
              ...(idbStatus==="saving" ? { animation: "pulse 1s infinite" } : {}) }} />
            <span style={{ fontSize: 11, color: "#fff", fontWeight: 600 }}>
              💾 Local: {idbStatus==="saved"?"Saved ✓":idbStatus==="saving"?"Saving...":idbStatus==="error"?"Error":"Ready"}
            </span>
          </div>
        )}

        {/* 🔄 Load from Supabase button — sirf Administrator ko */}
        {sideOpen && dbConfig.enabled && dbConfig.url && currentUser?.role === "administrator" && (
          <button
            onClick={() => {
              if (!sbRef.current) return toast("Supabase connected nahi hai!", "error");
              toast("🔄 Supabase se data load ho raha hai...", "info");
              const sb = sbRef.current;
              Promise.all([
                sb.loadAll("products").catch(()=>null),
                sb.loadAll("customers").catch(()=>null),

                  salaryRecords:  salaryRecords?.length  ? salaryRecords  : (localData.salaryRecords  || []),

                if (appUsersRows?.length) { setUsers(appUsersRows); userSbRef.current = appUsersRows; }
