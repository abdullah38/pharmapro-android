                      })}
                    </tbody>
                  </table>
                  <div style={{ borderTop: "2px solid #000", paddingTop: 5, marginTop: 3 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", fontWeight: 700, padding: "2px 0" }}><span>Subtotal:</span><span>Rs.{Number(inv.subtotal).toFixed(2)}</span></div>
                    {inv.discount > 0 && <div style={{ display: "flex", justifyContent: "space-between", fontWeight: 700, padding: "2px 0" }}><span>Discount:</span><span>-Rs.{Number(inv.discount).toFixed(2)}</span></div>}
                    {inv.tax > 0 && <div style={{ display: "flex", justifyContent: "space-between", fontWeight: 900, padding: "2px 0" }}><strong>TAX({inv.tax}%):</strong><strong>+Rs.{Number(taxAmt).toFixed(2)}</strong></div>}
                    <div style={{ display: "flex", justifyContent: "space-between", fontWeight: 900, fontSize: printSize === "thermal58" ? 15 : 17, borderTop: "2px solid #000", borderBottom: "2px solid #000", padding: "3px 0", margin: "3px 0" }}>
                      <span>TOTAL</span><span>Rs.{Number(inv.total).toFixed(2)}</span>
                    </div>
                    <div style={{ display: "flex", justifyContent: "space-between", fontWeight: 900, fontSize: printSize === "thermal58" ? 13 : 15, padding: "2px 0" }}><span>Paid:</span><span>Rs.{Number(inv.paid).toFixed(2)}</span></div>
                    <div style={{ display: "flex", justifyContent: "space-between", fontWeight: 900, fontSize: printSize === "thermal58" ? 13 : 15, borderTop: "2px solid #000", padding: "3px 0", marginTop: 2 }}><span>{balance > 0 ? "Balance Due:" : "Change:"}</span><span>Rs.{Number(Math.abs(balance)).toFixed(2)}</span></div>
                  </div>
                  <div style={{ textAlign: "center", marginTop: 8, fontSize: 11, fontWeight: 700 }}>Thank you!</div>
                </div>
              ) : (
                /* A4 / A5 preview */
                <div>
                  <div style={{ display: "flex", gap: 10, marginBottom: 16, flexWrap: "wrap" }}>
                    {[["Bill To", inv.customerName, null, null], ["Invoice No", inv.id, fmtDate(inv.date), null], ["Status", inv.status.toUpperCase(), `Paid: ${fmt(inv.paid)}`, statusColor[inv.status]]].map(([l,v,s,c]) => (
                      <div key={l} style={{ flex: 1, minWidth: 90, background: "#f8fafc", borderRadius: 8, padding: "6px 9px", border: "1px solid #e5e7eb" }}>
                        <div style={{ fontSize: 9, fontWeight: 700, color: "#6b7280", textTransform: "uppercase", marginBottom: 3 }}>{l}</div>
                        <div style={{ fontWeight: 700, fontSize: 12, color: c || "#111" }}>{v}</div>
                        {s && <div style={{ fontSize: 10, color: "#6b7280", marginTop: 1 }}>{s}</div>}
                      </div>
                    ))}
                  </div>
                  <table style={{ width: "100%", borderCollapse: "collapse", marginBottom: 10, fontSize: 11, tableLayout: "fixed" }}>
                    <colgroup>
                      <col style={{width:"38%"}}/><col style={{width:"10%"}}/><col style={{width:"15%"}}/><col style={{width:"15%"}}/><col style={{width:"17%"}}/>
                    </colgroup>
                    <thead>
                      <tr style={{ background: "#e0e7ff" }}>
                        {[["Description","left"],["Qty","center"],["Rate","right"],["Disc","right"],["Value","right"]].map(([h,a]) => (
                          <th key={h} style={{ padding: "5px 6px", textAlign: a, fontWeight: 800, fontSize: 10, color: "#1e40af", whiteSpace: "nowrap" }}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {inv.items.map((item, idx) => {
                        const baseRate = item.perUnitPrice || item.price;
                        const discPct  = item.itemDiscPct || 0;
                        const discAmt  = item.qty * baseRate * (discPct / 100);
                        const effRate  = baseRate * (1 - discPct / 100);
                        return (
                          <tr key={idx} style={{ background: idx % 2 === 0 ? "#fff" : "#fafafa" }}>
                            <td style={{ padding: "4px 6px", fontWeight: 600, borderBottom: "1px solid #f3f4f6", fontSize: 11, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                              {item.name}
                            </td>
                            <td style={{ padding: "4px 6px", textAlign: "center", borderBottom: "1px solid #f3f4f6", fontSize: 11, whiteSpace: "nowrap" }}>{item.qty} {item.unitQty > 1 ? "pcs" : item.unit}</td>
                            <td style={{ padding: "4px 6px", textAlign: "right", color: "#1d4ed8", fontWeight: 700, borderBottom: "1px solid #f3f4f6", fontSize: 11, whiteSpace: "nowrap" }}>Rs.{Number(baseRate).toFixed(2)}</td>
                            <td style={{ padding: "4px 6px", textAlign: "right", color: "#dc2626", fontWeight: 700, borderBottom: "1px solid #f3f4f6", fontSize: 11, whiteSpace: "nowrap" }}>{discAmt > 0 ? `-Rs.${Number(discAmt).toFixed(2)}` : "—"}</td>
                            <td style={{ padding: "4px 6px", textAlign: "right", fontWeight: 800, color: "#16a34a", borderBottom: "1px solid #f3f4f6", fontSize: 11, whiteSpace: "nowrap" }}>{fmt(item.qty * effRate)}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                  <div style={{ display: "flex", justifyContent: "flex-end" }}>
                    <div style={{ width: 240, background: "#f8fafc", borderRadius: 10, padding: "12px 14px", border: "1px solid #e5e7eb" }}>
                      {[["Subtotal", fmt(inv.subtotal), "#111"], ["Discount", `− ${fmt(inv.discount)}`, "#dc2626"], [`Tax (${inv.tax}%)`, `+ ${fmt(taxAmt)}`, "#d97706"]].map(([l,v,c]) => (
                        <div key={l} style={{ display: "flex", justifyContent: "space-between", padding: "3px 0", fontSize: 11, borderBottom: "1px solid #f3f4f6" }}>
                          <span style={{ color: "#6b7280" }}>{l}</span><span style={{ fontWeight: 600, color: c }}>{v}</span>
                        </div>
                      ))}
                      <div style={{ display: "flex", justifyContent: "space-between", padding: "8px 0 4px", fontSize: 16, fontWeight: 900, color: "#1d4ed8", borderTop: "2px solid #1d4ed8", marginTop: 3 }}>
                        <span>Total</span><span>{fmt(inv.total)}</span>
                      </div>
                      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, fontWeight: 700, color: "#16a34a", padding: "2px 0" }}><span>✓ Paid</span><span>{fmt(inv.paid)}</span></div>
                      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, fontWeight: 700, color: balance > 0 ? "#dc2626" : "#16a34a", padding: "2px 0" }}><span>Balance</span><span>{fmt(balance)}</span></div>
                    </div>
                  </div>
                </div>
              )}
            </div>

            <div style={{ background: "#f8fafc", borderTop: "1px solid #e5e7eb", padding: "10px", textAlign: "center", fontSize: 11, color: "#6b7280" }}>
              {pharmFooter} · {pharmName}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}


// ─── ACCOUNTS ─────────────────────────────────────────────────────────────────
function Accounts({ data, setData }) {
  const toast = useToast();
  const [modal, setModal] = useState(false);
  const [form, setForm] = useState({ type: "income", category: "", description: "", amount: "", date: new Date().toISOString().split("T")[0] });

  const income = data.accounts.filter((a) => a.type === "income").reduce((s, a) => s + a.amount, 0);
  const expense = data.accounts.filter((a) => a.type === "expense").reduce((s, a) => s + a.amount, 0);

  const save = () => {
    if (!form.amount || !form.description) return toast("Amount aur description zaroori hain!", "error");
    if (!form._payMethod?.method) return toast("Payment method select karein!", "error");
    if (form._payMethod.method!=="cash"&&(!form._payMethod.accountDesc||!form._payMethod.accountName))
      return toast("Account details likhein!", "error");
    const pmDetail = form._payMethod.method!=="cash"
      ? ` | ${form._payMethod.label} — ${form._payMethod.accountDesc} (${form._payMethod.accountName})`
      : "";
    const entry = {
      ...form, id: Date.now(), amount: +form.amount,
      paymentMethod: form._payMethod.method,
      paymentDetail: form._payMethod.accountDesc||"",
      paymentName:   form._payMethod.accountName||"",
      description:   form.description + pmDetail,
    };
    delete entry._payMethod;
    setData((d) => ({ ...d, accounts: [...d.accounts, entry] }));
    toast(`✅ Transaction "${form.description}" add ho gaya!`, "success");
    setModal(false);
    setForm({ type: "income", category: "", description: "", amount: "", date: new Date().toISOString().split("T")[0] });
  };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
        <h2 style={{ margin: 0, fontSize: 22, fontWeight: 800 }}>💼 Accounts Management</h2>
        <Btn onClick={() => setModal(true)}>+ Add Transaction</Btn>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(140px,1fr))", gap: 10, marginBottom: 16 }}>
        <Card style={{ background: "#d1fae5", boxShadow: "none" }}>
          <div style={{ fontSize: 13, fontWeight: 600, color: "#065f46" }}>Total Income</div>
          <div style={{ fontSize: 24, fontWeight: 800, color: "#16a34a" }}>{fmt(income)}</div>
        </Card>
        <Card style={{ background: "#fee2e2", boxShadow: "none" }}>
          <div style={{ fontSize: 13, fontWeight: 600, color: "#991b1b" }}>Total Expenses</div>
          <div style={{ fontSize: 24, fontWeight: 800, color: "#dc2626" }}>{fmt(expense)}</div>
        </Card>
        <Card style={{ background: income - expense >= 0 ? "#dbeafe" : "#fee2e2", boxShadow: "none" }}>
          <div style={{ fontSize: 13, fontWeight: 600, color: "#1e40af" }}>Net Balance</div>
          <div style={{ fontSize: 24, fontWeight: 800, color: income - expense >= 0 ? "#1d4ed8" : "#dc2626" }}>{fmt(income - expense)}</div>
        </Card>
        <Card style={{ background: "#fef3c7", boxShadow: "none" }}>
          <div style={{ fontSize: 13, fontWeight: 600, color: "#92400e" }}>Distributor Payable</div>
          <div style={{ fontSize: 22, fontWeight: 800, color: "#d97706" }}>
            {fmt((data.distributors||[]).filter(d=>+d.balance>0).reduce((s,d)=>s+(+d.balance||0),0))}
          </div>
          <div style={{fontSize:11,color:"#9ca3af"}}>{(data.distributors||[]).filter(d=>+d.balance>0).length} distributors</div>
        </Card>
      </div>

      {/* Distributor Quick Pay */}
      {(data.distributors||[]).filter(d=>+d.balance>0).length > 0 && (
        <Card style={{marginBottom:16,border:"1.5px solid #fde68a",background:"#fffbeb"}}>
          <div style={{fontWeight:700,fontSize:14,color:"#92400e",marginBottom:10}}>🚚 Distributor Payments Due</div>
          {(data.distributors||[]).filter(d=>+d.balance>0).map(dist=>(
            <div key={dist.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
              padding:"8px 0",borderBottom:"1px solid #fde68a"}}>
              <div>
                <div style={{fontWeight:600,fontSize:13}}>{dist.name}</div>
                {dist.company && <div style={{fontSize:11,color:"#9ca3af"}}>{dist.company}</div>}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{fontWeight:800,color:"#dc2626",fontSize:14}}>{fmt(+dist.balance||0)}</div>
                <button onClick={()=>{
                  const amt = prompt("Kitna payment karna hai? (Rs.)", dist.balance);
                  if(!amt || isNaN(amt)) return;
                  setData(d=>({
                    ...d,
                    accounts:[...d.accounts,{
                      id:Date.now(), date:new Date().toISOString().split("T")[0],
                      type:"expense", category:"Distributor Payment",
                      description:"Payment to " + dist.name + (dist.company?" ("+dist.company+")":""),
                      amount:+amt, reference:"DIST-"+dist.id
                    }],
                    distributors:(d.distributors||[]).map(x=>
                      x.id===dist.id ? {...x, balance: Math.max(0,(+x.balance||0)-(+amt))} : x
                    )
                  }));
                }} style={{background:"#1d4ed8",color:"#fff",border:"none",borderRadius:7,
                  padding:"5px 12px",cursor:"pointer",fontSize:12,fontWeight:700}}>
                  Pay Now
                </button>
              </div>
            </div>
          ))}
        </Card>
      )}

      {(()=>{
        const ACC_PS=15;
        const [accPg,setAccPg]=React.useState(1);
        const accList=[...data.accounts].reverse();
        const accDisp=accList.slice((accPg-1)*ACC_PS,accPg*ACC_PS);
        return(
      <Card>
        <div className="tbl-wrap" style={{overflowX:"auto"}}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
          <thead>
            <tr style={{ background: "#f8fafc" }}>
              {["Date","Type","Category","Description","Amount"].map((h) => (
                <th key={h} style={{ padding: "6px 8px", textAlign: "left", fontWeight: 700, fontSize:11, borderBottom: "2px solid #e5e7eb", whiteSpace:"nowrap" }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {accDisp.map((a) => (
              <tr key={a.id} style={{ borderBottom: "1px solid #f3f4f6" }}>
                <td style={{ padding: "5px 8px", fontSize:11, whiteSpace:"nowrap" }}>{fmtDate(a.date)}</td>
                <td style={{ padding: "5px 8px" }}>{badge(a.type === "income" ? "Inc" : "Exp", a.type === "income" ? "green" : "red")}</td>
                <td style={{ padding: "5px 8px", fontSize:11, maxWidth:80, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{a.category}</td>
                <td style={{ padding: "5px 8px", fontSize:11, maxWidth:120, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }} title={a.description}>{a.description}</td>
                <td style={{ padding: "5px 8px", fontWeight: 700, fontSize:11, color: a.type === "income" ? "#16a34a" : "#dc2626", whiteSpace:"nowrap" }}>
                  {a.type === "income" ? "+" : "-"}{fmt(a.amount)}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        </div>
        <Pager page={accPg} total={accList.length} pageSize={ACC_PS} onChange={setAccPg} />
      </Card>
        );
      })()}

      {modal && (
        <Modal title="Add Transaction" onClose={() => setModal(false)}>
          <Select label="Type" value={form.type} onChange={(v) => setForm((f) => ({ ...f, type: v }))}
            options={[{ value: "income", label: "Income" }, { value: "expense", label: "Expense" }]} />
          <div style={{marginBottom:12}}>
            <label style={{fontSize:12,fontWeight:700,color:"#374151",display:"block",marginBottom:4}}>Category</label>
            <select value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))}
              style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"1.5px solid #e5e7eb",fontSize:14}}>
              <option value="">-- Select Category --</option>
              <optgroup label="Income">
                <option>Sales</option>
                <option>Cash Sales</option>
                <option>Invoice Payment</option>
                <option>Clinic Income</option>
                <option>Other Income</option>
              </optgroup>
              <optgroup label="Expenses">
                <option>Distributor Payment</option>
                <option>Stock Purchase</option>
                <option>Salary</option>
                <option>Advance</option>
                <option>Doctor Payment</option>
                <option>Rent</option>
                <option>Utilities</option>
                <option>Transport</option>
                <option>Miscellaneous</option>
              </optgroup>
            </select>
          </div>
          <Input label="Description *" value={form.description} onChange={(v) => setForm((f) => ({ ...f, description: v }))} />
          <Input label="Amount (Rs.) *" type="number" value={form.amount} onChange={(v) => setForm((f) => ({ ...f, amount: v }))} />
          <Input label="Date" type="date" value={form.date} onChange={(v) => setForm((f) => ({ ...f, date: v }))} />
          <PaymentMethodPicker
            value={form._payMethod}
            direction={form.type==="income"?"receive":"send"}
            onChange={pm=>setForm(f=>({...f,_payMethod:pm}))}
            required />
          <div style={{ display: "flex", justifyContent: "flex-end", gap: 10 }}>
            <Btn color="gray" onClick={() => setModal(false)}>Cancel</Btn>
            <Btn onClick={save}>💾 Save Transaction</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── ADD PRODUCT FROM DISTRIBUTOR ────────────────────────────────────────────
function AddProductFromDist({ dist, data, setData, onClose }) {
  const toast = useToast();
  const EMPTY_ROW = { productId:"", name:"", batchNo:"", expiry:"", qty:"", bonusQty:"", costPrice:"", isNew:false };
  const [invoiceNo, setInvoiceNo]   = useState(`DIST-${Date.now().toString().slice(-6)}`);
  const [paymentClear, setPaymentClear] = useState(null);
  const [rows, setRows]             = useState([{...EMPTY_ROW}]);
  const [productSearch, setProductSearch] = useState([""]);

  const setRow = (i, k, v) => setRows(rs => rs.map((r,j) => j===i ? {...r,[k]:v} : r));

  const selectProduct = (i, pid) => {
    if (!pid) { setRow(i,"productId",""); setRow(i,"name",""); return; }
    const p = data.products.find(x => String(x.id) === String(pid));
    if (p) {
      setRows(rs => rs.map((r,j) => j===i ? {...r, productId:String(p.id), name:p.name, costPrice:String(p.cost||"")} : r));
    }
  };

  const handleRowKeyDown = (e, i) => {
    if (e.key === "Enter" && i === rows.length - 1) {
      setRows(r => [...r, {...EMPTY_ROW}]);
      setProductSearch(s => [...s, ""]);
      setTimeout(() => {
        const inputs = document.querySelectorAll(".dist-row-product");
        if (inputs[i+1]) inputs[i+1].focus();
      }, 50);
    }
  };

  const removeRow = i => {
    if (rows.length === 1) return;
    setRows(r => r.filter((_,j)=>j!==i));
    setProductSearch(s => s.filter((_,j)=>j!==i));
  };

  // Total cost = only paid qty × cost (bonus is free, no cost)
  const totalCost = rows.reduce((s,r) => s + ((+r.costPrice||0)*(+r.qty||0)), 0);
  const totalBonus = rows.reduce((s,r) => s + (+r.bonusQty||0), 0);

  const save = () => {
    const validRows = rows.filter(r => r.name && +r.qty > 0);
    if (!invoiceNo) return toast("Invoice number daakhil karein!", "error");
    if (!validRows.length) return toast("Kam az kam ek product add karein!", "error");
    if (paymentClear === null) return toast("Payment clear select karein!", "error");

    setData(d => {
      let products = [...d.products];
      validRows.forEach(r => {
        const idx = products.findIndex(p => String(p.id) === String(r.productId));
        const packSize = idx >= 0 ? (products[idx].unitQty || 1) : 1;
        // Qty is in PACKS — multiply by packSize to get units
        const paidUnits  = (+r.qty||0) * packSize;
        const bonusUnits = (+r.bonusQty||0) * packSize;
        const totalUnits = paidUnits + bonusUnits;
        // Cost is per pack — divide by packSize to get cost per unit
        const costPerUnit = r.costPrice;
        if (idx >= 0) {
          products[idx] = {
            ...products[idx],
            stock: products[idx].stock + totalUnits,
            ...(r.expiry ? {expiry: r.expiry} : {}),
            ...(costPerUnit !== null ? {cost: costPerUnit} : {}),
            supplier: dist.name,
          };
        } else if (r.name) {
          products.push({
            id: Date.now() + Math.random(),
            name: r.name, supplier: dist.name,
            category: "General", unit: "Tablets",
            price: 0, cost: costPerUnit||+r.costPrice||0, margin: 0,
            stock: totalUnits, reorder: 50,
            expiry: r.expiry||"", barcode: "",
          });
        }
      });

      const accounts = paymentClear === "yes"
        ? [...d.accounts, {
            id: Date.now(), date: new Date().toISOString().split("T")[0],
            type: "expense", category: "Purchase",
            description: `${invoiceNo} - Purchase from ${dist.name}${totalBonus>0?` (incl. ${totalBonus} bonus items)`:""}`,
            amount: totalCost,
          }]
        : d.accounts;

      const distributors = (d.distributors||[]).map(x =>
        x.id === dist.id
          ? {...x, balance: (x.balance||0) + (paymentClear==="no" ? totalCost : 0)}
          : x
      );

      const distHistory = [...(d.distHistory||[]), {
        id: invoiceNo, date: new Date().toISOString().split("T")[0],
        distributor: dist.name, items: validRows,
        totalCost, paymentClear, type:"purchase",
        totalBonus,
      }];

      return {...d, products, accounts, distributors, distHistory};
    });

    toast(`✅ ${invoiceNo} — ${validRows.length} products added from ${dist.name}!${totalBonus>0?` (🎁 ${totalBonus} bonus items bhi add hue)`:""}`, "success");
    onClose();
  };

  return (
    <Modal wide title={`🚚 Purchase from ${dist.name}`} onClose={onClose}>
      {/* Header */}
      <div style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:10,padding:"10px 14px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontSize:13,color:"#1e40af",fontWeight:700}}>🚚 {dist.name} {dist.company?`(${dist.company})`:""}</span>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:13,fontWeight:700,color:"#374151"}}>Invoice #</span>
          <input value={invoiceNo} onChange={e=>setInvoiceNo(e.target.value)}
            style={{padding:"6px 10px",border:"1.5px solid #93c5fd",borderRadius:7,fontSize:13,fontWeight:700,width:160,outline:"none"}}/>
        </div>
      </div>

      {/* Bonus info banner */}
      <div style={{background:"#f0fdf4",border:"1px solid #86efac",borderRadius:9,padding:"8px 14px",marginBottom:12,fontSize:12,color:"#065f46",fontWeight:600}}>
        🎁 <strong>Free Bonus Column:</strong> Agar distributor kuch items free bonus mein de to "Free Bonus" column mein qty likhein — woh stock mein add hongi lekin cost mein count nahi hongi.
      </div>

      {/* Rows Table */}
      <div style={{overflowX:"auto",marginBottom:14}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
          <thead>
            <tr style={{background:"#f8fafc"}}>
              {["#","Product Name *","Batch","Exp","Qty*","🎁Bonus","Cost",""].map(h=>(
                <th key={h} style={{padding:"6px 7px",textAlign:"left",fontWeight:700,borderBottom:"2px solid #e5e7eb",whiteSpace:"nowrap",fontSize:11,
                  color: h==="🎁Bonus" ? "#16a34a" : "#374151"}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {rows.map((row,i) => (
              <tr key={i} style={{borderBottom:"1px solid #f3f4f6"}}>
                <td style={{padding:"4px 5px",color:"#9ca3af",fontWeight:700,fontSize:11}}>{i+1}</td>
                <td style={{padding:"3px 4px",minWidth:150}}>
                  <select
                    className="dist-row-product"
                    value={row.productId}
                    onChange={e=>selectProduct(i,e.target.value)}
                    onKeyDown={e=>handleRowKeyDown(e,i)}
                    style={{width:"100%",padding:"5px 6px",border:"1.5px solid #d1d5db",borderRadius:6,fontSize:12,outline:"none"}}>
                    <option value="">-- Select --</option>
                    {data.products.map(p=>(
                      <option key={p.id} value={p.id}>{p.name}</option>
                    ))}
                    <option value="__new__">➕ New...</option>
                  </select>
                  {row.productId==="__new__" && (
                    <input placeholder="New product name" value={row.name}
                      onChange={e=>setRow(i,"name",e.target.value)}
                      style={{marginTop:3,width:"100%",padding:"5px 6px",border:"1.5px solid #fbbf24",borderRadius:6,fontSize:11,outline:"none"}}/>
                  )}
                </td>
                <td style={{padding:"3px 4px"}}>
                  <input value={row.batchNo||""} onChange={e=>setRow(i,"batchNo",e.target.value)}
                    placeholder="B001"
                    style={{width:65,padding:"5px 6px",border:"1.5px solid #d1d5db",borderRadius:6,fontSize:12,outline:"none"}}/>
                </td>
                <td style={{padding:"3px 4px"}}>
                  <input type="date" value={row.expiry||""} onChange={e=>setRow(i,"expiry",e.target.value)}
                    style={{width:115,padding:"5px 6px",border:"1.5px solid #d1d5db",borderRadius:6,fontSize:11,outline:"none"}}/>
                </td>
                <td style={{padding:"3px 4px"}}>
                  <input type="number" min="0" value={row.qty||""}
                    onChange={e=>setRow(i,"qty",e.target.value)}
                    onKeyDown={e=>handleRowKeyDown(e,i)}
                    placeholder="Packs"
                    style={{width:60,padding:"5px 6px",border:"1.5px solid #d1d5db",borderRadius:6,fontSize:12,outline:"none",fontWeight:700}}/>
                  {+row.qty>0 && row.productId && (() => {
                    const _p = data.products.find(x=>String(x.id)===String(row.productId));
                    const _ps = _p ? (_p.unitQty||1) : 1;
                    if (_ps <= 1) return null;
                    return <div style={{fontSize:9,color:"#1d4ed8",fontWeight:700,marginTop:1}}>={+row.qty*_ps}u</div>;
                  })()}
                </td>
                <td style={{padding:"3px 4px"}}>
                  <input type="number" min="0" value={row.bonusQty||""}
                    onChange={e=>setRow(i,"bonusQty",e.target.value)}
                    placeholder="0"
                    title="Free bonus qty"
                    style={{width:55,padding:"5px 6px",border:"2px solid #86efac",borderRadius:6,fontSize:12,outline:"none",fontWeight:700,
                      background: +row.bonusQty>0 ? "#f0fdf4" : "#fff",
                      color: +row.bonusQty>0 ? "#16a34a" : "#374151"}}/>
                  {+row.bonusQty>0 && (
                    <div style={{fontSize:9,color:"#16a34a",fontWeight:700,marginTop:1}}>🎁</div>
                  )}
                </td>
                <td style={{padding:"3px 4px"}}>
                  <input type="number" min="0" value={row.costPrice||""}
                    onChange={e=>setRow(i,"costPrice",e.target.value)}
                    placeholder="Cost"
                    style={{width:72,padding:"5px 6px",border:"1.5px solid #d1d5db",borderRadius:6,fontSize:12,outline:"none"}}/>
                  {+row.qty>0 && +row.bonusQty>0 && +row.costPrice>0 && (
                    <div style={{fontSize:9,color:"#6b7280",marginTop:1}}>
                      {+row.qty + +row.bonusQty}pcs
                    </div>
                  )}
                </td>
                <td style={{padding:"4px 6px"}}>
                  <button onClick={()=>removeRow(i)}
                    style={{background:"#fee2e2",color:"#dc2626",border:"none",borderRadius:6,padding:"5px 10px",cursor:"pointer",fontWeight:700,fontSize:12}}>✕</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <button onClick={()=>{setRows(r=>[...r,{...EMPTY_ROW}]);setProductSearch(s=>[...s,""]); }}
        style={{padding:"7px 16px",background:"#f0fdf4",color:"#16a34a",border:"1.5px dashed #86efac",borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:13,marginBottom:16}}>
        + Add Row
      </button>

      {/* Total summary */}
      <div style={{background:"#f8fafc",borderRadius:10,padding:"12px 16px",marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
          <span style={{fontWeight:700,color:"#374151"}}>Total Purchase Cost (paid qty only):</span>
          <span style={{fontWeight:800,fontSize:16,color:"#1d4ed8"}}>{fmt(totalCost)}</span>
        </div>
        {totalBonus > 0 && (
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",background:"#f0fdf4",borderRadius:8,border:"1px solid #86efac"}}>
            <span style={{fontWeight:700,color:"#16a34a"}}>🎁 Free Bonus Items (no cost):</span>
            <span style={{fontWeight:800,fontSize:15,color:"#16a34a"}}>{totalBonus} packs free!</span>
          </div>
        )}
      </div>

      {/* Payment Clear */}
      <div style={{marginBottom:16}}>
        <div style={{fontWeight:700,fontSize:13,color:"#374151",marginBottom:8}}>💳 Payment Clear?</div>
        <div style={{display:"flex",gap:12}}>
          <button onClick={()=>setPaymentClear("yes")}
            style={{flex:1,padding:"10px",borderRadius:9,fontWeight:700,fontSize:14,cursor:"pointer",
              border: paymentClear==="yes"?"2px solid #16a34a":"2px solid #e5e7eb",
              background: paymentClear==="yes"?"#d1fae5":"#fff",
              color: paymentClear==="yes"?"#16a34a":"#374151"}}>
            ✅ Yes — Payment Done
          </button>
          <button onClick={()=>setPaymentClear("no")}
            style={{flex:1,padding:"10px",borderRadius:9,fontWeight:700,fontSize:14,cursor:"pointer",
              border: paymentClear==="no"?"2px solid #dc2626":"2px solid #e5e7eb",
              background: paymentClear==="no"?"#fee2e2":"#fff",
              color: paymentClear==="no"?"#dc2626":"#374151"}}>
            ❌ No — Baki Hai (Credit)
          </button>
        </div>
        {paymentClear==="no" && (
          <div style={{marginTop:8,padding:"8px 12px",background:"#fef3c7",borderRadius:8,fontSize:12,color:"#92400e",fontWeight:600}}>
            ⚠️ {fmt(totalCost)} distributor ke account mein pending add ho jaega
          </div>
        )}
      </div>

      <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
        <Btn color="gray" onClick={onClose}>Cancel</Btn>
        <Btn onClick={save}>✅ Save Purchase</Btn>
      </div>
    </Modal>
  );
}

    d.name.toLowerCase().includes(search.toLowerCase()) ||
    (d.company||"").toLowerCase().includes(search.toLowerCase())
  );

  const save = () => {
    if (!form.name) return toast("Distributor name zaroori hai!", "error");

      const newDist = {...form, id: Date.now(), balance: +form.balance||0, createdAt: new Date().toISOString().split("T")[0]};
      setData(d => ({...d, distributors: [...(d.distributors||[]), newDist]}));

function Settings({ settings, setSettings, data, setData, onDbConfigSaved, dbStatus }) {

  const [saved, setSaved]     = useState(false);
  const [pharma, setPharma]   = useState({ ...settings.pharmacy });
  const [appCfg, setAppCfg]   = useState({ ...settings.app });

  // DB Config state — loaded from localStorage
  const initCfg = getSbConfig();
  const [dbCfg, setDbCfg] = useState({ url: initCfg.url, key: initCfg.key, enabled: initCfg.enabled, configCode: initCfg.configCode || "" });
  const [testing, setTesting] = useState(false);
  const [testResult, setTestResult] = useState(null); // null | "ok" | "fail"

  const savePharmacy = () => {
    if (!pharma.name) return toast("Pharmacy ka naam zaroori hai!", "error");
    setSettings((s) => ({ ...s, pharmacy: { ...pharma } }));
    toast("✅ Pharmacy information save ho gayi!", "success");
  };
  const saveApp = () => {
    setSettings((s) => ({ ...s, app: { ...appCfg } }));
    toast("✅ App settings save ho gayi!", "success");
  };

  // ── Backup: download full JSON ──
  const handleBackup = () => {
    const payload = JSON.stringify({ data, settings, exportedAt: new Date().toISOString() }, null, 2);
    const blob = new Blob([payload], { type: "application/json" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url; a.download = `PharmaPro-Backup-${new Date().toISOString().split("T")[0]}.json`;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
    toast("✅ Backup file download ho gayi!", "success");
  };

  // ── Restore: import JSON backup ──
  const handleRestore = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const parsed = JSON.parse(ev.target.result);
        if (!parsed.data || !parsed.settings) return toast("❌ Invalid backup file!", "error");
        setData(parsed.data);
        setSettings(parsed.settings);
        toast("✅ Data successfully restore ho gaya!", "success");
      } catch { toast("❌ Invalid backup file format!", "error"); }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  const TABS = [
    { id: "pharmacy", label: "🏥 Pharmacy Info" },
    { id: "app",      label: "⚙️ App Settings" },

      {tab === "pharmacy" && (

            {field("Email", "email", pharma, setPharma, { type: "email", placeholder: "pharmacy@email.com" })}

            </p>
            <label style={{ display: "inline-block", background: "#fef2f2", border: "2px dashed #fca5a5", borderRadius: 10, padding: "14px 24px", cursor: "pointer", fontSize: 14, color: "#dc2626", fontWeight: 700 }}>
              📁 Choose Backup File
              <input type="file" accept=".json" onChange={handleRestore} style={{ display: "none" }} />

          {/* Data Stats */}

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>

{`-- ══════════════════════════════════════════════════════════
-- PharmaPro SQL v3 — Lowercase Columns (copy & run in Supabase SQL Editor)
-- ══════════════════════════════════════════════════════════

drop table if exists app_users cascade;
drop table if exists app_settings cascade;
drop table if exists advance_records cascade;
drop table if exists salary_records cascade;
drop table if exists employees cascade;
drop table if exists patient_records cascade;
drop table if exists doctors cascade;
drop table if exists returns cascade;
drop table if exists dist_history cascade;
drop table if exists distributors cascade;
drop table if exists accounts cascade;
drop table if exists invoices cascade;
drop table if exists customers cascade;
drop table if exists products cascade;

create table products (
  id bigint primary key, name text not null,
  category text default '', unit text default 'Tablets',
  unitqty numeric default 1, price numeric default 0,
  cost numeric default 0, margin numeric default 0,
  stock numeric default 0, reorder numeric default 50,
  expiry text default '', supplier text default '', barcode text default '');

create table customers (
  id bigint primary key, name text not null,
  phone text default '', email text default '',
  address text default '', balance numeric default 0,
  totalpurchases numeric default 0);

create table invoices (
  id text primary key, date text default '',
  customerid text default '', customername text default '',
  saletype text default 'customer', items jsonb default '[]',
  subtotal numeric default 0, discount numeric default 0,
  discountpct numeric default 0, discounttype text default 'amount',
  tax numeric default 0, total numeric default 0,
  paid numeric default 0, status text default 'unpaid',
  notes text default '', paymentmethod text default 'cash',
  paymentdetail text default '', paymentname text default '',
  createdby text default '');

create table accounts (
  id bigint primary key, date text default '',
  type text default 'income', category text default '',
  description text default '', amount numeric default 0,
  reference text default '', paymentmethod text default 'cash',
  paymentdetail text default '', paymentname text default '');

create table distributors (
  id bigint primary key, name text not null,
  company text default '', phone text default '',
  mobile text default '', email text default '',
  address text default '', city text default '',
  ntn text default '', creditlimit text default '',
  paymentterms text default '', notes text default '',
  balance numeric default 0, createdat text default '');

create table dist_history (
  id text primary key, date text default '',
  distributor text default '', items jsonb default '[]',
  totalcost numeric default 0, paymentclear text default '',
  type text default 'purchase');

create table returns (
  id text primary key, date text default '',
  type text default '', invoiceid text default '',
  customerid text default '', customername text default '',
  items jsonb default '[]', total numeric default 0,
  reason text default '', createdby text default '');

create table doctors (
  id bigint primary key, name text not null,
  phone text default '', specialization text default '',
  feeshare numeric default 0, pendingamount numeric default 0,
  notes text default '');

create table patient_records (
  id text primary key, date text default '',
  doctorid text default '', doctorname text default '',
  patientname text default '', checkupfee numeric default 0,
  servicefee numeric default 0, bp text default '',
  diagnosis text default '', notes text default '',
  medicines jsonb default '[]', medtotal numeric default 0,
  grandtotal numeric default 0, invoiceid text default '',
  doctorshare numeric default 0, storeshare numeric default 0,
  sharepercent numeric default 0, createdby text default '');

create table employees (
  id bigint primary key, name text not null,
  fathername text default '', cnic text default '',
  phone text default '', address text default '',
  designation text default '', department text default '',
  joindate text default '', salary numeric default 0,
  bankaccount text default '', bankname text default '',
  pendingadvance numeric default 0, status text default 'active',
  notes text default '');

create table salary_records (
  id bigint primary key, empid text default '',
  empname text default '', month text default '',
  amount numeric default 0, deduction numeric default 0,
  net numeric default 0, note text default '',
  date text default '', paidby text default '');

create table advance_records (
  id bigint primary key, empid text default '',
  empname text default '', amount numeric default 0,
  reason text default '', recoverin text default '',
  date text default '', status text default 'pending',
  paidby text default '');

create table app_settings (id text primary key default 'main', data jsonb default '{}');
create table app_users (id bigint primary key, name text default '', username text default '', password text default '', role text default 'employee');
create table app_config (id text primary key, db_url text default '', db_key text default '', pharmacy_name text default '', updated_at text default '');

alter table products enable row level security;

const DB_PASSWORD = "pharma1234"; // default password

function DatabaseViewer({ data, settings, onClose }) {
  const [entered, setEntered]   = useState("");
  const [unlocked, setUnlocked] = useState(false);
  const [error, setError]       = useState("");
  const [dbTab, setDbTab]       = useState("products");
  const [changePwModal, setChangePwModal] = useState(false);
  const [pwForm, setPwForm]     = useState({ old: "", newPw: "", confirm: "" });
  const [pwError, setPwError]   = useState("");
  const [dbPassword, setDbPassword] = useState(
    (() => { try { return localStorage.getItem("pharma_db_pw") || DB_PASSWORD; } catch { return DB_PASSWORD; } })()
  );

  const tryUnlock = () => {
    if (entered === dbPassword) { setUnlocked(true); setError(""); }
    else { setError("❌ Wrong password!"); setEntered(""); }
  };

  const handleChangePw = () => {
    if (pwForm.old !== dbPassword) return setPwError("Old password galat hai");
    if (pwForm.newPw.length < 4)   return setPwError("Password kam az kam 4 characters ka hona chahiye");
    if (pwForm.newPw !== pwForm.confirm) return setPwError("Passwords match nahi kar rahe");
    try { localStorage.setItem("pharma_db_pw", pwForm.newPw); } catch {}
    setDbPassword(pwForm.newPw);
    setPwForm({ old: "", newPw: "", confirm: "" });
    setPwError("");
    setChangePwModal(false);
    toast("✅ Password successfully change ho gaya!", "success");
  };

  const DB_TABLES = [
    { id: "products",  label: "💊 Products",     rows: data.products,  cols: ["id","name","category","price","cost","stock","expiry"] },
    { id: "invoices",  label: "🧾 Invoices",     rows: data.invoices,  cols: ["id","date","customerName","total","paid","status"] },
    { id: "customers", label: "👥 Customers",    rows: data.customers, cols: ["id","name","phone","balance","totalPurchases"] },

// ─── DOCTOR INCOME REPORT ────────────────────────────────────────────────────
function DoctorIncomeReport({ data }) {
  const todayStr = new Date().toISOString().split("T")[0];
  const thisMonth = todayStr.slice(0, 7);
  const thisWeekStart = (() => {
    const d = new Date();
    d.setDate(d.getDate() - d.getDay());
    return d.toISOString().split("T")[0];
  })();

  const [filter, setFilter] = useState("month");   // today | week | month | custom | all
  const [dateFrom, setDateFrom] = useState(thisMonth + "-01");
  const [dateTo, setDateTo]     = useState(todayStr);
  const [selDoctor, setSelDoctor] = useState("all");

  const doctors = data.doctors || [];
  const records = data.patientRecords || [];

  // Apply date filter
  const getDateRange = () => {
    if (filter === "today")  return { from: todayStr,        to: todayStr };
    if (filter === "week")   return { from: thisWeekStart,   to: todayStr };
    if (filter === "month")  return { from: thisMonth+"-01", to: todayStr };
    if (filter === "custom") return { from: dateFrom,        to: dateTo   };
    return { from: "2000-01-01", to: "2099-12-31" }; // all
  };
  const { from, to } = getDateRange();

  const filtered = records.filter(r =>
    r.date >= from && r.date <= to &&
    (selDoctor === "all" || String(r.doctorId) === String(selDoctor))
  );

  // Per-doctor summary
  const doctorSummary = doctors.map(doc => {
    const recs = filtered.filter(r => String(r.doctorId) === String(doc.id));
    const totalPatients  = recs.length;
    const totalCheckupFee = recs.reduce((s,r) => s + (+r.checkupFee||0), 0);
    const totalDoctorEarned = recs.reduce((s,r) => s + (+r.doctorShare||0), 0);
    const totalStoreEarned  = recs.reduce((s,r) => s + (+r.storeShare||0), 0);
    const totalMedSales     = recs.reduce((s,r) => s + (+r.medTotal||0), 0);
    const totalGrand        = recs.reduce((s,r) => s + (+r.grandTotal||0), 0);
    return { doc, recs, totalPatients, totalCheckupFee, totalDoctorEarned, totalStoreEarned, totalMedSales, totalGrand };
  }).filter(d => selDoctor === "all" ? true : String(d.doc.id) === String(selDoctor));

  // Totals
  const grandPatients = doctorSummary.reduce((s,d)=>s+d.totalPatients,0);
  const grandCheckup  = doctorSummary.reduce((s,d)=>s+d.totalCheckupFee,0);
  const grandDocEarn  = doctorSummary.reduce((s,d)=>s+d.totalDoctorEarned,0);
  const grandStore    = doctorSummary.reduce((s,d)=>s+d.totalStoreEarned,0);
  const grandMed      = doctorSummary.reduce((s,d)=>s+d.totalMedSales,0);

  const thS = {padding:"10px 12px",textAlign:"left",fontWeight:700,fontSize:12,
               borderBottom:"2px solid #e5e7eb",color:"#374151",whiteSpace:"nowrap"};

  const numTd = {...tdS,textAlign:"right",fontWeight:600};

  return (
    <div>
      <div style={{fontWeight:800,fontSize:18,marginBottom:16}}>📊 Doctor Income Report</div>

      {/* Filters */}
      <Card style={{marginBottom:16}}>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"flex-end"}}>
          {/* Period buttons */}
          <div>
            <label style={{display:"block",fontSize:12,fontWeight:700,color:"#6b7280",marginBottom:5}}>Period</label>
            <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
              {[
                {id:"today", label:"Today"},
                {id:"week",  label:"This Week"},
                {id:"month", label:"This Month"},
                {id:"all",   label:"All Time"},
                {id:"custom",label:"Custom"},
              ].map(f=>(
                <button key={f.id} onClick={()=>setFilter(f.id)}
                  style={{padding:"7px 14px",borderRadius:8,border:"2px solid",cursor:"pointer",
                    fontSize:13,fontWeight:700,transition:"all .15s",
                    borderColor:filter===f.id?"#1d4ed8":"#e5e7eb",
                    background:filter===f.id?"#1d4ed8":"#fff",
                    color:filter===f.id?"#fff":"#374151"}}>
                  {f.label}
                </button>
              ))}
            </div>
          </div>

          {/* Custom date range */}
          {filter === "custom" && (
            <>
              <div>
                <label style={{display:"block",fontSize:12,fontWeight:600,color:"#6b7280",marginBottom:4}}>From</label>
                <input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)}
                  style={{padding:"8px 10px",border:"1px solid #d1d5db",borderRadius:8,fontSize:13,outline:"none"}}/>
              </div>
              <div>
                <label style={{display:"block",fontSize:12,fontWeight:600,color:"#6b7280",marginBottom:4}}>To</label>
                <input type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)}

          {/* Doctor filter */}
          <div>
            <label style={{display:"block",fontSize:12,fontWeight:700,color:"#6b7280",marginBottom:5}}>Doctor</label>
            <select value={selDoctor} onChange={e=>setSelDoctor(e.target.value)}

                  <tr key={doc.id}>
                    <td style={tdS}>
