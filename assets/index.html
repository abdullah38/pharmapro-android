// ─── INVOICE RETURNS ──────────────────────────────────────────────────────────
function InvoiceReturns({ data, setData, currentUser }) {
  const toast = useToast();
  const [returnTab, setReturnTab] = useState("by_invoice"); // by_invoice | by_item
  const [modal, setModal]         = useState(null);
  
  // ── Return by Invoice state ──
  const [selInvoice, setSelInvoice] = useState("");
  const [retItems, setRetItems]     = useState([]);
  const [retReason, setRetReason]   = useState("");
  const [retCustomer, setRetCustomer] = useState("");

  // ── Return by Item state ──
  const [itemCust, setItemCust]     = useState("");
  const [itemProd, setItemProd]     = useState("");
  const [itemQty,  setItemQty]      = useState("");
  const [itemReason, setItemReason] = useState("");

  const returns = data.returns || [];

  // ── Load invoice items when invoice selected ──
  const loadInvoice = (invId) => {
    setSelInvoice(invId);
    setRetItems([]);
    setRetCustomer("");
    if (!invId) return;
    const inv = data.invoices.find(x => x.id === invId);
    if (!inv) return;
    setRetCustomer(inv.customerName);
    setRetItems(inv.items.map(i => ({ ...i, retQty: 0, maxQty: i.qty })));
  };

  // ── Save Return by Invoice ──
  const saveReturnByInvoice = () => {
    if (!selInvoice) return toast("Invoice select karein!", "error");
    const inv = data.invoices.find(x => x.id === selInvoice);
    if (!inv) return toast("Invoice nahi mili!", "error");
    const returning = retItems.filter(i => +i.retQty > 0);
    if (!returning.length) return toast("Kam az kam ek item ki return qty likhein!", "error");

    const retTotal = returning.reduce((s, i) => s + (+i.retQty * i.price), 0);
    const retId = `RET-${String((returns.length + 1)).padStart(3,"0")}`;

    const retRecord = {
      id: retId, date: new Date().toISOString().split("T")[0],
      type: "by_invoice", invoiceId: selInvoice,
      customerId: inv.customerId, customerName: inv.customerName,
      items: returning.map(i => ({...i, qty: +i.retQty})),
      total: retTotal, reason: retReason,
      createdBy: currentUser?.name || "System",
    };

    setData(d => ({
      ...d,
      returns: [...(d.returns||[]), retRecord],
      // Restore stock
      products: d.products.map(p => {
        const ri = returning.find(i => String(i.productId) === String(p.id));
        return ri ? {...p, stock: p.stock + +ri.retQty} : p;
      }),
      // Adjust customer balance
      customers: d.customers.map(c =>
        String(c.id) === String(inv.customerId)
          ? {...c, balance: c.balance + retTotal}
          : c
      ),
      // Add refund to accounts
      accounts: [...d.accounts, {
        id: Date.now(), date: retRecord.date, type: "expense",
        category: "Return/Refund",
        description: `${retId} - Return from ${inv.customerName} (${selInvoice})`,
        amount: retTotal,
      }],
    }));

    toast(`✅ ${retId} return processed! Rs. ${retTotal.toFixed(2)} refund`, "success");
    setSelInvoice(""); setRetItems([]); setRetReason(""); setRetCustomer("");
  };

  // ── Save Return by Item ──
  const saveReturnByItem = () => {
    if (!itemCust) return toast("Customer select karein!", "error");
    if (!itemProd) return toast("Product select karein!", "error");
    if (!itemQty || +itemQty <= 0) return toast("Qty likhein!", "error");

    const prod = data.products.find(p => String(p.id) === String(itemProd));
    const cust = data.customers.find(c => String(c.id) === String(itemCust));
    if (!prod || !cust) return toast("Product ya customer nahi mila!", "error");

    const retTotal = +itemQty * prod.price;
    const retId = `RET-${String((returns.length + 1)).padStart(3,"0")}`;

    const retRecord = {
      id: retId, date: new Date().toISOString().split("T")[0],
      type: "by_item", invoiceId: null,
      customerId: String(cust.id), customerName: cust.name,
      items: [{ productId: prod.id, name: prod.name, qty: +itemQty, price: prod.price, retQty: +itemQty }],
      total: retTotal, reason: itemReason,
      createdBy: currentUser?.name || "System",
    };

    setData(d => ({
      ...d,
      returns: [...(d.returns||[]), retRecord],
      products: d.products.map(p => String(p.id) === String(itemProd) ? {...p, stock: p.stock + +itemQty} : p),
      customers: d.customers.map(c => String(c.id) === String(itemCust) ? {...c, balance: c.balance + retTotal} : c),
      accounts: [...d.accounts, {
        id: Date.now(), date: retRecord.date, type: "expense",
        category: "Return/Refund",
        description: `${retId} - Item return: ${prod.name} x${itemQty} (${cust.name})`,
        amount: retTotal,
      }],
    }));

    toast(`✅ ${retId} return processed! ${prod.name} x${itemQty}`, "success");
    setItemCust(""); setItemProd(""); setItemQty(""); setItemReason("");
  };

  const COUNTER_SALE_ID = "counter";

  return (
    <div>
      {/* Sub tabs */}
      <div style={{display:"flex",gap:4,marginBottom:20,background:"#f8fafc",borderRadius:10,padding:4}}>
        {[
          {id:"by_invoice", label:"📄 Return By Invoice"},
          {id:"by_item",    label:"📦 Return By Item"},
        ].map(t => (
          <button key={t.id} onClick={()=>setReturnTab(t.id)} style={{
            flex:1, padding:"9px 0", fontWeight:700, fontSize:13,
            border:"none", borderRadius:8,
            background: returnTab===t.id ? "#fff" : "none",
            boxShadow: returnTab===t.id ? "0 1px 4px rgba(0,0,0,.1)" : "none",
            color: returnTab===t.id ? "#1d4ed8" : "#6b7280",
            cursor:"pointer", transition:"all 0.15s",
          }}>{t.label}</button>
        ))}
      </div>

      {/* ── Return By Invoice ── */}
      {returnTab === "by_invoice" && (
        <Card>
          <div style={{fontWeight:800,fontSize:15,marginBottom:16,color:"#1d4ed8"}}>📄 Return By Invoice</div>
          
          {/* Customer type */}
          <div style={{marginBottom:14}}>
            <label style={{display:"block",fontSize:13,fontWeight:700,color:"#374151",marginBottom:6}}>
              Customer Type *
            </label>
            <div style={{display:"flex",gap:10}}>
              <button
                onClick={()=>{setRetCustomer("Counter Sale"); setSelInvoice(""); setRetItems([]);}}
                style={{padding:"8px 18px",borderRadius:8,fontWeight:700,fontSize:13,
                  border: retCustomer==="Counter Sale" ? "2px solid #1d4ed8" : "2px solid #e5e7eb",
                  background: retCustomer==="Counter Sale" ? "#dbeafe" : "#fff",
                  color: retCustomer==="Counter Sale" ? "#1d4ed8" : "#374151",cursor:"pointer"}}>
                🏪 Counter Sale
              </button>
              <button
                onClick={()=>{setRetCustomer("relation"); setSelInvoice(""); setRetItems([]);}}
                style={{padding:"8px 18px",borderRadius:8,fontWeight:700,fontSize:13,
                  border: retCustomer==="relation" ? "2px solid #16a34a" : "2px solid #e5e7eb",
                  background: retCustomer==="relation" ? "#d1fae5" : "#fff",
                  color: retCustomer==="relation" ? "#16a34a" : "#374151",cursor:"pointer"}}>
                👥 Relation Customer
              </button>
            </div>
          </div>

          {/* Invoice select */}
          {retCustomer && (
            <div style={{marginBottom:14}}>
              <label style={{display:"block",fontSize:13,fontWeight:700,color:"#374151",marginBottom:6}}>
                Invoice Select * {retCustomer==="Counter Sale" ? "(Counter Sale invoices)" : "(Relation customer invoices)"}
              </label>
              <select value={selInvoice} onChange={e=>loadInvoice(e.target.value)}
                style={{width:"100%",padding:"9px 12px",border:"1.5px solid #d1d5db",borderRadius:8,fontSize:14,outline:"none"}}>
                <option value="">-- Invoice Select Karein --</option>
                {data.invoices
                  .filter(inv => retCustomer === "Counter Sale"
                    ? inv.customerName === "Counter Sale" || inv.customerId === "counter"
                    : inv.customerName !== "Counter Sale" && inv.customerId !== "counter"
                  )
                  .map(inv => (
                    <option key={inv.id} value={inv.id}>
                      {inv.id} — {inv.customerName} — {fmt(inv.total)} — {inv.date}
                    </option>
                  ))
                }
              </select>
            </div>
          )}

          {/* Items table */}
          {retItems.length > 0 && (
            <div style={{marginBottom:14}}>
              <div style={{fontWeight:700,fontSize:13,marginBottom:8,color:"#374151"}}>Return Qty likhein:</div>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead>
                  <tr style={{background:"#f8fafc"}}>
                    {["Product","Sale Qty","Price","Return Qty","Ret %","Return Amt"].map(h=>(
                      <th key={h} style={{padding:"6px 8px",textAlign:"left",fontWeight:700,fontSize:11,borderBottom:"2px solid #e5e7eb",whiteSpace:"nowrap"}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {retItems.map((item,i) => {
                    const retPct = item.maxQty > 0 && item.retQty > 0
                      ? ((+item.retQty / item.maxQty) * 100).toFixed(0)
                      : 0;
                    return (
                    <tr key={i} style={{borderBottom:"1px solid #f3f4f6"}}>
                      <td style={{padding:"6px 8px",fontWeight:600,fontSize:12,maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.name}</td>
                      <td style={{padding:"6px 8px",fontSize:12}}>{item.maxQty}</td>
                      <td style={{padding:"6px 8px",fontSize:12}}>{fmt(item.price)}</td>
                      <td style={{padding:"6px 8px"}}>
                        <input type="number" min="0" max={item.maxQty}
                          value={item.retQty||""}
                          onChange={e=>{
                            const v = Math.min(+e.target.value, item.maxQty);
                            setRetItems(ri=>ri.map((r,j)=>j===i?{...r,retQty:v}:r));
                          }}
                          style={{width:60,padding:"4px 6px",border:"1.5px solid #d1d5db",borderRadius:6,fontSize:12}}
                        />
                      </td>
                      <td style={{padding:"6px 8px",fontSize:12}}>
                        <span style={{
                          background: retPct>50?"#fee2e2":retPct>0?"#fef3c7":"#f3f4f6",
                          color: retPct>50?"#dc2626":retPct>0?"#d97706":"#6b7280",
                          fontWeight:700,padding:"2px 7px",borderRadius:20,fontSize:11
                        }}>{retPct}%</span>
                      </td>
                      <td style={{padding:"6px 8px",fontWeight:700,color:"#dc2626",fontSize:12}}>
                        {fmt((item.retQty||0)*item.price)}
                      </td>
                    </tr>
                    );
                  })}
                </tbody>
              </table>
              <div style={{marginTop:8,fontWeight:800,fontSize:14,color:"#dc2626",textAlign:"right"}}>
                Total Refund: {fmt(retItems.reduce((s,i)=>s+(+i.retQty||0)*i.price,0))}
              </div>
            </div>
          )}

          {selInvoice && (
            <div style={{marginBottom:14}}>
              <label style={{display:"block",fontSize:13,fontWeight:700,color:"#374151",marginBottom:6}}>Return Reason</label>
              <input value={retReason} onChange={e=>setRetReason(e.target.value)}
                placeholder="e.g. Damaged product, Wrong item..."
                style={{width:"100%",padding:"9px 12px",border:"1.5px solid #d1d5db",borderRadius:8,fontSize:14,outline:"none"}}/>
            </div>
          )}

          {selInvoice && retItems.length > 0 && (
            <Btn color="danger" onClick={saveReturnByInvoice}>↩️ Process Return</Btn>
          )}
        </Card>
      )}

      {/* ── Return By Item ── */}
      {returnTab === "by_item" && (
        <Card>
          <div style={{fontWeight:800,fontSize:15,marginBottom:16,color:"#1d4ed8"}}>📦 Return By Item</div>
          
          {/* Customer select - Counter or Relation */}
          <div style={{marginBottom:14}}>
            <label style={{display:"block",fontSize:13,fontWeight:700,color:"#374151",marginBottom:6}}>
              Customer * (Counter Sale ya Relation Customer)
            </label>
            <select value={itemCust} onChange={e=>setItemCust(e.target.value)}
              style={{width:"100%",padding:"9px 12px",border:"1.5px solid #d1d5db",borderRadius:8,fontSize:14,outline:"none"}}>
              <option value="">-- Customer Select Karein --</option>
              <option value="counter">🏪 Counter Sale</option>
              {data.customers.map(c=>(
                <option key={c.id} value={c.id}>👥 {c.name} — {c.phone}</option>
              ))}
            </select>
          </div>

          {itemCust && (
            <>
              <div style={{marginBottom:14}}>
                <label style={{display:"block",fontSize:13,fontWeight:700,color:"#374151",marginBottom:6}}>Product *</label>
                <select value={itemProd} onChange={e=>setItemProd(e.target.value)}
                  style={{width:"100%",padding:"9px 12px",border:"1.5px solid #d1d5db",borderRadius:8,fontSize:14,outline:"none"}}>
                  <option value="">-- Product Select Karein --</option>
                  {data.products.map(p=>(
                    <option key={p.id} value={p.id}>{p.name} — Stock: {p.stock} — {fmt(p.price)}</option>
                  ))}
                </select>
              </div>

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 16px"}}>
                <div style={{marginBottom:14}}>
                  <label style={{display:"block",fontSize:13,fontWeight:700,color:"#374151",marginBottom:6}}>Return Qty *</label>
                  <input type="number" min="1" value={itemQty} onChange={e=>setItemQty(e.target.value)}
                    placeholder="e.g. 10"
                    style={{width:"100%",padding:"9px 12px",border:"1.5px solid #d1d5db",borderRadius:8,fontSize:14,outline:"none"}}/>
                </div>
                <div style={{marginBottom:14}}>
                  <label style={{display:"block",fontSize:13,fontWeight:700,color:"#374151",marginBottom:6}}>Return Amount</label>
                  <div style={{padding:"9px 12px",border:"1.5px solid #e5e7eb",borderRadius:8,fontSize:14,
                    background:"#f8fafc",fontWeight:700,color:"#dc2626"}}>
                    {itemProd && itemQty
                      ? fmt((data.products.find(p=>String(p.id)===String(itemProd))?.price||0) * +itemQty)
                      : "—"}
                  </div>
                </div>
              </div>

              <div style={{marginBottom:14}}>
                <label style={{display:"block",fontSize:13,fontWeight:700,color:"#374151",marginBottom:6}}>Return Reason</label>
                <input value={itemReason} onChange={e=>setItemReason(e.target.value)}
                  placeholder="e.g. Expired, Damaged..."
                  style={{width:"100%",padding:"9px 12px",border:"1.5px solid #d1d5db",borderRadius:8,fontSize:14,outline:"none"}}/>
              </div>

              <Btn color="danger" onClick={saveReturnByItem}>↩️ Process Return</Btn>
            </>
          )}
        </Card>
      )}

      {/* ── Returns History ── */}
      {returns.length > 0 && (
        <Card style={{marginTop:16}}>
          <div style={{fontWeight:800,fontSize:15,marginBottom:12}}>📋 Returns History</div>
          <div className="tbl-wrap" style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead>
                <tr style={{background:"#fef2f2"}}>
                  {["Return #","Date","Type","Customer","Invoice","Items","Total Refund","Reason"].map(h=>(
                    <th key={h} style={{padding:"8px 10px",textAlign:"left",fontWeight:700,borderBottom:"2px solid #fca5a5"}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {[...returns].reverse().map(r=>(
                  <tr key={r.id} style={{borderBottom:"1px solid #fef2f2"}}>
                    <td style={{padding:"8px 10px",fontWeight:700,color:"#dc2626"}}>{r.id}</td>
                    <td style={{padding:"8px 10px"}}>{r.date}</td>
                    <td style={{padding:"8px 10px"}}>{r.type==="by_invoice"?"By Invoice":"By Item"}</td>
                    <td style={{padding:"8px 10px",fontWeight:600}}>{r.customerName}</td>
                    <td style={{padding:"8px 10px",color:"#1d4ed8"}}>{r.invoiceId||"—"}</td>
                    <td style={{padding:"8px 10px"}}>{r.items?.map(i=>`${i.name} x${i.qty||i.retQty}`).join(", ")}</td>
                    <td style={{padding:"8px 10px",fontWeight:700,color:"#dc2626"}}>{fmt(r.total)}</td>
                    <td style={{padding:"8px 10px",color:"#6b7280"}}>{r.reason||"—"}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </Card>
      )}
    </div>
  );
}

function Invoices({ data, setData, settings = { pharmacy: {}, app: {} }, currentUser = {} }) {
  const toast = useToast();
  const [tab, setTab]           = useState("invoices");
  const [modal, setModal]       = useState(null);
  const [viewInv, setViewInv]   = useState(null);
  const [payInv, setPayInv]     = useState(null);
  const [invPayAmt, setInvPayAmt]       = useState("");
  const [invPayMethod, setInvPayMethod] = useState(null);
  const [saleTypeModal, setSaleTypeModal] = useState(false); // ask counter vs customer first
  const [form, setForm]       = useState({ customerId: "", items: [], discount: 0, discountPct: 0, discountType: "amount", tax: 0, paid: 0 });
  const [showProfit, setShowProfit] = useState(false);

  const addItemToForm = (item) => {
    const newItem = { ...item, productId: String(item.productId) };
    setForm((f) => ({
      ...f,
      items: [
        ...f.items.filter((i) => String(i.productId) !== String(newItem.productId)),
        newItem,
      ],
    }));
  };

  const updateQty = (productId, newQty) => {
    setForm((f) => ({
      ...f,
      items: f.items.map((i) =>
        String(i.productId) === String(productId)
          ? { ...i, qty: parseFloat(newQty) || 0 }
          : i
      ),
    }));
  };

  const updateItemDisc = (productId, discPct) => {
    const pct = Math.min(100, Math.max(0, parseFloat(discPct) || 0));
    setForm((f) => ({
      ...f,
      items: f.items.map((i) =>
        String(i.productId) === String(productId)
          ? { ...i, itemDiscPct: pct }
          : i
      ),
    }));
  };

  const getItemRate = (item) => {
    const base = item.perUnitPrice !== undefined ? item.perUnitPrice : item.price;
    const disc = item.itemDiscPct || 0;
    return base * (1 - disc / 100);
  };

  const rawSubtotal = form.items.reduce((s, i) => {
    const base = i.perUnitPrice !== undefined ? i.perUnitPrice : i.price;
    return s + i.qty * base;
  }, 0);
  const subtotal    = form.items.reduce((s, i) => s + i.qty * getItemRate(i), 0);
  const discountAmt = form.discountType==="pct"
    ? (subtotal * (+form.discountPct||0) / 100)
    : (+form.discount||0);
  const total = subtotal - discountAmt + (+form.tax / 100) * subtotal;

  const saveInvoice = () => {
    const isCounter = form._saleType === "counter" || form.customerId === "counter";
    const cid = String(form.customerId);
    const c = isCounter
      ? { id:"counter", name:"Counter Sale", balance:0, totalPurchases:0 }
      : data.customers.find((x) => String(x.id) === cid);
    if (!c) return toast("Pehle customer select karein", "error");
    if (form.items.length === 0) return toast("Kam az kam ek product add karein", "error");

    // Payment method validation
    const pm = form._payMethod;
    if (!pm?.method) return toast("Payment method select karein!", "error");
    if (pm.method !== "cash" && (!pm.accountDesc || !pm.accountName))
      return toast("Payment account details likhein!", "error");

    const paidAmt    = parseFloat(form.paid) || 0;
    const discAmt    = form.discountType==="pct" ? (subtotal*(+form.discountPct||0)/100) : (parseFloat(form.discount)||0);
    const taxPct     = parseFloat(form.tax) || 0;
    const finalTotal = subtotal - discAmt + (taxPct / 100) * subtotal;

    const pmDetail = pm.method !== "cash"
      ? ` | ${pm.label} — ${pm.accountDesc} (${pm.accountName})`
      : " | Cash";

    const inv = {
      id          : `INV-${String(data.invoices.length + 1).padStart(3, "0")}`,
      date        : new Date().toISOString().split("T")[0],
      customerId  : isCounter ? "counter" : cid,
      customerName: isCounter ? "Counter Sale" : c.name,
      saleType    : form._saleType || "customer",
      items       : form.items.map(i => ({
        ...i,
        perUnitPrice: i.perUnitPrice !== undefined ? i.perUnitPrice : i.price,
        effectiveRate: getItemRate(i),
        itemDiscPct: i.itemDiscPct || 0,
      })),
      subtotal,
      discount    : discAmt,
      discountPct : form.discountType==="pct" ? +form.discountPct : 0,
      discountType: form.discountType||"amount",
      tax         : taxPct,
      total       : finalTotal,
      paid        : paidAmt,
      status      : paidAmt >= finalTotal ? "paid" : paidAmt > 0 ? "partial" : "unpaid",
      paymentMethod: pm.method, paymentDetail: pm.accountDesc||"", paymentName: pm.accountName||"",
      createdBy   : currentUser.name || currentUser.username || "System",
    };

    setData((d) => ({
      ...d,
      invoices: [...d.invoices, inv],
      products: d.products.map((p) => {
        const item = form.items.find((i) => String(i.productId) === String(p.id));
        if (!item) return p;
        const packsUsed = (item.unitQty||1)>1 ? item.qty/item.unitQty : item.qty;
        return { ...p, stock: Math.max(0, p.stock - packsUsed) };
      }),
      customers: isCounter ? d.customers : d.customers.map((cu) =>
        String(cu.id) === cid
          ? { ...cu, balance: cu.balance - (finalTotal - paidAmt), totalPurchases: (cu.totalPurchases||0) + finalTotal }
          : cu
      ),
      accounts: [...d.accounts, {
        id: Date.now(), date: inv.date, type: "income", category: isCounter?"Counter Sale":"Sales",
        paymentMethod: pm.method, paymentDetail: pm.accountDesc||"", paymentName: pm.accountName||"",
        description: `${inv.id} - ${isCounter?"Counter Sale":c.name}${pmDetail}`,
        amount: paidAmt,
      }],
    }));
    setModal(null);
    setForm({ customerId:"", items:[], discount:0, discountPct:0, discountType:"amount", tax:0, paid:0, _payMethod:null });
    toast(`✅ Invoice ${inv.id} — ${isCounter?"Counter Sale":c.name} — ${fmt(finalTotal)}`, "success");
    setViewInv(inv);
  };

  const statusColors = { paid: "green", partial: "yellow", unpaid: "red" };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <h2 style={{ margin: 0, fontSize: 22, fontWeight: 800 }}>🧾 Invoice Management</h2>
        {tab === "invoices" && <Btn onClick={() => setSaleTypeModal(true)}>+ New Invoice</Btn>}
      </div>

      {/* ── Tabs ── */}
      <div style={{ display:"flex", gap:4, marginBottom:16, borderBottom:"2px solid #e5e7eb", paddingBottom:0 }}>
        {[
          { id:"invoices", label:"🧾 Invoices" },
          { id:"returns",  label:"↩️ Returns"  },
        ].map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{
            padding:"9px 22px", fontWeight:700, fontSize:14, border:"none",
            borderBottom: tab===t.id ? "3px solid #1d4ed8" : "3px solid transparent",
            background:"none", cursor:"pointer",
            color: tab===t.id ? "#1d4ed8" : "#6b7280",
            transition:"all 0.15s",
          }}>{t.label}</button>
        ))}
      </div>

      {/* ── Invoices Tab ── */}
      {tab === "invoices" && (() => {
        const INV_PS = 15;
        const [invPage, setInvPage] = React.useState(1);
        const invList = [...data.invoices].reverse();
        const invDisp = invList.slice((invPage-1)*INV_PS, invPage*INV_PS);
        return (
        <Card style={{padding:"8px 10px"}}>
          <div className="tbl-wrap" style={{ overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
              <thead>
                <tr style={{ background: "#f8fafc" }}>
                  {["Invoice #", "Date", "Customer", "Total", "Status", "Actions"].map((h) => (
                    <th key={h} style={{ padding: "6px 8px", textAlign: "left", fontWeight: 700, fontSize: 11, borderBottom: "2px solid #e5e7eb", whiteSpace:"nowrap" }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {invDisp.map((inv) => (
                  <tr key={inv.id} style={{ borderBottom: "1px solid #f3f4f6" }}>
                    <td style={{ padding: "5px 8px", fontWeight: 700, color: "#1d4ed8", fontSize:11, whiteSpace:"nowrap" }}>{inv.id}</td>
                    <td style={{ padding: "5px 8px", fontSize:11, whiteSpace:"nowrap" }}>{fmtDate(inv.date)}</td>
                    <td style={{ padding: "5px 8px", fontWeight: 600, fontSize:11, maxWidth:110, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{inv.customerName}</td>
                    <td style={{ padding: "5px 8px", fontWeight: 700, fontSize:11, whiteSpace:"nowrap" }}>{fmt(inv.total)}</td>
                    <td style={{ padding: "5px 8px" }}>{badge(inv.status, statusColors[inv.status])}</td>
                    <td style={{ padding:"4px 6px" }}>
                      <div style={{display:"flex",gap:4,flexWrap:"nowrap"}}>
                        <Btn small onClick={() => setViewInv(inv)}>View</Btn>
                        {(inv.status==="unpaid"||inv.status==="partial") && (
                          <Btn small color="success" onClick={()=>setPayInv(inv)}>💰 Pay</Btn>
                        )}
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <Pager page={invPage} total={invList.length} pageSize={INV_PS} onChange={setInvPage} />
        </Card>
        );
      })()}

      {/* ── Returns Tab ── */}
      {tab === "returns" && <InvoiceReturns data={data} setData={setData} currentUser={currentUser} />}

      {/* ── NEW INVOICE MODAL ── */}
      {modal === "new" && (
        <Modal wide title="🧾 Create New Invoice" onClose={() => setModal(null)}>
          <Select
            label="Customer *"
            value={form.customerId}
            onChange={(v) => setForm((f) => ({ ...f, customerId: v }))}
            options={[{ value: "", label: "-- Customer Select Karein --" }, ...data.customers.map((c) => ({ value: String(c.id), label: `${c.name} (${c.phone})` }))]}
          />

          {/* ── Smart Product Search ── */}
          <div style={{ border: "1.5px solid #bfdbfe", borderRadius: 12, padding: "14px 14px 10px", marginBottom: 14, background: "#f8faff" }}>
            <p style={{ margin: "0 0 12px", fontWeight: 700, fontSize: 14, color: "#1e40af" }}>
              💊 Products Add Karein
            </p>
            <ProductSearchRow products={data.products} onAdd={addItemToForm} />

            {/* ── Added Items Table ── */}
            {form.items.length > 0 && (
              <div style={{ marginTop: 14 }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: "#374151", marginBottom: 8 }}>📋 Added Items:</div>
                <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12, tableLayout:"fixed" }}>
                  <colgroup>
                    <col style={{width:"32%"}}/>
                    <col style={{width:"11%"}}/>
                    <col style={{width:"13%"}}/>
                    <col style={{width:"11%"}}/>
                    <col style={{width:"16%"}}/>
                    <col style={{width:"7%"}}/>
                  </colgroup>
                  <thead>
                    <tr style={{ background: "#e0e7ff" }}>
                      <th style={{ padding: "6px 8px", textAlign: "left", fontWeight: 700, fontSize:11 }}>Description</th>
                      <th style={{ padding: "6px 6px", textAlign: "center", fontWeight: 700, fontSize:11 }}>Qty</th>
                      <th style={{ padding: "6px 6px", textAlign: "center", fontWeight: 700, fontSize:11 }}>Rate ✏️</th>
                      <th style={{ padding: "6px 6px", textAlign: "center", fontWeight: 700, fontSize:11 }}>Disc%</th>
                      <th style={{ padding: "6px 6px", textAlign: "right", fontWeight: 700, fontSize:11 }}>Amount</th>
                      <th style={{ padding: "6px 4px", textAlign: "center" }}></th>
                    </tr>
                  </thead>
                  <tbody>
                    {form.items.map((item) => {
                      const baseRate = item.perUnitPrice !== undefined ? item.perUnitPrice : (item.price || 0);
                      const discPct  = item.itemDiscPct || 0;
                      const effRate  = baseRate * (1 - discPct / 100);
                      const lineAmt  = item.qty * effRate;
                      return (
                      <tr key={item.productId} style={{ borderBottom: "1px solid #e0e7ff" }}>
                        <td style={{ padding: "4px 8px", fontWeight: 600, fontSize: 12, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }} title={item.name}>{item.name}</td>
                        <td style={{ padding: "4px 5px", textAlign: "center" }}>
                          <input
                            type="number" min="1"
                            value={item.qty}
                            onChange={(e) => updateQty(item.productId, e.target.value)}
                            style={{ width: "100%", padding: "3px 4px", border: "1px solid #d1d5db", borderRadius: 5, textAlign: "center", fontSize: 11, fontWeight: 700 }}
                          />
                        </td>
                        <td style={{ padding: "4px 5px", textAlign: "center" }}>
                          <input
                            type="number" min="0" step="0.01"
                            value={baseRate}
                            onChange={(e) => {
                              const newPrice = parseFloat(e.target.value) || 0;
                              setForm(f => ({
                                ...f,
                                items: f.items.map(i => String(i.productId) === String(item.productId)
                                  ? { ...i, perUnitPrice: newPrice, price: newPrice }
                                  : i
                                )
                              }));
                            }}
                            style={{ width: "100%", padding: "3px 4px", border: "2px solid #818cf8", borderRadius: 5, textAlign: "center", fontSize: 11, fontWeight: 700, color: "#1d4ed8", background: "#eef2ff" }}
                          />
                        </td>
                        <td style={{ padding: "4px 5px", textAlign: "center" }}>
                          <input
                            type="number" min="0" max="100" step="0.1"
                            value={discPct || ""}
                            placeholder="0"
                            onChange={(e) => updateItemDisc(item.productId, e.target.value)}
                            style={{ width: "100%", padding: "3px 4px", border: "2px solid #f97316", borderRadius: 5, textAlign: "center", fontSize: 11, fontWeight: 700, color: "#ea580c", background: "#fff7ed" }}
                          />
                        </td>
                        <td style={{ padding: "4px 6px", textAlign: "right", fontWeight: 800, fontSize: 12 }}>
                          <div style={{color:"#16a34a"}}>{fmt(lineAmt)}</div>
                          {discPct > 0 && <div style={{fontSize:9,color:"#dc2626",textDecoration:"line-through"}}>{fmt(item.qty*baseRate)}</div>}
                        </td>
                        <td style={{ padding: "4px 4px", textAlign: "center" }}>
                          <button
                            onClick={() => setForm((f) => ({ ...f, items: f.items.filter((i) => String(i.productId) !== String(item.productId)) }))}
                            style={{ background: "#fee2e2", border: "none", color: "#dc2626", cursor: "pointer", borderRadius: 5, padding: "2px 6px", fontSize: 12, fontWeight: 700 }}
                          >✕</button>
                        </td>
                      </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            )}
          </div>

          {/* ── Discount / Tax / Paid ── */}
          <div style={{ display: "grid", gridTemplateColumns: "1.5fr 1fr 1fr", gap: 10 }}>
            {/* Discount — toggle between Amount and Percentage */}
            <div>
              <label style={{display:"block",fontSize:13,fontWeight:600,color:"#374151",marginBottom:5}}>
                Discount
                <span style={{marginLeft:8}}>
                  <button onClick={()=>setForm(f=>({...f,discountType:"amount"}))}
                    style={{padding:"2px 10px",borderRadius:20,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,
                      background:form.discountType!=="pct"?"#1d4ed8":"#e5e7eb",
                      color:form.discountType!=="pct"?"#fff":"#374151"}}>Rs.</button>
                  <button onClick={()=>setForm(f=>({...f,discountType:"pct"}))}
                    style={{padding:"2px 10px",borderRadius:20,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,marginLeft:4,
                      background:form.discountType==="pct"?"#1d4ed8":"#e5e7eb",
                      color:form.discountType==="pct"?"#fff":"#374151"}}>%</button>
                </span>
              </label>
              {form.discountType==="pct" ? (
                <div>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <input type="number" min="0" max="100" value={form.discountPct||""}
                      onChange={e=>{
                        const pct = Math.min(100, Math.max(0, +e.target.value||0));
                        const amt = subtotal > 0 ? (subtotal * pct / 100) : 0;
                        setForm(f=>({...f, discountPct: e.target.value, discount: amt.toFixed(2)}));
                      }}
                      placeholder="0–100"
                      style={{width:90,padding:"9px 12px",border:"2px solid #1d4ed8",borderRadius:9,fontSize:15,outline:"none",fontWeight:700,textAlign:"center"}}/>
                    <span style={{fontSize:18,fontWeight:900,color:"#6b7280"}}>%</span>
                  </div>
                  {subtotal>0 && (+form.discountPct||0)>0 && (
                    <div style={{marginTop:6,padding:"7px 12px",background:"#fee2e2",borderRadius:8,fontSize:13,fontWeight:700,color:"#dc2626"}}>
                      ✂️ Deduction: Rs. {(subtotal*(+form.discountPct||0)/100).toFixed(0)} will be deducted
                    </div>
                  )}
                </div>
              ) : (
                <input type="number" min="0" value={form.discount||""}
                  onChange={e=>setForm(f=>({...f,discount:e.target.value}))}
                  placeholder="e.g. 50"
                  style={{width:"100%",padding:"9px 12px",border:"1.5px solid #d1d5db",borderRadius:9,fontSize:14,outline:"none",boxSizing:"border-box"}}/>
              )}
            </div>
            <Input label="Tax (%)" type="number" value={form.tax} onChange={(v) => setForm((f) => ({ ...f, tax: v }))} />
            <Input label="Amount Paid (Rs.)" type="number" value={form.paid} onChange={(v) => setForm((f) => ({ ...f, paid: v }))} />
          </div>

          {/* ── Totals ── */}
          <div style={{ background:"#f0fdf4", border:"2px solid #86efac", borderRadius:12, padding:"14px 16px", marginBottom:14, fontSize:14 }}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <span style={{color:"#374151"}}>Subtotal:</span>
              <strong>{fmt(subtotal)}</strong>
            </div>
            {discountAmt>0 && (
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6,
                background:"#fee2e2",borderRadius:8,padding:"6px 10px",margin:"0 -4px 6px -4px"}}>
                <span style={{color:"#dc2626",fontWeight:700}}>
                  ✂️ Discount{form.discountType==="pct"?` (${form.discountPct}%)`:""}:
                </span>
                <strong style={{color:"#dc2626"}}>− {fmt(discountAmt)}</strong>
              </div>
            )}
            {+form.tax>0 && (
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                <span style={{color:"#d97706"}}>Tax ({form.tax}%):</span>
                <strong style={{color:"#d97706"}}>+ {fmt((+form.tax/100)*subtotal)}</strong>
              </div>
            )}
            <div style={{display:"flex",justifyContent:"space-between",
              background:"#1d4ed8",borderRadius:9,padding:"10px 14px",margin:"4px -4px 0 -4px"}}>
              <span style={{fontWeight:800,color:"#fff",fontSize:16}}>NET TOTAL:</span>
              <strong style={{color:"#fff",fontSize:18}}>{fmt(total)}</strong>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",marginTop:8,fontSize:13}}>
              <span style={{color:"#16a34a",fontWeight:700}}>✅ Paid: {fmt(+form.paid||0)}</span>
              <span style={{color:total-(+form.paid||0)>0?"#dc2626":"#16a34a",fontWeight:700}}>
                {total-(+form.paid||0)>0?"⚠️ Balance:":"✅ Clear:"} {fmt(Math.abs(total-(+form.paid||0)))}
              </span>
            </div>

            {/* ── Show Profit Toggle ── */}
            <div style={{marginTop:10,paddingTop:10,borderTop:"1px dashed #d1d5db"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <span style={{fontSize:12,fontWeight:700,color:"#374151"}}>📊 Show Invoice Profit</span>
                <button onClick={()=>setShowProfit(p=>!p)}
                  style={{padding:"4px 14px",borderRadius:20,border:"none",cursor:"pointer",fontWeight:700,fontSize:12,
                    background:showProfit?"#16a34a":"#e5e7eb",color:showProfit?"#fff":"#374151"}}>
                  {showProfit?"✅ Yes":"❌ No"}
                </button>
              </div>
              {showProfit && (() => {
                const itemProfit = form.items.reduce((s,i) => {
                  const prod = data.products.find(x => String(x.id) === String(i.productId));
                  const cost = prod ? prod.cost : 0;
                  const salePrice = i.perUnitPrice !== undefined ? i.perUnitPrice : i.price;
                  return s + (salePrice - cost) * i.qty;
                }, 0);
                const profitAfterDiscount = itemProfit - discountAmt;
                const profitPct = subtotal > 0 ? ((profitAfterDiscount / total) * 100).toFixed(1) : 0;
                const profitColor = profitAfterDiscount > 0 ? "#16a34a" : "#dc2626";
                return (
                  <div style={{marginTop:8,background: profitAfterDiscount>0?"#f0fdf4":"#fef2f2",border:`1px solid ${profitAfterDiscount>0?"#86efac":"#fca5a5"}`,borderRadius:8,padding:"10px 12px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4,fontSize:12}}>
                      <span style={{color:"#6b7280"}}>Gross Profit (items):</span>
                      <strong style={{color:profitColor}}>{fmt(itemProfit)}</strong>
                    </div>
                    {discountAmt > 0 && (
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4,fontSize:12}}>
                        <span style={{color:"#dc2626"}}>− Discount:</span>
                        <strong style={{color:"#dc2626"}}>− {fmt(discountAmt)}</strong>
                      </div>
                    )}
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:13,paddingTop:4,borderTop:"1px solid #d1d5db"}}>
                      <span style={{fontWeight:800,color:profitColor}}>Net Profit:</span>
                      <strong style={{color:profitColor,fontSize:14}}>{fmt(profitAfterDiscount)} <span style={{fontSize:11}}>({profitPct}%)</span></strong>
                    </div>
                  </div>
                );
              })()}
            </div>
          </div>

          <PaymentMethodPicker
            value={form._payMethod}
            direction="receive"
            onChange={pm=>setForm(f=>({...f,_payMethod:pm}))}
            required />

          <div style={{ display: "flex", justifyContent: "flex-end", gap: 10 }}>
            <Btn color="gray" onClick={() => setModal(null)}>Cancel</Btn>
            <Btn color="success" onClick={saveInvoice}>✅ Create Invoice</Btn>
          </div>
        </Modal>
      )}

      {/* ── VIEW / PRINT / DOWNLOAD INVOICE MODAL ── */}
      {viewInv && <InvoicePopup inv={viewInv} onClose={() => setViewInv(null)} settings={settings} />}

      {/* ── Sale Type Picker ── */}
      {saleTypeModal && (
        <Modal title="🧾 New Invoice — Sale Type" onClose={()=>setSaleTypeModal(false)}>
          <div style={{marginBottom:16,fontSize:13,color:"#6b7280"}}>Kaun sa sale hai?</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:8}}>
            <button onClick={()=>{
              setForm({customerId:"counter",items:[],discount:0,discountPct:0,discountType:"amount",tax:0,paid:0,_saleType:"counter",_payMethod:null});
              setSaleTypeModal(false); setModal("new");
            }} style={{padding:"20px 16px",borderRadius:12,border:"2px solid #1d4ed8",
              background:"#eff6ff",cursor:"pointer",textAlign:"center"}}>
              <div style={{fontSize:36,marginBottom:8}}>🏪</div>
              <div style={{fontWeight:800,fontSize:15,color:"#1d4ed8"}}>Counter Sale</div>
              <div style={{fontSize:12,color:"#6b7280",marginTop:4}}>Walk-in customer — cash ya other</div>
            </button>
            <button onClick={()=>{
              setForm({customerId:"",items:[],discount:0,discountPct:0,discountType:"amount",tax:0,paid:0,_saleType:"customer",_payMethod:null});
              setSaleTypeModal(false); setModal("new");
            }} style={{padding:"20px 16px",borderRadius:12,border:"2px solid #16a34a",
              background:"#f0fdf4",cursor:"pointer",textAlign:"center"}}>
              <div style={{fontSize:36,marginBottom:8}}>👥</div>
              <div style={{fontWeight:800,fontSize:15,color:"#16a34a"}}>Relation Customer</div>
              <div style={{fontSize:12,color:"#6b7280",marginTop:4}}>Registered customer — account update hoga</div>
            </button>
          </div>
        </Modal>
      )}

      {/* ── Invoice Payment Modal ── */}
      {payInv && (
        <Modal title={`💰 Pay Invoice — ${payInv.id}`} onClose={()=>{setPayInv(null);setInvPayAmt("");setInvPayMethod(null);}}>
          <div style={{background:"#fef3c7",borderRadius:9,padding:"12px 16px",marginBottom:16}}>
            <div style={{fontSize:13,fontWeight:600}}>Customer: <b>{payInv.customerName}</b></div>
            <div style={{display:"flex",justifyContent:"space-between",marginTop:8}}>
              <span>Invoice Total: <b>{fmt(payInv.total)}</b></span>
              <span>Already Paid: <b style={{color:"#16a34a"}}>{fmt(payInv.paid)}</b></span>
            </div>
            <div style={{fontWeight:800,fontSize:16,color:"#dc2626",marginTop:6}}>
              Remaining: {fmt(payInv.total - payInv.paid)}
            </div>
          </div>
          <div style={{marginBottom:12}}>
            <label style={{display:"block",fontSize:13,fontWeight:700,marginBottom:5}}>Payment Amount *</label>
            <input type="number" min="1" max={payInv.total-payInv.paid}
              value={invPayAmt} onChange={e=>setInvPayAmt(e.target.value)}
              placeholder={`Max: ${fmt(payInv.total-payInv.paid)}`}
              style={{width:"100%",padding:"11px 14px",border:"2px solid #16a34a",borderRadius:9,fontSize:16,fontWeight:700,outline:"none"}}/>
            <div style={{display:"flex",gap:8,marginTop:8}}>
              <button onClick={()=>setInvPayAmt(String(payInv.total-payInv.paid))}
                style={{padding:"5px 12px",background:"#d1fae5",color:"#065f46",border:"1px solid #86efac",borderRadius:7,cursor:"pointer",fontWeight:700,fontSize:12}}>
                Full Amount
              </button>
            </div>
          </div>
          {invPayAmt>0 && (
            <div style={{background:"#eff6ff",borderRadius:8,padding:"8px 14px",marginBottom:4,fontSize:13}}>
              New status: <b style={{color:(payInv.paid+Number(invPayAmt))>=payInv.total?"#16a34a":"#d97706"}}>
                {(payInv.paid+Number(invPayAmt))>=payInv.total?"✅ PAID":"⏳ PARTIAL"}
              </b> — Balance: <b>{fmt(Math.max(0, payInv.total-payInv.paid-Number(invPayAmt)))}</b>
            </div>
          )}
          <PaymentMethodPicker value={invPayMethod} direction="receive"
            onChange={pm=>setInvPayMethod(pm)} required />
          <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
            <Btn color="gray" onClick={()=>{setPayInv(null);setInvPayAmt("");setInvPayMethod(null);}}>Cancel</Btn>
            <Btn color="success" onClick={()=>{
              if(!invPayAmt||+invPayAmt<=0) return toast("Amount likhein!","error");
              if(!invPayMethod?.method) return toast("Payment method select karein!","error");
              if(invPayMethod.method!=="cash"&&(!invPayMethod.accountDesc||!invPayMethod.accountName))
                return toast("Account details likhein!","error");
              const amt = Math.min(+invPayAmt, payInv.total-payInv.paid);
              const newPaid = payInv.paid + amt;
              const newStatus = newPaid >= payInv.total ? "paid" : "partial";
              const pmDetail = invPayMethod.method!=="cash"
                ? ` | ${invPayMethod.label} — ${invPayMethod.accountDesc} (${invPayMethod.accountName})`
                : " | Cash";
              setData(d=>({
                ...d,
                invoices: d.invoices.map(i=>i.id===payInv.id ? {...i,paid:newPaid,status:newStatus} : i),
                customers: d.customers.map(c=>String(c.id)===String(payInv.customerId)
                  ? {...c, balance:(c.balance||0)+amt} : c),
                accounts: [...d.accounts, {
                  id:Date.now(), date:new Date().toISOString().split("T")[0],
                  type:"income", category:"Invoice Payment",
                  paymentMethod:invPayMethod.method,
                  paymentDetail:invPayMethod.accountDesc,
                  paymentName:invPayMethod.accountName,
                  description:`${payInv.id} payment — ${payInv.customerName}${pmDetail}`,
                  amount:amt,
                }],
              }));
              toast(`✅ ${fmt(amt)} received (${invPayMethod.label})! Invoice ${newStatus==="paid"?"fully paid":"partially paid"}`, "success");
              setPayInv(null); setInvPayAmt(""); setInvPayMethod(null);
            }}>✅ Confirm Payment</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}


// ─── INVOICE POPUP (View + Print Sizes + PDF Download) ───────────────────────
function InvoicePopup({ inv, onClose, settings = { pharmacy: {}, app: {} } }) {
  const [printSize, setPrintSize] = useState(settings.app.defaultPrintSize || "thermal80");
  const [showSizes, setShowSizes] = useState(false);
  const [printing, setPrinting]   = useState(false);
  const [printers, setPrinters]   = useState([]);
  const [selPrinter, setSelPrinter] = useState("");
  const sizeRef = useRef(null);

  // Load printers list from Electron on mount
  useEffect(() => {
    try {
      const ipc = window.require ? (() => { try { return window.require("electron").ipcRenderer; } catch(e){ return null; } })() : null;
      if (ipc) {
        ipc.invoke("get-printers").then(list => {
          setPrinters(list);
          const def = list.find(p => p.isDefault);
          if (def) setSelPrinter(def.name);
        }).catch(() => {});
      }
    } catch(e) {}
  }, []);

  const ph = settings.pharmacy || {};
  const pharmName   = ph.name    || "PharmaPro";
  const pharmFooter = ph.footer  || "Thank you for your business!";
  const pharmAddr   = [ph.address, ph.city].filter(Boolean).join(", ");
  const pharmPhone  = [ph.phone, ph.mobile].filter(Boolean).join(" | ");

  const statusColor = { paid: "#16a34a", partial: "#d97706", unpaid: "#dc2626" };
  const statusBg    = { paid: "#d1fae5", partial: "#fef3c7", unpaid: "#fee2e2" };
  const taxAmt      = (inv.tax / 100) * inv.subtotal;
  const balance     = inv.total - inv.paid;

  // Close dropdown on outside click
  useEffect(() => {
    if (!showSizes) return;
    const handler = (e) => { if (sizeRef.current && !sizeRef.current.contains(e.target)) setShowSizes(false); };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, [showSizes]);

  const SIZES = {
    a4:        { label: "A4",           desc: "Standard paper" },
    a5:        { label: "A5",           desc: "Half page" },
    thermal80: { label: "Thermal 80×210mm", desc: "POS 80mm receipt printer" },
    thermal58: { label: "Thermal 58mm", desc: "Small POS printer" },
  };

  const buildHTML = (size) => {
    const isT58 = size === "thermal58";
    const isThm = size === "thermal80" || isT58;
    const pgW   = isT58 ? "58mm" : isThm ? "80mm" : size === "a5" ? "148mm" : "210mm";
    const fsize = isT58 ? "10px" : isThm ? "13px" : "13px";

    const rows = inv.items.map((i) => {
      const baseRate  = i.perUnitPrice || i.price;
      const discPct   = i.itemDiscPct || 0;
      const discAmt   = i.qty * baseRate * (discPct / 100);
      const effRate   = baseRate * (1 - discPct / 100);
      const amount    = i.qty * effRate;
      const discStr   = discAmt > 0 ? ` -${Number(discAmt).toFixed(0)}` : "";
      if (isThm) {
        const fs = isT58 ? "8px" : "10px";
        const namefs = isT58 ? "8px" : "10px";
        const tdSt = `padding:3px 1px;vertical-align:top;font-size:${fs};font-weight:900;overflow:hidden`;
        return `<tr>
          <td style="${tdSt};white-space:normal;word-break:break-word;font-size:${namefs};font-weight:900;line-height:1.3">${i.name}</td>
          <td style="${tdSt};text-align:center;white-space:nowrap">${i.qty}</td>
          <td style="${tdSt};text-align:right;white-space:nowrap">${Number(baseRate).toFixed(2)}</td>
          <td style="${tdSt};text-align:right;white-space:nowrap">${discAmt>0?Number(discAmt).toFixed(2):"0.00"}</td>
          <td style="${tdSt};text-align:right;white-space:nowrap">${Number(amount).toFixed(2)}</td>
        </tr>`;
      }
      return `<tr>
        <td style="padding:5px 7px;border-bottom:1px solid #f3f4f6;font-weight:600;font-size:12px">${i.name}</td>
        <td style="padding:5px 7px;border-bottom:1px solid #f3f4f6;text-align:center;font-size:12px">${i.qty} ${i.unitQty > 1 ? "pcs" : (i.unit||"")}</td>

    if (isThm) return `<!DOCTYPE html><html><head><meta charset="UTF-8"/>

      <!-- Contact -->
      ${pharmPhone ? `<div style="text-align:center;font-size:${isT58?"10px":"12px"};font-weight:bold;word-break:break-word;white-space:normal;width:100%;margin-bottom:6px">${pharmPhone}</div>` : ""}

      ${ph.license ? `<div style="text-align:center;font-size:${isT58?"10px":"12px"};font-weight:bold;word-break:break-word;white-space:normal;width:100%;margin-bottom:6px">Lic: ${ph.license}</div>` : ""}

      <div style="border-bottom:2px solid #000;margin-bottom:8px"></div>

      <!-- Invoice info -->
      <div style="display:flex;justify-content:space-between;font-size:${isT58?"10px":"12px"};font-weight:900;margin-bottom:4px;width:100%"><span style="white-space:nowrap;margin-right:4px">Invoice:</span><strong style="text-align:right;word-break:break-all">${inv.id}</strong></div>
      <div style="display:flex;justify-content:space-between;font-size:${isT58?"10px":"12px"};font-weight:900;margin-bottom:4px;width:100%"><span style="white-space:nowrap;margin-right:4px">Date:</span><strong style="text-align:right">${fmtDate(inv.date)}</strong></div>
      <div style="display:flex;justify-content:space-between;font-size:${isT58?"10px":"12px"};font-weight:900;width:100%"><span style="white-space:nowrap;margin-right:4px">Customer:</span><strong style="text-align:right;word-break:break-word">${inv.customerName}</strong></div>

      <!-- Gap after customer -->
      <div style="height:8px"></div>
      <div style="border-bottom:2px solid #000"></div>

      <table style="width:100%;border-collapse:collapse;table-layout:fixed;overflow:hidden">

        <thead>

            <th style="font-size:${isT58?"8px":"9px"};font-weight:900;text-align:center;padding:3px 1px;border-bottom:1px solid #000;border-top:1px solid #000">QTY</th>

      <div style="display:flex;justify-content:space-between;padding:3px 0;font-size:${isT58?"10px":"12px"};font-weight:900;width:100%"><span>Subtotal:</span><strong>Rs.${Number(inv.subtotal).toFixed(2)}</strong></div>

      ${inv.discount > 0 ? `
      <div style="display:flex;justify-content:space-between;padding:3px 0;font-size:${isT58?"10px":"12px"};font-weight:900;width:100%"><span>Discount:</span><strong>-Rs.${Number(inv.discount).toFixed(2)}</strong></div>

      ${inv.tax > 0 ? `<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:${isT58?"10px":"12px"};font-weight:900;width:100%"><span>TAX(${inv.tax}%):</span><strong>+Rs.${Number(taxAmt).toFixed(2)}</strong></div>` : ""}

      <div style="display:flex;justify-content:space-between;font-weight:900;font-size:${isT58?"13px":"16px"};border-top:2px solid #000;border-bottom:2px solid #000;padding:4px 0;margin:4px 0;width:100%">
        <span>TOTAL</span><span>Rs.${Number(inv.total).toFixed(2)}</span>

      <div style="display:flex;justify-content:space-between;font-weight:900;font-size:${isT58?"11px":"14px"};padding:3px 0;width:100%"><span>Paid:</span><span>Rs.${Number(inv.paid).toFixed(2)}</span></div>
      <div style="display:flex;justify-content:space-between;font-weight:900;font-size:${isT58?"11px":"14px"};border-top:1px dashed #000;padding:4px 0;margin-top:3px;width:100%"><span>${balance>0?"Bal Due:":"Change:"}</span><span>Rs.${Number(Math.abs(balance)).toFixed(2)}</span></div>

    </body></html>`;

    const pgSize = size === "a5" ? "A5" : "A4";
    return `<!DOCTYPE html><html><head><meta charset="UTF-8"/>
      <title>${inv.id} - ${pharmName}</title>
      <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',Arial,sans-serif;background:#f3f4f6;padding:20px}

        table{width:100%;border-collapse:collapse}
        thead tr{background:#e0e7ff}

        @media print{@page{size:${pgSize} portrait;margin:8mm 10mm}body{background:#fff;padding:0}.page{box-shadow:none;border-radius:0;max-width:100%;border:none}}
      </style></head><body>
      <div class="page">
        <div class="hdr">
          <div>
            <div style="font-weight:900;font-size:${size==="a5"?"18px":"22px"}">💊 ${pharmName}</div>
            ${pharmAddr ? `<div style="font-size:10px;opacity:.8;margin-top:2px">${pharmAddr}</div>` : ""}
            ${pharmPhone ? `<div style="font-size:10px;opacity:.75;margin-top:1px">📞 ${pharmPhone}</div>` : ""}
            ${ph.license ? `<div style="font-size:10px;opacity:.7;margin-top:1px">Lic: ${ph.license}</div>` : ""}
          </div>
          <div style="text-align:right">
            <div style="font-weight:900;font-size:${size==="a5"?"18px":"22px"}">${inv.id}</div>
            <div style="font-size:11px;opacity:.75;margin-top:2px">${fmtDate(inv.date)}</div>
            <div style="display:inline-block;margin-top:5px;padding:3px 12px;border-radius:20px;font-size:11px;font-weight:800;background:${statusBg[inv.status]};color:${statusColor[inv.status]}">${inv.status.toUpperCase()}</div>
          </div>
        </div>
        <div style="padding:${size==="a5"?"16px 20px":"22px 28px"}">
          <div style="display:flex;gap:12px;margin-bottom:18px">
            <div style="flex:1;background:#f8fafc;border-radius:8px;padding:10px 12px;border:1px solid #e5e7eb">
              <div style="font-size:9px;font-weight:700;color:#6b7280;text-transform:uppercase;margin-bottom:3px">Bill To</div>
              <div style="font-weight:700;font-size:13px">${inv.customerName}</div>
            </div>
            <div style="flex:1;background:#f8fafc;border-radius:8px;padding:10px 12px;border:1px solid #e5e7eb">
              <div style="font-size:9px;font-weight:700;color:#6b7280;text-transform:uppercase;margin-bottom:3px">Invoice No</div>
              <div style="font-weight:700;font-size:13px">${inv.id}</div>
              <div style="font-size:11px;color:#6b7280">${fmtDate(inv.date)}</div>
            </div>
            <div style="flex:1;background:#f8fafc;border-radius:8px;padding:10px 12px;border:1px solid #e5e7eb">
              <div style="font-size:9px;font-weight:700;color:#6b7280;text-transform:uppercase;margin-bottom:3px">Status</div>
              <div style="font-weight:700;font-size:13px;color:${statusColor[inv.status]}">${inv.status.toUpperCase()}</div>
              <div style="font-size:11px;color:#6b7280">Paid: Rs.${Number(inv.paid).toFixed(2)}</div>
            </div>
          </div>
          <table>
            <thead><tr><th>Description</th><th style="text-align:center">Qty</th><th style="text-align:right">Rate</th><th style="text-align:right">Disc</th><th style="text-align:right">Value</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
          <div style="display:flex;justify-content:flex-end;margin-top:16px">
            <div style="width:${size==="a5"?"200px":"260px"};background:#f8fafc;border-radius:10px;padding:14px;border:1px solid #e5e7eb">
              <div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #f3f4f6;font-size:12px"><span style="color:#6b7280">Subtotal</span><span>Rs.${Number(inv.subtotal).toFixed(2)}</span></div>
              <div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #f3f4f6;font-size:12px"><span style="color:#6b7280">Discount</span><span style="color:#dc2626">-Rs.${Number(inv.discount).toFixed(2)}</span></div>
              <div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #f3f4f6;font-size:12px"><span style="color:#6b7280">Tax(${inv.tax}%)</span><span style="color:#d97706">+Rs.${Number(taxAmt).toFixed(2)}</span></div>
              <div style="display:flex;justify-content:space-between;padding:9px 0 5px;font-size:18px;font-weight:900;color:#1d4ed8;border-top:2px solid #1d4ed8;margin-top:4px"><span>Total</span><span>Rs.${Number(inv.total).toFixed(2)}</span></div>
              <div style="display:flex;justify-content:space-between;font-size:12px;font-weight:700;color:#16a34a;padding:3px 0"><span>✓ Paid</span><span>Rs.${Number(inv.paid).toFixed(2)}</span></div>
              <div style="display:flex;justify-content:space-between;font-size:12px;font-weight:700;color:${balance>0?"#dc2626":"#16a34a"};padding:3px 0"><span>Balance</span><span>Rs.${Number(balance).toFixed(2)}</span></div>
            </div>
          </div>
        </div>
        <div class="ftr">${pharmFooter} · ${pharmName}</div>
      </div>
    </body></html>`;
  };

  // ── PRINT ──
  // ── Electron IPC thermal print helper ──
  const electronThermalPrint = (html, onDone) => {
    const ipc = window.__electronIPC || (window.require ? (() => { try { return window.require("electron").ipcRenderer; } catch(e){ return null; } })() : null);
    if (ipc) {
      ipc.invoke("pharma-print-thermal", { html, printerName: selPrinter || undefined })
        .then(() => onDone())
        .catch((err) => { console.error("Print error:", err); onDone(); });
      return true;
    }
    return false;
  };

  const handlePrint = () => {
    if (printing) return;
    setPrinting(true);
    const isT = printSize.startsWith("thermal");
    const html = buildHTML(printSize);
    if (isT) {
      // Try Electron IPC first
      if (electronThermalPrint(html, () => setPrinting(false))) return;
      // Fallback: hidden iframe (best for non-Electron)
      const oldF = document.getElementById("pharma-thm-frame");
      if (oldF) oldF.remove();
      const f = document.createElement("iframe");
      f.id = "pharma-thm-frame";
      f.style.cssText = "position:fixed;left:0;top:0;width:302px;height:200px;border:none;opacity:0.01;pointer-events:none;z-index:-1";
      document.body.appendChild(f);
      f.onload = () => {
        try { f.contentWindow.focus(); f.contentWindow.print(); } catch(e){}
        setTimeout(() => setPrinting(false), 800);
      };
      const fd = f.contentDocument || f.contentWindow.document;
      fd.open(); fd.write(html); fd.close();
      return;
    }
    const win = window.open("","_blank","width=900,height=700");
    if (!win) { setPrinting(false); return; }
    win.document.open(); win.document.write(html); win.document.close();
    win.onload = () => { win.focus(); win.print(); setPrinting(false); };
    setTimeout(() => { try { win.focus(); win.print(); } catch{} setPrinting(false); }, 800);
  };

  // ── PDF ──
  const handlePDF = () => {
    if (printing) return;
    setPrinting(true);
    const isT = printSize.startsWith("thermal");
    const html = buildHTML(printSize).replace("</title>", ` — ${inv.id}</title>`);
    if (isT) {
      if (electronThermalPrint(html, () => setPrinting(false))) return;
      const oldF = document.getElementById("pharma-pdf-frame");
      if (oldF) oldF.remove();
      const f = document.createElement("iframe");
      f.id = "pharma-pdf-frame";
      f.style.cssText = "position:fixed;left:0;top:0;width:302px;height:200px;border:none;opacity:0.01;pointer-events:none;z-index:-1";
      document.body.appendChild(f);
      f.onload = () => {
        try { f.contentWindow.focus(); f.contentWindow.print(); } catch(e){}
        setTimeout(() => setPrinting(false), 800);
      };
      const fd = f.contentDocument || f.contentWindow.document;
      fd.open(); fd.write(html); fd.close();
      return;
    }
    const win = window.open("","_blank","width=900,height=700");
    if (!win) { setPrinting(false); return; }
    win.document.open(); win.document.write(html); win.document.close();
    win.onload = () => { win.focus(); win.print(); setPrinting(false); };
    setTimeout(() => { try { win.focus(); win.print(); } catch{} setPrinting(false); }, 800);
  };

  const isThm = printSize.startsWith("thermal");

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.65)", zIndex:1000, display:"flex", alignItems:"center", justifyContent:"center" }}>
      <div style={{ background:"#fff", borderRadius:18, width:"min(800px,97vw)", maxHeight:"93vh", display:"flex", flexDirection:"column", boxShadow:"0 28px 90px rgba(0,0,0,.35)", overflow:"hidden" }}>

        {/* ══ TOP BAR ══ */}
        <div style={{ background:"linear-gradient(135deg,#1e3a8a,#1d4ed8)", padding:"12px 18px", flexShrink:0, zIndex:10 }}>

          {/* Row 1: title + close */}
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
            <div style={{ color:"#fff" }}>
              <div style={{ fontWeight:900, fontSize:17 }}>🧾 {inv.id}</div>
              <div style={{ fontSize:11, opacity:.75 }}>{fmtDate(inv.date)} · {inv.customerName}</div>
            </div>
            <button onClick={onClose}
              style={{ background:"rgba(255,255,255,.2)", border:"1.5px solid rgba(255,255,255,.3)", color:"#fff", borderRadius:8, width:36, height:36, cursor:"pointer", fontSize:18, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>✕</button>
          </div>

          {/* Row 2: size picker + print buttons */}
          <div style={{ display:"flex", gap:8, alignItems:"center", flexWrap:"wrap" }}>

            {/* Size picker */}
            <div ref={sizeRef} style={{ position:"relative" }}>
              <button
                onClick={(e) => { e.stopPropagation(); setShowSizes(v => !v); }}
                style={{ background:"rgba(255,255,255,.15)", border:"1.5px solid rgba(255,255,255,.35)", color:"#fff", borderRadius:8, padding:"7px 14px", cursor:"pointer", fontWeight:700, fontSize:13, whiteSpace:"nowrap" }}>
                📐 {SIZES[printSize].label} ▾
              </button>
              {showSizes && (
                <div style={{ position:"absolute", top:"calc(100% + 6px)", left:0, background:"#fff", borderRadius:10, boxShadow:"0 8px 32px rgba(0,0,0,.25)", zIndex:9999, minWidth:200, overflow:"hidden" }}>
                  {Object.entries(SIZES).map(([key, s]) => (
                    <button key={key}
                      onClick={(e) => { e.stopPropagation(); setPrintSize(key); setShowSizes(false); }}
                      style={{ display:"flex", flexDirection:"column", width:"100%", padding:"10px 14px", border:"none", background:printSize===key?"#eff6ff":"#fff", cursor:"pointer", textAlign:"left", borderBottom:"1px solid #f3f4f6" }}>
                      <span style={{ fontWeight:700, fontSize:14, color:printSize===key?"#1d4ed8":"#111" }}>{printSize===key?"✓ ":""}{s.label}</span>
                      <span style={{ fontSize:11, color:"#6b7280" }}>{s.desc}</span>
                    </button>
                  ))}
                </div>
              )}
            </div>

            <div style={{ width:1, height:28, background:"rgba(255,255,255,.25)", flexShrink:0 }} />

            {/* Printer selector — Electron only */}
            {printers.length > 0 && (
              <select
                value={selPrinter}
                onChange={e => setSelPrinter(e.target.value)}
                style={{ padding:"6px 10px", borderRadius:8, border:"none", fontWeight:700, fontSize:12, cursor:"pointer", flexShrink:0, maxWidth:160, background:"rgba(255,255,255,0.15)", color:"#fff" }}>
                {printers.map(p => (
                  <option key={p.name} value={p.name} style={{color:"#111",background:"#fff"}}>{p.name}{p.isDefault?" ✓":""}</option>
                ))}
              </select>
            )}

            {/* Print button */}
            <button
              onClick={(e) => { e.stopPropagation(); handlePrint(); }}
              disabled={printing}
              style={{ background:"#fff", color:"#1d4ed8", border:"none", borderRadius:9, padding:"8px 22px", cursor:printing?"wait":"pointer", fontWeight:800, fontSize:14, boxShadow:"0 2px 8px rgba(0,0,0,.12)", opacity:printing?.7:1, flexShrink:0 }}>
              {printing ? "⏳ Printing..." : "🖨️ Print"}
            </button>

            {/* PDF button */}
            <button
              onClick={(e) => { e.stopPropagation(); handlePDF(); }}
              disabled={printing}
              style={{ background:"#dc2626", color:"#fff", border:"none", borderRadius:9, padding:"8px 22px", cursor:printing?"wait":"pointer", fontWeight:800, fontSize:14, boxShadow:"0 2px 8px rgba(0,0,0,.12)", opacity:printing?.7:1, flexShrink:0 }}>
              📄 Save as PDF
            </button>

            {/* WhatsApp Share button */}
            <button
              onClick={(e) => {
                e.stopPropagation();
                const ph = settings.pharmacy || {};
                const balance = inv.total - inv.paid;
                const taxAmt2 = ((inv.tax||0)/100)*(inv.subtotal||0);
                // Thermal 80mm style — compact receipt format
                const sep = "────────────────────";
                const pharmLine = ph.name ? `*${ph.name}*` : "*PharmaPro*";
                const addrLine  = [ph.address, ph.city].filter(Boolean).join(", ");
                const phoneLine = [ph.phone, ph.mobile].filter(Boolean).join(" | ");
                const itemLines = (inv.items||[]).map(i=>{
                  const amt = (i.qty*(i.perUnitPrice||i.price)).toFixed(0);
                  return `${i.name}\n  ${i.qty} x Rs.${(i.perUnitPrice||i.price).toFixed(0)} = *Rs.${amt}*`;
                }).join("\n");
                let msg = pharmLine + "\n";
                if(addrLine)  msg += addrLine + "\n";
                if(phoneLine) msg += phoneLine + "\n";
                msg += sep + "\n";
                msg += `Invoice: *${inv.id}*\n`;
                msg += `Date: ${inv.date}\n`;
                msg += `Customer: ${inv.customerName}\n`;
                msg += sep + "\n";
                msg += itemLines + "\n";
                msg += sep + "\n";
                if(inv.discount>0) msg += `Discount: -Rs.${Number(inv.discount).toFixed(0)}\n`;
                if(taxAmt2>0)      msg += `Tax(${inv.tax}%): Rs.${taxAmt2.toFixed(0)}\n`;
                msg += `*TOTAL: Rs.${Number(inv.total).toFixed(0)}*\n`;
                msg += `Paid:   Rs.${Number(inv.paid).toFixed(0)}\n`;
                if(balance>0) msg += `*Balance: Rs.${Number(balance).toFixed(0)}* ⚠️\n`;
                msg += sep + "\n";
                msg += (ph.footer||"Thank you for your business!");
                const url = `https://wa.me/?text=${encodeURIComponent(msg)}`;
                window.open(url, "_blank");
              }}
              style={{ background:"#25D366", color:"#fff", border:"none", borderRadius:9, padding:"8px 16px", cursor:"pointer", fontWeight:800, fontSize:13, boxShadow:"0 2px 8px rgba(0,0,0,.12)", flexShrink:0, display:"flex", alignItems:"center", gap:5 }}>
              <span style={{fontSize:15}}>📱</span> WhatsApp
            </button>

            {/* Direct phone send */}
            <button
              onClick={(e)=>{
                e.stopPropagation();
                const ph2 = settings.pharmacy || {};
                const balance2 = inv.total - inv.paid;
                const taxAmt3 = ((inv.tax||0)/100)*(inv.subtotal||0);
                const sep2 = "────────────────────";
                const pharmLine2 = ph2.name ? `*${ph2.name}*` : "*PharmaPro*";
                const addrLine2  = [ph2.address, ph2.city].filter(Boolean).join(", ");
                const phoneLine2 = [ph2.phone, ph2.mobile].filter(Boolean).join(" | ");
                const itemLines2 = (inv.items||[]).map(i=>{
                  const amt2 = (i.qty*(i.perUnitPrice||i.price)).toFixed(0);
                  return `${i.name}\n  ${i.qty} x Rs.${(i.perUnitPrice||i.price).toFixed(0)} = *Rs.${amt2}*`;
                }).join("\n");
                let msg2 = pharmLine2 + "\n";
                if(addrLine2)  msg2 += addrLine2 + "\n";
                if(phoneLine2) msg2 += phoneLine2 + "\n";
                msg2 += sep2 + "\n";
                msg2 += `Invoice: *${inv.id}*\n`;
                msg2 += `Date: ${inv.date}\n`;
                msg2 += `Customer: ${inv.customerName}\n`;
                msg2 += sep2 + "\n";
                msg2 += itemLines2 + "\n";
                msg2 += sep2 + "\n";
                if(inv.discount>0) msg2 += `Discount: -Rs.${Number(inv.discount).toFixed(0)}\n`;
                if(taxAmt3>0)      msg2 += `Tax(${inv.tax}%): Rs.${taxAmt3.toFixed(0)}\n`;
                msg2 += `*TOTAL: Rs.${Number(inv.total).toFixed(0)}*\n`;
                msg2 += `Paid:   Rs.${Number(inv.paid).toFixed(0)}\n`;
                if(balance2>0) msg2 += `*Balance: Rs.${Number(balance2).toFixed(0)}* ⚠️\n`;
                msg2 += sep2 + "\n";
                msg2 += (ph2.footer||"Thank you for your business!");
                const phone = window.prompt("Customer ka WhatsApp number (92xxxxxxxxxx ya 0xxxxxxxxxx):", "");
                if (!phone) return;
                const cleaned = phone.replace(/[^0-9]/g,"").replace(/^0/,"92");
                const url2 = `https://wa.me/${cleaned}?text=${encodeURIComponent(msg2)}`;
                window.open(url2, "_blank");
              }}
              style={{ background:"#128C7E", color:"#fff", border:"none", borderRadius:9, padding:"8px 14px", cursor:"pointer", fontWeight:800, fontSize:13, boxShadow:"0 2px 8px rgba(0,0,0,.12)", flexShrink:0, display:"flex", alignItems:"center", gap:5 }}>
              <span style={{fontSize:15}}>📲</span> Send to No.
            </button>

            <span style={{ color:"rgba(255,255,255,.55)", fontSize:11 }}>{SIZES[printSize].desc}</span>
          </div>
        </div>

            💡 <strong>Thermal Print karne ke liye:</strong> Print dabayein → Print dialog mein: <strong>Paper Size = 80×210mm ya "Roll Paper 80mm"</strong> select karein → Margins = <strong>None/Custom (0)</strong> set karein → Print
          </div>

          {/* Invoice preview card */}

            {/* Header */}

              <div>
                <div style={{ color: "#fff", fontWeight: 900, fontSize: isThm ? 15 : 20 }}>💊 {pharmName}</div>

              </div>
              <div style={{ textAlign: "right" }}>
                <div style={{ color: "#fff", fontWeight: 900, fontSize: isThm ? 13 : 18 }}>{inv.id}</div>
                <div style={{ color: "rgba(255,255,255,.7)", fontSize: 10, marginTop: 2 }}>{fmtDate(inv.date)}</div>
                <div style={{ display: "inline-block", marginTop: 4, padding: "2px 9px", borderRadius: 20, background: statusBg[inv.status], color: statusColor[inv.status], fontWeight: 800, fontSize: 10 }}>

                </div>
              </div>
            </div>

            <div style={{ padding: isThm ? "12px 14px" : "18px 22px" }}>
              {/* Thermal preview */}
              {isThm ? (

                  <div style={{ borderBottom: "1px dashed #ccc", paddingBottom: 6, marginBottom: 6 }}>
                    <div style={{ display: "flex", justifyContent: "space-between" }}><span>Customer:</span><strong>{inv.customerName}</strong></div>
                  </div>
                  <table style={{ width:"100%", borderCollapse:"collapse", tableLayout:"fixed", marginBottom:4 }}>
                    <colgroup>
                      <col style={{width:"42%"}}/><col style={{width:"9%"}}/><col style={{width:"18%"}}/><col style={{width:"13%"}}/><col style={{width:"18%"}}/>
                    </colgroup>
                    <thead>
                      <tr style={{ borderBottom:"1px solid #000" }}>
                        {[["DESC","left"],["QTY","center"],["RATE","right"],["DISC","right"],["VALUE","right"]].map(([h,a])=>(
                          <th key={h} style={{ fontSize: printSize==="thermal58"?8:9, fontWeight:900, textAlign:a, padding:"1px 2px" }}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {inv.items.map((item, i) => {
                        const baseRate = item.perUnitPrice || item.price;
                        const discPct  = item.itemDiscPct || 0;
                        const discAmt  = item.qty * baseRate * (discPct / 100);
                        const amount   = item.qty * baseRate * (1 - discPct / 100);
                        const tdS = { fontSize: printSize==="thermal58"?9:10, fontWeight:"bold", padding:"1px 2px", verticalAlign:"top" };
                        return (
                          <tr key={i}>
                            <td style={{ ...tdS, fontSize: printSize==="thermal58"?10:11, fontWeight:900, wordBreak:"break-word", whiteSpace:"normal" }}>{item.name}</td>
                            <td style={{ ...tdS, textAlign:"center", whiteSpace:"nowrap" }}>{item.qty}</td>
                            <td style={{ ...tdS, textAlign:"right", whiteSpace:"nowrap" }}>{Number(baseRate).toFixed(2)}</td>
                            <td style={{ ...tdS, textAlign:"right", whiteSpace:"nowrap" }}>{discAmt>0?Number(discAmt).toFixed(2):"0.00"}</td>
                            <td style={{ ...tdS, textAlign:"right", whiteSpace:"nowrap" }}>{Number(amount).toFixed(2)}</td>
                          </tr>
