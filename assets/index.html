// ─── TOAST NOTIFICATION SYSTEM ───────────────────────────────────────────────
const ToastCtx = createContext(null);

function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  const add = useCallback((msg, type = "success") => {
    const id = Date.now() + Math.random();
    setToasts((t) => [...t, { id, msg, type }]);
    setTimeout(() => setToasts((t) => t.filter((x) => x.id !== id)), 3500);
  }, []);
  const remove = (id) => setToasts((t) => t.filter((x) => x.id !== id));

  const icons  = { success: "✅", error: "❌", warning: "⚠️", info: "ℹ️" };
  const colors = {
    success: { bg: "#f0fdf4", border: "#86efac", text: "#166534", icon: "#16a34a" },
    error:   { bg: "#fef2f2", border: "#fca5a5", text: "#991b1b", icon: "#dc2626" },
    warning: { bg: "#fffbeb", border: "#fcd34d", text: "#92400e", icon: "#d97706" },
    info:    { bg: "#eff6ff", border: "#93c5fd", text: "#1e40af", icon: "#1d4ed8" },
  };

  return (
    <ToastCtx.Provider value={add}>
      {children}
      <div style={{ position: "fixed", top: 20, right: 20, zIndex: 9999, display: "flex", flexDirection: "column", gap: 10, maxWidth: 360 }}>
        {toasts.map((t) => {
          const c = colors[t.type] || colors.success;
          return (
            <div key={t.id} style={{
              background: c.bg, border: `1.5px solid ${c.border}`, borderRadius: 12,
              padding: "12px 16px", display: "flex", alignItems: "flex-start", gap: 10,
              boxShadow: "0 4px 20px rgba(0,0,0,.12)",
              animation: "slideIn .25s ease",
            }}>
              <span style={{ fontSize: 18, flexShrink: 0 }}>{icons[t.type]}</span>
              <span style={{ fontSize: 14, fontWeight: 600, color: c.text, flex: 1, lineHeight: 1.4 }}>{t.msg}</span>
              <button onClick={() => remove(t.id)} style={{ background: "none", border: "none", cursor: "pointer", color: c.text, fontSize: 16, padding: 0, opacity: .6, flexShrink: 0 }}>✕</button>
            </div>
          );
        })}
      </div>
      <style>{`@keyframes slideIn { from { opacity:0; transform:translateX(60px); } to { opacity:1; transform:translateX(0); } }`}</style>
    </ToastCtx.Provider>
  );
}
const useToast = () => useContext(ToastCtx);

// ─── SUPABASE DYNAMIC CONFIG ─────────────────────────────────────────────────
// Config is stored in localStorage — update via Settings → Database Config tab
const getSbConfig = () => {
  try {
    const cfg = JSON.parse(localStorage.getItem("pharma_db_config") || "{}");
    return { url: cfg.url || "", key: cfg.key || "", enabled: !!cfg.enabled };
  } catch { return { url: "", key: "", enabled: false }; }
};

const makeSb = (url, key) => {
  if (!url || !key) return null;
  const base = url.replace(/\/$/, "");
  const h = {
    "Content-Type": "application/json",
    "apikey": key,
    "Authorization": `Bearer ${key}`,
  };
  const q = async (table, method = "GET", body = null, params = "") => {
    const headers = { ...h };
    if (method === "POST") headers["Prefer"] = "resolution=merge-duplicates,return=representation";
    if (method === "PATCH") headers["Prefer"] = "return=minimal";
    const res = await fetch(`${base}/rest/v1/${table}${params}`, {
      method, headers, body: body ? JSON.stringify(body) : null,
    });
    if (!res.ok) {
      const errText = await res.text().catch(() => res.statusText);
      throw new Error(`${res.status}: ${errText}`);
    }
    if (method === "DELETE") return [];
    const text = await res.text();
    return text ? JSON.parse(text) : [];
  };
  return {
    select:  (t, p = "") => q(t, "GET",    null, `?${p}`),
    insert:  (t, rows)   => q(t, "POST",   Array.isArray(rows) ? rows : [rows]),
    upsert:  (t, rows)   => q(t, "POST",   Array.isArray(rows) ? rows : [rows], "", {"Prefer": "resolution=merge-duplicates"}),
    delete:  (t, match)  => q(t, "DELETE", null, `?${match}`),
    testConnection: async () => {
      // Test root endpoint — always exists on any Supabase project
      const res = await fetch(`${base}/rest/v1/`, { headers: h });
      if (res.status === 401 || res.status === 403)
        throw new Error("API key invalid — anon key check karein");
      if (res.status >= 500)
        throw new Error(`Server error ${res.status}`);
      return true; // 200 or 404/406 both = reachable
    },
  };
};

const today = new Date();

const fmt = (n) => `Rs. ${Number(n).toLocaleString("en-PK", { minimumFractionDigits: 2 })}`;

function badge(label, color) {
  const colors = {
    green: "background:#d1fae5;color:#065f46",
    red: "background:#fee2e2;color:#991b1b",
    yellow: "background:#fef3c7;color:#92400e",
    blue: "background:#dbeafe;color:#1e40af",
    gray: "background:#f3f4f6;color:#374151",
  };
  return <span style={{ ...parseSt(colors[color] || colors.gray), padding: "2px 10px", borderRadius: 20, fontSize: 12, fontWeight: 600 }}>{label}</span>;
}
function parseSt(s) {
  return Object.fromEntries(s.split(";").map((p) => { const [k, v] = p.split(":"); return [k.trim().replace(/-([a-z])/g, (_, c) => c.toUpperCase()), v?.trim()]; }).filter(([k, v]) => k && v));
}

function PaymentMethodPicker({ value, onChange, direction="send", required=false }) {
  // direction: "receive" | "send"
  const [method, setMethod]   = React.useState(value?.method || "cash");
  const [acctDesc, setAcctDesc] = React.useState(value?.accountDesc || "");
  const [acctName, setAcctName] = React.useState(value?.accountName || "");

  const update = (m, d, n) => {
    onChange({ method: m, accountDesc: d, accountName: n,
      label: PAYMENT_METHODS.find(x=>x.id===m)?.label || m });
  };

  const handleMethod = (m) => { setMethod(m); setAcctDesc(""); setAcctName(""); update(m,"",""); };
  const handleDesc   = (v) => { setAcctDesc(v); update(method, v, acctName); };
  const handleName   = (v) => { setAcctName(v); update(method, acctDesc, v); };

  const needsDetail = method !== "cash";
  const dirLabel = direction === "send" ? "Jis account mein gaya" : "Jahan se aya";

  return (
    <div style={{marginBottom:14}}>
      <label style={{display:"block",fontSize:13,fontWeight:700,color:"#374151",marginBottom:8}}>
        Payment Method {required && <span style={{color:"#dc2626"}}>*</span>}
      </label>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:8}}>
        {PAYMENT_METHODS.map(pm=>(
          <button key={pm.id} onClick={()=>handleMethod(pm.id)}
            style={{padding:"7px 14px",borderRadius:20,border:"2px solid",cursor:"pointer",
              fontSize:13,fontWeight:700,transition:"all .15s",
              borderColor: method===pm.id ? pm.color : "#e5e7eb",
              background: method===pm.id ? pm.bg : "#fff",
              color: method===pm.id ? pm.color : "#6b7280",
            }}>{pm.label}</button>
        ))}
      </div>
      {needsDetail && (
        <div style={{background:"#fef9c3",border:"1.5px solid #fde68a",borderRadius:9,padding:"12px 14px"}}>
          <div style={{fontSize:12,color:"#92400e",fontWeight:600,marginBottom:8}}>
            ⚠️ Cash ke ilawa — Details zaroori hain
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <div>
              <label style={{display:"block",fontSize:12,fontWeight:700,color:"#374151",marginBottom:4}}>
                {dirLabel} (Account/Number) *
              </label>
              <input value={acctDesc} onChange={e=>handleDesc(e.target.value)}
                placeholder={method==="bank"?"Account number / IBAN":method==="jazzcash"?"JazzCash number":method==="easypaisa"?"EasyPaisa number":"Details"}
                style={{width:"100%",padding:"8px 10px",border:"1.5px solid #fcd34d",borderRadius:7,fontSize:13,outline:"none"}}/>
            </div>
            <div>
              <label style={{display:"block",fontSize:12,fontWeight:700,color:"#374151",marginBottom:4}}>
                Account Holder Name *
              </label>
              <input value={acctName} onChange={e=>handleName(e.target.value)}
                placeholder="Account ka naam"
                style={{width:"100%",padding:"8px 10px",border:"1.5px solid #fcd34d",borderRadius:7,fontSize:13,outline:"none"}}/>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function Btn({ children, onClick, color = "primary", small, style = {} }) {
  const bg = { primary: "#1d4ed8", danger: "#dc2626", success: "#16a34a", gray: "#6b7280", warning: "#d97706" };
  return (
    <button onClick={onClick} style={{ background: bg[color] || bg.primary, color: "#fff", border: "none", borderRadius: 8, padding: small ? "5px 14px" : "8px 20px", cursor: "pointer", fontSize: small ? 13 : 14, fontWeight: 600, ...style }}>
      {children}
    </button>
  );
}
function Input({ label, value, onChange, type = "text", placeholder = "" }) {
  return (
    <div style={{ marginBottom: 14 }}>
      {label && <label style={{ display: "block", marginBottom: 4, fontSize: 13, fontWeight: 600, color: "#374151" }}>{label}</label>}
      <input type={type} value={value} onChange={(e) => onChange(e.target.value)} placeholder={placeholder}
        style={{ width: "100%", padding: "8px 12px", border: "1px solid #d1d5db", borderRadius: 8, fontSize: 14, boxSizing: "border-box", outline: "none" }} />
    </div>
  );
}
function Select({ label, value, onChange, options }) {
  return (
    <div style={{ marginBottom: 14 }}>
      {label && <label style={{ display: "block", marginBottom: 4, fontSize: 13, fontWeight: 600, color: "#374151" }}>{label}</label>}
      <select value={value} onChange={(e) => onChange(e.target.value)}
        style={{ width: "100%", padding: "8px 12px", border: "1px solid #d1d5db", borderRadius: 8, fontSize: 14, boxSizing: "border-box", background: "#fff" }}>
        {options.map((o) => <option key={o.value} value={o.value}>{o.label}</option>)}
      </select>
    </div>
  );
}
function Modal({ title, onClose, children, wide }) {
  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.5)", zIndex:1000, display:"flex", alignItems:"center", justifyContent:"center", padding:"16px" }}>
      <div style={{ background:"#fff", borderRadius:16, width: wide ? "min(800px,96vw)" : "min(620px,96vw)", maxHeight:"90vh", display:"flex", flexDirection:"column", boxShadow:"0 24px 64px rgba(0,0,0,.25)", overflow:"hidden" }}>
        {/* Fixed header */}
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"18px 24px", borderBottom:"1px solid #f3f4f6", flexShrink:0 }}>
          <h3 style={{ margin:0, fontSize:17, fontWeight:800, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", maxWidth:"80%" }}>{title}</h3>
          <button onClick={onClose} style={{ background:"#f3f4f6", border:"none", fontSize:18, cursor:"pointer", color:"#6b7280", borderRadius:8, width:32, height:32, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>✕</button>
        </div>
        {/* Scrollable body */}
        <div style={{ overflowY:"auto", overflowX:"hidden", padding:"20px 24px", flex:1 }}>
          {children}
        </div>
      </div>
    </div>
  );
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function Dashboard({ data }) {
  const today = new Date();
  const thisMonth = today.toISOString().slice(0,7);
  const lastMonth = new Date(today.getFullYear(), today.getMonth()-1, 1).toISOString().slice(0,7);

  const expiringSoon = data.products.filter((p) => { const d=daysUntil(p.expiry); return d>0&&d<=195; });
  const expired      = data.products.filter((p) => daysUntil(p.expiry)<=0);
  const lowStock     = data.products.filter((p) => p.stock <= (p.reorder||50));

  const totalRevenue  = data.invoices.reduce((s,i)=>s+i.paid,0);
  const outstanding   = data.invoices.reduce((s,i)=>s+(i.total-i.paid),0);
  const totalIncome   = data.accounts.filter(a=>a.type==="income").reduce((s,a)=>s+a.amount,0);
  const totalExpense  = data.accounts.filter(a=>a.type==="expense").reduce((s,a)=>s+a.amount,0);
  const netProfit     = totalIncome - totalExpense;

  // This month
  const thisMonthInv  = data.invoices.filter(i=>i.date.startsWith(thisMonth));
  const thisMonthSales = thisMonthInv.reduce((s,i)=>s+i.total,0);
  const thisMonthPaid  = thisMonthInv.reduce((s,i)=>s+i.paid,0);
  const thisMonthIncome  = data.accounts.filter(a=>a.type==="income"&&a.date.startsWith(thisMonth)).reduce((s,a)=>s+a.amount,0);
  const thisMonthExpense = data.accounts.filter(a=>a.type==="expense"&&a.date.startsWith(thisMonth)).reduce((s,a)=>s+a.amount,0);
  const thisMonthProfit  = thisMonthIncome - thisMonthExpense;

  // Last month
  const lastMonthIncome  = data.accounts.filter(a=>a.type==="income"&&a.date.startsWith(lastMonth)).reduce((s,a)=>s+a.amount,0);
  const lastMonthExpense = data.accounts.filter(a=>a.type==="expense"&&a.date.startsWith(lastMonth)).reduce((s,a)=>s+a.amount,0);
  const lastMonthProfit  = lastMonthIncome - lastMonthExpense;

  // Monthly sales chart data — last 6 months
  const months6 = Array.from({length:6},(_,i)=>{
    const d = new Date(today.getFullYear(), today.getMonth()-5+i, 1);
    return d.toISOString().slice(0,7);
  });
  const monthlyData = months6.map(m=>({
    month: m.slice(5), // MM
    sales: data.invoices.filter(i=>i.date.startsWith(m)).reduce((s,i)=>s+i.total,0),
    income: data.accounts.filter(a=>a.type==="income"&&a.date.startsWith(m)).reduce((s,a)=>s+a.amount,0),
    expense: data.accounts.filter(a=>a.type==="expense"&&a.date.startsWith(m)).reduce((s,a)=>s+a.amount,0),
  }));
  const maxBar = Math.max(...monthlyData.map(m=>m.income),1);

  // Top 5 products by stock value
  const topProds = [...data.products].sort((a,b)=>(b.stock*b.price)-(a.stock*a.price)).slice(0,5);

  // Unpaid invoices
  const unpaidInvs = data.invoices.filter(i=>i.status==="unpaid"||i.status==="partial").slice(0,5);

  const StatCard = ({icon,label,value,sub,color,bg}) => (
    <Card style={{background:bg||"#fff",boxShadow:"none",border:`1px solid ${color}22`,padding:"14px 16px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div>
          <div style={{fontSize:11,color:"#6b7280",fontWeight:600,marginBottom:4}}>{label}</div>
          <div style={{fontSize:20,fontWeight:900,color}}>{value}</div>
          {sub && <div style={{fontSize:11,color:"#9ca3af",marginTop:2}}>{sub}</div>}
        </div>
        <div style={{fontSize:26}}>{icon}</div>
      </div>
    </Card>
  );

  return (
    <div style={{paddingBottom:20}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h2 style={{margin:0,fontSize:22,fontWeight:800}}>📊 Dashboard</h2>
        <div style={{fontSize:12,color:"#6b7280",fontWeight:600}}>
          {today.toLocaleDateString("en-PK",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}
        </div>
      </div>

      {/* Alerts bar */}
      {(expired.length>0||lowStock.length>0) && (
        <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
          {expired.length>0 && (
            <div style={{background:"#fee2e2",border:"1.5px solid #fca5a5",borderRadius:9,padding:"8px 14px",fontSize:13,fontWeight:700,color:"#dc2626"}}>
              🔴 {expired.length} products EXPIRED
            </div>
          )}
          {expiringSoon.length>0 && (
            <div style={{background:"#fef3c7",border:"1.5px solid #fcd34d",borderRadius:9,padding:"8px 14px",fontSize:13,fontWeight:700,color:"#d97706"}}>
              ⚠️ {expiringSoon.length} expiring soon
            </div>
          )}
          {lowStock.length>0 && (
            <div style={{background:"#fff7ed",border:"1.5px solid #fdba74",borderRadius:9,padding:"8px 14px",fontSize:13,fontWeight:700,color:"#ea580c"}}>
              📦 {lowStock.length} low stock
            </div>
          )}
        </div>
      )}

      {/* Main stats */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(170px,1fr))",gap:12,marginBottom:20}}>
        <StatCard icon="💰" label="Total Revenue" value={fmt(totalRevenue)} sub="All time collected" color="#1d4ed8" bg="#dbeafe"/>
        <StatCard icon="⚠️" label="Outstanding" value={fmt(outstanding)} sub="Pending collection" color="#dc2626" bg="#fee2e2"/>
        <StatCard icon="📈" label="Net Profit" value={fmt(netProfit)} sub="Income - Expense" color={netProfit>=0?"#16a34a":"#dc2626"} bg={netProfit>=0?"#d1fae5":"#fee2e2"}/>
        <StatCard icon="📅" label="This Month Sales" value={fmt(thisMonthSales)} sub={`${thisMonthInv.length} invoices`} color="#7c3aed" bg="#ede9fe"/>
        <StatCard icon="✅" label="This Month Collected" value={fmt(thisMonthPaid)} sub={thisMonth} color="#16a34a" bg="#d1fae5"/>
        <StatCard icon={thisMonthProfit>=0?"🟢":"🔴"} label="This Month P&L" value={fmt(Math.abs(thisMonthProfit))} sub={thisMonthProfit>=0?"Profit":"Loss"} color={thisMonthProfit>=0?"#16a34a":"#dc2626"} bg={thisMonthProfit>=0?"#f0fdf4":"#fef2f2"}/>
        <StatCard icon="💊" label="Products" value={data.products.length} sub={`${lowStock.length} low stock`} color="#1d4ed8" bg="#eff6ff"/>
        <StatCard icon="👥" label="Customers" value={data.customers.length} sub="Total registered" color="#16a34a" bg="#f0fdf4"/>
      </div>

      {/* Charts + Data Row */}
      <div style={{display:"grid",gridTemplateColumns:"1.5fr 1fr",gap:16,marginBottom:16}}>
        {/* Monthly bar chart */}
        <Card>
          <div style={{fontWeight:800,fontSize:15,marginBottom:16}}>📊 Last 6 Months — Income vs Expense</div>
          <div style={{display:"flex",alignItems:"flex-end",gap:6,height:140}}>
            {monthlyData.map((m,i)=>(
              <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                <div style={{width:"100%",display:"flex",gap:2,alignItems:"flex-end",height:110}}>
                  <div style={{flex:1,background:"#1d4ed8",borderRadius:"3px 3px 0 0",
                    height:Math.max(4,(m.income/maxBar)*100)+"%",transition:"height .3s"}} title={`Income: ${fmt(m.income)}`}/>
                  <div style={{flex:1,background:"#dc2626",borderRadius:"3px 3px 0 0",
                    height:Math.max(4,(m.expense/maxBar)*100)+"%",transition:"height .3s"}} title={`Expense: ${fmt(m.expense)}`}/>
                </div>
                <div style={{fontSize:10,color:"#6b7280",fontWeight:600}}>{m.month}</div>
                <div style={{fontSize:9,color:m.income-m.expense>=0?"#16a34a":"#dc2626",fontWeight:700}}>
                  {m.income-m.expense>=0?"+":""}{fmt(m.income-m.expense).replace("Rs. ","")}
                </div>
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:16,marginTop:8,fontSize:11}}>
            <span><span style={{display:"inline-block",width:10,height:10,background:"#1d4ed8",borderRadius:2,marginRight:4}}/>Income</span>
            <span><span style={{display:"inline-block",width:10,height:10,background:"#dc2626",borderRadius:2,marginRight:4}}/>Expense</span>
          </div>
        </Card>

        {/* Last month vs this month */}
        <Card>
          <div style={{fontWeight:800,fontSize:15,marginBottom:12}}>📅 Month Comparison</div>
          {[
            {label:"Income",  thisVal:thisMonthIncome,  lastVal:lastMonthIncome,  color:"#16a34a"},
            {label:"Expense", thisVal:thisMonthExpense, lastVal:lastMonthExpense, color:"#dc2626"},
            {label:"Profit",  thisVal:thisMonthProfit,  lastVal:lastMonthProfit,  color:thisMonthProfit>=0?"#7c3aed":"#dc2626"},
          ].map(r=>{
            const diff = r.thisVal - r.lastVal;
            return (
              <div key={r.label} style={{marginBottom:12,paddingBottom:12,borderBottom:"1px solid #f3f4f6"}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <span style={{fontSize:12,fontWeight:600,color:"#374151"}}>{r.label}</span>
                  <span style={{fontSize:11,color:diff>=0?"#16a34a":"#dc2626",fontWeight:700}}>
                    {diff>=0?"▲":"▼"} {fmt(Math.abs(diff))}
                  </span>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:12}}>
                  <span style={{color:"#6b7280"}}>Last: {fmt(r.lastVal)}</span>
                  <span style={{fontWeight:700,color:r.color}}>This: {fmt(r.thisVal)}</span>
                </div>
              </div>
            );
          })}
        </Card>
      </div>

      {/* Bottom row */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:16}}>
        {/* Unpaid invoices */}
        <Card>
          <div style={{fontWeight:800,fontSize:14,marginBottom:10,color:"#dc2626"}}>🧾 Pending Payments</div>
          {unpaidInvs.length===0 ? <div style={{color:"#9ca3af",fontSize:13}}>Sab invoices clear!</div>
          : unpaidInvs.map(inv=>(
            <div key={inv.id} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid #f3f4f6"}}>
              <div>
                <div style={{fontWeight:700,fontSize:13}}>{inv.id}</div>
                <div style={{fontSize:11,color:"#6b7280"}}>{inv.customerName}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontWeight:800,color:"#dc2626",fontSize:13}}>{fmt(inv.total-inv.paid)}</div>
                <div style={{fontSize:10,color:"#9ca3af"}}>{inv.date}</div>
              </div>
            </div>
          ))}
        </Card>

        {/* Expiring */}
        <Card>
          <div style={{fontWeight:800,fontSize:14,marginBottom:10,color:"#d97706"}}>⚠️ Expiring Products</div>
          {[...expired.map(p=>({...p,_expired:true})),...expiringSoon].slice(0,6).map(p=>(
            <div key={p.id} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid #f3f4f6"}}>
              <span style={{fontWeight:600,fontSize:12}}>{p.name}</span>
              <span style={{fontSize:12,fontWeight:700,color:p._expired?"#dc2626":"#d97706"}}>
                {p._expired?"🔴 EXPIRED":`${daysUntil(p.expiry)}d`}
              </span>
            </div>
          ))}
          {expired.length===0&&expiringSoon.length===0&&<div style={{color:"#9ca3af",fontSize:13}}>✅ Sab theek hai!</div>}
        </Card>

        {/* Low stock */}
        <Card>
          <div style={{fontWeight:800,fontSize:14,marginBottom:10,color:"#ea580c"}}>📦 Low Stock</div>
          {lowStock.slice(0,6).map(p=>(
            <div key={p.id} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid #f3f4f6"}}>
              <span style={{fontWeight:600,fontSize:12}}>{p.name}</span>
              <span style={{fontSize:12,fontWeight:700,color:"#ea580c"}}>{p.stock}/{p.reorder||50}</span>
            </div>
          ))}
          {lowStock.length===0&&<div style={{color:"#9ca3af",fontSize:13}}>✅ Stock levels OK!</div>}
        </Card>
      </div>
    </div>
  );
}

// ─── PRODUCTS ─────────────────────────────────────────────────────────────────
function PriceCalculator({ form, setForm }) {
  // Live calculations
  const salePrice   = parseFloat(form.price)    || 0;
  const units       = parseFloat(form.unitQty)  || 1;
  const marginPct   = parseFloat(form.margin)   || 0;

  // Per-unit sale price = total sale price ÷ units in pack
  const perUnitSalePrice = units > 0 ? salePrice / units : 0;

  // Cost price derived from margin:  cost = salePrice × (1 - margin/100)
  // margin = (salePrice - cost) / salePrice × 100
  const autoCost = marginPct > 0 && salePrice > 0
    ? salePrice * (1 - marginPct / 100)
    : parseFloat(form.cost) || 0;

  const perUnitCost  = units > 0 ? autoCost / units : 0;
  const profitPerPack = salePrice - autoCost;
  const profitPerUnit = perUnitSalePrice - perUnitCost;

  // Sync cost back into form whenever margin or price changes
  const handleMarginChange = (v) => {
    const m = parseFloat(v) || 0;
    const sp = parseFloat(form.price) || 0;
    const newCost = sp > 0 && m > 0 ? (sp * (1 - m / 100)).toFixed(2) : form.cost;
    setForm((f) => ({ ...f, margin: v, cost: newCost }));
  };

  const handlePriceChange = (v) => {
    const sp = parseFloat(v) || 0;
    const m  = parseFloat(form.margin) || 0;
    const newCost = sp > 0 && m > 0 ? (sp * (1 - m / 100)).toFixed(2) : form.cost;
    setForm((f) => ({ ...f, price: v, cost: newCost }));
  };

  const handleCostChange = (v) => {
    // If user types cost manually, recalculate margin
    const sp   = parseFloat(form.price) || 0;
    const cost = parseFloat(v) || 0;
    const newMargin = sp > 0 && cost > 0 ? (((sp - cost) / sp) * 100).toFixed(1) : form.margin;
    setForm((f) => ({ ...f, cost: v, margin: newMargin }));
  };

  const InfoBox = ({ label, value, highlight }) => (
    <div style={{
      textAlign: "center", padding: "10px 6px", borderRadius: 10,
      background: highlight ? "#eff6ff" : "#f8fafc",
      border: highlight ? "1.5px solid #93c5fd" : "1px solid #e5e7eb",
      flex: 1,
    }}>
      <div style={{ fontSize: 11, color: "#6b7280", fontWeight: 600, marginBottom: 3 }}>{label}</div>
      <div style={{ fontSize: 14, fontWeight: 800, color: highlight ? "#1d4ed8" : "#111827" }}>{value}</div>
    </div>
  );

  return (
    <div>
      {/* ── Row 1: Basic Info ── */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 16px" }}>
        <Input label="Product Name *" value={form.name || ""} onChange={(v) => setForm((f) => ({ ...f, name: v }))} />
        <Input label="Category" value={form.category || ""} onChange={(v) => setForm((f) => ({ ...f, category: v }))} />
        <Select label="Unit Type" value={form.unit || "Tablets"} onChange={(v) => setForm((f) => ({ ...f, unit: v }))}
          options={["Tablets","Syrup","Capsule","Injection","Surgical Item","Drops","Sachet","General Items","Eye Drops","Ear Drops","Ointment","Inhaler","Powder"].map(u=>({value:u,label:u}))} />
        <Input label="Supplier" value={form.supplier || ""} onChange={(v) => setForm((f) => ({ ...f, supplier: v }))} />
      </div>

      {/* ── Pricing Section ── */}
      <div style={{ background: "#f0f9ff", border: "1.5px solid #bfdbfe", borderRadius: 12, padding: "16px 16px 8px", marginBottom: 14 }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: "#1e40af", marginBottom: 12 }}>💰 Pricing & Margin Calculator</div>

        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 16px" }}>
          {/* Sale Price */}
          <div style={{ marginBottom: 14 }}>
            <label style={{ display: "block", marginBottom: 4, fontSize: 13, fontWeight: 600, color: "#374151" }}>
              Sale Price (Rs.) — Total Pack *
            </label>
            <input
              type="number" value={form.price || ""}
              onChange={(e) => handlePriceChange(e.target.value)}
              placeholder="e.g. 120"
              style={{ width: "100%", padding: "8px 12px", border: "2px solid #3b82f6", borderRadius: 8, fontSize: 14, boxSizing: "border-box", outline: "none", background: "#fff", fontWeight: 700 }}
            />
          </div>

          {/* Units in pack */}
          <div style={{ marginBottom: 14 }}>
            <label style={{ display: "block", marginBottom: 4, fontSize: 13, fontWeight: 600, color: "#374151" }}>
              Units in Pack (for per-unit price)
            </label>
            <input
              type="number" value={form.unitQty || ""}
              onChange={(e) => setForm((f) => ({ ...f, unitQty: e.target.value }))}
              placeholder="e.g. 10 (tablets in strip)"
              style={{ width: "100%", padding: "8px 12px", border: "1px solid #d1d5db", borderRadius: 8, fontSize: 14, boxSizing: "border-box", outline: "none" }}
            />
          </div>
        </div>

        {/* Per-unit result banner */}
        {salePrice > 0 && units > 1 && (
          <div style={{ background: "#dbeafe", borderRadius: 8, padding: "8px 14px", marginBottom: 12, display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontSize: 16 }}>🔢</span>
            <span style={{ fontSize: 14, fontWeight: 700, color: "#1e40af" }}>
              Per Unit Sale Price: <span style={{ color: "#1d4ed8", fontSize: 16 }}>Rs. {perUnitSalePrice.toFixed(2)}</span>
              <span style={{ color: "#6b7280", fontWeight: 400 }}> &nbsp;({fmt(salePrice)} ÷ {units} units)</span>
            </span>
          </div>
        )}

        {/* Margin % */}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 16px" }}>
          <div style={{ marginBottom: 14 }}>
            <label style={{ display: "block", marginBottom: 4, fontSize: 13, fontWeight: 600, color: "#374151" }}>
              Profit Margin %
            </label>
            <div style={{ position: "relative" }}>
              <input
                type="number" value={form.margin || ""}
                onChange={(e) => handleMarginChange(e.target.value)}
                placeholder="e.g. 25"
                style={{ width: "100%", padding: "8px 36px 8px 12px", border: "2px solid #10b981", borderRadius: 8, fontSize: 14, boxSizing: "border-box", outline: "none", background: "#fff", fontWeight: 700 }}
              />
              <span style={{ position: "absolute", right: 10, top: "50%", transform: "translateY(-50%)", fontSize: 14, color: "#10b981", fontWeight: 700 }}>%</span>
            </div>
            <div style={{ fontSize: 11, color: "#6b7280", marginTop: 3 }}>
              Margin % = (Sale − Cost) ÷ Sale × 100
            </div>
          </div>

          {/* Cost Price — auto or manual */}
          <div style={{ marginBottom: 14 }}>
            <label style={{ display: "block", marginBottom: 4, fontSize: 13, fontWeight: 600, color: "#374151" }}>
              Cost Price (Rs.) — auto from margin
            </label>
            <input
              type="number" value={form.cost || ""}
              onChange={(e) => handleCostChange(e.target.value)}
              placeholder="Auto-calculated"
              style={{ width: "100%", padding: "8px 12px", border: "1px solid #d1d5db", borderRadius: 8, fontSize: 14, boxSizing: "border-box", outline: "none", background: "#f9fafb" }}
            />
            <div style={{ fontSize: 11, color: "#6b7280", marginTop: 3 }}>
              Edit cost → margin updates automatically
            </div>
          </div>
        </div>

        {/* Live Summary Boxes */}
        {salePrice > 0 && autoCost > 0 && (
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 6 }}>
            <InfoBox label="Sale / Pack" value={fmt(salePrice)} />
            <InfoBox label="Cost / Pack" value={fmt(autoCost)} />
            <InfoBox label="Profit / Pack" value={fmt(profitPerPack)} highlight />
            <InfoBox label="Margin %" value={`${marginPct > 0 ? marginPct : (salePrice > 0 && autoCost > 0 ? (((salePrice - autoCost) / salePrice) * 100).toFixed(1) : 0)}%`} highlight />
            {units > 1 && <InfoBox label={`Profit / Unit`} value={fmt(profitPerUnit)} />}
            {units > 1 && <InfoBox label={`Cost / Unit`} value={fmt(perUnitCost)} />}
          </div>
        )}
      </div>

      {/* ── Stock Info ── */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "0 16px" }}>
        <Input label="Current Stock (Packs)" type="number" value={form.stock || ""} onChange={(v) => setForm((f) => ({ ...f, stock: v }))} />
        <Input label="Reorder Level" type="number" value={form.reorder || ""} onChange={(v) => setForm((f) => ({ ...f, reorder: v }))} />
        <Input label="Expiry Date" type="date" value={form.expiry || ""} onChange={(v) => setForm((f) => ({ ...f, expiry: v }))} />

    </div>
  );
}

// ─── BARCODE SCANNER COMPONENT ───────────────────────────────────────────────
function BarcodeScanner({ onDetected, onClose }) {
  const videoRef   = useRef(null);
  const canvasRef  = useRef(null);
  const streamRef  = useRef(null);
  const rafRef     = useRef(null);
  const doneRef    = useRef(false);
  const [status, setStatus]   = useState("starting");
  const [errMsg, setErrMsg]   = useState("");
  const [manualCode, setManualCode] = useState("");
  const [scanMethod, setScanMethod] = useState(""); // "native" | "canvas"

  useEffect(() => {
    let cancelled = false;

    const done = (code) => {
      if (doneRef.current || cancelled) return;
      doneRef.current = true;
      cancelAnimationFrame(rafRef.current);
      if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop());
      onDetected(code);
    };

    const startCamera = async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: "environment" }, width: { ideal: 1280 }, height: { ideal: 720 } }
        });
        if (cancelled) { stream.getTracks().forEach(t => t.stop()); return; }
        streamRef.current = stream;
        if (videoRef.current) {
          videoRef.current.srcObject = stream;
          await new Promise(r => { videoRef.current.onloadedmetadata = r; });
          videoRef.current.play();
        }

        // --- Method 1: Native BarcodeDetector (Chrome/Edge/Android) ---
        if ("BarcodeDetector" in window) {
          setScanMethod("native");
          setStatus("scanning");
          const detector = new window.BarcodeDetector({
            formats: ["ean_13","ean_8","code_128","code_39","qr_code","upc_a","upc_e","codabar","itf","data_matrix","pdf417","aztec"]
          });
          const scan = async () => {
            if (cancelled || doneRef.current) return;
            try {
              const results = await detector.detect(videoRef.current);
              if (results.length > 0) { done(results[0].rawValue); return; }
            } catch {}
            rafRef.current = requestAnimationFrame(scan);
          };
          rafRef.current = requestAnimationFrame(scan);
        }
        // --- Method 2: Canvas + ZXing via jsDelivr (more reliable CDN) ---
        else {
          setScanMethod("canvas");
          setStatus("loading_lib");
          // Load from jsDelivr — more reliable than cdnjs for this package
          const loaded = await new Promise(res => {
            if (window.ZXing) { res(true); return; }
            const s = document.createElement("script");
            s.src = "https://cdn.jsdelivr.net/npm/@zxing/library@0.19.1/umd/index.min.js";
            s.onload = () => res(true);
            s.onerror = () => {
              // Fallback to unpkg
              const s2 = document.createElement("script");
              s2.src = "https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js";
              s2.onload = () => res(true);
              s2.onerror = () => res(false);
              document.head.appendChild(s2);
            };
            document.head.appendChild(s);
          });

          if (!loaded || !window.ZXing) {
            // Library failed — still show camera, just no auto decode
            setStatus("scanning_manual");
            return;
          }

          setStatus("scanning");
          const hints = new Map();
          hints.set(window.ZXing.DecodeHintType.TRY_HARDER, true);
          const reader = new window.ZXing.BrowserMultiFormatReader(hints, 400);
          try {
            await reader.decodeFromVideoElement(videoRef.current, (result, err) => {
              if (cancelled || doneRef.current) return;
              if (result) done(result.getText());
            });
          } catch {}
        }
      } catch (e) {
        if (cancelled) return;
        setStatus("error");
        if (e.name === "NotAllowedError")  setErrMsg("Camera permission deny ho gayi. Browser address bar mein camera allow karein.");
        else if (e.name === "NotFoundError") setErrMsg("Koi camera nahi mila. Manual barcode enter karein.");
        else setErrMsg(e.message || "Camera start nahi ho saka.");
      }
    };

    startCamera();
    return () => {
      cancelled = true;
      cancelAnimationFrame(rafRef.current);
      if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop());
    };
  }, []);

  const statusLabel = {
    starting:       "📷 Camera start ho raha hai...",
    loading_lib:    "⏳ Scanner load ho raha hai...",
    scanning:       "✅ Scanner ready — barcode frame mein lao",
    scanning_manual:"📷 Camera on hai — ya manual barcode enter karein",
    error:          null,
  };

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.88)", zIndex:9998, display:"flex", alignItems:"center", justifyContent:"center" }} onClick={e => e.target===e.currentTarget && onClose()}>
      <div style={{ background:"#0f172a", borderRadius:20, padding:22, width:380, maxWidth:"96vw", color:"#fff", boxShadow:"0 32px 80px rgba(0,0,0,.6)" }}>

        {/* Header */}
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
          <div style={{ fontWeight:800, fontSize:17 }}>📷 Barcode / QR Scanner</div>
          <button onClick={onClose} style={{ background:"rgba(255,255,255,.12)", border:"none", color:"#fff", borderRadius:8, padding:"5px 12px", cursor:"pointer", fontSize:18, lineHeight:1 }}>✕</button>
        </div>

        {/* Camera box */}
        <div style={{ position:"relative", borderRadius:14, overflow:"hidden", background:"#000", marginBottom:14, height:240 }}>
          <video ref={videoRef} style={{ width:"100%", height:"100%", objectFit:"cover", display:"block" }} muted playsInline />
          <canvas ref={canvasRef} style={{ display:"none" }} />

          {/* Scanning frame overlay */}
          {(status === "scanning" || status === "scanning_manual") && (
            <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center", pointerEvents:"none" }}>
              <div style={{ width:230, height:145, position:"relative" }}>
                {/* Corner L-shapes */}
                {[{t:0,l:0},{t:0,r:0},{b:0,l:0},{b:0,r:0}].map((c,i) => (
                  <div key={i} style={{ position:"absolute", width:22, height:22, ...c,
                    borderTop:    c.t===0 ? "3px solid #22d3ee" : "none",
                    borderBottom: c.b===0 ? "3px solid #22d3ee" : "none",
                    borderLeft:   c.l===0 ? "3px solid #22d3ee" : "none",
                    borderRight:  c.r===0 ? "3px solid #22d3ee" : "none",
                  }} />
                ))}
                <div style={{ position:"absolute", left:0, right:0, height:2, top:"50%",
                  background:"linear-gradient(90deg,transparent 0%,#22d3ee 30%,#22d3ee 70%,transparent 100%)",
                  animation:"scanPulse 1.8s ease-in-out infinite" }} />
              </div>
              <div style={{ position:"absolute", bottom:8, fontSize:11, color:"rgba(255,255,255,.7)" }}>
                Barcode ko frame ke beech rakhein
              </div>
            </div>
          )}

          {/* Status overlay */}
          {status !== "scanning" && status !== "scanning_manual" && (
            <div style={{ position:"absolute", inset:0, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:10, padding:16, textAlign:"center", background:"rgba(0,0,0,.5)" }}>
              <div style={{ fontSize:36 }}>{status==="error" ? "📵" : "⏳"}</div>
              <div style={{ fontSize:13, color: status==="error" ? "#f87171" : "#94a3b8" }}>
                {status==="error" ? errMsg : statusLabel[status]}
              </div>
            </div>
          )}
        </div>

        {/* Supported formats pill */}
        <div style={{ fontSize:11, color:"#475569", marginBottom:12, textAlign:"center" }}>
          Supports: EAN-13 · EAN-8 · Code128 · QR · UPC-A · UPC-E · Code39 · DataMatrix
        </div>

        {/* Divider */}
        <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:12 }}>
          <div style={{ flex:1, height:1, background:"rgba(255,255,255,.1)" }} />
          <span style={{ fontSize:12, color:"#64748b" }}>ya manually type karein</span>
          <div style={{ flex:1, height:1, background:"rgba(255,255,255,.1)" }} />
        </div>

        {/* Manual entry */}
        <div style={{ display:"flex", gap:8 }}>
          <input value={manualCode} onChange={e=>setManualCode(e.target.value)}
            onKeyDown={e=>e.key==="Enter" && manualCode.trim() && onDetected(manualCode.trim())}
            placeholder="Barcode number (e.g. 8901030865466)"
            style={{ flex:1, padding:"10px 12px", borderRadius:9, border:"1px solid rgba(255,255,255,.18)", background:"rgba(255,255,255,.07)", color:"#fff", fontSize:14, outline:"none" }} />
          <button onClick={()=>manualCode.trim() && onDetected(manualCode.trim())}
            style={{ padding:"10px 18px", background:"#1d4ed8", border:"none", borderRadius:9, color:"#fff", fontWeight:800, cursor:"pointer", fontSize:16 }}>→</button>
        </div>
      </div>
      <style>{`@keyframes scanPulse{0%,100%{opacity:.4;transform:scaleX(.7)}50%{opacity:1;transform:scaleX(1)}}`}</style>
    </div>
  );
}

// ─── BARCODE LOOKUP — fetch product info from Open Food Facts / OpenFDA ───────
async function lookupBarcode(barcode) {
  const result = { barcode, name: "", brand: "", category: "", found: false, source: "" };
  try {
    // 1. Try Open Food Facts (great for pharma/FMCG)
    const r1 = await fetch(`https://world.openfoodfacts.org/api/v0/product/${barcode}.json`);
    const d1 = await r1.json();
    if (d1.status === 1 && d1.product) {
      const p = d1.product;
      result.name     = p.product_name || p.product_name_en || "";
      result.brand    = p.brands || "";
      result.category = p.categories?.split(",")[0]?.trim() || "";
      result.found    = true;
      result.source   = "Open Food Facts";
      return result;
    }
  } catch {}
  try {
    // 2. Try Open Beauty Facts (cosmetics/pharma)
    const r2 = await fetch(`https://world.openbeautyfacts.org/api/v0/product/${barcode}.json`);
    const d2 = await r2.json();
    if (d2.status === 1 && d2.product) {
      const p = d2.product;
      result.name     = p.product_name || "";
      result.brand    = p.brands || "";
      result.category = p.categories?.split(",")[0]?.trim() || "";
      result.found    = true;
      result.source   = "Open Beauty Facts";
      return result;
    }
  } catch {}
  try {
    // 3. Try UPC Item DB
    const r3 = await fetch(`https://api.upcitemdb.com/prod/trial/lookup?upc=${barcode}`);
    const d3 = await r3.json();
    if (d3.code === "OK" && d3.items?.length > 0) {
      const item = d3.items[0];
      result.name     = item.title || "";
      result.brand    = item.brand || "";
      result.category = item.category || "";
      result.found    = true;
      result.source   = "UPC Item DB";
      return result;
    }
  } catch {}
  return result; // not found — manual fill karo
}

// ─── PRODUCTS ─────────────────────────────────────────────────────────────────
function Products({ data, setData }) {
  const toast = useToast();
  const [search, setSearch]       = useState("");
  const [modal, setModal]         = useState(null);
  const [form, setForm]           = useState({});
  const [showScanner, setShowScanner] = useState(false);
  const [lookupStatus, setLookupStatus] = useState(null); // null | "loading" | "found" | "notfound"
  const [lookupSource, setLookupSource] = useState("");

  const filtered = data.products.filter((p) => p.name.toLowerCase().includes(search.toLowerCase()) || p.category.toLowerCase().includes(search.toLowerCase()));

  const EMPTY = { name: "", category: "", unit: "Tablets", unitQty: "", price: "", cost: "", margin: "", stock: "", reorder: "", expiry: "", supplier: "", barcode: "" };

  const openAdd  = () => { setForm({ ...EMPTY }); setModal("add"); setLookupStatus(null); };
  const openEdit = (p) => {
    const sp = p.price || 0, cost = p.cost || 0;
    const margin = sp > 0 && cost > 0 ? (((sp - cost) / sp) * 100).toFixed(1) : "";
    setForm({ ...EMPTY, ...p, margin: p.margin || margin });
    setModal("edit"); setLookupStatus(null);
  };

  // Called when barcode is scanned or manually entered
  const handleBarcode = async (code) => {
    setShowScanner(false);
    setLookupStatus("loading");
    setForm(f => ({ ...f, barcode: code }));
    toast(`🔍 Barcode ${code} lookup ho raha hai...`, "info");

    const result = await lookupBarcode(code);
    if (result.found) {
      setForm(f => ({
        ...f,
        barcode: code,
        name:     result.name     || f.name,
        supplier: result.brand    || f.supplier,
        category: result.category || f.category,
      }));
      setLookupStatus("found");
      setLookupSource(result.source);
      toast(`✅ Product info mili! (${result.source}) — Baki details manually fill karein`, "success");
    } else {
      setLookupStatus("notfound");
      toast(`⚠️ Barcode ${code} ki info nahi mili online — manually fill karein`, "warning");
    }
  };

  const save = () => {
    if (!form.name || !form.price) return toast("Name aur price zaroori hain!", "error");
    const product = {
      ...form,
      price: +form.price, cost: +form.cost, margin: +form.margin,
      unitQty: +form.unitQty || 1, stock: +form.stock, reorder: +form.reorder,
    };
    if (modal === "add") {
      setData((d) => ({ ...d, products: [...d.products, { ...product, id: Date.now() }] }));
      toast(`✅ Product "${product.name}" successfully add ho gaya!`, "success");
    } else {
      setData((d) => ({ ...d, products: d.products.map((p) => p.id === form.id ? product : p) }));
      toast(`✅ Product "${product.name}" update ho gaya!`, "success");
    }
    setModal(null);
  };

  const del = (id) => {
    const p = data.products.find((x) => x.id === id);
    setData((d) => ({ ...d, products: d.products.filter((p) => p.id !== id) }));
    toast(`🗑️ "${p?.name}" delete ho gaya`, "warning");
  };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
        <h2 style={{ margin: 0, fontSize: 22, fontWeight: 800 }}>💊 Products Management</h2>
        <div style={{ display: "flex", gap: 10 }}>
          <Btn color="gray" onClick={() => { setForm({ ...EMPTY }); setModal("add"); setShowScanner(true); setLookupStatus(null); }}>
            📷 Scan & Add
          </Btn>
          <Btn onClick={openAdd}>+ Add Product</Btn>
        </div>
      </div>
      <Card>
        <input value={search} onChange={(e) => setSearch(e.target.value)} placeholder="🔍 Search products..." style={{ width: "100%", padding: "10px 14px", border: "1px solid #d1d5db", borderRadius: 8, fontSize: 14, marginBottom: 16, boxSizing: "border-box" }} />
        <div className="tbl-wrap" style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 14 }}>
            <thead>
              <tr style={{ background: "#f8fafc" }}>
                {["Product Name", "Category", "Sale Price", "Per Unit", "Cost Price", "Margin %", "Profit", "Stock", "Expiry", "Actions"].map((h) => (
                  <th key={h} style={{ padding: "10px 12px", textAlign: "left", fontWeight: 700, color: "#374151", borderBottom: "2px solid #e5e7eb", whiteSpace: "nowrap" }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filtered.map((p) => {
                const days = daysUntil(p.expiry);
                const _expThresh = 195;
                const expColor = days <= 0 ? "#dc2626" : days <= _expThresh ? "#d97706" : "#16a34a";
                const units = p.unitQty || 1;
                const perUnit = units > 1 ? p.price / units : null;
                const margin = p.margin || (p.price > 0 && p.cost > 0 ? (((p.price - p.cost) / p.price) * 100).toFixed(1) : 0);
                const profit = p.price - p.cost;
                const marginColor = margin >= 30 ? "#16a34a" : margin >= 15 ? "#d97706" : "#dc2626";
                return (
                  <tr key={p.id} style={{ borderBottom: "1px solid #f3f4f6" }}>
                    <td style={{ padding: "10px 12px", fontWeight: 700 }}>
                      {p.name}
                      {p.barcode && <div style={{ fontSize: 10, color: "#6b7280", fontFamily: "monospace" }}>🔲 {p.barcode}</div>}
                      <div style={{ fontSize: 11, color: "#6b7280", fontWeight: 400 }}>{p.category} · {p.supplier}</div>
                    </td>
                    <td style={{ padding: "10px 12px" }}>{p.unit}</td>
                    <td style={{ padding: "10px 12px", fontWeight: 700, color: "#1d4ed8" }}>{fmt(p.price)}</td>
                    <td style={{ padding: "10px 12px" }}>
                      {perUnit
                        ? <span style={{ background: "#dbeafe", color: "#1e40af", padding: "2px 8px", borderRadius: 6, fontSize: 12, fontWeight: 700 }}>Rs. {perUnit.toFixed(2)}</span>
                        : <span style={{ color: "#9ca3af", fontSize: 12 }}>—</span>}
                    </td>
                    <td style={{ padding: "10px 12px" }}>{fmt(p.cost)}</td>
                    <td style={{ padding: "10px 12px" }}>
                      <span style={{ background: margin >= 30 ? "#d1fae5" : margin >= 15 ? "#fef3c7" : "#fee2e2", color: marginColor, padding: "2px 10px", borderRadius: 20, fontSize: 12, fontWeight: 700 }}>
                        {margin}%
                      </span>
                    </td>
                    <td style={{ padding: "10px 12px", fontWeight: 700, color: profit > 0 ? "#16a34a" : "#dc2626" }}>{fmt(profit)}</td>
                    <td style={{ padding: "10px 12px" }}>
                      <span style={{ color: p.stock <= p.reorder ? "#dc2626" : "#111", fontWeight: p.stock <= p.reorder ? 700 : 400 }}>{p.stock}</span>
                    </td>
                    <td style={{ padding: "10px 12px", color: expColor, fontWeight: 600 }}>{fmtDate(p.expiry)}</td>
                    <td style={{ padding: "10px 12px" }}>
                      <div style={{ display: "flex", gap: 6 }}>
                        <Btn small color="primary" onClick={() => openEdit(p)}>Edit</Btn>
                        <Btn small color="danger" onClick={() => del(p.id)}>Del</Btn>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </Card>

      {/* Barcode scanner overlay */}
      {showScanner && (
        <BarcodeScanner
          onDetected={handleBarcode}
          onClose={() => setShowScanner(false)}
        />
      )}

      {modal && (
        <Modal wide title={modal === "add" ? "➕ Add New Product" : "✏️ Edit Product"} onClose={() => setModal(null)}>

          {/* ── Barcode section at top of modal ── */}
          <div style={{ background: "#f8fafc", border: "1.5px solid #e5e7eb", borderRadius: 12, padding: "14px 16px", marginBottom: 18 }}>
            <div style={{ fontWeight: 800, fontSize: 14, marginBottom: 10, color: "#374151" }}>🔲 Barcode / QR Scan</div>

            {/* Lookup status banner */}
            {lookupStatus === "loading" && (
              <div style={{ background: "#eff6ff", border: "1px solid #93c5fd", borderRadius: 8, padding: "9px 14px", marginBottom: 10, fontSize: 13, color: "#1e40af", fontWeight: 600 }}>
                ⏳ Online database mein dhundh raha hai...
              </div>
            )}
            {lookupStatus === "found" && (
              <div style={{ background: "#f0fdf4", border: "1px solid #86efac", borderRadius: 8, padding: "9px 14px", marginBottom: 10, fontSize: 13, color: "#166534", fontWeight: 600 }}>
                ✅ Product info mili! ({lookupSource}) — Name, Brand auto-fill ho gaya. Baki fields check karein.
              </div>
            )}
            {lookupStatus === "notfound" && (
              <div style={{ background: "#fffbeb", border: "1px solid #fcd34d", borderRadius: 8, padding: "9px 14px", marginBottom: 10, fontSize: 13, color: "#92400e", fontWeight: 600 }}>
                ⚠️ Online mein nahi mila — Barcode save ho gaya, baaki fields manually fill karein.
              </div>
            )}

            <div style={{ display: "flex", gap: 8 }}>
              {/* Manual barcode input */}
              <input
                value={form.barcode || ""}
                onChange={e => setForm(f => ({ ...f, barcode: e.target.value }))}
                placeholder="Barcode / QR number..."
                style={{ flex: 1, padding: "9px 12px", border: "1.5px solid #d1d5db", borderRadius: 8, fontSize: 14, outline: "none", fontFamily: "monospace" }}
              />
              {/* Lookup button for manual entry */}

              <button onClick={() => setShowScanner(true)}

                📷 Scan
              </button>
            </div>

              Camera se scan karein ya barcode number type kar ke Lookup dabayein — name, brand auto fill ho jaega

          <PriceCalculator form={form} setForm={setForm} />
          <div style={{ display: "flex", justifyContent: "flex-end", gap: 10, marginTop: 8 }}>
            <Btn color="gray" onClick={() => setModal(null)}>Cancel</Btn>

          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── STOCK / EXPIRY ───────────────────────────────────────────────────────────
