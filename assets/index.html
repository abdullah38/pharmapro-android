  const toast = useToast();
  const [tab, setTab] = useState("stock");
  const [adjModal, setAdjModal] = useState(null);
  const [adjQty, setAdjQty] = useState("");
  const [adjNote, setAdjNote] = useState("");

  const adjust = () => {
    if (!adjQty) return;
    setData((d) => ({ ...d, products: d.products.map((p) => p.id === adjModal.id ? { ...p, stock: Math.max(0, p.stock + parseInt(adjQty)) } : p) }));
    setAdjModal(null); setAdjQty(""); setAdjNote("");
  };

  const expired = data.products.filter((p) => daysUntil(p.expiry) <= 0);
  const expiring = data.products.filter((p) => { const d=daysUntil(p.expiry); return d>0 && d<=(settings?.app?.expiryAlertDays||195); });
  const safe = data.products.filter((p) => daysUntil(p.expiry) > (settings?.app?.expiryAlertDays||195));

  return (
    <div>
      <h2 style={{ marginBottom: 20, fontSize: 22, fontWeight: 800 }}>📦 Stock & Expiry Management</h2>
      <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
        {["stock", "expiry"].map((t) => (
          <button key={t} onClick={() => setTab(t)} style={{ padding: "8px 22px", borderRadius: 8, border: "none", cursor: "pointer", fontWeight: 700, fontSize: 14, background: tab === t ? "#1d4ed8" : "#e5e7eb", color: tab === t ? "#fff" : "#374151" }}>
            {t === "stock" ? "📦 Stock Management" : "⏰ Expiry Management"}
          </button>
        ))}
      </div>

      {tab === "stock" && (
        <Card>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 14 }}>
            <thead>
              <tr style={{ background: "#f8fafc" }}>
                {["Product", "Category", "Current Stock", "Reorder Level", "Status", "Adjust"].map((h) => (
                  <th key={h} style={{ padding: "10px 12px", textAlign: "left", fontWeight: 700, borderBottom: "2px solid #e5e7eb" }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {data.products.map((p) => {
                const status = p.stock === 0 ? ["Out of Stock", "red"] : p.stock <= p.reorder ? ["Low Stock", "yellow"] : ["In Stock", "green"];
                return (
                  <tr key={p.id} style={{ borderBottom: "1px solid #f3f4f6" }}>
                    <td style={{ padding: "10px 12px", fontWeight: 600 }}>{p.name}</td>
                    <td style={{ padding: "10px 12px" }}>{p.category}</td>
                    <td style={{ padding: "10px 12px", fontWeight: 700, color: p.stock <= p.reorder ? "#dc2626" : "#111" }}>{p.stock}</td>
                    <td style={{ padding: "10px 12px" }}>{p.reorder}</td>
                    <td style={{ padding: "10px 12px" }}>{badge(status[0], status[1])}</td>
                    <td style={{ padding: "10px 12px" }}>
                      <Btn small onClick={() => setAdjModal(p)}>Adjust</Btn>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </Card>
      )}

      {tab === "expiry" && (
        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          {[["🔴 Expired Products", expired, "red"], ["🟡 Expiring Soon (≤30 days)", expiring, "yellow"], ["🟢 Safe Products (>30 days)", safe, "green"]].map(([title, items, color]) => (
            <Card key={title}>
              <h3 style={{ margin: "0 0 14px", fontSize: 16, fontWeight: 700 }}>{title} ({items.length})</h3>
              {items.length === 0 ? <p style={{ color: "#6b7280", margin: 0 }}>None</p> : (
                <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 14 }}>
                  <thead>
                    <tr style={{ background: "#f8fafc" }}>
                      {["Product", "Category", "Stock", "Expiry Date", "Days Left"].map((h) => (
                        <th key={h} style={{ padding: "8px 12px", textAlign: "left", fontWeight: 700, borderBottom: "2px solid #e5e7eb" }}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {items.map((p) => (
                      <tr key={p.id} style={{ borderBottom: "1px solid #f3f4f6" }}>
                        <td style={{ padding: "8px 12px", fontWeight: 600 }}>{p.name}</td>
                        <td style={{ padding: "8px 12px" }}>{p.category}</td>
                        <td style={{ padding: "8px 12px" }}>{p.stock}</td>
                        <td style={{ padding: "8px 12px" }}>{fmtDate(p.expiry)}</td>
                        <td style={{ padding: "8px 12px", fontWeight: 700, color: color === "red" ? "#dc2626" : color === "yellow" ? "#d97706" : "#16a34a" }}>
                          {daysUntil(p.expiry) <= 0 ? "EXPIRED" : `${daysUntil(p.expiry)} days`}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              )}
            </Card>
          ))}
        </div>
      )}

      {adjModal && (
        <Modal title={`Adjust Stock: ${adjModal.name}`} onClose={() => setAdjModal(null)}>
          <p style={{ color: "#6b7280", margin: "0 0 16px" }}>Current stock: <strong>{adjModal.stock}</strong> {adjModal.unit}</p>
          <Input label="Quantity Change (use + or - number)" type="number" value={adjQty} onChange={setAdjQty} placeholder="e.g. 50 or -10" />
          <Input label="Note (optional)" value={adjNote} onChange={setAdjNote} placeholder="Reason for adjustment" />
          <div style={{ display: "flex", justifyContent: "flex-end", gap: 10 }}>
            <Btn color="gray" onClick={() => setAdjModal(null)}>Cancel</Btn>
            <Btn color="success" onClick={adjust}>Apply Adjustment</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── CUSTOMERS ────────────────────────────────────────────────────────────────
function Customers({ data, setData }) {
  const toast = useToast();
  const [search, setSearch]   = useState("");
  const [modal, setModal]     = useState(null); // "add"|"edit"|"view"|"payment"
  const [form, setForm]       = useState({});
  const [payAmt, setPayAmt]   = useState("");
  const [payNote, setPayNote] = useState("");

  const filtered = data.customers.filter((c) =>
    c.name.toLowerCase().includes(search.toLowerCase()) || (c.phone||"").includes(search)
  );

  const save = () => {
    if (!form.name || !form.phone) return toast("Name aur phone zaroori hain!", "error");
    if (modal === "add") {
      setData((d) => ({ ...d, customers: [...d.customers, { ...form, id: Date.now(), balance: 0, totalPurchases: 0 }] }));
      toast(`✅ Customer "${form.name}" add ho gaya!`, "success");
    } else {
      setData((d) => ({ ...d, customers: d.customers.map((c) => c.id === form.id ? form : c) }));
      toast(`✅ Customer "${form.name}" update ho gaya!`, "success");
    }
    setModal(null);
  };

  const del = (id) => {
    if (!window.confirm("Customer delete karein?")) return;
    const c = data.customers.find((x) => x.id === id);
    setData((d) => ({ ...d, customers: d.customers.filter((c) => c.id !== id) }));
    toast(`🗑️ Customer "${c?.name}" delete ho gaya`, "warning");
  };

  const receivePayment = () => {
    if (!payAmt || +payAmt <= 0) return toast("Amount likhein!", "error");
    const pm = form._payMethod;
    if (!pm?.method) return toast("Payment method select karein!", "error");
    if (pm.method !== "cash" && (!pm.accountDesc || !pm.accountName))
      return toast("Account details likhein!", "error");
    const c = form;
    const amt = +payAmt;
    const pmDetail = pm.method !== "cash"
      ? ` | ${pm.label} — ${pm.accountDesc} (${pm.accountName})`
      : " | Cash";
    setData(d => ({
      ...d,
      customers: d.customers.map(x => x.id===c.id ? {...x, balance: (x.balance||0) + amt} : x),
      accounts: [...d.accounts, {
        id: Date.now(), date: new Date().toISOString().split("T")[0],
        type: "income", category: "Customer Payment",
        paymentMethod: pm.method, paymentDetail: pm.accountDesc, paymentName: pm.accountName,
        description: `Payment received — ${c.name}${pmDetail}${payNote ? ` | ${payNote}` : ""}`,
        amount: amt,
      }],
    }));
    toast(`✅ ${fmt(amt)} payment received (${pm.label}) from ${c.name}!`, "success");
    setPayAmt(""); setPayNote(""); setModal(null);
  };

  const custInvoices = (cid) => data.invoices.filter(i => String(i.customerId) === String(cid));

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
        <h2 style={{ margin:0, fontSize:22, fontWeight:800 }}>👥 Customer Management</h2>
        <Btn onClick={() => { setForm({ name:"", phone:"", email:"", address:"" }); setModal("add"); }}>+ Add Customer</Btn>
      </div>

      {/* Summary */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:16}}>
        <Card style={{background:"#dbeafe",boxShadow:"none",padding:"12px 16px"}}>
          <div style={{fontSize:12,color:"#1e40af",fontWeight:600}}>Total Customers</div>
          <div style={{fontSize:24,fontWeight:800,color:"#1d4ed8"}}>{data.customers.length}</div>
        </Card>
        <Card style={{background:"#fee2e2",boxShadow:"none",padding:"12px 16px"}}>
          <div style={{fontSize:12,color:"#991b1b",fontWeight:600}}>Total Receivable</div>
          <div style={{fontSize:18,fontWeight:800,color:"#dc2626"}}>
            {fmt(Math.abs(data.customers.filter(c=>c.balance<0).reduce((s,c)=>s+c.balance,0)))}
          </div>
        </Card>
        <Card style={{background:"#d1fae5",boxShadow:"none",padding:"12px 16px"}}>
          <div style={{fontSize:12,color:"#065f46",fontWeight:600}}>Total Revenue</div>
          <div style={{fontSize:18,fontWeight:800,color:"#16a34a"}}>
            {fmt(data.customers.reduce((s,c)=>s+(c.totalPurchases||0),0))}
          </div>
        </Card>
      </div>

      <Card>
        <input value={search} onChange={(e) => setSearch(e.target.value)}
          placeholder="🔍 Search customers..."
          style={{ width:"100%", padding:"10px 14px", border:"1px solid #d1d5db", borderRadius:8, fontSize:14, marginBottom:16, boxSizing:"border-box" }} />
        <div style={{overflowX:"auto"}}>
          <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
            <thead>
              <tr style={{ background:"#f8fafc" }}>
                {["Name","Phone","Balance","Total Purchases","Actions"].map((h) => (
                  <th key={h} style={{ padding:"10px 12px", textAlign:"left", fontWeight:700, borderBottom:"2px solid #e5e7eb", whiteSpace:"nowrap" }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filtered.map((c) => (
                <tr key={c.id} style={{ borderBottom:"1px solid #f3f4f6" }}>
                  <td style={{ padding:"9px 12px", fontWeight:700 }}>
                    {c.name}
                    {c.email && <div style={{fontSize:11,color:"#9ca3af",fontWeight:400}}>{c.email}</div>}
                  </td>
                  <td style={{ padding:"9px 12px", color:"#374151" }}>{c.phone}</td>
                  <td style={{ padding:"9px 12px", fontWeight:800,
                    color: c.balance < 0 ? "#dc2626" : c.balance > 0 ? "#16a34a" : "#9ca3af" }}>
                    {c.balance < 0 && <span style={{fontSize:10,background:"#fee2e2",color:"#dc2626",padding:"1px 6px",borderRadius:10,marginRight:4}}>OWED</span>}
                    {c.balance > 0 && <span style={{fontSize:10,background:"#d1fae5",color:"#065f46",padding:"1px 6px",borderRadius:10,marginRight:4}}>CREDIT</span>}
                    {fmt(Math.abs(c.balance||0))}
                  </td>
                  <td style={{ padding:"9px 12px" }}>{fmt(c.totalPurchases||0)}</td>
                  <td style={{ padding:"9px 12px" }}>
                    <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                      <Btn small color="primary" onClick={()=>{setForm({...c});setModal("view");}}>View</Btn>
                      <Btn small color="success" onClick={()=>{setForm({...c});setPayAmt("");setPayNote("");setModal("payment");}}>💰 Pay</Btn>
                      <Btn small onClick={()=>{setForm({...c});setModal("edit");}}>Edit</Btn>
                      <Btn small color="danger" onClick={()=>del(c.id)}>Del</Btn>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </Card>

      {/* Add/Edit Modal */}
      {(modal==="add"||modal==="edit") && (
        <Modal title={modal==="add"?"➕ Add Customer":"✏️ Edit Customer"} onClose={()=>setModal(null)}>
          <Input label="Full Name *" value={form.name||""} onChange={(v)=>setForm(f=>({...f,name:v}))} />
          <Input label="Phone *" value={form.phone||""} onChange={(v)=>setForm(f=>({...f,phone:v}))} />
          <Input label="Email" value={form.email||""} onChange={(v)=>setForm(f=>({...f,email:v}))} />
          <Input label="Address" value={form.address||""} onChange={(v)=>setForm(f=>({...f,address:v}))} />
          <div style={{display:"flex",justifyContent:"flex-end",gap:10}}>
            <Btn color="gray" onClick={()=>setModal(null)}>Cancel</Btn>
            <Btn onClick={save}>💾 Save</Btn>
          </div>
        </Modal>
      )}

      {/* View Modal */}
      {modal==="view" && (
        <Modal wide title={`👤 ${form.name}`} onClose={()=>setModal(null)}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
            {[["📞 Phone",form.phone],["📧 Email",form.email||"—"],["📍 Address",form.address||"—"]].map(([l,v])=>(
              <div key={l} style={{background:"#f8fafc",borderRadius:9,padding:"10px 14px"}}>
                <div style={{fontSize:12,color:"#6b7280"}}>{l}</div>
                <div style={{fontWeight:700,marginTop:2}}>{v}</div>
              </div>
            ))}
            <div style={{background: (form.balance||0)<0?"#fee2e2":"#d1fae5",borderRadius:9,padding:"10px 14px"}}>
              <div style={{fontSize:12,color:"#6b7280"}}>Balance</div>
              <div style={{fontWeight:800,fontSize:18,color:(form.balance||0)<0?"#dc2626":"#16a34a"}}>
                {(form.balance||0)<0?"⚠️ Owes: ":"✅ Credit: "}{fmt(Math.abs(form.balance||0))}
              </div>
            </div>
          </div>
          {/* Customer invoices */}
          <div style={{fontWeight:700,marginBottom:8}}>Invoice History</div>
          <div style={{overflowX:"auto",maxHeight:250,overflowY:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead><tr style={{background:"#f8fafc"}}>
                {["Invoice","Date","Total","Paid","Balance","Status"].map(h=>(
                  <th key={h} style={{padding:"7px 10px",textAlign:"left",fontWeight:700,borderBottom:"2px solid #e5e7eb"}}>{h}</th>
                ))}
              </tr></thead>
              <tbody>
                {custInvoices(form.id).map(inv=>(
                  <tr key={inv.id} style={{borderBottom:"1px solid #f3f4f6"}}>
                    <td style={{padding:"7px 10px",fontWeight:700,color:"#1d4ed8"}}>{inv.id}</td>
                    <td style={{padding:"7px 10px"}}>{inv.date}</td>
                    <td style={{padding:"7px 10px",fontWeight:700}}>{fmt(inv.total)}</td>
                    <td style={{padding:"7px 10px",color:"#16a34a"}}>{fmt(inv.paid)}</td>
                    <td style={{padding:"7px 10px",color:"#dc2626",fontWeight:700}}>{fmt(inv.total-inv.paid)}</td>
                    <td style={{padding:"7px 10px"}}>{badge(inv.status,{paid:"green",partial:"yellow",unpaid:"red"}[inv.status])}</td>
                  </tr>
                ))}
                {custInvoices(form.id).length===0 && <tr><td colSpan={6} style={{textAlign:"center",padding:20,color:"#9ca3af"}}>Koi invoice nahi</td></tr>}
              </tbody>
            </table>
          </div>
          <div style={{display:"flex",justifyContent:"flex-end",gap:10,marginTop:12}}>
            <Btn color="success" onClick={()=>{setPayAmt("");setPayNote("");setModal("payment");}}>💰 Receive Payment</Btn>
            <Btn color="gray" onClick={()=>setModal(null)}>Close</Btn>
          </div>
        </Modal>
      )}

      {/* Payment Modal */}
      {modal==="payment" && (
        <Modal title={`💰 Payment — ${form.name}`} onClose={()=>setModal(null)}>
          <div style={{background:(form.balance||0)<0?"#fee2e2":"#d1fae5",borderRadius:9,padding:"12px 16px",marginBottom:16}}>
            <div style={{fontSize:13,fontWeight:600,color:"#374151"}}>Current Balance</div>
            <div style={{fontWeight:800,fontSize:20,color:(form.balance||0)<0?"#dc2626":"#16a34a"}}>
              {(form.balance||0)<0?`Owes: ${fmt(Math.abs(form.balance||0))}`:`Credit: ${fmt(form.balance||0)}`}
            </div>
          </div>
          <div style={{marginBottom:12}}>
            <label style={{display:"block",fontSize:13,fontWeight:700,marginBottom:5}}>Payment Amount (Rs.) *</label>
            <input type="number" min="1" value={payAmt} onChange={e=>setPayAmt(e.target.value)}
              placeholder={`e.g. ${Math.abs(form.balance||0)||500}`}
              style={{width:"100%",padding:"11px 14px",border:"2px solid #1d4ed8",borderRadius:9,fontSize:16,outline:"none",fontWeight:700}}/>
          </div>
          {payAmt>0 && (
            <div style={{background:"#eff6ff",borderRadius:8,padding:"8px 14px",marginBottom:12,fontSize:13}}>
              After payment: <b style={{color:(form.balance||0)+Number(payAmt)>=0?"#16a34a":"#dc2626"}}>
                {fmt((form.balance||0)+Number(payAmt))}
              </b>
            </div>
          )}
          <PaymentMethodPicker value={form._payMethod} direction="receive"
            onChange={pm=>setForm(f=>({...f,_payMethod:pm}))} required />
          <div style={{marginBottom:14}}>
            <label style={{display:"block",fontSize:13,fontWeight:700,marginBottom:5}}>Note (optional)</label>
            <input value={payNote} onChange={e=>setPayNote(e.target.value)} placeholder="Additional note..."
              style={{width:"100%",padding:"9px 12px",border:"1.5px solid #d1d5db",borderRadius:8,fontSize:14,outline:"none"}}/>
          </div>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
            <Btn color="gray" onClick={()=>setModal(null)}>Cancel</Btn>
            <Btn color="success" onClick={receivePayment}>✅ Receive Payment</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── SMART PRODUCT SEARCH for Invoice ────────────────────────────────────────
function ProductSearchRow({ products, onAdd }) {
  const [query, setQuery]         = useState("");
  const [results, setResults]     = useState([]);
  const [selected, setSelected]   = useState(null);
  const [qty, setQty]             = useState("");
  const [showDrop, setShowDrop]   = useState(false);
  const [rowErr, setRowErr]       = useState("");

  // Live search as user types
  const handleQuery = (v) => {
    setQuery(v);
    setSelected(null);
    setQty("");
    if (v.trim().length === 0) { setResults([]); setShowDrop(false); return; }
    const hits = products.filter((p) =>
      p.name.toLowerCase().includes(v.toLowerCase()) ||
      (p.category || "").toLowerCase().includes(v.toLowerCase())
    );
    setResults(hits);
    setShowDrop(true);
  };

  const pickProduct = (p) => {
    setSelected(p);
    setQuery(p.name);
    setResults([]);
    setShowDrop(false);
    setQty("");
  };

  // Per-unit price of selected product
  const unitQty      = selected ? (selected.unitQty || 1) : 1;
  const packPrice    = selected ? selected.price : 0;
  const perUnitPrice = unitQty > 1 ? packPrice / unitQty : packPrice;

  // How many pieces entered → convert to packs for stock deduction, but bill by pieces
  const piecesEntered = parseFloat(qty) || 0;
  const lineTotal     = piecesEntered * perUnitPrice;

  const handleAdd = () => {
    if (!selected) return setRowErr("Pehle product select karein");
    if (!qty || piecesEntered <= 0) return setRowErr("Quantity zaroor likhein");
    setRowErr("");
    onAdd({
      productId    : String(selected.id),
      name         : selected.name,
      unit         : selected.unit || "pcs",
      unitQty      : unitQty,
      packPrice    : packPrice,
      perUnitPrice,
      qty          : piecesEntered,
      price        : perUnitPrice,
    });
    setSelected(null);
    setQuery("");
    setQty("");
  };

  return (
    <div style={{ marginBottom: 4 }}>
      <div style={{ display: "flex", gap: 8, alignItems: "flex-end", flexWrap: "wrap" }}>

        {/* ── Search Input + Dropdown ── */}
        <div style={{ flex: 2, minWidth: 220, position: "relative" }}>
          <label style={{ display: "block", fontSize: 12, fontWeight: 600, color: "#374151", marginBottom: 4 }}>
            🔍 Product Search (naam ya category likhein)
          </label>
          <input
            value={query}
            onChange={(e) => handleQuery(e.target.value)}
            onFocus={() => query && setShowDrop(results.length > 0)}
            placeholder="e.g. Paracetamol, Antibiotic..."
            style={{
              width: "100%", padding: "9px 12px",
              border: selected ? "2px solid #16a34a" : "2px solid #3b82f6",
              borderRadius: 9, fontSize: 14, boxSizing: "border-box", outline: "none",
              background: selected ? "#f0fdf4" : "#fff",
            }}
          />

          {/* Live dropdown */}
          {showDrop && results.length > 0 && (
            <div style={{
              position: "absolute", top: "100%", left: 0, right: 0, zIndex: 999,
              background: "#fff", border: "1px solid #d1d5db", borderRadius: 10,
              boxShadow: "0 8px 24px rgba(0,0,0,.12)", maxHeight: 240, overflowY: "auto",
              marginTop: 2,
            }}>
              {results.map((p) => {
                const uq = p.unitQty || 1;
                const pup = uq > 1 ? p.price / uq : p.price;
                const stockStatus = p.stock === 0 ? "#dc2626" : p.stock <= p.reorder ? "#d97706" : "#16a34a";
                return (
                  <div
                    key={p.id}
                    onClick={() => pickProduct(p)}
                    style={{
                      padding: "10px 14px", cursor: "pointer", borderBottom: "1px solid #f3f4f6",
                      display: "flex", justifyContent: "space-between", alignItems: "center",
                    }}
                    onMouseEnter={(e) => e.currentTarget.style.background = "#f0f9ff"}
                    onMouseLeave={(e) => e.currentTarget.style.background = "#fff"}
                  >
                    <div>
                      <div style={{ fontWeight: 700, fontSize: 14, color: "#111827" }}>{p.name}</div>
                      <div style={{ fontSize: 12, color: "#6b7280" }}>
                        {p.category} &nbsp;·&nbsp;
                        Pack: <strong>{fmt(p.price)}</strong>
                        {uq > 1 && <span style={{ color: "#1d4ed8" }}> &nbsp;·&nbsp; Per unit: Rs.{pup.toFixed(2)}</span>}
                        {uq > 1 && <span style={{ color: "#7c3aed" }}> ({uq} pcs/pack)</span>}
                      </div>
                    </div>
                    <div style={{ textAlign: "right", flexShrink: 0 }}>
                      <div style={{ fontSize: 12, color: stockStatus, fontWeight: 700 }}>
                        Stock: {p.stock} packs
                      </div>
                      {p.stock === 0 && <div style={{ fontSize: 11, color: "#dc2626" }}>Out of Stock</div>}
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* No results hint */}
          {showDrop && results.length === 0 && query.length > 0 && (
            <div style={{ position: "absolute", top: "100%", left: 0, right: 0, zIndex: 999, background: "#fff", border: "1px solid #d1d5db", borderRadius: 10, padding: "12px 14px", marginTop: 2 }}>
              <span style={{ color: "#6b7280", fontSize: 13 }}>❌ "{query}" se koi product nahi mila</span>
            </div>
          )}
        </div>

        {/* ── Quantity Input ── */}
        <div style={{ flex: 1, minWidth: 130 }}>
          <label style={{ display: "block", fontSize: 12, fontWeight: 600, color: "#374151", marginBottom: 4 }}>
            Quantity ({selected && unitQty > 1 ? "Pieces" : "Units"})
          </label>
          <input
            type="number" min="1"
            value={qty}
            onChange={(e) => setQty(e.target.value)}
            placeholder={selected && unitQty > 1 ? `e.g. 5 pieces` : "Qty"}
            disabled={!selected}
            style={{
              width: "100%", padding: "9px 12px",
              border: "1px solid #d1d5db", borderRadius: 9, fontSize: 14,
              boxSizing: "border-box", outline: "none",
              background: selected ? "#fff" : "#f9fafb",
              cursor: selected ? "text" : "not-allowed",
            }}
          />
        </div>

        {/* ── Add Button ── */}
        <div>
          <label style={{ display: "block", fontSize: 12, fontWeight: 600, color: "transparent", marginBottom: 4 }}>_</label>
          <Btn color="success" onClick={handleAdd} style={{ padding: "9px 20px" }}>+ Add</Btn>
        </div>
      </div>

      {/* ── Row Error ── */}
      {rowErr && <div style={{ color: "#dc2626", fontSize: 12, fontWeight: 600, marginTop: 4 }}>⚠️ {rowErr}</div>}

      {/* ── Live Price Preview ── */}
      {selected && (
        <div style={{ background: "#f0fdf4", border: "1px solid #86efac", borderRadius: 8, padding: "8px 14px", marginTop: 8, fontSize: 13, display: "flex", gap: 20, flexWrap: "wrap" }}>
          <span>✅ <strong>{selected.name}</strong></span>
          <span>Pack Price: <strong>{fmt(packPrice)}</strong></span>
          {unitQty > 1 && <span style={{ color: "#1d4ed8" }}>Per Piece: <strong>Rs. {perUnitPrice.toFixed(2)}</strong> ({unitQty} pcs/pack)</span>}
          {piecesEntered > 0 && (
            <span style={{ color: "#16a34a", fontWeight: 700 }}>
              {piecesEntered} {unitQty > 1 ? "pieces" : "units"} × Rs.{perUnitPrice.toFixed(2)} = <strong>{fmt(lineTotal)}</strong>
            </span>
          )}
        </div>
      )}
    </div>
  );
}

// ─── INVOICE RETURNS ──────────────────────────────────────────────────────────
function InvoiceReturns({ data, setData, currentUser }) {
  const toast = useToast();
  const [returnTab, setReturnTab] = useState("by_invoice"); // by_invoice | by_item
  const [modal, setModal]         = useState(null);
  
  // ── Return by Invoice state ──
  const [selInvoice, setSelInvoice] = useState("");
  const [retItems, setRetItems]     = useState([]);
  const [retReason, setRetReason]   = useState("");
  const [retCustomer, setRetCustomer] = useState("");

  // ── Return by Item state ──
  const [itemCust, setItemCust]     = useState("");
  const [itemProd, setItemProd]     = useState("");
  const [itemQty,  setItemQty]      = useState("");
  const [itemReason, setItemReason] = useState("");

  const returns = data.returns || [];

  // ── Load invoice items when invoice selected ──
  const loadInvoice = (invId) => {
    setSelInvoice(invId);
    setRetItems([]);
    setRetCustomer("");
    if (!invId) return;
    const inv = data.invoices.find(x => x.id === invId);
    if (!inv) return;
    setRetCustomer(inv.customerName);
    setRetItems(inv.items.map(i => ({ ...i, retQty: 0, maxQty: i.qty })));
  };

  // ── Save Return by Invoice ──
  const saveReturnByInvoice = () => {
    if (!selInvoice) return toast("Invoice select karein!", "error");
    const inv = data.invoices.find(x => x.id === selInvoice);
    if (!inv) return toast("Invoice nahi mili!", "error");
    const returning = retItems.filter(i => +i.retQty > 0);
    if (!returning.length) return toast("Kam az kam ek item ki return qty likhein!", "error");

    const retTotal = returning.reduce((s, i) => s + (+i.retQty * i.price), 0);
    const retId = `RET-${String((returns.length + 1)).padStart(3,"0")}`;

    const retRecord = {
      id: retId, date: new Date().toISOString().split("T")[0],
      type: "by_invoice", invoiceId: selInvoice,
      customerId: inv.customerId, customerName: inv.customerName,
      items: returning.map(i => ({...i, qty: +i.retQty})),
      total: retTotal, reason: retReason,
      createdBy: currentUser?.name || "System",
    };

    setData(d => ({
      ...d,
      returns: [...(d.returns||[]), retRecord],
      // Restore stock
      products: d.products.map(p => {
        const ri = returning.find(i => String(i.productId) === String(p.id));
        return ri ? {...p, stock: p.stock + +ri.retQty} : p;
      }),
      // Adjust customer balance
      customers: d.customers.map(c =>
        String(c.id) === String(inv.customerId)
          ? {...c, balance: c.balance + retTotal}
          : c
      ),
      // Add refund to accounts
      accounts: [...d.accounts, {
        id: Date.now(), date: retRecord.date, type: "expense",
        category: "Return/Refund",
        description: `${retId} - Return from ${inv.customerName} (${selInvoice})`,
        amount: retTotal,
      }],
    }));

    toast(`✅ ${retId} return processed! Rs. ${retTotal.toFixed(2)} refund`, "success");
    setSelInvoice(""); setRetItems([]); setRetReason(""); setRetCustomer("");
  };

  // ── Save Return by Item ──
  const saveReturnByItem = () => {
    if (!itemCust) return toast("Customer select karein!", "error");
    if (!itemProd) return toast("Product select karein!", "error");
    if (!itemQty || +itemQty <= 0) return toast("Qty likhein!", "error");

    const prod = data.products.find(p => String(p.id) === String(itemProd));
    const cust = data.customers.find(c => String(c.id) === String(itemCust));
    if (!prod || !cust) return toast("Product ya customer nahi mila!", "error");

    const retTotal = +itemQty * prod.price;
    const retId = `RET-${String((returns.length + 1)).padStart(3,"0")}`;

    const retRecord = {
      id: retId, date: new Date().toISOString().split("T")[0],
      type: "by_item", invoiceId: null,
      customerId: String(cust.id), customerName: cust.name,
      items: [{ productId: prod.id, name: prod.name, qty: +itemQty, price: prod.price, retQty: +itemQty }],
      total: retTotal, reason: itemReason,
      createdBy: currentUser?.name || "System",
    };

    setData(d => ({
      ...d,
      returns: [...(d.returns||[]), retRecord],
      products: d.products.map(p => String(p.id) === String(itemProd) ? {...p, stock: p.stock + +itemQty} : p),
      customers: d.customers.map(c => String(c.id) === String(itemCust) ? {...c, balance: c.balance + retTotal} : c),
      accounts: [...d.accounts, {
        id: Date.now(), date: retRecord.date, type: "expense",
        category: "Return/Refund",
        description: `${retId} - Item return: ${prod.name} x${itemQty} (${cust.name})`,
        amount: retTotal,
      }],
    }));

    toast(`✅ ${retId} return processed! ${prod.name} x${itemQty}`, "success");
    setItemCust(""); setItemProd(""); setItemQty(""); setItemReason("");
  };

  const COUNTER_SALE_ID = "counter";

  return (
    <div>
      {/* Sub tabs */}
      <div style={{display:"flex",gap:4,marginBottom:20,background:"#f8fafc",borderRadius:10,padding:4}}>
        {[
          {id:"by_invoice", label:"📄 Return By Invoice"},
          {id:"by_item",    label:"📦 Return By Item"},
        ].map(t => (
          <button key={t.id} onClick={()=>setReturnTab(t.id)} style={{
            flex:1, padding:"9px 0", fontWeight:700, fontSize:13,
            border:"none", borderRadius:8,
            background: returnTab===t.id ? "#fff" : "none",
            boxShadow: returnTab===t.id ? "0 1px 4px rgba(0,0,0,.1)" : "none",
            color: returnTab===t.id ? "#1d4ed8" : "#6b7280",
            cursor:"pointer", transition:"all 0.15s",
          }}>{t.label}</button>
        ))}
      </div>

      {/* ── Return By Invoice ── */}
      {returnTab === "by_invoice" && (
        <Card>
          <div style={{fontWeight:800,fontSize:15,marginBottom:16,color:"#1d4ed8"}}>📄 Return By Invoice</div>
          
          {/* Customer type */}
          <div style={{marginBottom:14}}>
            <label style={{display:"block",fontSize:13,fontWeight:700,color:"#374151",marginBottom:6}}>
              Customer Type *
            </label>
            <div style={{display:"flex",gap:10}}>
              <button
                onClick={()=>{setRetCustomer("Counter Sale"); setSelInvoice(""); setRetItems([]);}}
                style={{padding:"8px 18px",borderRadius:8,fontWeight:700,fontSize:13,
                  border: retCustomer==="Counter Sale" ? "2px solid #1d4ed8" : "2px solid #e5e7eb",
                  background: retCustomer==="Counter Sale" ? "#dbeafe" : "#fff",
                  color: retCustomer==="Counter Sale" ? "#1d4ed8" : "#374151",cursor:"pointer"}}>
                🏪 Counter Sale
              </button>
              <button
                onClick={()=>{setRetCustomer("relation"); setSelInvoice(""); setRetItems([]);}}
                style={{padding:"8px 18px",borderRadius:8,fontWeight:700,fontSize:13,
                  border: retCustomer==="relation" ? "2px solid #16a34a" : "2px solid #e5e7eb",
                  background: retCustomer==="relation" ? "#d1fae5" : "#fff",
                  color: retCustomer==="relation" ? "#16a34a" : "#374151",cursor:"pointer"}}>
                👥 Relation Customer
              </button>
            </div>
          </div>

          {/* Invoice select */}
          {retCustomer && (
            <div style={{marginBottom:14}}>
              <label style={{display:"block",fontSize:13,fontWeight:700,color:"#374151",marginBottom:6}}>
                Invoice Select * {retCustomer==="Counter Sale" ? "(Counter Sale invoices)" : "(Relation customer invoices)"}
              </label>
              <select value={selInvoice} onChange={e=>loadInvoice(e.target.value)}
                style={{width:"100%",padding:"9px 12px",border:"1.5px solid #d1d5db",borderRadius:8,fontSize:14,outline:"none"}}>
                <option value="">-- Invoice Select Karein --</option>
                {data.invoices
                  .filter(inv => retCustomer === "Counter Sale"
                    ? inv.customerName === "Counter Sale" || inv.customerId === "counter"
                    : inv.customerName !== "Counter Sale" && inv.customerId !== "counter"
                  )
                  .map(inv => (
                    <option key={inv.id} value={inv.id}>
                      {inv.id} — {inv.customerName} — {fmt(inv.total)} — {inv.date}

                  ))
                }
              </select>
            </div>
          )}

          {/* Items table */}
          {retItems.length > 0 && (
            <div style={{marginBottom:14}}>
              <div style={{fontWeight:700,fontSize:13,marginBottom:8,color:"#374151"}}>Return Qty likhein:</div>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                <thead>
                  <tr style={{background:"#f8fafc"}}>
                    {["Product","Sale Qty","Price","Return Qty","Return Amt"].map(h=>(
                      <th key={h} style={{padding:"8px 10px",textAlign:"left",fontWeight:700,borderBottom:"2px solid #e5e7eb"}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {retItems.map((item,i) => (
                    <tr key={i} style={{borderBottom:"1px solid #f3f4f6"}}>
                      <td style={{padding:"8px 10px",fontWeight:600}}>{item.name}</td>
                      <td style={{padding:"8px 10px"}}>{item.maxQty}</td>
                      <td style={{padding:"8px 10px"}}>{fmt(item.price)}</td>
                      <td style={{padding:"8px 10px"}}>
                        <input type="number" min="0" max={item.maxQty}
                          value={item.retQty||""}
                          onChange={e=>{
                            const v = Math.min(+e.target.value, item.maxQty);
                            setRetItems(ri=>ri.map((r,j)=>j===i?{...r,retQty:v}:r));

                        />
                      </td>
                      <td style={{padding:"8px 10px",fontWeight:700,color:"#dc2626"}}>
                        {fmt((item.retQty||0)*item.price)}

                </tbody>
              </table>
              <div style={{marginTop:8,fontWeight:800,fontSize:14,color:"#dc2626",textAlign:"right"}}>
                Total Refund: {fmt(retItems.reduce((s,i)=>s+(+i.retQty||0)*i.price,0))}
              </div>
            </div>
          )}

          {selInvoice && (
            <div style={{marginBottom:14}}>
              <label style={{display:"block",fontSize:13,fontWeight:700,color:"#374151",marginBottom:6}}>Return Reason</label>
              <input value={retReason} onChange={e=>setRetReason(e.target.value)}
                placeholder="e.g. Damaged product, Wrong item..."
                style={{width:"100%",padding:"9px 12px",border:"1.5px solid #d1d5db",borderRadius:8,fontSize:14,outline:"none"}}/>
            </div>
          )}

          {selInvoice && retItems.length > 0 && (
            <Btn color="danger" onClick={saveReturnByInvoice}>↩️ Process Return</Btn>
          )}
        </Card>
      )}

      {/* ── Return By Item ── */}
      {returnTab === "by_item" && (
        <Card>
          <div style={{fontWeight:800,fontSize:15,marginBottom:16,color:"#1d4ed8"}}>📦 Return By Item</div>
          
          {/* Customer select - Counter or Relation */}
          <div style={{marginBottom:14}}>
            <label style={{display:"block",fontSize:13,fontWeight:700,color:"#374151",marginBottom:6}}>
              Customer * (Counter Sale ya Relation Customer)
            </label>
            <select value={itemCust} onChange={e=>setItemCust(e.target.value)}
              style={{width:"100%",padding:"9px 12px",border:"1.5px solid #d1d5db",borderRadius:8,fontSize:14,outline:"none"}}>
              <option value="">-- Customer Select Karein --</option>
              <option value="counter">🏪 Counter Sale</option>
              {data.customers.map(c=>(
                <option key={c.id} value={c.id}>👥 {c.name} — {c.phone}</option>
              ))}
            </select>
          </div>

          {itemCust && (
            <>
              <div style={{marginBottom:14}}>
                <label style={{display:"block",fontSize:13,fontWeight:700,color:"#374151",marginBottom:6}}>Product *</label>
                <select value={itemProd} onChange={e=>setItemProd(e.target.value)}
                  style={{width:"100%",padding:"9px 12px",border:"1.5px solid #d1d5db",borderRadius:8,fontSize:14,outline:"none"}}>
                  <option value="">-- Product Select Karein --</option>
                  {data.products.map(p=>(
                    <option key={p.id} value={p.id}>{p.name} — Stock: {p.stock} — {fmt(p.price)}</option>
                  ))}

              </div>

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 16px"}}>

                  <label style={{display:"block",fontSize:13,fontWeight:700,color:"#374151",marginBottom:6}}>Return Qty *</label>
                  <input type="number" min="1" value={itemQty} onChange={e=>setItemQty(e.target.value)}

                    style={{width:"100%",padding:"9px 12px",border:"1.5px solid #d1d5db",borderRadius:8,fontSize:14,outline:"none"}}/>
                </div>
                <div style={{marginBottom:14}}>
                  <label style={{display:"block",fontSize:13,fontWeight:700,color:"#374151",marginBottom:6}}>Return Amount</label>

      )}

      {/* ── Returns History ── */}
      {returns.length > 0 && (
        <Card style={{marginTop:16}}>
          <div style={{fontWeight:800,fontSize:15,marginBottom:12}}>📋 Returns History</div>
          <div className="tbl-wrap" style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead>
                <tr style={{background:"#fef2f2"}}>
                  {["Return #","Date","Type","Customer","Invoice","Items","Total Refund","Reason"].map(h=>(
                    <th key={h} style={{padding:"8px 10px",textAlign:"left",fontWeight:700,borderBottom:"2px solid #fca5a5"}}>{h}</th>

              </thead>

                {[...returns].reverse().map(r=>(
                  <tr key={r.id} style={{borderBottom:"1px solid #fef2f2"}}>
                    <td style={{padding:"8px 10px",fontWeight:700,color:"#dc2626"}}>{r.id}</td>
                    <td style={{padding:"8px 10px"}}>{r.date}</td>
                    <td style={{padding:"8px 10px"}}>{r.type==="by_invoice"?"By Invoice":"By Item"}</td>

                    <td style={{padding:"8px 10px",color:"#1d4ed8"}}>{r.invoiceId||"—"}</td>
                    <td style={{padding:"8px 10px"}}>{r.items?.map(i=>`${i.name} x${i.qty||i.retQty}`).join(", ")}</td>
                    <td style={{padding:"8px 10px",fontWeight:700,color:"#dc2626"}}>{fmt(r.total)}</td>
                    <td style={{padding:"8px 10px",color:"#6b7280"}}>{r.reason||"—"}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </Card>
      )}
    </div>
  );
}

function Invoices({ data, setData, settings = { pharmacy: {}, app: {} }, currentUser = {} }) {
  const toast = useToast();
  const [tab, setTab]           = useState("invoices");
  const [modal, setModal]       = useState(null);
  const [viewInv, setViewInv]   = useState(null);
  const [payInv, setPayInv]     = useState(null);
  const [invPayAmt, setInvPayAmt]       = useState("");
  const [invPayMethod, setInvPayMethod] = useState(null);
  const [saleTypeModal, setSaleTypeModal] = useState(false); // ask counter vs customer first
  const [form, setForm]       = useState({ customerId: "", items: [], discount: 0, discountPct: 0, discountType: "amount", tax: 0, paid: 0 });

  const addItemToForm = (item) => {
    const newItem = { ...item, productId: String(item.productId) };
    setForm((f) => ({
      ...f,
      items: [
        ...f.items.filter((i) => String(i.productId) !== String(newItem.productId)),
        newItem,
      ],
    }));
  };

  const updateQty = (productId, newQty) => {
    setForm((f) => ({
      ...f,
      items: f.items.map((i) =>
        String(i.productId) === String(productId)
          ? { ...i, qty: parseFloat(newQty) || 0 }
          : i
      ),
    }));
  };

  const subtotal    = form.items.reduce((s, i) => s + i.qty * i.price, 0);
  const discountAmt = form.discountType==="pct"
    ? (subtotal * (+form.discountPct||0) / 100)
    : (+form.discount||0);
  const total = subtotal - discountAmt + (+form.tax / 100) * subtotal;

  const saveInvoice = () => {
    const isCounter = form._saleType === "counter" || form.customerId === "counter";
    const cid = String(form.customerId);
    const c = isCounter
      ? { id:"counter", name:"Counter Sale", balance:0, totalPurchases:0 }
      : data.customers.find((x) => String(x.id) === cid);
    if (!c) return toast("Pehle customer select karein", "error");
    if (form.items.length === 0) return toast("Kam az kam ek product add karein", "error");

    // Payment method validation
    const pm = form._payMethod;
    if (!pm?.method) return toast("Payment method select karein!", "error");
    if (pm.method !== "cash" && (!pm.accountDesc || !pm.accountName))
      return toast("Payment account details likhein!", "error");

    const paidAmt    = parseFloat(form.paid) || 0;
    const discAmt    = form.discountType==="pct" ? (subtotal*(+form.discountPct||0)/100) : (parseFloat(form.discount)||0);
    const taxPct     = parseFloat(form.tax) || 0;
    const finalTotal = subtotal - discAmt + (taxPct / 100) * subtotal;

    const pmDetail = pm.method !== "cash"
      ? ` | ${pm.label} — ${pm.accountDesc} (${pm.accountName})`
      : " | Cash";

    const inv = {
      id          : `INV-${String(data.invoices.length + 1).padStart(3, "0")}`,
      date        : new Date().toISOString().split("T")[0],
      customerId  : isCounter ? "counter" : cid,
      customerName: isCounter ? "Counter Sale" : c.name,
      saleType    : form._saleType || "customer",
      items       : form.items,
      subtotal,
      discount    : discAmt,
      discountPct : form.discountType==="pct" ? +form.discountPct : 0,
      discountType: form.discountType||"amount",
      tax         : taxPct,
      total       : finalTotal,
      paid        : paidAmt,
      status      : paidAmt >= finalTotal ? "paid" : paidAmt > 0 ? "partial" : "unpaid",
      paymentMethod: pm.method, paymentDetail: pm.accountDesc||"", paymentName: pm.accountName||"",
      createdBy   : currentUser.name || currentUser.username || "System",
    };

    setData((d) => ({
      ...d,
      invoices: [...d.invoices, inv],
      products: d.products.map((p) => {
        const item = form.items.find((i) => String(i.productId) === String(p.id));
        if (!item) return p;
        const packsUsed = (item.unitQty||1)>1 ? item.qty/item.unitQty : item.qty;
        return { ...p, stock: Math.max(0, p.stock - packsUsed) };
      }),
      customers: isCounter ? d.customers : d.customers.map((cu) =>
        String(cu.id) === cid
          ? { ...cu, balance: cu.balance - (finalTotal - paidAmt), totalPurchases: (cu.totalPurchases||0) + finalTotal }
          : cu
      ),
      accounts: [...d.accounts, {
        id: Date.now(), date: inv.date, type: "income", category: isCounter?"Counter Sale":"Sales",
        paymentMethod: pm.method, paymentDetail: pm.accountDesc||"", paymentName: pm.accountName||"",
        description: `${inv.id} - ${isCounter?"Counter Sale":c.name}${pmDetail}`,
        amount: paidAmt,
      }],
    }));
    setModal(null);
    setForm({ customerId:"", items:[], discount:0, discountPct:0, discountType:"amount", tax:0, paid:0, _payMethod:null });
    toast(`✅ Invoice ${inv.id} — ${isCounter?"Counter Sale":c.name} — ${fmt(finalTotal)}`, "success");
    setViewInv(inv);
  };

  const statusColors = { paid: "green", partial: "yellow", unpaid: "red" };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <h2 style={{ margin: 0, fontSize: 22, fontWeight: 800 }}>🧾 Invoice Management</h2>
        {tab === "invoices" && <Btn onClick={() => setSaleTypeModal(true)}>+ New Invoice</Btn>}
      </div>

      {/* ── Tabs ── */}
      <div style={{ display:"flex", gap:4, marginBottom:16, borderBottom:"2px solid #e5e7eb", paddingBottom:0 }}>
        {[
          { id:"invoices", label:"🧾 Invoices" },
          { id:"returns",  label:"↩️ Returns"  },
        ].map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{
            padding:"9px 22px", fontWeight:700, fontSize:14, border:"none",
            borderBottom: tab===t.id ? "3px solid #1d4ed8" : "3px solid transparent",
            background:"none", cursor:"pointer",
            color: tab===t.id ? "#1d4ed8" : "#6b7280",
            transition:"all 0.15s",
          }}>{t.label}</button>
        ))}
      </div>

      {/* ── Invoices Tab ── */}
      {tab === "invoices" && (
      <Card>
        <div className="tbl-wrap" style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 14 }}>
            <thead>
              <tr style={{ background: "#f8fafc" }}>
                {["Invoice #", "Date", "Customer", "Total", "Paid", "Balance", "Status", "Actions"].map((h) => (
                  <th key={h} style={{ padding: "10px 12px", textAlign: "left", fontWeight: 700, borderBottom: "2px solid #e5e7eb" }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {data.invoices.map((inv) => (
                <tr key={inv.id} style={{ borderBottom: "1px solid #f3f4f6" }}>
                  <td style={{ padding: "10px 12px", fontWeight: 700, color: "#1d4ed8" }}>{inv.id}</td>
                  <td style={{ padding: "10px 12px" }}>{fmtDate(inv.date)}</td>
                  <td style={{ padding: "10px 12px", fontWeight: 600 }}>{inv.customerName}</td>
                  <td style={{ padding: "10px 12px", fontWeight: 700 }}>{fmt(inv.total)}</td>
                  <td style={{ padding: "10px 12px", color: "#16a34a", fontWeight: 700 }}>{fmt(inv.paid)}</td>
                  <td style={{ padding: "10px 12px", color: "#dc2626", fontWeight: 700 }}>{fmt(inv.total - inv.paid)}</td>
                  <td style={{ padding: "10px 12px" }}>{badge(inv.status, statusColors[inv.status])}</td>
                  <td style={{ padding:"8px 10px" }}>
                    <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                      <Btn small onClick={() => setViewInv(inv)}>View</Btn>
                      {(inv.status==="unpaid"||inv.status==="partial") && (
                        <Btn small color="success" onClick={()=>setPayInv(inv)}>💰 Pay</Btn>
                      )}
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </Card>
      )}

      {/* ── Returns Tab ── */}
      {tab === "returns" && <InvoiceReturns data={data} setData={setData} currentUser={currentUser} />}

      {/* ── NEW INVOICE MODAL ── */}
      {modal === "new" && (
        <Modal wide title="🧾 Create New Invoice" onClose={() => setModal(null)}>
          <Select
            label="Customer *"
            value={form.customerId}
            onChange={(v) => setForm((f) => ({ ...f, customerId: v }))}
            options={[{ value: "", label: "-- Customer Select Karein --" }, ...data.customers.map((c) => ({ value: String(c.id), label: `${c.name} (${c.phone})` }))]}
          />

          {/* ── Smart Product Search ── */}
          <div style={{ border: "1.5px solid #bfdbfe", borderRadius: 12, padding: "14px 14px 10px", marginBottom: 14, background: "#f8faff" }}>
            <p style={{ margin: "0 0 12px", fontWeight: 700, fontSize: 14, color: "#1e40af" }}>
              💊 Products Add Karein
            </p>
            <ProductSearchRow products={data.products} onAdd={addItemToForm} />

            {/* ── Added Items Table ── */}
            {form.items.length > 0 && (
              <div style={{ marginTop: 14 }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: "#374151", marginBottom: 8 }}>📋 Added Items:</div>
                <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                  <thead>
                    <tr style={{ background: "#e0e7ff" }}>
                      <th style={{ padding: "7px 10px", textAlign: "left", fontWeight: 700, borderRadius: "6px 0 0 6px" }}>Product</th>
                      <th style={{ padding: "7px 8px", textAlign: "center", fontWeight: 700 }}>Pack Info</th>
                      <th style={{ padding: "7px 8px", textAlign: "center", fontWeight: 700 }}>Qty (pcs)</th>
                      <th style={{ padding: "7px 8px", textAlign: "center", fontWeight: 700 }}>Rate/pc</th>
                      <th style={{ padding: "7px 8px", textAlign: "center", fontWeight: 700 }}>Amount</th>
                      <th style={{ padding: "7px 8px", textAlign: "center" }}></th>
                    </tr>
                  </thead>
                  <tbody>
                    {form.items.map((item) => (
                      <tr key={item.productId} style={{ borderBottom: "1px solid #e0e7ff" }}>
                        <td style={{ padding: "8px 10px", fontWeight: 600 }}>{item.name}</td>
                        <td style={{ padding: "8px 8px", textAlign: "center" }}>
                          {item.unitQty > 1
                            ? <span style={{ fontSize: 11, background: "#ede9fe", color: "#7c3aed", padding: "2px 7px", borderRadius: 6, fontWeight: 700 }}>
                                {item.unitQty} pcs · {fmt(item.packPrice)}
                              </span>
                            : <span style={{ fontSize: 11, color: "#6b7280" }}>Single unit</span>}
                        </td>
                        <td style={{ padding: "8px 8px", textAlign: "center" }}>
                          <input
                            type="number" min="1"
                            value={item.qty}
                            onChange={(e) => updateQty(item.productId, e.target.value)}
                            style={{ width: 60, padding: "4px 8px", border: "1px solid #d1d5db", borderRadius: 6, textAlign: "center", fontSize: 13, fontWeight: 700 }}
                          />
                        </td>
                        <td style={{ padding: "8px 8px", textAlign: "center", color: "#1d4ed8", fontWeight: 700 }}>
                          Rs.{(item.perUnitPrice || item.price).toFixed(2)}
                        </td>
                        <td style={{ padding: "8px 8px", textAlign: "center", fontWeight: 800, color: "#16a34a" }}>
                          {fmt(item.qty * (item.perUnitPrice || item.price))}
                        </td>
                        <td style={{ padding: "8px 8px", textAlign: "center" }}>
                          <button
                            onClick={() => setForm((f) => ({ ...f, items: f.items.filter((i) => String(i.productId) !== String(item.productId)) }))}
                            style={{ background: "#fee2e2", border: "none", color: "#dc2626", cursor: "pointer", borderRadius: 6, padding: "3px 8px", fontSize: 14, fontWeight: 700 }}
                          >✕</button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>

          {/* ── Discount / Tax / Paid ── */}
          <div style={{ display: "grid", gridTemplateColumns: "1.5fr 1fr 1fr", gap: 10 }}>
            {/* Discount — toggle between Amount and Percentage */}
            <div>
              <label style={{display:"block",fontSize:13,fontWeight:600,color:"#374151",marginBottom:5}}>
                Discount
                <span style={{marginLeft:8}}>
                  <button onClick={()=>setForm(f=>({...f,discountType:"amount"}))}
                    style={{padding:"2px 10px",borderRadius:20,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,
                      background:form.discountType!=="pct"?"#1d4ed8":"#e5e7eb",
                      color:form.discountType!=="pct"?"#fff":"#374151"}}>Rs.</button>
                  <button onClick={()=>setForm(f=>({...f,discountType:"pct"}))}
                    style={{padding:"2px 10px",borderRadius:20,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,marginLeft:4,
                      background:form.discountType==="pct"?"#1d4ed8":"#e5e7eb",
                      color:form.discountType==="pct"?"#fff":"#374151"}}>%</button>
                </span>
              </label>
              {form.discountType==="pct" ? (
                <div>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <input type="number" min="0" max="100" value={form.discountPct||""}
                      onChange={e=>{
                        const pct = Math.min(100, Math.max(0, +e.target.value||0));
                        const amt = subtotal > 0 ? (subtotal * pct / 100) : 0;
                        setForm(f=>({...f, discountPct: e.target.value, discount: amt.toFixed(2)}));
                      }}
                      placeholder="0–100"
                      style={{width:90,padding:"9px 12px",border:"2px solid #1d4ed8",borderRadius:9,fontSize:15,outline:"none",fontWeight:700,textAlign:"center"}}/>
                    <span style={{fontSize:18,fontWeight:900,color:"#6b7280"}}>%</span>
                  </div>
                  {subtotal>0 && (+form.discountPct||0)>0 && (
                    <div style={{marginTop:6,padding:"7px 12px",background:"#fee2e2",borderRadius:8,fontSize:13,fontWeight:700,color:"#dc2626"}}>
                      ✂️ Deduction: Rs. {(subtotal*(+form.discountPct||0)/100).toFixed(0)} will be deducted
                    </div>
                  )}
                </div>
              ) : (
                <input type="number" min="0" value={form.discount||""}
                  onChange={e=>setForm(f=>({...f,discount:e.target.value}))}
                  placeholder="e.g. 50"
                  style={{width:"100%",padding:"9px 12px",border:"1.5px solid #d1d5db",borderRadius:9,fontSize:14,outline:"none",boxSizing:"border-box"}}/>
              )}
            </div>
            <Input label="Tax (%)" type="number" value={form.tax} onChange={(v) => setForm((f) => ({ ...f, tax: v }))} />
            <Input label="Amount Paid (Rs.)" type="number" value={form.paid} onChange={(v) => setForm((f) => ({ ...f, paid: v }))} />
          </div>

          {/* ── Totals ── */}
          <div style={{ background:"#f0fdf4", border:"2px solid #86efac", borderRadius:12, padding:"14px 16px", marginBottom:14, fontSize:14 }}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <span style={{color:"#374151"}}>Subtotal:</span>
              <strong>{fmt(subtotal)}</strong>
            </div>
            {discountAmt>0 && (
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6,
                background:"#fee2e2",borderRadius:8,padding:"6px 10px",margin:"0 -4px 6px -4px"}}>
                <span style={{color:"#dc2626",fontWeight:700}}>
                  ✂️ Discount{form.discountType==="pct"?` (${form.discountPct}%)`:""}:
                </span>
                <strong style={{color:"#dc2626"}}>− {fmt(discountAmt)}</strong>
              </div>
            )}
            {+form.tax>0 && (
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                <span style={{color:"#d97706"}}>Tax ({form.tax}%):</span>
                <strong style={{color:"#d97706"}}>+ {fmt((+form.tax/100)*subtotal)}</strong>
              </div>
            )}
            <div style={{display:"flex",justifyContent:"space-between",
              background:"#1d4ed8",borderRadius:9,padding:"10px 14px",margin:"4px -4px 0 -4px"}}>
              <span style={{fontWeight:800,color:"#fff",fontSize:16}}>NET TOTAL:</span>
              <strong style={{color:"#fff",fontSize:18}}>{fmt(total)}</strong>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",marginTop:8,fontSize:13}}>
              <span style={{color:"#16a34a",fontWeight:700}}>✅ Paid: {fmt(+form.paid||0)}</span>
              <span style={{color:total-(+form.paid||0)>0?"#dc2626":"#16a34a",fontWeight:700}}>
                {total-(+form.paid||0)>0?"⚠️ Balance:":"✅ Clear:"} {fmt(Math.abs(total-(+form.paid||0)))}
              </span>
            </div>
          </div>

          <PaymentMethodPicker
            value={form._payMethod}
            direction="receive"
            onChange={pm=>setForm(f=>({...f,_payMethod:pm}))}
            required />

          <div style={{ display: "flex", justifyContent: "flex-end", gap: 10 }}>
            <Btn color="gray" onClick={() => setModal(null)}>Cancel</Btn>
            <Btn color="success" onClick={saveInvoice}>✅ Create Invoice</Btn>
          </div>
        </Modal>
      )}

      {/* ── VIEW / PRINT / DOWNLOAD INVOICE MODAL ── */}
      {viewInv && <InvoicePopup inv={viewInv} onClose={() => setViewInv(null)} settings={settings} />}

      {/* ── Sale Type Picker ── */}
      {saleTypeModal && (
        <Modal title="🧾 New Invoice — Sale Type" onClose={()=>setSaleTypeModal(false)}>
          <div style={{marginBottom:16,fontSize:13,color:"#6b7280"}}>Kaun sa sale hai?</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:8}}>
            <button onClick={()=>{
              setForm({customerId:"counter",items:[],discount:0,discountPct:0,discountType:"amount",tax:0,paid:0,_saleType:"counter",_payMethod:null});
              setSaleTypeModal(false); setModal("new");
            }} style={{padding:"20px 16px",borderRadius:12,border:"2px solid #1d4ed8",
              background:"#eff6ff",cursor:"pointer",textAlign:"center"}}>
              <div style={{fontSize:36,marginBottom:8}}>🏪</div>
              <div style={{fontWeight:800,fontSize:15,color:"#1d4ed8"}}>Counter Sale</div>
              <div style={{fontSize:12,color:"#6b7280",marginTop:4}}>Walk-in customer — cash ya other</div>
            </button>
            <button onClick={()=>{
              setForm({customerId:"",items:[],discount:0,discountPct:0,discountType:"amount",tax:0,paid:0,_saleType:"customer",_payMethod:null});
              setSaleTypeModal(false); setModal("new");
            }} style={{padding:"20px 16px",borderRadius:12,border:"2px solid #16a34a",
              background:"#f0fdf4",cursor:"pointer",textAlign:"center"}}>
              <div style={{fontSize:36,marginBottom:8}}>👥</div>
              <div style={{fontWeight:800,fontSize:15,color:"#16a34a"}}>Relation Customer</div>
              <div style={{fontSize:12,color:"#6b7280",marginTop:4}}>Registered customer — account update hoga</div>
            </button>
          </div>
        </Modal>
      )}

      {/* ── Invoice Payment Modal ── */}
      {payInv && (
        <Modal title={`💰 Pay Invoice — ${payInv.id}`} onClose={()=>{setPayInv(null);setInvPayAmt("");setInvPayMethod(null);}}>
          <div style={{background:"#fef3c7",borderRadius:9,padding:"12px 16px",marginBottom:16}}>
            <div style={{fontSize:13,fontWeight:600}}>Customer: <b>{payInv.customerName}</b></div>
            <div style={{display:"flex",justifyContent:"space-between",marginTop:8}}>
              <span>Invoice Total: <b>{fmt(payInv.total)}</b></span>
              <span>Already Paid: <b style={{color:"#16a34a"}}>{fmt(payInv.paid)}</b></span>
            </div>
            <div style={{fontWeight:800,fontSize:16,color:"#dc2626",marginTop:6}}>
              Remaining: {fmt(payInv.total - payInv.paid)}
            </div>
          </div>
          <div style={{marginBottom:12}}>
            <label style={{display:"block",fontSize:13,fontWeight:700,marginBottom:5}}>Payment Amount *</label>
            <input type="number" min="1" max={payInv.total-payInv.paid}
              value={invPayAmt} onChange={e=>setInvPayAmt(e.target.value)}
              placeholder={`Max: ${fmt(payInv.total-payInv.paid)}`}
              style={{width:"100%",padding:"11px 14px",border:"2px solid #16a34a",borderRadius:9,fontSize:16,fontWeight:700,outline:"none"}}/>
            <div style={{display:"flex",gap:8,marginTop:8}}>
              <button onClick={()=>setInvPayAmt(String(payInv.total-payInv.paid))}
                style={{padding:"5px 12px",background:"#d1fae5",color:"#065f46",border:"1px solid #86efac",borderRadius:7,cursor:"pointer",fontWeight:700,fontSize:12}}>
                Full Amount
              </button>
            </div>
          </div>
          {invPayAmt>0 && (
            <div style={{background:"#eff6ff",borderRadius:8,padding:"8px 14px",marginBottom:4,fontSize:13}}>
              New status: <b style={{color:(payInv.paid+Number(invPayAmt))>=payInv.total?"#16a34a":"#d97706"}}>
                {(payInv.paid+Number(invPayAmt))>=payInv.total?"✅ PAID":"⏳ PARTIAL"}
              </b> — Balance: <b>{fmt(Math.max(0, payInv.total-payInv.paid-Number(invPayAmt)))}</b>
            </div>
          )}
          <PaymentMethodPicker value={invPayMethod} direction="receive"
            onChange={pm=>setInvPayMethod(pm)} required />
          <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
            <Btn color="gray" onClick={()=>{setPayInv(null);setInvPayAmt("");setInvPayMethod(null);}}>Cancel</Btn>
            <Btn color="success" onClick={()=>{
              if(!invPayAmt||+invPayAmt<=0) return toast("Amount likhein!","error");
              if(!invPayMethod?.method) return toast("Payment method select karein!","error");
              if(invPayMethod.method!=="cash"&&(!invPayMethod.accountDesc||!invPayMethod.accountName))
                return toast("Account details likhein!","error");
              const amt = Math.min(+invPayAmt, payInv.total-payInv.paid);
              const newPaid = payInv.paid + amt;
              const newStatus = newPaid >= payInv.total ? "paid" : "partial";
              const pmDetail = invPayMethod.method!=="cash"
                ? ` | ${invPayMethod.label} — ${invPayMethod.accountDesc} (${invPayMethod.accountName})`
                : " | Cash";
              setData(d=>({
                ...d,
                invoices: d.invoices.map(i=>i.id===payInv.id ? {...i,paid:newPaid,status:newStatus} : i),
                customers: d.customers.map(c=>String(c.id)===String(payInv.customerId)
                  ? {...c, balance:(c.balance||0)+amt} : c),
                accounts: [...d.accounts, {
                  id:Date.now(), date:new Date().toISOString().split("T")[0],
                  type:"income", category:"Invoice Payment",
                  paymentMethod:invPayMethod.method,
                  paymentDetail:invPayMethod.accountDesc,
                  paymentName:invPayMethod.accountName,
                  description:`${payInv.id} payment — ${payInv.customerName}${pmDetail}`,
                  amount:amt,
                }],
              }));
              toast(`✅ ${fmt(amt)} received (${invPayMethod.label})! Invoice ${newStatus==="paid"?"fully paid":"partially paid"}`, "success");
              setPayInv(null); setInvPayAmt(""); setInvPayMethod(null);
            }}>✅ Confirm Payment</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}


// ─── INVOICE POPUP (View + Print Sizes + PDF Download) ───────────────────────
function InvoicePopup({ inv, onClose, settings = { pharmacy: {}, app: {} } }) {
  const [printSize, setPrintSize] = useState(settings.app.defaultPrintSize || "a4");
  const [showSizes, setShowSizes] = useState(false);
  const [printing, setPrinting]   = useState(false);
  const sizeRef = useRef(null);

  const ph = settings.pharmacy || {};
  const pharmName   = ph.name    || "PharmaPro";
  const pharmFooter = ph.footer  || "Thank you for your business!";
  const pharmAddr   = [ph.address, ph.city].filter(Boolean).join(", ");
  const pharmPhone  = [ph.phone, ph.mobile].filter(Boolean).join(" | ");

  const statusColor = { paid: "#16a34a", partial: "#d97706", unpaid: "#dc2626" };
  const statusBg    = { paid: "#d1fae5", partial: "#fef3c7", unpaid: "#fee2e2" };
  const taxAmt      = (inv.tax / 100) * inv.subtotal;
  const balance     = inv.total - inv.paid;

  // Close dropdown on outside click
  useEffect(() => {
    if (!showSizes) return;
    const handler = (e) => { if (sizeRef.current && !sizeRef.current.contains(e.target)) setShowSizes(false); };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, [showSizes]);

  const SIZES = {
    a4:        { label: "A4",           desc: "Standard paper" },
    a5:        { label: "A5",           desc: "Half page" },
    thermal80: { label: "Thermal 80mm", desc: "POS receipt printer" },
    thermal58: { label: "Thermal 58mm", desc: "Small POS printer" },
  };

  const buildHTML = (size) => {
    const isT58 = size === "thermal58";
    const isThm = size === "thermal80" || isT58;
    const pgW   = isT58 ? "58mm" : isThm ? "80mm" : size === "a5" ? "148mm" : "210mm";
    const fsize = isT58 ? "10px" : isThm ? "12px" : "13px";

    const rows = inv.items.map((i) => {
      const rate   = i.perUnitPrice || i.price;
      const amount = i.qty * rate;
      if (isThm) return `
        <div style="border-bottom:1px dashed #ccc;padding:4px 0;margin-bottom:4px">
          <div style="font-weight:bold">${i.name}</div>
          ${i.unitQty > 1 ? `<div style="font-size:${isT58?"9px":"10px"};color:#555">${i.unitQty}pcs/pk Rs.${Number(i.packPrice).toFixed(2)}/pk</div>` : ""}
          <div style="display:flex;justify-content:space-between">
            <span>${i.qty}${i.unitQty > 1 ? "pcs" : (i.unit||"")} x Rs.${Number(rate).toFixed(2)}</span>
            <strong>Rs.${Number(amount).toFixed(2)}</strong>
          </div>
        </div>`;
      return `<tr>
        <td style="padding:7px 8px;border-bottom:1px solid #f3f4f6;font-weight:600">
          ${i.name}${i.unitQty > 1 ? `<br><small style="color:#7c3aed;font-size:10px">${i.unitQty}pcs·Rs.${Number(i.packPrice).toFixed(2)}</small>` : ""}
        </td>
        <td style="padding:7px 8px;border-bottom:1px solid #f3f4f6;text-align:center">${i.qty} ${i.unitQty > 1 ? "pcs" : (i.unit||"")}</td>
        <td style="padding:7px 8px;border-bottom:1px solid #f3f4f6;text-align:right;color:#1d4ed8;font-weight:700">Rs.${Number(rate).toFixed(2)}</td>
        <td style="padding:7px 8px;border-bottom:1px solid #f3f4f6;text-align:right;font-weight:800;color:#16a34a">Rs.${Number(amount).toFixed(2)}</td>
      </tr>`;
    }).join("");

    if (isThm) return `<!DOCTYPE html><html><head><meta charset="UTF-8"/>
      <title>${inv.id}</title>
      <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Courier New',monospace;font-size:${fsize};width:${pgW};margin:0 auto;padding:3mm}
        @media print{@page{size:${pgW} auto;margin:1mm}body{width:${pgW}}}
      </style></head><body>
      <div style="text-align:center;font-weight:900;font-size:${isT58?"14px":"16px"};margin-bottom:2px">${pharmName}</div>
      ${pharmAddr ? `<div style="text-align:center;font-size:${isT58?"8px":"9px"};margin-bottom:1px">${pharmAddr}</div>` : ""}
      ${pharmPhone ? `<div style="text-align:center;font-size:${isT58?"8px":"9px"};margin-bottom:2px">${pharmPhone}</div>` : ""}
      ${ph.license ? `<div style="text-align:center;font-size:${isT58?"8px":"9px"};margin-bottom:2px">Lic: ${ph.license}</div>` : ""}
      <div style="border-bottom:1px dashed #000;margin:4px 0"></div>
      <div style="display:flex;justify-content:space-between"><span>Invoice:</span><strong>${inv.id}</strong></div>
      <div style="display:flex;justify-content:space-between"><span>Date:</span><span>${fmtDate(inv.date)}</span></div>
      <div style="display:flex;justify-content:space-between"><span>Customer:</span><span>${inv.customerName}</span></div>
      <div style="border-bottom:1px dashed #000;margin:4px 0"></div>
      ${rows}
      <div style="border-bottom:1px dashed #000;margin:4px 0"></div>
      ${inv.discount > 0 ? `<div style="display:flex;justify-content:space-between"><span>Discount</span><span>-Rs.${Number(inv.discount).toFixed(2)}</span></div>` : ""}
      ${inv.tax > 0 ? `<div style="display:flex;justify-content:space-between"><span>Tax(${inv.tax}%)</span><span>+Rs.${Number(taxAmt).toFixed(2)}</span></div>` : ""}
      <div style="display:flex;justify-content:space-between;font-weight:900;font-size:${isT58?"14px":"16px"};border-top:2px solid #000;border-bottom:2px solid #000;padding:2px 0;margin:3px 0">
        <span>TOTAL</span><span>Rs.${Number(inv.total).toFixed(2)}</span>
      </div>
      <div style="display:flex;justify-content:space-between;color:#16a34a;font-weight:700"><span>Paid</span><span>Rs.${Number(inv.paid).toFixed(2)}</span></div>
      <div style="display:flex;justify-content:space-between;font-weight:700;color:${balance>0?"#dc2626":"#16a34a"}"><span>Balance</span><span>Rs.${Number(balance).toFixed(2)}</span></div>
      <div style="text-align:center;margin-top:8px;font-size:${isT58?"9px":"10px"};border-top:1px dashed #ccc;padding-top:6px">${pharmFooter}</div>
    </body></html>`;

    const pgSize = size === "a5" ? "A5" : "A4";
    return `<!DOCTYPE html><html><head><meta charset="UTF-8"/>
      <title>${inv.id} - ${pharmName}</title>
      <style>
        *{margin:0;padding:0;box-sizing:border-box}
