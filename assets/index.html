              ✕
            </button>
          </div>
        </div>

        {/* Lock screen */}
        {!unlocked ? (
          <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", background: "#f8fafc" }}>
            <div style={{ background: "#fff", borderRadius: 16, padding: "40px 48px", boxShadow: "0 4px 24px rgba(0,0,0,.1)", textAlign: "center", width: 360 }}>
              <div style={{ fontSize: 56, marginBottom: 12 }}>🔒</div>
              <div style={{ fontWeight: 800, fontSize: 20, color: "#0f172a", marginBottom: 6 }}>Database Access</div>
              <div style={{ fontSize: 14, color: "#6b7280", marginBottom: 24 }}>Aage jaane ke liye password daalen</div>
              <input
                type="password" value={entered} onChange={(e) => setEntered(e.target.value)}
                onKeyDown={(e) => e.key === "Enter" && tryUnlock()}
                placeholder="Password daalen..."
                style={{ width: "100%", padding: "12px 16px", border: `2px solid ${error ? "#dc2626" : "#e5e7eb"}`, borderRadius: 10, fontSize: 15, boxSizing: "border-box", outline: "none", marginBottom: 8, textAlign: "center", letterSpacing: 4 }}
                autoFocus
              />
              {error && <div style={{ color: "#dc2626", fontSize: 13, marginBottom: 10, fontWeight: 600 }}>{error}</div>}
              <button onClick={tryUnlock}
                style={{ width: "100%", background: "linear-gradient(135deg,#1e3a8a,#1d4ed8)", color: "#fff", border: "none", borderRadius: 10, padding: "12px", fontSize: 15, fontWeight: 800, cursor: "pointer", marginTop: 4 }}>
                🔓 Unlock
              </button>
              <div style={{ fontSize: 11, color: "#9ca3af", marginTop: 14 }}>Default password: pharma1234</div>
            </div>
          </div>
        ) : (
          /* Unlocked DB view */
          <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
            {/* Table tabs */}
            <div style={{ display: "flex", gap: 2, padding: "10px 16px", borderBottom: "1px solid #e5e7eb", background: "#f8fafc", flexShrink: 0 }}>
              {DB_TABLES.map((t) => (
                <button key={t.id} onClick={() => setDbTab(t.id)}
                  style={{ padding: "7px 16px", borderRadius: 8, border: "none", cursor: "pointer", fontSize: 13, fontWeight: dbTab === t.id ? 700 : 500,
                    background: dbTab === t.id ? "#1d4ed8" : "#fff", color: dbTab === t.id ? "#fff" : "#374151",
                    boxShadow: dbTab === t.id ? "0 2px 8px rgba(29,78,216,.25)" : "0 1px 3px rgba(0,0,0,.06)" }}>
                  {t.label} <span style={{ fontSize: 11, opacity: .75 }}>({t.rows.length})</span>
                </button>
              ))}
            </div>

            {/* Table data */}
            <div style={{ flex: 1, overflowY: "auto", padding: 16 }}>
              <div style={{ fontSize: 12, color: "#6b7280", marginBottom: 10 }}>
                Table: <strong style={{ color: "#1d4ed8" }}>{activeTable.id}</strong> · {activeTable.rows.length} records
              </div>
              <div className="tbl-wrap" style={{ overflowX: "auto" }}>
                <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                  <thead>
                    <tr style={{ background: "#0f172a" }}>
                      {activeTable.cols.map((c) => (
                        <th key={c} style={{ padding: "9px 12px", textAlign: "left", color: "#94a3b8", fontWeight: 600, fontSize: 11, textTransform: "uppercase", letterSpacing: .5, whiteSpace: "nowrap" }}>{c}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {activeTable.rows.map((row, ri) => (
                      <tr key={ri} style={{ background: ri % 2 === 0 ? "#fff" : "#f8fafc", borderBottom: "1px solid #f1f5f9" }}>
                        {activeTable.cols.map((c) => (
                          <td key={c} style={{ padding: "8px 12px", color: "#374151", maxWidth: 200, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                            {typeof row[c] === "object" ? JSON.stringify(row[c]) : String(row[c] ?? "—")}
                          </td>
                        ))}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        )}

        {/* Change password modal */}
        {changePwModal && (
          <div style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,.5)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 10 }}>
            <div style={{ background: "#fff", borderRadius: 14, padding: "28px 32px", width: 360, boxShadow: "0 8px 32px rgba(0,0,0,.2)" }}>
              <div style={{ fontWeight: 800, fontSize: 16, marginBottom: 20 }}>🔑 Password Change</div>
              {["old","newPw","confirm"].map((k) => (
                <div key={k} style={{ marginBottom: 12 }}>
                  <label style={{ display: "block", fontSize: 13, fontWeight: 600, marginBottom: 4, color: "#374151" }}>
                    {k === "old" ? "Old Password" : k === "newPw" ? "New Password" : "Confirm New Password"}
                  </label>
                  <input type="password" value={pwForm[k]} onChange={(e) => setPwForm((p) => ({ ...p, [k]: e.target.value }))}
                    style={{ width: "100%", padding: "9px 12px", border: "1px solid #d1d5db", borderRadius: 8, fontSize: 14, boxSizing: "border-box", outline: "none" }} />
                </div>
              ))}
              {pwError && <div style={{ color: "#dc2626", fontSize: 13, marginBottom: 10 }}>{pwError}</div>}
              <div style={{ display: "flex", gap: 10, marginTop: 16 }}>
                <Btn color="gray" onClick={() => { setChangePwModal(false); setPwError(""); }}>Cancel</Btn>
                <Btn onClick={handleChangePw}>Save Password</Btn>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── STOCK DISTRIBUTION PAGE ─────────────────────────────────────────────────
function StockDistribution({ data, setData }) {
  const toast = useToast();
  const [tab, setTab]         = useState("receive");
  const [search, setSearch]   = useState("");
  const history    = data.distHistory || [];
  const setHistory = (fn) => setData(d => ({
    ...d,
    distHistory: typeof fn === "function" ? fn(d.distHistory || []) : fn
  }));

  // Form states
  const [recvForm, setRecvForm] = useState({ productId: "", qty: "", supplier: "", batchNo: "", expiry: "", costPrice: "", note: "" });
  const [adjForm,  setAdjForm]  = useState({ productId: "", type: "add", qty: "", reason: "", note: "" });
  const [transForm, setTransForm] = useState({ productId: "", fromLoc: "", toLoc: "", qty: "", note: "" });

  const products = data.products.filter(p =>
    p.name.toLowerCase().includes(search.toLowerCase()) ||
    (p.supplier || "").toLowerCase().includes(search.toLowerCase())
  );

  const addHistory = (entry) => {
    setHistory(h => [{ ...entry, id: Date.now(), date: new Date().toISOString().split("T")[0], time: new Date().toLocaleTimeString() }, ...h]);
  };

  // ── Receive Stock (new delivery from supplier) ──
  const handleReceive = () => {
    if (!recvForm.productId) return toast("Product select karein", "error");
    if (!recvForm.qty || +recvForm.qty <= 0) return toast("Valid quantity likhein", "error");
    const p = data.products.find(x => String(x.id) === String(recvForm.productId));
    if (!p) return toast("Product nahi mila", "error");

    const addQty = +recvForm.qty;
    setData(d => ({ ...d, products: d.products.map(x =>
      String(x.id) === String(recvForm.productId)
        ? { ...x, stock: x.stock + addQty,
            ...(recvForm.expiry    ? { expiry: recvForm.expiry }    : {}),
            ...(recvForm.costPrice ? { cost: +recvForm.costPrice }  : {}),
            ...(recvForm.supplier  ? { supplier: recvForm.supplier } : {}) }
        : x
    )}));
    addHistory({ type: "receive", product: p.name, qty: `+${addQty}`, supplier: recvForm.supplier || p.supplier, batch: recvForm.batchNo, note: recvForm.note });
    toast(`✅ ${p.name} — ${addQty} units stock mein add ho gayi! Naya stock: ${p.stock + addQty}`, "success");
    setRecvForm({ productId: "", qty: "", supplier: "", batchNo: "", expiry: "", costPrice: "", note: "" });
  };

  // ── Stock Adjustment (manual add/remove/set) ──
  const handleAdjust = () => {
    if (!adjForm.productId) return toast("Product select karein", "error");
    if (!adjForm.qty || +adjForm.qty < 0) return toast("Valid quantity likhein", "error");
    if (!adjForm.reason) return toast("Reason zaroori hai", "error");
    const p = data.products.find(x => String(x.id) === String(adjForm.productId));
    if (!p) return toast("Product nahi mila", "error");

    let newStock = p.stock;
    const q = +adjForm.qty;
    if      (adjForm.type === "add")    newStock = p.stock + q;
    else if (adjForm.type === "remove") newStock = Math.max(0, p.stock - q);
    else if (adjForm.type === "set")    newStock = q;

    const diff = newStock - p.stock;
    setData(d => ({ ...d, products: d.products.map(x =>
      String(x.id) === String(adjForm.productId) ? { ...x, stock: newStock } : x
    )}));
    addHistory({ type: "adjust", product: p.name, qty: (diff >= 0 ? "+" : "") + diff, reason: adjForm.reason, note: adjForm.note });
    toast(`✅ ${p.name} stock adjust ho gaya: ${p.stock} → ${newStock}`, "success");
    setAdjForm({ productId: "", type: "add", qty: "", reason: "", note: "" });
  };

  // ── Transfer (location-based notes) ──
  const handleTransfer = () => {
    if (!transForm.productId) return toast("Product select karein", "error");
    if (!transForm.qty || +transForm.qty <= 0) return toast("Valid quantity likhein", "error");
    if (!transForm.fromLoc || !transForm.toLoc) return toast("From aur To location likhein", "error");
    const p = data.products.find(x => String(x.id) === String(transForm.productId));
    if (!p) return toast("Product nahi mila", "error");
    if (+transForm.qty > p.stock) return toast(`❌ Stock insufficient! Available: ${p.stock}`, "error");

    addHistory({ type: "transfer", product: p.name, qty: transForm.qty, from: transForm.fromLoc, to: transForm.toLoc, note: transForm.note });
    toast(`✅ ${transForm.qty} units ${transForm.fromLoc} → ${transForm.toLoc} transfer record ho gaya`, "success");
    setTransForm({ productId: "", fromLoc: "", toLoc: "", qty: "", note: "" });
  };

  const inp = (label, val, onChange, opts = {}) => (
    <div style={{ marginBottom: 14 }}>
      <label style={{ display: "block", fontSize: 12, fontWeight: 700, color: "#374151", marginBottom: 4 }}>{label}</label>
      {opts.select ? (
        <select value={val} onChange={e => onChange(e.target.value)}
          style={{ width: "100%", padding: "9px 12px", border: "1px solid #d1d5db", borderRadius: 8, fontSize: 14, outline: "none", boxSizing: "border-box" }}>
          <option value="">-- Select --</option>
          {data.products.map(p => <option key={p.id} value={p.id}>{p.name} (Stock: {p.stock})</option>)}
        </select>
      ) : opts.typeSelect ? (
        <select value={val} onChange={e => onChange(e.target.value)}
          style={{ width: "100%", padding: "9px 12px", border: "1px solid #d1d5db", borderRadius: 8, fontSize: 14, outline: "none", boxSizing: "border-box" }}>
          <option value="add">➕ Add to Stock</option>
          <option value="remove">➖ Remove from Stock</option>
          <option value="set">🔄 Set Exact Amount</option>
        </select>
      ) : (
        <input type={opts.type || "text"} value={val} onChange={e => onChange(e.target.value)}
          placeholder={opts.placeholder || ""}
          style={{ width: "100%", padding: "9px 12px", border: "1px solid #d1d5db", borderRadius: 8, fontSize: 14, outline: "none", boxSizing: "border-box" }} />
      )}
    </div>
  );

  const TABS = [
    { id: "receive",  label: "📦 Receive Stock",   color: "#16a34a" },
    { id: "adjust",   label: "🔧 Adjust Stock",    color: "#d97706" },
    { id: "transfer", label: "🔀 Transfer",        color: "#1d4ed8" },
    { id: "overview", label: "📊 Stock Overview",  color: "#7c3aed" },
    { id: "history",  label: "📋 History",         color: "#374151" },
  ];

  const typeColors = { receive: "#d1fae5", adjust: "#fef3c7", transfer: "#dbeafe" };
  const typeBadge  = { receive: "📦 Receive", adjust: "🔧 Adjust", transfer: "🔀 Transfer" };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
        <h2 style={{ margin: 0, fontSize: 22, fontWeight: 800 }}>🏭 Stock Distribution</h2>
        <div style={{ fontSize: 13, color: "#6b7280" }}>Total Products: {data.products.length} | Total Units: {data.products.reduce((s,p) => s+p.stock, 0)}</div>
      </div>

      {/* Tab bar */}
      <div className="tab-bar" style={{ display: "flex", gap: 6, marginBottom: 20 }}>
        {TABS.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)}
            style={{ padding: "9px 18px", borderRadius: 10, border: "none", cursor: "pointer", fontWeight: 700, fontSize: 13,
              background: tab === t.id ? t.color : "#fff", color: tab === t.id ? "#fff" : "#374151",
              boxShadow: "0 1px 4px rgba(0,0,0,.08)" }}>
            {t.label}
          </button>
        ))}
      </div>

      {/* ── RECEIVE STOCK ── */}
      {tab === "receive" && (
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>
          <Card>
            <div style={{ fontWeight: 800, fontSize: 15, marginBottom: 16, color: "#16a34a" }}>📦 Naya Stock Receive Karein</div>
            {inp("Product *", recvForm.productId, v => setRecvForm(f=>({...f, productId: v})), { select: true })}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              {inp("Quantity *", recvForm.qty, v => setRecvForm(f=>({...f, qty: v})), { type: "number", placeholder: "Packs/Units" })}
              {inp("Cost Price (Rs.)", recvForm.costPrice, v => setRecvForm(f=>({...f, costPrice: v})), { type: "number", placeholder: "Optional" })}
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              {inp("Supplier", recvForm.supplier, v => setRecvForm(f=>({...f, supplier: v})), { placeholder: "e.g. MediCorp" })}
              {inp("Batch No.", recvForm.batchNo, v => setRecvForm(f=>({...f, batchNo: v})), { placeholder: "e.g. B-2026-01" })}
            </div>
            {inp("New Expiry Date", recvForm.expiry, v => setRecvForm(f=>({...f, expiry: v})), { type: "date" })}
            {inp("Note", recvForm.note, v => setRecvForm(f=>({...f, note: v})), { placeholder: "Optional note..." })}
            <Btn onClick={handleReceive} style={{ width: "100%", marginTop: 4 }}>📦 Stock Receive Karein</Btn>
          </Card>
          <Card>
            <div style={{ fontWeight: 800, fontSize: 15, marginBottom: 14 }}>📋 Current Stock Status</div>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Product ya supplier..." style={{ width: "100%", padding: "8px 12px", border: "1px solid #d1d5db", borderRadius: 8, fontSize: 13, marginBottom: 12, boxSizing: "border-box" }} />
            <div style={{ maxHeight: 340, overflowY: "auto" }}>
              {products.map(p => {
                const pct = Math.min(100, Math.round((p.stock / Math.max(p.reorder * 2, 1)) * 100));
                const color = p.stock === 0 ? "#dc2626" : p.stock <= p.reorder ? "#d97706" : "#16a34a";
                return (
                  <div key={p.id} style={{ borderBottom: "1px solid #f3f4f6", paddingBottom: 10, marginBottom: 10 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                      <span style={{ fontWeight: 700, fontSize: 13 }}>{p.name}</span>
                      <span style={{ fontWeight: 800, color, fontSize: 13 }}>{p.stock} units</span>
                    </div>
                    <div style={{ fontSize: 11, color: "#6b7280", marginBottom: 5 }}>{p.supplier} · Reorder: {p.reorder}</div>
                    <div style={{ background: "#f3f4f6", borderRadius: 99, height: 6 }}>
                      <div style={{ background: color, borderRadius: 99, height: 6, width: `${pct}%`, transition: "width .3s" }} />
                    </div>
                  </div>
                );
              })}
            </div>
          </Card>
        </div>
      )}

      {/* ── ADJUST STOCK ── */}
      {tab === "adjust" && (
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>
          <Card>
            <div style={{ fontWeight: 800, fontSize: 15, marginBottom: 16, color: "#d97706" }}>🔧 Stock Manually Adjust Karein</div>
            {inp("Product *", adjForm.productId, v => setAdjForm(f=>({...f, productId: v})), { select: true })}
            {adjForm.productId && (() => {
              const p = data.products.find(x => String(x.id) === String(adjForm.productId));
              return p ? <div style={{ background: "#fffbeb", border: "1px solid #fcd34d", borderRadius: 8, padding: "8px 12px", marginBottom: 12, fontSize: 13 }}>📦 Current Stock: <strong>{p.stock}</strong> units</div> : null;
            })()}
            {inp("Adjustment Type *", adjForm.type, v => setAdjForm(f=>({...f, type: v})), { typeSelect: true })}
            {inp("Quantity *", adjForm.qty, v => setAdjForm(f=>({...f, qty: v})), { type: "number", placeholder: "Amount" })}
            {inp("Reason *", adjForm.reason, v => setAdjForm(f=>({...f, reason: v})), { placeholder: "e.g. Damaged goods, Expired, Manual count" })}
            {inp("Note", adjForm.note, v => setAdjForm(f=>({...f, note: v})), { placeholder: "Optional note..." })}
            {adjForm.productId && adjForm.qty && (() => {
              const p = data.products.find(x => String(x.id) === String(adjForm.productId));
              if (!p) return null;
              const q = +adjForm.qty;
              let ns = adjForm.type === "add" ? p.stock + q : adjForm.type === "remove" ? Math.max(0, p.stock - q) : q;
              return <div style={{ background: "#f0fdf4", border: "1px solid #86efac", borderRadius: 8, padding: "8px 12px", marginBottom: 12, fontSize: 13 }}>
                📊 Preview: {p.stock} → <strong style={{ color: "#16a34a" }}>{ns}</strong> units
              </div>;
            })()}
            <Btn onClick={handleAdjust} style={{ width: "100%", marginTop: 4 }}>🔧 Adjust Karein</Btn>
          </Card>
          <Card>
            <div style={{ fontWeight: 800, fontSize: 15, marginBottom: 14 }}>⚠️ Low Stock Alert</div>
            {data.products.filter(p => p.stock <= p.reorder).length === 0
              ? <div style={{ color: "#16a34a", fontWeight: 600, textAlign: "center", padding: 24 }}>✅ Sab products ka stock theek hai!</div>
              : data.products.filter(p => p.stock <= p.reorder).map(p => (
                <div key={p.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 0", borderBottom: "1px solid #f3f4f6" }}>
                  <div>
                    <div style={{ fontWeight: 700, fontSize: 13 }}>{p.name}</div>
                    <div style={{ fontSize: 11, color: "#6b7280" }}>Reorder level: {p.reorder}</div>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontWeight: 800, color: p.stock === 0 ? "#dc2626" : "#d97706", fontSize: 14 }}>{p.stock}</div>
                    <div style={{ fontSize: 10, color: "#6b7280" }}>units left</div>
                  </div>
                </div>
              ))
            }
          </Card>
        </div>
      )}

      {/* ── TRANSFER ── */}
      {tab === "transfer" && (
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>
          <Card>
            <div style={{ fontWeight: 800, fontSize: 15, marginBottom: 16, color: "#1d4ed8" }}>🔀 Stock Transfer / Distribution</div>
            {inp("Product *", transForm.productId, v => setTransForm(f=>({...f, productId: v})), { select: true })}
            {transForm.productId && (() => {
              const p = data.products.find(x => String(x.id) === String(transForm.productId));
              return p ? <div style={{ background: "#eff6ff", border: "1px solid #93c5fd", borderRadius: 8, padding: "8px 12px", marginBottom: 12, fontSize: 13 }}>📦 Available Stock: <strong>{p.stock}</strong> units</div> : null;
            })()}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              {inp("From Location *", transForm.fromLoc, v => setTransForm(f=>({...f, fromLoc: v})), { placeholder: "e.g. Main Warehouse" })}
              {inp("To Location *", transForm.toLoc, v => setTransForm(f=>({...f, toLoc: v})), { placeholder: "e.g. Branch 2" })}
            </div>
            {inp("Quantity *", transForm.qty, v => setTransForm(f=>({...f, qty: v})), { type: "number", placeholder: "Transfer units" })}
            {inp("Note", transForm.note, v => setTransForm(f=>({...f, note: v})), { placeholder: "Optional note..." })}
            <Btn onClick={handleTransfer} style={{ width: "100%", marginTop: 4 }}>🔀 Transfer Record Karein</Btn>
          </Card>
          <Card>
            <div style={{ fontWeight: 800, fontSize: 15, marginBottom: 14 }}>📦 Product-wise Stock</div>
            <div style={{ maxHeight: 360, overflowY: "auto" }}>
              {data.products.sort((a,b) => b.stock - a.stock).map((p, i) => (
                <div key={p.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "9px 0", borderBottom: "1px solid #f3f4f6" }}>
                  <div style={{ fontWeight: 800, color: "#6b7280", fontSize: 13, minWidth: 22 }}>#{i+1}</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontWeight: 700, fontSize: 13 }}>{p.name}</div>
                    <div style={{ fontSize: 11, color: "#6b7280" }}>{p.supplier}</div>
                  </div>
                  <div style={{ fontWeight: 800, fontSize: 14, color: p.stock === 0 ? "#dc2626" : p.stock <= p.reorder ? "#d97706" : "#16a34a" }}>
                    {p.stock}
                  </div>
                </div>
              ))}
            </div>
          </Card>
        </div>
      )}

      {/* ── STOCK OVERVIEW ── */}
      {tab === "overview" && (
        <div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 16, marginBottom: 20 }}>
            {[
              { label: "Total Products", val: data.products.length, icon: "💊", color: "#1d4ed8", bg: "#dbeafe" },
              { label: "Total Stock Value", val: fmt(data.products.reduce((s,p)=>s+p.stock*p.price,0)), icon: "💰", color: "#16a34a", bg: "#d1fae5" },
              { label: "Low Stock Items", val: data.products.filter(p=>p.stock<=p.reorder).length, icon: "⚠️", color: "#d97706", bg: "#fef3c7" },
              { label: "Out of Stock", val: data.products.filter(p=>p.stock===0).length, icon: "❌", color: "#dc2626", bg: "#fee2e2" },
            ].map(s => (
              <div key={s.label} style={{ background: s.bg, borderRadius: 14, padding: "18px 20px", border: `1px solid ${s.color}30` }}>
                <div style={{ fontSize: 26, marginBottom: 6 }}>{s.icon}</div>
                <div style={{ fontSize: 22, fontWeight: 900, color: s.color }}>{s.val}</div>
                <div style={{ fontSize: 12, color: "#374151", fontWeight: 600 }}>{s.label}</div>
              </div>
            ))}
          </div>
          <Card>
            <div style={{ fontWeight: 800, fontSize: 15, marginBottom: 14 }}>📊 Supplier-wise Stock Distribution</div>
            <div className="tbl-wrap" style={{ overflowX: "auto" }}>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                <thead><tr style={{ background: "#f8fafc" }}>
                  {["Supplier", "Products", "Total Stock", "Stock Value", "Low Stock Items"].map(h =>
                    <th key={h} style={{ padding: "9px 12px", textAlign: "left", fontWeight: 700, borderBottom: "2px solid #e5e7eb" }}>{h}</th>
                  )}
                </tr></thead>
                <tbody>
                  {Object.values(data.products.reduce((acc, p) => {
                    const k = p.supplier || "Unknown";
                    if (!acc[k]) acc[k] = { supplier: k, count: 0, stock: 0, value: 0, low: 0 };
                    acc[k].count++; acc[k].stock += p.stock; acc[k].value += p.stock * p.price;
                    if (p.stock <= p.reorder) acc[k].low++;
                    return acc;
                  }, {})).map((r, i) => (
                    <tr key={r.supplier} style={{ background: i%2===0 ? "#fff" : "#fafafa" }}>
                      <td style={{ padding: "9px 12px", fontWeight: 700 }}>{r.supplier}</td>
                      <td style={{ padding: "9px 12px", textAlign: "right" }}>{r.count}</td>
                      <td style={{ padding: "9px 12px", textAlign: "right", fontWeight: 700 }}>{r.stock}</td>
                      <td style={{ padding: "9px 12px", textAlign: "right", color: "#1d4ed8", fontWeight: 700 }}>{fmt(r.value)}</td>
                      <td style={{ padding: "9px 12px", textAlign: "right" }}>
                        {r.low > 0 ? <span style={{ background: "#fef3c7", color: "#92400e", padding: "2px 8px", borderRadius: 20, fontWeight: 700, fontSize: 12 }}>⚠️ {r.low}</span>
                                   : <span style={{ color: "#16a34a", fontWeight: 600 }}>✅ OK</span>}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </Card>
        </div>
      )}

      {/* ── HISTORY ── */}
      {tab === "history" && (
        <Card>
          <div style={{ fontWeight: 800, fontSize: 15, marginBottom: 14 }}>📋 Stock Movement History</div>
          {history.length === 0
            ? <div style={{ textAlign: "center", padding: 40, color: "#6b7280" }}>Abhi koi history nahi hai. Stock receive, adjust ya transfer karein.</div>
            : <div className="tbl-wrap" style={{ overflowX: "auto" }}>
                <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                  <thead><tr style={{ background: "#f8fafc" }}>
                    {["Date", "Time", "Type", "Product", "Qty Change", "Details", "Note"].map(h =>
                      <th key={h} style={{ padding: "9px 12px", textAlign: "left", fontWeight: 700, borderBottom: "2px solid #e5e7eb" }}>{h}</th>
                    )}
                  </tr></thead>
                  <tbody>
                    {history.map(h => (
                      <tr key={h.id} style={{ borderBottom: "1px solid #f3f4f6" }}>
                        <td style={{ padding: "9px 12px" }}>{h.date}</td>
                        <td style={{ padding: "9px 12px", color: "#6b7280" }}>{h.time}</td>
                        <td style={{ padding: "9px 12px" }}>
                          <span style={{ background: typeColors[h.type] || "#f3f4f6", padding: "2px 10px", borderRadius: 20, fontSize: 12, fontWeight: 700 }}>
                            {typeBadge[h.type] || h.type}
                          </span>
                        </td>
                        <td style={{ padding: "9px 12px", fontWeight: 700 }}>{h.product}</td>
                        <td style={{ padding: "9px 12px", fontWeight: 800, color: h.qty?.startsWith("-") ? "#dc2626" : "#16a34a" }}>{h.qty}</td>
                        <td style={{ padding: "9px 12px", fontSize: 12, color: "#6b7280" }}>
                          {h.supplier && `Supplier: ${h.supplier}`}
                          {h.batch && ` · Batch: ${h.batch}`}
                          {h.reason && `Reason: ${h.reason}`}
                          {h.from && `${h.from} → ${h.to}`}
                        </td>
                        <td style={{ padding: "9px 12px", color: "#6b7280" }}>{h.note || "—"}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
          }
        </Card>
      )}
    </div>
  );
}

// ─── REPORTS PAGE ────────────────────────────────────────────────────────────
function Reports({ data }) {
  const todayStr = new Date().toISOString().split("T")[0];
  const thisMonthStart = todayStr.slice(0,7) + "-01";
  const [tab, setTab]         = useState("income");
  const [dateFrom, setDateFrom] = useState(thisMonthStart);
  const [dateTo, setDateTo]   = useState(todayStr);
  const [monthFilter, setMonthFilter] = useState(todayStr.slice(0,7));

  const invoices = data.invoices;

  const filterByDate = (item) => {
    if (dateFrom && item.date < dateFrom) return false;
    if (dateTo   && item.date > dateTo)   return false;
    return true;
  };

  const filtered = invoices.filter(filterByDate);
  const totalSales    = filtered.reduce((s, i) => s + i.total, 0);
  const totalReceived = filtered.reduce((s, i) => s + i.paid,  0);
  const totalBalance  = filtered.reduce((s, i) => s + (i.total - i.paid), 0);

  // By Day
  const byDay = Object.values(
    filtered.reduce((acc, inv) => {
      const d = inv.date;
      if (!acc[d]) acc[d] = { date: d, invoices: 0, sales: 0, received: 0 };
      acc[d].invoices++;
      acc[d].sales    += inv.total;
      acc[d].received += inv.paid;
      return acc;
    }, {})
  ).sort((a, b) => b.date.localeCompare(a.date));

  // By Customer
  const byCustomer = Object.values(
    filtered.reduce((acc, inv) => {
      const k = inv.customerName;
      if (!acc[k]) acc[k] = { name: k, invoices: 0, sales: 0, received: 0 };
      acc[k].invoices++;
      acc[k].sales    += inv.total;
      acc[k].received += inv.paid;
      return acc;
    }, {})
  ).sort((a, b) => b.sales - a.sales);

  // By Item / Product
  const byItem = Object.values(
    filtered.flatMap((inv) => inv.items).reduce((acc, item) => {
      const k = item.name;
      if (!acc[k]) acc[k] = { name: k, qty: 0, revenue: 0 };
      acc[k].qty     += item.qty || 0;
      acc[k].revenue += item.qty * (item.perUnitPrice || item.price || 0);
      return acc;
    }, {})
  ).sort((a, b) => b.revenue - a.revenue);

  // By Supplier / Company (from products)
  const byCompany = Object.values(
    data.products.reduce((acc, p) => {
      const k = p.supplier || "Unknown";
      if (!acc[k]) acc[k] = { supplier: k, products: 0, stock: 0, value: 0 };
      acc[k].products++;
      acc[k].stock += p.stock;
      acc[k].value += p.stock * p.price;
      return acc;
    }, {})
  ).sort((a, b) => b.value - a.value);

  // By User (created by field on invoices - will show "System" for seed data)
  const byUser = Object.values(
    filtered.reduce((acc, inv) => {
      const k = inv.createdBy || "System";
      if (!acc[k]) acc[k] = { user: k, invoices: 0, sales: 0 };
      acc[k].invoices++;
      acc[k].sales += inv.total;
      return acc;
    }, {})
  ).sort((a, b) => b.sales - a.sales);

  // Income/Expense filtered by date
  const filteredAccounts = data.accounts.filter(filterByDate);
  const totalIncomeFlt  = filteredAccounts.filter(a=>a.type==="income").reduce((s,a)=>s+a.amount,0);
  const totalExpenseFlt = filteredAccounts.filter(a=>a.type==="expense").reduce((s,a)=>s+a.amount,0);

  // By Month data
  const allMonths = [...new Set([
    ...data.invoices.map(i=>i.date.slice(0,7)),
    ...data.accounts.map(a=>a.date.slice(0,7)),
  ])].sort().reverse().slice(0,12);

  const monthlyReport = allMonths.map(m=>({
    month: m,
    sales:   data.invoices.filter(i=>i.date.startsWith(m)).reduce((s,i)=>s+i.total,0),
    collected: data.invoices.filter(i=>i.date.startsWith(m)).reduce((s,i)=>s+i.paid,0),
    invoices:  data.invoices.filter(i=>i.date.startsWith(m)).length,
    income:  data.accounts.filter(a=>a.type==="income"&&a.date.startsWith(m)).reduce((s,a)=>s+a.amount,0),
    expense: data.accounts.filter(a=>a.type==="expense"&&a.date.startsWith(m)).reduce((s,a)=>s+a.amount,0),
  })).map(m=>({...m, profit: m.income-m.expense}));

  const TABS = [
    { id: "income",   label: "💵 Income/Expense" },
    { id: "monthly",  label: "📅 By Month" },
    { id: "sales",    label: "📊 All Sales" },
    { id: "day",      label: "📅 By Day" },
    { id: "customer", label: "👥 By Customer" },
    { id: "item",     label: "💊 By Item" },
    { id: "company",  label: "🏭 By Company" },
    { id: "user",     label: "👤 By User" },
  ];

  const thStyle = { padding: "10px 12px", textAlign: "left", fontWeight: 700, fontSize: 12, borderBottom: "2px solid #e5e7eb", color: "#374151", whiteSpace: "nowrap" };
  const tdStyle = { padding: "9px 12px", fontSize: 13, borderBottom: "1px solid #f3f4f6" };
  const numTd   = { ...tdStyle, textAlign: "right", fontWeight: 600 };

  return (
    <div>
      <h2 style={{ margin: "0 0 20px", fontSize: 22, fontWeight: 800 }}>📈 Reports</h2>

      {/* Date filter */}
      <Card style={{ marginBottom: 20 }}>
        <div style={{ display: "flex", gap: 14, alignItems: "flex-end", flexWrap: "wrap" }}>
          <div>
            <label style={{ display: "block", fontSize: 12, fontWeight: 600, color: "#6b7280", marginBottom: 4 }}>From Date</label>
            <input type="date" value={dateFrom} onChange={(e) => setDateFrom(e.target.value)}
              style={{ padding: "8px 12px", border: "1px solid #d1d5db", borderRadius: 8, fontSize: 13, outline: "none" }} />
          </div>
          <div>
            <label style={{ display: "block", fontSize: 12, fontWeight: 600, color: "#6b7280", marginBottom: 4 }}>To Date</label>
            <input type="date" value={dateTo} onChange={(e) => setDateTo(e.target.value)}
              style={{ padding: "8px 12px", border: "1px solid #d1d5db", borderRadius: 8, fontSize: 13, outline: "none" }} />
          </div>
            <Btn color="gray" onClick={()=>{setDateFrom(thisMonthStart);setDateTo(todayStr);}}>This Month</Btn>
          <Btn color="gray" onClick={()=>{
            const lm = new Date(new Date().getFullYear(),new Date().getMonth()-1,1);
            const lme= new Date(new Date().getFullYear(),new Date().getMonth(),0);
            setDateFrom(lm.toISOString().split("T")[0]);
            setDateTo(lme.toISOString().split("T")[0]);
          }}>Last Month</Btn>
        <Btn color="gray" onClick={() => { setDateFrom(""); setDateTo(""); }}>All Time</Btn>
          <div style={{ marginLeft: "auto", display: "flex", gap: 12, flexWrap: "wrap" }}>
            {[
              { label: "Total Sales", val: fmt(totalSales), color: "#1d4ed8" },
              { label: "Received", val: fmt(totalReceived), color: "#16a34a" },
              { label: "Pending", val: fmt(totalBalance), color: "#dc2626" },
            ].map((s) => (
              <div key={s.label} style={{ background: "#f8fafc", borderRadius: 10, padding: "8px 16px", border: "1px solid #e5e7eb", textAlign: "center" }}>
                <div style={{ fontSize: 11, color: "#6b7280" }}>{s.label}</div>
                <div style={{ fontWeight: 800, color: s.color, fontSize: 15 }}>{s.val}</div>
              </div>
            ))}
          </div>
        </div>
      </Card>

      {/* Tab bar */}
      <div className="tab-bar" style={{ display: "flex", gap: 4, marginBottom: 18 }}>
        {TABS.map((t) => (
          <button key={t.id} onClick={() => setTab(t.id)}
            style={{ padding: "8px 16px", borderRadius: 9, border: "none", cursor: "pointer", fontWeight: 700, fontSize: 13,
              background: tab === t.id ? "#1d4ed8" : "#fff", color: tab === t.id ? "#fff" : "#374151",
              boxShadow: "0 1px 4px rgba(0,0,0,.08)" }}>
            {t.label}
          </button>
        ))}
      </div>

      {/* ── INCOME / EXPENSE ── */}
      {tab === "income" && (
        <div>
          {/* Summary cards */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:16}}>
            <Card style={{background:"#d1fae5",boxShadow:"none",padding:"14px 16px"}}>
              <div style={{fontSize:12,color:"#065f46",fontWeight:600}}>Total Income</div>
              <div style={{fontSize:24,fontWeight:800,color:"#16a34a"}}>{fmt(totalIncomeFlt)}</div>
              <div style={{fontSize:11,color:"#9ca3af"}}>{dateFrom} → {dateTo}</div>
            </Card>
            <Card style={{background:"#fee2e2",boxShadow:"none",padding:"14px 16px"}}>
              <div style={{fontSize:12,color:"#991b1b",fontWeight:600}}>Total Expense</div>
              <div style={{fontSize:24,fontWeight:800,color:"#dc2626"}}>{fmt(totalExpenseFlt)}</div>
              <div style={{fontSize:11,color:"#9ca3af"}}>{dateFrom} → {dateTo}</div>
            </Card>
            <Card style={{background:totalIncomeFlt-totalExpenseFlt>=0?"#dbeafe":"#fee2e2",boxShadow:"none",padding:"14px 16px"}}>
              <div style={{fontSize:12,fontWeight:600,color:"#1e40af"}}>{totalIncomeFlt-totalExpenseFlt>=0?"✅ Profit":"❌ Loss"}</div>
              <div style={{fontSize:24,fontWeight:800,color:totalIncomeFlt-totalExpenseFlt>=0?"#1d4ed8":"#dc2626"}}>
                {fmt(Math.abs(totalIncomeFlt-totalExpenseFlt))}
              </div>
            </Card>
          </div>
          {/* Transaction list */}
          <Card>
            <div style={{fontWeight:700,fontSize:15,marginBottom:12}}>Transactions — {filteredAccounts.length} records</div>
            <div className="tbl-wrap" style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                <thead><tr style={{background:"#f8fafc"}}>
                  {["Date","Type","Category","Payment","Description","Amount"].map(h=>(
                    <th key={h} style={{padding:"9px 10px",textAlign:"left",fontWeight:700,borderBottom:"2px solid #e5e7eb",whiteSpace:"nowrap"}}>{h}</th>
                  ))}
                </tr></thead>
                <tbody>
                  {[...filteredAccounts].reverse().map(a=>(
                    <tr key={a.id} style={{borderBottom:"1px solid #f3f4f6"}}>
                      <td style={{padding:"8px 10px",whiteSpace:"nowrap"}}>{a.date}</td>
                      <td style={{padding:"8px 10px"}}>{badge(a.type==="income"?"Income":"Expense",a.type==="income"?"green":"red")}</td>
                      <td style={{padding:"8px 10px"}}>{a.category}</td>
                      <td style={{padding:"8px 10px",fontSize:12}}>
                        {a.paymentMethod ? (PAYMENT_METHODS.find(p=>p.id===a.paymentMethod)?.label||a.paymentMethod) : "—"}
                      </td>
                      <td style={{padding:"8px 10px",maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.description}</td>
                      <td style={{padding:"8px 10px",fontWeight:700,color:a.type==="income"?"#16a34a":"#dc2626",textAlign:"right"}}>
                        {a.type==="income"?"+":"-"}{fmt(a.amount)}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </Card>
        </div>
      )}

      {/* ── BY MONTH ── */}
      {tab === "monthly" && (
        <Card>
          <div style={{fontWeight:700,fontSize:15,marginBottom:14}}>📅 Monthly Summary</div>
          <div className="tbl-wrap" style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead><tr style={{background:"#f8fafc"}}>
                {["Month","Invoices","Sales","Collected","Pending","Income","Expense","Profit/Loss"].map(h=>(
                  <th key={h} style={{padding:"9px 12px",textAlign:"left",fontWeight:700,borderBottom:"2px solid #e5e7eb",whiteSpace:"nowrap"}}>{h}</th>
                ))}
              </tr></thead>
              <tbody>
                {monthlyReport.map(m=>(
                  <tr key={m.month} style={{borderBottom:"1px solid #f3f4f6",background:m.month===todayStr.slice(0,7)?"#eff6ff":"#fff"}}>
                    <td style={{padding:"9px 12px",fontWeight:700}}>{m.month} {m.month===todayStr.slice(0,7)&&<span style={{fontSize:10,background:"#dbeafe",color:"#1d4ed8",padding:"1px 6px",borderRadius:10,marginLeft:4}}>Current</span>}</td>
                    <td style={{padding:"9px 12px"}}>{m.invoices}</td>
                    <td style={{padding:"9px 12px",fontWeight:600}}>{fmt(m.sales)}</td>
                    <td style={{padding:"9px 12px",color:"#16a34a",fontWeight:600}}>{fmt(m.collected)}</td>
                    <td style={{padding:"9px 12px",color:"#dc2626"}}>{fmt(m.sales-m.collected)}</td>
                    <td style={{padding:"9px 12px",color:"#16a34a",fontWeight:600}}>{fmt(m.income)}</td>
                    <td style={{padding:"9px 12px",color:"#dc2626"}}>{fmt(m.expense)}</td>
                    <td style={{padding:"9px 12px",fontWeight:800,color:m.profit>=0?"#16a34a":"#dc2626"}}>
                      {m.profit>=0?"✅":""}{fmt(Math.abs(m.profit))} {m.profit<0?"(Loss)":""}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </Card>
      )}

      {/* ── ALL SALES ── */}
      {tab === "sales" && (
        <Card>
          <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 14 }}>All Sales — {filtered.length} Invoices</div>
          <div className="tbl-wrap" style={{ overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse" }}>
              <thead><tr style={{ background: "#f8fafc" }}>
                {["Invoice #", "Date", "Customer", "Items", "Subtotal", "Discount", "Tax", "Total", "Paid", "Balance", "Status"].map((h) => (
                  <th key={h} style={thStyle}>{h}</th>
                ))}
              </tr></thead>
              <tbody>
                {filtered.length === 0 && <tr><td colSpan={11} style={{ ...tdStyle, textAlign: "center", color: "#6b7280" }}>No data found</td></tr>}
                {filtered.map((inv) => (
                  <tr key={inv.id} style={{ borderBottom: "1px solid #f3f4f6" }}>
                    <td style={{ ...tdStyle, fontWeight: 700, color: "#1d4ed8" }}>{inv.id}</td>
                    <td style={tdStyle}>{fmtDate(inv.date)}</td>
                    <td style={{ ...tdStyle, fontWeight: 600 }}>{inv.customerName}</td>
                    <td style={numTd}>{inv.items?.length || 0}</td>
                    <td style={numTd}>{fmt(inv.subtotal)}</td>
                    <td style={{ ...numTd, color: "#dc2626" }}>{fmt(inv.discount)}</td>
                    <td style={{ ...numTd, color: "#d97706" }}>{fmt((inv.tax/100)*inv.subtotal)}</td>
                    <td style={{ ...numTd, fontWeight: 800 }}>{fmt(inv.total)}</td>
                    <td style={{ ...numTd, color: "#16a34a" }}>{fmt(inv.paid)}</td>
                    <td style={{ ...numTd, color: inv.total - inv.paid > 0 ? "#dc2626" : "#16a34a" }}>{fmt(inv.total - inv.paid)}</td>
                    <td style={tdStyle}>{badge(inv.status, { paid: "green", partial: "yellow", unpaid: "red" }[inv.status])}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </Card>
      )}

      {/* ── BY DAY ── */}
      {tab === "day" && (
        <Card>
          <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 14 }}>Sales By Day</div>
          <table style={{ width: "100%", borderCollapse: "collapse" }}>
            <thead><tr style={{ background: "#f8fafc" }}>
              {["Date", "Invoices", "Total Sales", "Amount Received", "Balance"].map((h) => <th key={h} style={thStyle}>{h}</th>)}
            </tr></thead>
            <tbody>
              {byDay.length === 0 && <tr><td colSpan={5} style={{ ...tdStyle, textAlign: "center", color: "#6b7280" }}>No data</td></tr>}
              {byDay.map((r) => (
                <tr key={r.date}>
                  <td style={{ ...tdStyle, fontWeight: 600 }}>{fmtDate(r.date)}</td>
                  <td style={numTd}>{r.invoices}</td>
                  <td style={{ ...numTd, color: "#1d4ed8", fontWeight: 800 }}>{fmt(r.sales)}</td>
                  <td style={{ ...numTd, color: "#16a34a" }}>{fmt(r.received)}</td>
                  <td style={{ ...numTd, color: r.sales - r.received > 0 ? "#dc2626" : "#16a34a" }}>{fmt(r.sales - r.received)}</td>
                </tr>
              ))}
              {byDay.length > 0 && (
                <tr style={{ background: "#f0f9ff", fontWeight: 800 }}>
                  <td style={{ ...tdStyle, fontWeight: 800 }}>TOTAL</td>
                  <td style={numTd}>{filtered.length}</td>
                  <td style={{ ...numTd, color: "#1d4ed8" }}>{fmt(totalSales)}</td>
                  <td style={{ ...numTd, color: "#16a34a" }}>{fmt(totalReceived)}</td>
                  <td style={{ ...numTd, color: "#dc2626" }}>{fmt(totalBalance)}</td>
                </tr>
              )}
            </tbody>
          </table>
        </Card>
      )}

      {/* ── BY CUSTOMER ── */}
      {tab === "customer" && (
        <Card>
          <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 14 }}>Sales By Customer</div>
          <table style={{ width: "100%", borderCollapse: "collapse" }}>
            <thead><tr style={{ background: "#f8fafc" }}>
              {["#", "Customer", "Invoices", "Total Sales", "Received", "Balance"].map((h) => <th key={h} style={thStyle}>{h}</th>)}
            </tr></thead>
            <tbody>
              {byCustomer.length === 0 && <tr><td colSpan={6} style={{ ...tdStyle, textAlign: "center", color: "#6b7280" }}>No data</td></tr>}
              {byCustomer.map((r, i) => (
                <tr key={r.name} style={{ background: i % 2 === 0 ? "#fff" : "#fafafa" }}>
                  <td style={{ ...tdStyle, color: "#6b7280" }}>{i + 1}</td>
                  <td style={{ ...tdStyle, fontWeight: 700 }}>{r.name}</td>
                  <td style={numTd}>{r.invoices}</td>
                  <td style={{ ...numTd, color: "#1d4ed8", fontWeight: 800 }}>{fmt(r.sales)}</td>
                  <td style={{ ...numTd, color: "#16a34a" }}>{fmt(r.received)}</td>
                  <td style={{ ...numTd, color: r.sales - r.received > 0 ? "#dc2626" : "#16a34a" }}>{fmt(r.sales - r.received)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </Card>
      )}

      {/* ── BY ITEM ── */}
      {tab === "item" && (
        <Card>
          <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 14 }}>Sales By Item / Product</div>
          <table style={{ width: "100%", borderCollapse: "collapse" }}>
            <thead><tr style={{ background: "#f8fafc" }}>
              {["#", "Product", "Qty Sold", "Revenue"].map((h) => <th key={h} style={thStyle}>{h}</th>)}
            </tr></thead>
            <tbody>

// ─── USER MANAGEMENT (Admin only) ────────────────────────────────────────────
function UserManagement({ users, setUsers, currentUser }) {
  const toast = useToast();
  const [modal, setModal] = useState(null); // null | "add" | user-obj
  const [form, setForm]   = useState({ name: "", username: "", password: "", role: "employee" });
  const [err, setErr]     = useState("");

  const ROLES = { administrator: { label: "Administrator", color: "#7c3aed", bg: "#ede9fe" },
                  user:          { label: "User",          color: "#1d4ed8", bg: "#dbeafe" },
                  employee:      { label: "Employee",      color: "#16a34a", bg: "#d1fae5" } };

  const openAdd  = () => { setForm({ name: "", username: "", password: "", role: "employee" }); setErr(""); setModal("add"); };
  const openEdit = (u) => { setForm({ ...u, password: "" }); setErr(""); setModal(u); };

  const save = () => {
    if (!form.name.trim() || !form.username.trim()) return setErr("Name aur username zaroori hai");
    if (modal === "add" && !form.password.trim()) return setErr("Naye user ke liye password zaroori hai");
    if (form.username !== (modal?.username) && users.find((u) => u.username === form.username)) return setErr("Yeh username pehle se exist karta hai");

    if (modal === "add") {
      setUsers((prev) => [...prev, { ...form, id: Date.now() }]);
    } else {
      setUsers((prev) => prev.map((u) => u.id === modal.id ? { ...u, ...form, password: form.password || u.password } : u));
    }
    setModal(null);
  };

  const del = (id) => {
    if (users.find((u) => u.id === id)?.username === currentUser.username) return toast("❌ Aap apna account delete nahi kar sakte!", "error");
    setUsers((prev) => prev.filter((u) => u.id !== id));
  };

  const f = (label, key, type = "text", opts = {}) => (
    <div style={{ marginBottom: 14 }}>
      <label style={{ display: "block", fontSize: 13, fontWeight: 600, color: "#374151", marginBottom: 4 }}>{label}</label>
      {opts.select ? (
        <select value={form[key]} onChange={(e) => setForm((s) => ({ ...s, [key]: e.target.value }))}
          style={{ width: "100%", padding: "9px 12px", border: "1px solid #d1d5db", borderRadius: 8, fontSize: 14, outline: "none" }}>
          {Object.entries(ROLES).map(([v, r]) => <option key={v} value={v}>{r.label}</option>)}
        </select>
      ) : (
        <input type={type} value={form[key]} onChange={(e) => setForm((s) => ({ ...s, [key]: e.target.value }))}
          placeholder={opts.placeholder || ""}
          style={{ width: "100%", padding: "9px 12px", border: "1px solid #d1d5db", borderRadius: 8, fontSize: 14, boxSizing: "border-box", outline: "none" }} />
      )}
    </div>
  );

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
        <h2 style={{ margin: 0, fontSize: 22, fontWeight: 800 }}>👥 User Management</h2>
        <Btn onClick={openAdd}>+ Add User</Btn>
      </div>

      <Card>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 14 }}>
          <thead>
            <tr style={{ background: "#f8fafc" }}>
              {["Name", "Username", "Role", "Actions"].map((h) => (
                <th key={h} style={{ padding: "10px 14px", textAlign: "left", fontWeight: 700, borderBottom: "2px solid #e5e7eb" }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {users.map((u) => (
              <tr key={u.id} style={{ borderBottom: "1px solid #f3f4f6" }}>
                <td style={{ padding: "11px 14px", fontWeight: 600 }}>
                  {u.name}
                  {u.username === currentUser.username && <span style={{ marginLeft: 6, fontSize: 11, background: "#dbeafe", color: "#1d4ed8", padding: "2px 8px", borderRadius: 20, fontWeight: 700 }}>You</span>}
                </td>
                <td style={{ padding: "11px 14px", color: "#6b7280", fontFamily: "monospace" }}>@{u.username}</td>
                <td style={{ padding: "11px 14px" }}>
                  <span style={{ background: ROLES[u.role]?.bg, color: ROLES[u.role]?.color, padding: "3px 12px", borderRadius: 20, fontSize: 12, fontWeight: 700 }}>
                    {ROLES[u.role]?.label || u.role}
                  </span>
                </td>
                <td style={{ padding: "11px 14px" }}>
                  <div style={{ display: "flex", gap: 8 }}>
                    <Btn small onClick={() => openEdit(u)}>Edit</Btn>
                    {u.username !== currentUser.username && (
                      <Btn small color="danger" onClick={() => del(u.id)}>Delete</Btn>
                    )}
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </Card>

      {modal && (
        <Modal title={modal === "add" ? "Add New User" : `Edit: ${modal.name}`} onClose={() => setModal(null)}>
          {f("Full Name *", "name", "text", { placeholder: "e.g. Ali Hassan" })}
          {f("Username *", "username", "text", { placeholder: "e.g. alihassan" })}
          {f(modal === "add" ? "Password *" : "New Password (blank = no change)", "password", "password", { placeholder: "••••••••" })}
          {f("Role *", "role", "text", { select: true })}
          {err && <div style={{ color: "#dc2626", fontSize: 13, marginBottom: 10, fontWeight: 600 }}>⚠️ {err}</div>}
          <div style={{ display: "flex", justifyContent: "flex-end", gap: 10, marginTop: 4 }}>
            <Btn color="gray" onClick={() => setModal(null)}>Cancel</Btn>
            <Btn onClick={save}>{modal === "add" ? "Add User" : "Save Changes"}</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}

function LoginScreen({ users, onLogin, pharmName }) {
  const [username, setUsername] = useState("");
  const [password, setPassword] = useState("");
  const [err, setErr]           = useState("");
  const [showPw, setShowPw]     = useState(false);

  const handle = () => {

    setErr("");
    onLogin(u);

  return (

          <div style={{ fontSize: 52, marginBottom: 10 }}>💊</div>

          <div style={{ fontSize: 13, color: "#6b7280", marginTop: 4 }}>Management System — Login</div>

        <div style={{ marginBottom: 14 }}>
          <label style={{ display: "block", fontSize: 13, fontWeight: 600, color: "#374151", marginBottom: 5 }}>Username</label>
          <input value={username} onChange={(e) => setUsername(e.target.value)} onKeyDown={(e) => e.key === "Enter" && handle()}

            style={{ width: "100%", padding: "11px 14px", border: "1.5px solid #e5e7eb", borderRadius: 10, fontSize: 14, boxSizing: "border-box", outline: "none" }} />

            <button onClick={() => setShowPw(!showPw)} style={{ position: "absolute", right: 12, top: "50%", transform: "translateY(-50%)", background: "none", border: "none", cursor: "pointer", fontSize: 16, color: "#6b7280" }}>
              {showPw ? "🙈" : "👁️"}
            </button>
          </div>
        </div>

        {err && <div style={{ color: "#dc2626", fontSize: 13, fontWeight: 600, marginBottom: 10, textAlign: "center" }}>{err}</div>}

        <button onClick={handle}
          style={{ width: "100%", background: "linear-gradient(135deg,#1e3a8a,#1d4ed8)", color: "#fff", border: "none", borderRadius: 11, padding: "13px", fontSize: 15, fontWeight: 800, cursor: "pointer", marginTop: 10 }}>
          🔓 Login
        </button>


      </div>
    </div>
  );
}

// ─── PATIENT CHECKUP FORM ────────────────────────────────────────────────────
function PatientCheckup({ data, setData, currentUser }) {
  const toast = useToast();
  const EMPTY = {
    doctorId:"", patientName:"", checkupFee:"", bp:"",
    serviceFee:"", diagnosis:"", medicines:[], notes:"",
  };
  const [form, setForm]         = useState({...EMPTY});
  const [medSearch, setMedSearch] = useState("");
  const [viewRec, setViewRec]   = useState(null);

  const doctors = data.doctors || [];
  const records = data.patientRecords || [];

  const sf = k => v => setForm(f=>({...f,[k]:v}));

  const addMedicine = (prod) => {
    if (form.medicines.find(m=>String(m.productId)===String(prod.id))) {
      toast("Already added!", "warning"); return;
    }
    setForm(f=>({...f, medicines:[...f.medicines, {
      productId:String(prod.id), name:prod.name,
      price:prod.price, qty:1, unit:prod.unit||"",
    }]}));
    setMedSearch("");
  };

  const updateMedQty = (pid, qty) => {
    setForm(f=>({...f, medicines:f.medicines.map(m=>
      String(m.productId)===String(pid)?{...m,qty:Math.max(1,+qty||1)}:m
    )}));
  };

  const removeMed = pid => setForm(f=>({...f, medicines:f.medicines.filter(m=>String(m.productId)!==String(pid))}));

  const medTotal   = form.medicines.reduce((s,m)=>s+(m.price*m.qty),0);
  const checkupFee = +form.checkupFee||0;
  const serviceFee = +form.serviceFee||0;
  const grandTotal = checkupFee + serviceFee + medTotal;

  const filteredProds = medSearch.length>1
    ? data.products.filter(p=>p.name.toLowerCase().includes(medSearch.toLowerCase())).slice(0,8)
    : [];

  const submit = () => {
    if (!form.doctorId)    return toast("Doctor select karein!", "error");
    if (!form.patientName) return toast("Patient name likhein!", "error");
    if (!checkupFee)       return toast("Checkup fee likhein!", "error");

    const doctor = doctors.find(d=>String(d.id)===String(form.doctorId));
    if (!doctor) return toast("Doctor nahi mila!", "error");

    const recId   = `PAT-${String((records.length+1)).padStart(4,"0")}`;
    const invId   = `INV-PAT-${String((data.invoices.length+1)).padStart(3,"0")}`;
    const today   = new Date().toISOString().split("T")[0];

    // Doctor fee share
    const sharePercent = +(doctor.feeShare||0);
    const doctorShare  = (checkupFee * sharePercent / 100);
    const storeShare   = checkupFee - doctorShare;

    const record = {
      id: recId, date: today,
      doctorId: String(form.doctorId), doctorName: doctor.name,
      patientName: form.patientName,
      checkupFee, serviceFee, bp: form.bp,
      diagnosis: form.diagnosis, notes: form.notes,
      medicines: form.medicines,
      medTotal, grandTotal,
      invoiceId: invId,
      doctorShare, storeShare, sharePercent,
      createdBy: currentUser?.name||"System",
    };

    // Invoice for medicines
    const invoice = form.medicines.length > 0 ? {
      id: invId, date: today,
      customerId: "clinic", customerName: form.patientName,
      items: form.medicines.map(m=>({productId:m.productId,name:m.name,qty:m.qty,price:m.price})),
      subtotal: medTotal, discount:0, tax:0,
      total: grandTotal, paid: grandTotal,
      status:"paid",
      notes:`Patient: ${form.patientName} | Dr. ${doctor.name} | ${form.diagnosis||""}`,
      createdBy: currentUser?.name||"System",
    } : null;

    setData(d => ({
      ...d,
      patientRecords: [...(d.patientRecords||[]), record],
      // Deduct medicine stock
      products: d.products.map(p=>{
        const m = form.medicines.find(x=>String(x.productId)===String(p.id));
        return m ? {...p, stock:Math.max(0, p.stock-m.qty)} : p;
      }),
      // Add invoice
      invoices: invoice ? [...d.invoices, invoice] : d.invoices,
      // Add to accounts
      accounts: [...d.accounts,
        { id:Date.now(), date:today, type:"income", category:"Clinic",
          description:`${recId} - Checkup: ${form.patientName} | Dr.${doctor.name}`,
          amount: checkupFee + serviceFee },
        ...(medTotal>0 ? [{
          id:Date.now()+1, date:today, type:"income", category:"Sales",
          description:`${invId} - Medicine: ${form.patientName}`, amount:medTotal,
        }] : []),
      ],
      // Add doctor pending share
      doctors: (d.doctors||[]).map(doc=>
        String(doc.id)===String(form.doctorId)
          ? {...doc, pendingAmount:(+doc.pendingAmount||0)+doctorShare}
          : doc
      ),
    }));

    toast(`✅ ${recId} — ${form.patientName} checkup complete! Dr.${doctor.name} share: ${fmt(doctorShare)}`, "success");
    setViewRec(record);
    setForm({...EMPTY});
  };

  return (
    <div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
        {/* Left: Form */}
        <Card>
          <div style={{fontWeight:800,fontSize:15,marginBottom:16,color:"#1d4ed8"}}>🩺 New Patient Checkup</div>

          {/* Doctor */}
          <div style={{marginBottom:12}}>
            <label style={{display:"block",fontSize:13,fontWeight:700,marginBottom:5}}>Doctor *</label>
            <select value={form.doctorId} onChange={e=>sf("doctorId")(e.target.value)}
              style={{width:"100%",padding:"9px 12px",border:"1.5px solid #d1d5db",borderRadius:8,fontSize:14,outline:"none"}}>
              <option value="">-- Doctor Select Karein --</option>
              {doctors.map(d=>(
                <option key={d.id} value={d.id}>Dr. {d.name} ({d.feeShare||0}% share)</option>
              ))}
            </select>
            {doctors.length===0 && <div style={{fontSize:11,color:"#dc2626",marginTop:4}}>⚠️ Pehle Doctor List mein doctor add karein</div>}
          </div>

          {/* Patient Name */}
          <div style={{marginBottom:12}}>
            <label style={{display:"block",fontSize:13,fontWeight:700,marginBottom:5}}>Patient Name *</label>
            <input value={form.patientName} onChange={e=>sf("patientName")(e.target.value)}
              placeholder="Patient ka naam"
              style={{width:"100%",padding:"9px 12px",border:"1.5px solid #d1d5db",borderRadius:8,fontSize:14,outline:"none"}}/>
          </div>

          {/* Fees row */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
            <div style={{marginBottom:12}}>
              <label style={{display:"block",fontSize:13,fontWeight:700,marginBottom:5}}>Checkup Fee *</label>
              <input type="number" value={form.checkupFee} onChange={e=>sf("checkupFee")(e.target.value)}
                placeholder="e.g. 500"
                style={{width:"100%",padding:"9px 12px",border:"1.5px solid #d1d5db",borderRadius:8,fontSize:14,outline:"none"}}/>
            </div>
            <div style={{marginBottom:12}}>
              <label style={{display:"block",fontSize:13,fontWeight:700,marginBottom:5}}>BP</label>
              <input value={form.bp} onChange={e=>sf("bp")(e.target.value)}
                placeholder="e.g. 120/80"
                style={{width:"100%",padding:"9px 12px",border:"1.5px solid #d1d5db",borderRadius:8,fontSize:14,outline:"none"}}/>
            </div>
            <div style={{marginBottom:12}}>
              <label style={{display:"block",fontSize:13,fontWeight:700,marginBottom:5}}>Service Fee</label>
              <input type="number" value={form.serviceFee} onChange={e=>sf("serviceFee")(e.target.value)}
                placeholder="e.g. 100"
                style={{width:"100%",padding:"9px 12px",border:"1.5px solid #d1d5db",borderRadius:8,fontSize:14,outline:"none"}}/>
            </div>
            <div style={{marginBottom:12}}>
              <label style={{display:"block",fontSize:13,fontWeight:700,marginBottom:5}}>Diagnosis</label>
              <input value={form.diagnosis} onChange={e=>sf("diagnosis")(e.target.value)}
                placeholder="e.g. Flu, Diabetes..."
                style={{width:"100%",padding:"9px 12px",border:"1.5px solid #d1d5db",borderRadius:8,fontSize:14,outline:"none"}}/>
            </div>
          </div>

          {/* Medicine Search */}
          <div style={{marginBottom:8}}>
            <label style={{display:"block",fontSize:13,fontWeight:700,marginBottom:5}}>💊 Medicine Add Karein</label>
            <div style={{position:"relative"}}>
              <input value={medSearch} onChange={e=>setMedSearch(e.target.value)}
                placeholder="Product name type karein..."
                style={{width:"100%",padding:"9px 12px",border:"1.5px solid #93c5fd",borderRadius:8,fontSize:14,outline:"none"}}/>
              {filteredProds.length>0 && (
                <div style={{position:"absolute",top:"100%",left:0,right:0,background:"#fff",border:"1.5px solid #e5e7eb",borderRadius:8,zIndex:100,boxShadow:"0 4px 16px rgba(0,0,0,.1)",maxHeight:200,overflowY:"auto"}}>
                  {filteredProds.map(p=>(
                    <div key={p.id} onClick={()=>addMedicine(p)}
                      style={{padding:"9px 14px",cursor:"pointer",borderBottom:"1px solid #f3f4f6",fontSize:13,fontWeight:600}}
                      onMouseEnter={e=>e.currentTarget.style.background="#eff6ff"}
                      onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
                      💊 {p.name} — {fmt(p.price)} — Stock:{p.stock}
                    </div>
                  ))}
                </div>
              )}

// ─── DOCTOR LIST ─────────────────────────────────────────────────────────────
function DoctorList({ data, setData }) {
  const toast = useToast();
  const EMPTY = { name:"", phone:"", specialization:"", feeShare:"", notes:"" };
  const [modal, setModal] = useState(null);
  const [form, setForm]   = useState({...EMPTY});
  const [payModal, setPayModal] = useState(null);
  const [payAmt, setPayAmt] = useState("");
  const doctors = data.doctors || [];
  const records = data.patientRecords || [];

  const sf = k => v => setForm(f=>({...f,[k]:v}));

  const save = () => {
    if (!form.name) return toast("Doctor name zaroori!", "error");
    if (modal==="add") {
      setData(d=>({...d, doctors:[...(d.doctors||[]),{...form,id:Date.now(),feeShare:+form.feeShare||0,pendingAmount:0}]}));
      toast(`✅ Dr. ${form.name} add ho gaya!`,"success");
    } else {
      setData(d=>({...d, doctors:(d.doctors||[]).map(x=>x.id===form.id?{...x,...form,feeShare:+form.feeShare||0}:x)}));
      toast(`✅ Dr. ${form.name} update ho gaya!`,"success");
    }
    setModal(null); setForm({...EMPTY});
  };

  const del = doc => {
    if (!window.confirm(`Dr. ${doc.name} delete karein?`)) return;
    setData(d=>({...d,doctors:(d.doctors||[]).filter(x=>x.id!==doc.id)}));
    toast("🗑️ Doctor delete ho gaya","warning");
  };

  const payDoctor = (doc) => {
    if (!payAmt || +payAmt<=0) return toast("Amount likhein!","error");
    setData(d=>({
      ...d,
      doctors:(d.doctors||[]).map(x=>x.id===doc.id?{...x,pendingAmount:Math.max(0,(+x.pendingAmount||0)-(+payAmt))}:x),
      accounts:[...d.accounts,{
        id:Date.now(),date:new Date().toISOString().split("T")[0],
        type:"expense",category:"Doctor Payment",
        description:`Dr. ${doc.name} ko payment — Rs.${payAmt}`,
        amount:+payAmt,
      }],
    }));
    toast(`✅ Dr. ${doc.name} ko ${fmt(+payAmt)} payment ho gaya!`,"success");
    setPayModal(null); setPayAmt("");
  };

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div style={{fontWeight:800,fontSize:16}}>👨‍⚕️ Doctor List</div>
        <Btn onClick={()=>{setForm({...EMPTY});setModal("add");}}>+ Add Doctor</Btn>
      </div>

      {doctors.length===0 && (
        <div style={{textAlign:"center",padding:60,color:"#9ca3af"}}>
          <div style={{fontSize:48,marginBottom:12}}>👨‍⚕️</div>
          <div style={{fontWeight:600}}>Koi doctor nahi hai</div>
          <div style={{fontSize:13,marginTop:4}}>+ Add Doctor button se add karein</div>
        </div>
      )}

      {doctors.map(doc=>{
        const docRecs = records.filter(r=>String(r.doctorId)===String(doc.id));
        const totalEarned = docRecs.reduce((s,r)=>s+r.doctorShare,0);
        return (
          <Card key={doc.id} style={{marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:800,fontSize:15}}>Dr. {doc.name}</div>
                {doc.specialization && <div style={{color:"#6b7280",fontSize:13}}>🔬 {doc.specialization}</div>}
                {doc.phone && <div style={{color:"#374151",fontSize:13}}>📞 {doc.phone}</div>}
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:12,color:"#6b7280"}}>Fee Share</div>
                <div style={{fontWeight:800,fontSize:18,color:"#1d4ed8"}}>{doc.feeShare||0}%</div>
              </div>
            </div>

            {/* Stats */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginTop:12}}>
              <div style={{background:"#eff6ff",borderRadius:8,padding:"8px 12px",textAlign:"center"}}>
                <div style={{fontSize:11,color:"#6b7280"}}>Total Patients</div>
                <div style={{fontWeight:800,fontSize:18,color:"#1d4ed8"}}>{docRecs.length}</div>
              </div>
              <div style={{background:"#d1fae5",borderRadius:8,padding:"8px 12px",textAlign:"center"}}>
                <div style={{fontSize:11,color:"#6b7280"}}>Total Earned</div>
                <div style={{fontWeight:800,fontSize:14,color:"#16a34a"}}>{fmt(totalEarned)}</div>
              </div>
              <div style={{background:+doc.pendingAmount>0?"#fee2e2":"#f0fdf4",borderRadius:8,padding:"8px 12px",textAlign:"center"}}>
                <div style={{fontSize:11,color:"#6b7280"}}>Pending (Store Owes)</div>
                <div style={{fontWeight:800,fontSize:14,color:+doc.pendingAmount>0?"#dc2626":"#16a34a"}}>{fmt(+doc.pendingAmount||0)}</div>
              </div>
            </div>

            <div style={{display:"flex",gap:8,marginTop:12}}>
              {(+doc.pendingAmount||0)>0 && (
                <Btn small color="success" onClick={()=>{setPayModal(doc);setPayAmt("");}}>💰 Pay Doctor</Btn>
              )}
              <Btn small onClick={()=>{setForm({...doc,feeShare:String(doc.feeShare||"")});setModal("edit");}}>Edit</Btn>
              <Btn small color="danger" onClick={()=>del(doc)}>Delete</Btn>
            </div>
          </Card>
        );
      })}

      {/* Add/Edit Modal */}
      {modal && (
        <Modal title={modal==="add"?"➕ Add Doctor":"✏️ Edit Doctor"} onClose={()=>setModal(null)}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
            <div style={{marginBottom:12,gridColumn:"1/-1"}}>
              <label style={{display:"block",fontSize:13,fontWeight:700,marginBottom:5}}>Doctor Name *</label>
              <input value={form.name} onChange={e=>sf("name")(e.target.value)}
                placeholder="e.g. Ali Hassan"
                style={{width:"100%",padding:"9px 12px",border:"1.5px solid #d1d5db",borderRadius:8,fontSize:14,outline:"none"}}/>
            </div>
            <div style={{marginBottom:12}}>
              <label style={{display:"block",fontSize:13,fontWeight:700,marginBottom:5}}>Phone</label>
              <input value={form.phone||""} onChange={e=>sf("phone")(e.target.value)}
                placeholder="0300-1234567"
                style={{width:"100%",padding:"9px 12px",border:"1.5px solid #d1d5db",borderRadius:8,fontSize:14,outline:"none"}}/>
            </div>
            <div style={{marginBottom:12}}>
              <label style={{display:"block",fontSize:13,fontWeight:700,marginBottom:5}}>Specialization</label>
              <input value={form.specialization||""} onChange={e=>sf("specialization")(e.target.value)}
                placeholder="e.g. General, Cardiologist"
                style={{width:"100%",padding:"9px 12px",border:"1.5px solid #d1d5db",borderRadius:8,fontSize:14,outline:"none"}}/>
            </div>
            <div style={{marginBottom:12,gridColumn:"1/-1"}}>
              <label style={{display:"block",fontSize:13,fontWeight:700,marginBottom:5}}>Fee Share % (Checkup fee mein se doctor ka hissa)</label>
              <input type="number" min="0" max="100" value={form.feeShare||""} onChange={e=>sf("feeShare")(e.target.value)}
                placeholder="e.g. 70 (matlab 70% doctor ka, 30% store ka)"
                style={{width:"100%",padding:"9px 12px",border:"1.5px solid #d1d5db",borderRadius:8,fontSize:14,outline:"none"}}/>
            </div>
          </div>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
            <Btn color="gray" onClick={()=>setModal(null)}>Cancel</Btn>
            <Btn onClick={save}>💾 Save</Btn>
          </div>
        </Modal>
      )}

      {/* Pay Doctor Modal */}
      {payModal && (
        <Modal title={`💰 Pay Dr. ${payModal.name}`} onClose={()=>setPayModal(null)}>
          <div style={{background:"#fef3c7",borderRadius:8,padding:"10px 14px",marginBottom:14,fontSize:13,color:"#92400e",fontWeight:600}}>
            Pending Amount: {fmt(+payModal.pendingAmount||0)}
          </div>
          <div style={{marginBottom:14}}>
            <label style={{display:"block",fontSize:13,fontWeight:700,marginBottom:5}}>Payment Amount</label>
            <input type="number" value={payAmt} onChange={e=>setPayAmt(e.target.value)}
              placeholder={`Max: ${+payModal.pendingAmount||0}`}
              style={{width:"100%",padding:"9px 12px",border:"1.5px solid #d1d5db",borderRadius:8,fontSize:14,outline:"none"}}/>
          </div>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
            <Btn color="gray" onClick={()=>setPayModal(null)}>Cancel</Btn>
            <Btn color="success" onClick={()=>payDoctor(payModal)}>✅ Pay</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}

function EmployeeAdvance({ data, setData, currentUser }) {
  const toast = useToast();
  const employees = data.employees || [];
  const [empId, setEmpId]   = useState("");
  const [amount, setAmount] = useState("");
  const [reason, setReason] = useState("");
  const [recoverIn, setRecoverIn] = useState("");

  const selEmp = employees.find(e=>String(e.id)===String(empId));

  const give = () => {
    if (!empId)  return toast("Employee select karein!","error");
    if (!amount||+amount<=0) return toast("Amount likhein!","error");
    const rec = {
      id:Date.now(), empId:String(empId), empName:selEmp?.name,
      amount:+amount, reason, recoverIn,
      date:new Date().toISOString().split("T")[0],
      status:"pending", paidBy:currentUser?.name||"Admin",
    };
    setData(d=>({
      ...d,
      advanceRecords:[...(d.advanceRecords||[]),rec],
      employees:(d.employees||[]).map(e=>
        String(e.id)===String(empId)?{...e,pendingAdvance:(+e.pendingAdvance||0)+(+amount)}:e
      ),
      accounts:[...d.accounts,{
        id:Date.now(),date:rec.date,type:"expense",category:"Advance",
        description:`${selEmp?.name} — Advance ${reason?`(${reason})`:""}`,
        amount:+amount,
      }],
    }));
    toast(`✅ ${selEmp?.name} ko ${fmt(+amount)} advance diya!`,"success");
    setEmpId(""); setAmount(""); setReason(""); setRecoverIn("");
  };

  const recover = (rec) => {
    setData(d=>({
      ...d,
      advanceRecords:(d.advanceRecords||[]).map(r=>r.id===rec.id?{...r,status:"recovered"}:r),
      employees:(d.employees||[]).map(e=>
        String(e.id)===String(rec.empId)?{...e,pendingAdvance:Math.max(0,(+e.pendingAdvance||0)-rec.amount)}:e
      ),
    }));
    toast(`✅ ${rec.empName} ka advance recover ho gaya!`,"success");
  };

  return (
    <div style={{display:"grid",gridTemplateColumns:"1fr 1.5fr",gap:16}}>
      <Card>
        <div style={{fontWeight:800,fontSize:15,marginBottom:16,color:"#d97706"}}>💳 Give Advance</div>
        <div style={{marginBottom:12}}>
          <label style={{display:"block",fontSize:13,fontWeight:700,marginBottom:5}}>Employee *</label>
          <select value={empId} onChange={e=>setEmpId(e.target.value)}
            style={{width:"100%",padding:"9px 12px",border:"1.5px solid #d1d5db",borderRadius:8,fontSize:14,outline:"none"}}>
            <option value="">-- Select Employee --</option>
            {employees.filter(e=>e.status==="active").map(e=>(
              <option key={e.id} value={e.id}>{e.name} — Pending: {fmt(e.pendingAdvance||0)}</option>
            ))}
          </select>
        </div>
        <div style={{marginBottom:12}}>
          <label style={{display:"block",fontSize:13,fontWeight:700,marginBottom:5}}>Amount *</label>
          <input type="number" value={amount} onChange={e=>setAmount(e.target.value)} placeholder="e.g. 5000"
            style={{width:"100%",padding:"9px 12px",border:"1.5px solid #d1d5db",borderRadius:8,fontSize:14,outline:"none"}}/>
        </div>
        <div style={{marginBottom:12}}>
          <label style={{display:"block",fontSize:13,fontWeight:700,marginBottom:5}}>Reason</label>
          <input value={reason} onChange={e=>setReason(e.target.value)} placeholder="e.g. Medical, Personal"
            style={{width:"100%",padding:"9px 12px",border:"1.5px solid #d1d5db",borderRadius:8,fontSize:14,outline:"none"}}/>
        </div>
        <div style={{marginBottom:12}}>
          <label style={{display:"block",fontSize:13,fontWeight:700,marginBottom:5}}>Recover In</label>
          <input value={recoverIn} onChange={e=>setRecoverIn(e.target.value)} placeholder="e.g. 3 months"
            style={{width:"100%",padding:"9px 12px",border:"1.5px solid #d1d5db",borderRadius:8,fontSize:14,outline:"none"}}/>
        </div>
        <Btn color="warning" onClick={give} style={{width:"100%"}}>💳 Give Advance</Btn>
      </Card>

      <Card>
        <div style={{fontWeight:800,fontSize:15,marginBottom:12}}>📋 Advance Records</div>
        {(data.advanceRecords||[]).length===0 && <div style={{color:"#9ca3af",textAlign:"center",padding:30}}>Koi record nahi</div>}
        {[...(data.advanceRecords||[])].reverse().map(r=>(
          <div key={r.id} style={{padding:"10px 12px",borderRadius:9,border:"1px solid #e5e7eb",marginBottom:8,
            background:r.status==="recovered"?"#f0fdf4":"#fff"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div>
                <div style={{fontWeight:700}}>{r.empName}</div>
                <div style={{fontSize:12,color:"#6b7280"}}>{r.date} {r.reason?`· ${r.reason}`:""}</div>
                {r.recoverIn && <div style={{fontSize:11,color:"#d97706"}}>Recover in: {r.recoverIn}</div>}
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontWeight:800,fontSize:15,color:r.status==="recovered"?"#16a34a":"#dc2626"}}>{fmt(r.amount)}</div>
                <span style={{fontSize:11,padding:"2px 8px",borderRadius:20,fontWeight:700,
                  background:r.status==="recovered"?"#d1fae5":"#fee2e2",
                  color:r.status==="recovered"?"#065f46":"#991b1b"}}>
                  {r.status==="recovered"?"✅ Recovered":"⏳ Pending"}
                </span>
              </div>
            </div>
            {r.status==="pending" && (
              <button onClick={()=>recover(r)}
                style={{marginTop:8,padding:"5px 14px",background:"#d1fae5",color:"#065f46",border:"1px solid #86efac",
                  borderRadius:7,cursor:"pointer",fontWeight:700,fontSize:12}}>
                ✅ Mark Recovered
              </button>
            )}
          </div>
        ))}
      </Card>
    </div>
  );
}
