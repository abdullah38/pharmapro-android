  <script>

    window.__pharmaLibsReady = new Promise(function(resolve, reject) {
      var checks = 0;
      function checkLibs() {
        checks++;
        if (window.React && window.ReactDOM && window.Babel) {
          window.useState    = React.useState;
          window.useEffect   = React.useEffect;
          window.useCallback = React.useCallback;
          window.useRef      = React.useRef;
          window.createContext = React.createContext;
          window.useContext  = React.useContext;
          window.useMemo     = React.useMemo;
          resolve();
        } else if (checks > 100) {
          reject(new Error("Libraries timeout"));
        } else {
          setTimeout(checkLibs, 100);
        }
      }
      // Give scripts time to load
      setTimeout(checkLibs, 200);
    });

    window.__pharmaLibsReady.then(function() {
      var appScript = document.getElementById('__pharma_app');
      if (appScript) { Babel.transformScriptTags(); }
      var splash = document.getElementById('splash');
      if (splash) splash.style.display = 'none';

// ─── TOAST NOTIFICATION SYSTEM ───────────────────────────────────────────────
const ToastCtx = createContext(null);

function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  const add = useCallback((msg, type = "success") => {
    const id = Date.now() + Math.random();
    setToasts((t) => [...t, { id, msg, type }]);
    setTimeout(() => setToasts((t) => t.filter((x) => x.id !== id)), 3500);
  }, []);
  const remove = (id) => setToasts((t) => t.filter((x) => x.id !== id));

  const icons  = { success: "✅", error: "❌", warning: "⚠️", info: "ℹ️" };
  const colors = {
    success: { bg: "#f0fdf4", border: "#86efac", text: "#166534", icon: "#16a34a" },
    error:   { bg: "#fef2f2", border: "#fca5a5", text: "#991b1b", icon: "#dc2626" },
    warning: { bg: "#fffbeb", border: "#fcd34d", text: "#92400e", icon: "#d97706" },
    info:    { bg: "#eff6ff", border: "#93c5fd", text: "#1e40af", icon: "#1d4ed8" },
  };

  return (
    <ToastCtx.Provider value={add}>
      {children}
      <div style={{ position: "fixed", bottom: 20, left: 20, zIndex: 9999, display: "flex", flexDirection: "column-reverse", gap: 10, maxWidth: 360 }}>
        {toasts.map((t) => {
          const c = colors[t.type] || colors.success;
          return (
            <div key={t.id} style={{
              background: c.bg, border: `1.5px solid ${c.border}`, borderRadius: 12,
              padding: "12px 16px", display: "flex", alignItems: "flex-start", gap: 10,
              boxShadow: "0 4px 20px rgba(0,0,0,.12)",
              animation: "slideIn .25s ease",
            }}>
              <span style={{ fontSize: 18, flexShrink: 0 }}>{icons[t.type]}</span>
              <span style={{ fontSize: 14, fontWeight: 600, color: c.text, flex: 1, lineHeight: 1.4 }}>{t.msg}</span>
              <button onClick={() => remove(t.id)} style={{ background: "none", border: "none", cursor: "pointer", color: c.text, fontSize: 16, padding: 0, opacity: .6, flexShrink: 0 }}>✕</button>
            </div>
          );
        })}
      </div>
      <style>{`@keyframes slideIn { from { opacity:0; transform:translateX(-60px); } to { opacity:1; transform:translateX(0); } }`}</style>
    </ToastCtx.Provider>
  );
}
const useToast = () => useContext(ToastCtx);

// ─── GLOBAL CONFIRM DIALOG ───────────────────────────────────────────────────
const ConfirmCtx = createContext(null);
function ConfirmProvider({ children }) {
  const [cfg, setCfg] = useState(null); // {msg, resolve}
  const ask = useCallback((msg) => new Promise(res => setCfg({msg, resolve:res})), []);
  const answer = (v) => { cfg?.resolve(v); setCfg(null); };
  return (
    <ConfirmCtx.Provider value={ask}>
      {children}
      {cfg && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:99999,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{background:"#fff",borderRadius:16,padding:"28px 32px",maxWidth:360,width:"90%",boxShadow:"0 20px 60px rgba(0,0,0,.3)",textAlign:"center"}}>
            <div style={{fontSize:40,marginBottom:12}}>⚠️</div>
            <div style={{fontSize:16,fontWeight:700,color:"#1f2937",marginBottom:24,lineHeight:1.5}}>{cfg.msg}</div>
            <div style={{display:"flex",gap:12,justifyContent:"center"}}>
              <button onClick={()=>answer(false)}
                style={{padding:"10px 28px",borderRadius:10,border:"2px solid #e5e7eb",background:"#f9fafb",
                  fontWeight:700,fontSize:14,cursor:"pointer",color:"#374151"}}>
                Cancel
              </button>
              <button onClick={()=>answer(true)}
                style={{padding:"10px 28px",borderRadius:10,border:"none",background:"#dc2626",
                  fontWeight:700,fontSize:14,cursor:"pointer",color:"#fff"}}>
                Haan, Delete karo
              </button>
            </div>
          </div>
        </div>
      )}
    </ConfirmCtx.Provider>
  );
}
const useConfirm = () => useContext(ConfirmCtx);

// ─── SUPABASE CLIENT ─────────────────────────────────────────────────────────
const getSbConfig = () => {
  try {
    // Firebase mode — Supabase skip karo
    if (window.PHARMA_USE_FIREBASE && window.__firestore) {
      return { url: "firebase", key: "firebase", enabled: true, configCode: "", useFirebase: true };
    }
    // 1. supaconfig.js se check karo
    const sc = window.PHARMA_CONFIG;
    if (sc && sc.supabase_url && sc.supabase_key
        && sc.supabase_url !== "https://YOUR_PROJECT.supabase.co"
        && sc.supabase_key !== "YOUR_ANON_KEY_HERE") {
      const fromFile = { url: sc.supabase_url, key: sc.supabase_key, enabled: !!sc.auto_connect, configCode: "" };
      try { localStorage.setItem("pharma_db_config", JSON.stringify(fromFile)); } catch {}
      return fromFile;
    }
    // 2. Fallback: localStorage se
    const c = JSON.parse(localStorage.getItem("pharma_db_config") || "{}");
    return { url: c.url || "", key: c.key || "", enabled: !!c.enabled, configCode: c.configCode || "" };
  } catch { return { url: "", key: "", enabled: false, configCode: "" }; }
};


// ─── AUTO CONFIG LOADER FROM SUPABASE ────────────────────────────────────────
// Jab user pehli baar "Config Code" enter kare, credentials Supabase se load ho
// Config Code = aapka Supabase project ka short identifier (khud set karo)

async function fetchConfigFromSupabase(configUrl, configKey, configCode) {
  // configUrl/configKey = aapke Supabase project credentials
  // configCode = unique ID jo is config ko identify kare
  try {
    const headers = {
      "Content-Type":  "application/json",
      "apikey":        configKey,
      "Authorization": "Bearer " + configKey,
    };
    const url = configUrl.replace(/\/$/, "") + "/rest/v1/app_config?id=eq." + encodeURIComponent(configCode);
    const res = await fetch(url, { headers });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const rows = await res.json();
    if (!rows || !rows.length) return null;
    return {
      db_url:  rows[0].db_url  || rows[0].dburl  || "",
      db_key:  rows[0].db_key  || rows[0].dbkey  || "",
      pharmacy_name: rows[0].pharmacy_name || rows[0].pharmacyname || "",
    };
  } catch(e) {
    console.error("Config fetch error:", e.message);
    return null;
  }
}

async function saveConfigToSupabase(url, key, configCode, pharmacyName) {
  try {
    const headers = {
      "Content-Type":  "application/json",
      "apikey":        key,
      "Authorization": "Bearer " + key,
      "Prefer":        "resolution=merge-duplicates,return=minimal",
    };
    const body = JSON.stringify([{
      id:             configCode,
      db_url:         url,
      db_key:         key,
      pharmacy_name:  pharmacyName || "",
      updated_at:     new Date().toISOString(),
    }]);
    await fetch(url.replace(/\/$/, "") + "/rest/v1/app_config", {
      method: "POST", headers, body,
    });
    console.log("✅ Config saved to Supabase app_config");
  } catch(e) {
    console.warn("Config save error:", e.message);
  }
}

// ─── INDEXEDDB LOCAL DATABASE ────────────────────────────────────────────────
// Mirrors all data locally — works offline, syncs with Supabase when online
const IDB_NAME    = "PharmaPro";
const IDB_VERSION = 1;
const IDB_STORES  = ["products","customers","invoices","accounts","distributors",
                     "dist_history","returns","doctors","patient_records",
                     "employees","salary_records","advance_records",
                     "app_settings","app_users"];

let _idb = null;

function openIDB() {
  if (_idb) return Promise.resolve(_idb);
  return new Promise((res, rej) => {
    const req = indexedDB.open(IDB_NAME, IDB_VERSION);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      IDB_STORES.forEach(name => {
        if (!db.objectStoreNames.contains(name)) {
          db.createObjectStore(name, { keyPath: "id" });
        }
      });
    };
    req.onsuccess = e => { _idb = e.target.result; res(_idb); };
    req.onerror   = e => { console.error("IDB error:", e); rej(e); };
  });
}

// Save/update a record in IndexedDB
async function idbPut(storeName, record) {
  try {
    const db = await openIDB();
    return new Promise((res, rej) => {
      const tx = db.transaction(storeName, "readwrite");
      tx.objectStore(storeName).put(record);
      tx.oncomplete = () => res(true);
      tx.onerror    = e => rej(e);
    });
  } catch(e) { console.warn("IDB put error:", storeName, e); }
}

// Save multiple records
async function idbPutAll(storeName, records) {
  if (!records || !records.length) return;
  try {
    const db = await openIDB();
    return new Promise((res, rej) => {
      const tx = db.transaction(storeName, "readwrite");
      const store = tx.objectStore(storeName);
      records.forEach(r => store.put(r));
      tx.oncomplete = () => res(true);
      tx.onerror    = e => rej(e);
    });
  } catch(e) { console.warn("IDB putAll error:", storeName, e); }
}

// Delete a record by id
async function idbDel(storeName, id) {
  try {
    const db = await openIDB();
    return new Promise((res, rej) => {
      const tx = db.transaction(storeName, "readwrite");
      tx.objectStore(storeName).delete(id);
      tx.oncomplete = () => res(true);
      tx.onerror    = e => rej(e);
    });
  } catch(e) { console.warn("IDB del error:", storeName, e); }
}

// Get all records from a store
async function idbGetAll(storeName) {
  try {
    const db = await openIDB();
    return new Promise((res, rej) => {
      const tx = db.transaction(storeName, "readonly");
      const req = tx.objectStore(storeName).getAll();
      req.onsuccess = () => res(req.result || []);
      req.onerror   = e => rej(e);
    });
  } catch(e) { console.warn("IDB getAll error:", storeName, e); return []; }
}

// Save entire app data snapshot to IDB
async function idbSaveAll(data, settings, users) {
  const TABLE_KEY_MAP = {
    products:"products", customers:"customers", invoices:"invoices",
    accounts:"accounts", distributors:"distributors", distHistory:"dist_history",
    returns:"returns", doctors:"doctors", patientRecords:"patient_records",
    employees:"employees", salaryRecords:"salary_records", advanceRecords:"advance_records",
  };
  const jobs = [];
  for (const [jsKey, storeName] of Object.entries(TABLE_KEY_MAP)) {
    const arr = data[jsKey] || [];
    if (arr.length > 0) jobs.push(idbPutAll(storeName, arr));
  }
  if (settings) jobs.push(idbPut("app_settings", { id: "main", data: settings }));
  if (users && users.length) jobs.push(idbPutAll("app_users", users));
  await Promise.allSettled(jobs);
}

// Load entire app data from IDB
async function idbLoadAll() {
  const [products, customers, invoices, accounts, distributors,
         dist_history, returns_, doctors, patient_records,
         employees, salary_records, advance_records,
         app_settings_rows, app_users_rows] = await Promise.all([
    idbGetAll("products"), idbGetAll("customers"), idbGetAll("invoices"),
    idbGetAll("accounts"), idbGetAll("distributors"), idbGetAll("dist_history"),
    idbGetAll("returns"), idbGetAll("doctors"), idbGetAll("patient_records"),
    idbGetAll("employees"), idbGetAll("salary_records"), idbGetAll("advance_records"),
    idbGetAll("app_settings"), idbGetAll("app_users"),
  ]);
  const settings = app_settings_rows.find(r => r.id === "main")?.data || null;
  return {
    data: {
      products, customers, invoices, accounts,
      distributors, distHistory: dist_history,
      returns: returns_, doctors, patientRecords: patient_records,
      employees, salaryRecords: salary_records, advanceRecords: advance_records,
    },
    settings,
    users: app_users_rows,
  };
}


// ─── FIREBASE DB CLIENT (Supabase replacement) ───────────────────────────────
const makeFirebaseDb = () => {
  const db = window.__firestore;
  if (!db) return null;

  const TABLE_MAP = {
    products: "products", customers: "customers", invoices: "invoices",
    accounts: "accounts", distributors: "distributors", dist_history: "dist_history",
    returns: "returns", doctors: "doctors", patient_records: "patient_records",
    employees: "employees", salary_records: "salary_records",
    advance_records: "advance_records", app_settings: "app_settings",
    app_users: "app_users", app_config: "app_config",
  };

  return {
    loadAll: async function(table) {
      const snap = await db.collection(TABLE_MAP[table] || table).get();
      const rows = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      return this.denorm(table, rows);
    },

    upsert: async (table, rows) => {
      const arr = Array.isArray(rows) ? rows : [rows];
      if (!arr.length) return [];
      const batch = db.batch();
      arr.forEach(row => {
        if (!row.id) return;
        const ref = db.collection(TABLE_MAP[table] || table).doc(String(row.id));
        batch.set(ref, row, { merge: true });
      });
      await batch.commit();
      return arr;
    },

    del: async (table, filter) => {
      // filter format: "id=eq.123"
      const match = filter.match(/id=eq\.(.+)/);
      if (match) {
        await db.collection(TABLE_MAP[table] || table).doc(match[1]).delete();
      }
      return true;
    },

    test: async () => {
      await db.collection("app_settings").limit(1).get();
      return true;
    },

    denorm: (table, rows) => {
      const MAP = {
        unitqty:"unitQty", totalpurchases:"totalPurchases",
        customerid:"customerId", customername:"customerName",
        saletype:"saleType", discountpct:"discountPct",
        discounttype:"discountType", paymentmethod:"paymentMethod",
        paymentdetail:"paymentDetail", paymentname:"paymentName",
        createdby:"createdBy", creditlimit:"creditLimit",
        paymentterms:"paymentTerms", createdat:"createdAt",
        totalcost:"totalCost", paymentclear:"paymentClear",
        invoiceid:"invoiceId", doctorid:"doctorId",
        doctorname:"doctorName", patientname:"patientName",
        checkupfee:"checkupFee", servicefee:"serviceFee",
        medtotal:"medTotal", grandtotal:"grandTotal",
        doctorshare:"doctorShare", storeshare:"storeShare",
        sharepercent:"sharePercent", feeshare:"feeShare",
        pendingamount:"pendingAmount", fathername:"fatherName",
        joindate:"joinDate", bankaccount:"bankAccount",
        bankname:"bankName", pendingadvance:"pendingAdvance",
        empid:"empId", empname:"empName", recoverin:"recoverIn",
        paidby:"paidBy",
      };
      if (!rows || !rows.length) return rows;
      return rows.map(r => {
        const out = {};
        for (const k of Object.keys(r)) {
          out[MAP[k] || k] = r[k];
        }
        return out;
      });
    },
  };
};

// ─── SUPABASE CLIENT (kept for fallback, Firebase preferred) ─────────────────
const makeSb = (url, key) => {
  if (!url || !key) return null;
  const base = url.replace(/\/$/, "");
  const headers = {
    "Content-Type":  "application/json",
    "apikey":        key,
    "Authorization": "Bearer " + key,
  };

  // Generic REST call
  const call = async (path, method, body, extra = {}) => {
    const h = Object.assign({}, headers, extra);
    const opts = { method, headers: h };
    if (body !== null && body !== undefined) opts.body = JSON.stringify(body);
    const r = await fetch(base + "/rest/v1/" + path, opts);
    if (!r.ok) {
      const msg = await r.text().catch(() => r.statusText);
      throw new Error("[" + r.status + "] " + path + " → " + msg.slice(0, 200));
    }
    const txt = await r.text();
    try { return txt ? JSON.parse(txt) : []; } catch { return []; }
  };

  return {
    // Load ALL rows from a table (handles Supabase 1000-row limit)
    // Returns data with camelCase keys restored (denormalized)
    loadAll: async function(table) {
      let rows = [], offset = 0, limit = 1000;
      while (true) {
        const batch = await call(
          table + "?select=*&limit=" + limit + "&offset=" + offset,
          "GET", null
        );
        rows = rows.concat(batch || []);
        if (!batch || batch.length < limit) break;
        offset += limit;
      }
      return this.denorm(table, rows);
    },

    // Upsert (insert or update) — uses ON CONFLICT DO UPDATE
    // Lowercases all keys + strips any fields not in the table schema
    upsert: (table, rows) => {
      const arr = Array.isArray(rows) ? rows : [rows];
      if (!arr.length) return Promise.resolve([]);

      // Column whitelist per table — only send known columns
      const COLS = {
        products:        ["id","name","category","unit","unitqty","price","cost","margin","stock","reorder","expiry","supplier","barcode"],
        customers:       ["id","name","phone","email","address","balance","totalpurchases"],
        invoices:        ["id","date","customerid","customername","saletype","items","subtotal","discount","discountpct","discounttype","tax","total","paid","status","notes","paymentmethod","paymentdetail","paymentname","createdby"],
        accounts:        ["id","date","type","category","description","amount","reference","paymentmethod","paymentdetail","paymentname"],
        distributors:    ["id","name","company","phone","mobile","email","address","city","ntn","creditlimit","paymentterms","notes","balance","createdat"],
        dist_history:    ["id","date","distributor","items","totalcost","paymentclear","type"],
        returns:         ["id","date","type","invoiceid","customerid","customername","items","total","reason","createdby"],
        doctors:         ["id","name","phone","specialization","feeshare","pendingamount","notes"],
        patient_records: ["id","date","doctorid","doctorname","patientname","checkupfee","servicefee","bp","diagnosis","notes","medicines","medtotal","grandtotal","invoiceid","doctorshare","storeshare","sharepercent","createdby"],
        employees:       ["id","name","fathername","cnic","phone","address","designation","department","joindate","salary","bankaccount","bankname","pendingadvance","status","notes"],
        salary_records:  ["id","empid","empname","month","amount","deduction","net","note","date","paidby"],
        advance_records: ["id","empid","empname","amount","reason","recoverin","date","status","paidby"],
        app_settings:    ["id","data"],
        app_users:       ["id","name","username","password","role"],
        app_config:      ["id","db_url","db_key","pharmacy_name","updated_at"],
      };

      const allowed = COLS[table];
      // Step 1: normalize keys to lowercase + filter to whitelist
      const norm = arr.map(r => {
        const out = {};
        for (const k of Object.keys(r)) {
          const lk = k.toLowerCase();
          if (!allowed || allowed.includes(lk)) {
            out[lk] = r[k];
          }
        }
        return out;
      });

      // Step 2: PGRST102 fix — all rows must have IDENTICAL keys
      // Collect union of all keys in this batch
      const allKeys = allowed
        ? allowed  // use whitelist order (most reliable)
        : [...new Set(norm.flatMap(r => Object.keys(r)))];

      // Fill every row with null for any missing key
      const uniform = norm.map(r => {
        const out = {};
        for (const k of allKeys) {
          out[k] = r.hasOwnProperty(k) ? r[k] : null;
        }
        return out;
      });

      return call(table, "POST", uniform, {
        "Prefer": "resolution=merge-duplicates,return=minimal"
      });
    },

    // Denormalize: restore camelCase keys from DB response
    // (used when loading data back — maps lowercase DB cols to JS camelCase)
    denorm: (table, rows) => {
      // Field mapping: lowercase → camelCase
      const MAP = {
        unitqty:"unitQty", totalpurchases:"totalPurchases",
        customerid:"customerId", customername:"customerName",
        saletype:"saleType", discountpct:"discountPct",
        discounttype:"discountType", paymentmethod:"paymentMethod",
        paymentdetail:"paymentDetail", paymentname:"paymentName",
        createdby:"createdBy", creditlimit:"creditLimit",
        paymentterms:"paymentTerms", createdat:"createdAt",
        totalcost:"totalCost", paymentclear:"paymentClear",
        invoiceid:"invoiceId", doctorid:"doctorId",
        doctorname:"doctorName", patientname:"patientName",
        checkupfee:"checkupFee", servicefee:"serviceFee",
        medtotal:"medTotal", grandtotal:"grandTotal",
        doctorshare:"doctorShare", storeshare:"storeShare",
        sharepercent:"sharePercent", feeshare:"feeShare",
        pendingamount:"pendingAmount", fathername:"fatherName",
        joindate:"joinDate", bankaccount:"bankAccount",
        bankname:"bankName", pendingadvance:"pendingAdvance",
        empid:"empId", empname:"empName", recoverin:"recoverIn",
        paidby:"paidBy",
      };
      if (!rows || !rows.length) return rows;
      return rows.map(r => {
        const out = {};
        for (const k of Object.keys(r)) {
          out[MAP[k] || k] = r[k];
        }
        return out;
      });
    },

    // Delete by filter  e.g. "id=eq.123"
    del: (table, filter) => call(table + "?" + filter, "DELETE", null, {
      "Prefer": "return=minimal"
    }),

    // Test connection — just hits the root endpoint
    test: async () => {
      const r = await fetch(base + "/rest/v1/", { headers });
      if (r.status === 401 || r.status === 403)
        throw new Error("API key galat hai — anon public key use karein");
      if (r.status >= 500)
        throw new Error("Server error " + r.status);
      return true; // 200/404/406 all mean reachable
    },
  };
};

function badge(label, color) {
  const colors = {
    green: "background:#d1fae5;color:#065f46",
    red: "background:#fee2e2;color:#991b1b",
    yellow: "background:#fef3c7;color:#92400e",
    blue: "background:#dbeafe;color:#1e40af",

  return <span style={{ ...parseSt(colors[color] || colors.gray), padding: "2px 10px", borderRadius: 20, fontSize: 12, fontWeight: 600 }}>{label}</span>;

function parseSt(s) {
  return Object.fromEntries(s.split(";").map((p) => { const [k, v] = p.split(":"); return [k.trim().replace(/-([a-z])/g, (_, c) => c.toUpperCase()), v?.trim()]; }).filter(([k, v]) => k && v));
}

function Pager({ page, total, pageSize, onChange }) {
  const totalPages = Math.max(1, Math.ceil(total / pageSize));
  if (totalPages <= 1) return null;
  return (
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:10,paddingTop:10,borderTop:"1px solid #f3f4f6",flexWrap:"wrap",gap:6}}>
      <div style={{fontSize:11,color:"#6b7280"}}>{(page-1)*pageSize+1}–{Math.min(page*pageSize,total)} / {total}</div>
      <div style={{display:"flex",gap:4,alignItems:"center"}}>
        <button onClick={()=>onChange(Math.max(1,page-1))} disabled={page===1}
          style={{padding:"4px 10px",borderRadius:6,border:"1.5px solid #e5e7eb",background:page===1?"#f9fafb":"#fff",color:page===1?"#9ca3af":"#374151",cursor:page===1?"default":"pointer",fontWeight:700,fontSize:12}}>←</button>
        {Array.from({length:Math.min(5,totalPages)},(_,i)=>{
          let s=Math.max(1,page-2),e=Math.min(totalPages,s+4);s=Math.max(1,e-4);
          const pg=s+i; return pg<=e?(
          <button key={pg} onClick={()=>onChange(pg)}
            style={{padding:"4px 9px",borderRadius:6,border:"1.5px solid",minWidth:30,
              borderColor:pg===page?"#1d4ed8":"#e5e7eb",
              background:pg===page?"#1d4ed8":"#fff",
              color:pg===page?"#fff":"#374151",
              cursor:"pointer",fontWeight:700,fontSize:12}}>{pg}</button>
          ):null;
        })}
        <button onClick={()=>onChange(Math.min(totalPages,page+1))} disabled={page===totalPages}
          style={{padding:"4px 10px",borderRadius:6,border:"1.5px solid #e5e7eb",background:page===totalPages?"#f9fafb":"#fff",color:page===totalPages?"#9ca3af":"#374151",cursor:page===totalPages?"default":"pointer",fontWeight:700,fontSize:12}}>→</button>
      </div>
    </div>
  );
}

// ─── PRODUCTS ─────────────────────────────────────────────────────────────────
function PriceCalculator({ form, setForm }) {
  // Live calculations
  const salePrice   = parseFloat(form.price)    || 0;
  const units       = parseFloat(form.unitQty)  || 1;
  const marginPct   = parseFloat(form.margin)   || 0;

  // Per-unit sale price = total sale price ÷ units in pack
  const perUnitSalePrice = units > 0 ? salePrice / units : 0;

  // Cost price derived from margin:  cost = salePrice × (1 - margin/100)
  // margin = (salePrice - cost) / salePrice × 100
  const autoCost = marginPct > 0 && salePrice > 0
    ? salePrice * (1 - marginPct / 100)
    : parseFloat(form.cost) || 0;

  const perUnitCost  = units > 0 ? autoCost / units : 0;
  const profitPerPack = salePrice - autoCost;
  const profitPerUnit = perUnitSalePrice - perUnitCost;

  // Sync cost back into form whenever margin or price changes
  const handleMarginChange = (v) => {
    const m = parseFloat(v) || 0;
    const sp = parseFloat(form.price) || 0;
    const newCost = sp > 0 && m > 0 ? (sp * (1 - m / 100)).toFixed(2) : form.cost;
    setForm((f) => ({ ...f, margin: v, cost: newCost }));
  };

  const handlePriceChange = (v) => {
    const sp = parseFloat(v) || 0;
    const m  = parseFloat(form.margin) || 0;
    const newCost = sp > 0 && m > 0 ? (sp * (1 - m / 100)).toFixed(2) : form.cost;
    setForm((f) => ({ ...f, price: v, cost: newCost }));
  };

  const handleCostChange = (v) => {
    // If user types cost manually, recalculate margin
    const sp   = parseFloat(form.price) || 0;
    const cost = parseFloat(v) || 0;
    const newMargin = sp > 0 && cost > 0 ? (((sp - cost) / sp) * 100).toFixed(1) : form.margin;
    setForm((f) => ({ ...f, cost: v, margin: newMargin }));
  };

  const InfoBox = ({ label, value, highlight }) => (
    <div style={{
      textAlign: "center", padding: "10px 6px", borderRadius: 10,
      background: highlight ? "#eff6ff" : "#f8fafc",
      border: highlight ? "1.5px solid #93c5fd" : "1px solid #e5e7eb",
      flex: 1,
    }}>
      <div style={{ fontSize: 11, color: "#6b7280", fontWeight: 600, marginBottom: 3 }}>{label}</div>
      <div style={{ fontSize: 14, fontWeight: 800, color: highlight ? "#1d4ed8" : "#111827" }}>{value}</div>
    </div>
  );

  return (
    <div>
      {/* ── Row 1: Basic Info ── */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 16px" }}>
        <Input label="Product Name *" value={form.name || ""} onChange={(v) => setForm((f) => ({ ...f, name: v }))} />
        <Input label="Category" value={form.category || ""} onChange={(v) => setForm((f) => ({ ...f, category: v }))} />
        <Select label="Unit Type" value={form.unit || "Tablets"} onChange={(v) => setForm((f) => ({ ...f, unit: v }))}
          options={["Tablets","Syrup","Capsule","Injection","Surgical Item","Drops","Sachet","General Items","Eye Drops","Ear Drops","Ointment","Inhaler","Powder"].map(u=>({value:u,label:u}))} />
        <Input label="Supplier" value={form.supplier || ""} onChange={(v) => setForm((f) => ({ ...f, supplier: v }))} />
      </div>

      {/* ── Pricing Section ── */}
      <div style={{ background: "#f0f9ff", border: "1.5px solid #bfdbfe", borderRadius: 12, padding: "16px 16px 8px", marginBottom: 14 }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: "#1e40af", marginBottom: 12 }}>💰 Pricing & Margin Calculator</div>

        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 16px" }}>
          {/* Sale Price */}
          <div style={{ marginBottom: 14 }}>
            <label style={{ display: "block", marginBottom: 4, fontSize: 13, fontWeight: 600, color: "#374151" }}>
              Sale Price (Rs.) — Total Pack *
            </label>
            <input
              type="number" value={form.price || ""}
              onChange={(e) => handlePriceChange(e.target.value)}
              placeholder="e.g. 120"
              style={{ width: "100%", padding: "8px 12px", border: "2px solid #3b82f6", borderRadius: 8, fontSize: 14, boxSizing: "border-box", outline: "none", background: "#fff", fontWeight: 700 }}
            />
          </div>

          {/* Units in pack */}
          <div style={{ marginBottom: 14 }}>
            <label style={{ display: "block", marginBottom: 4, fontSize: 13, fontWeight: 600, color: "#374151" }}>
              Units in Pack (for per-unit price)
            </label>
            <input
              type="number" value={form.unitQty || ""}
              onChange={(e) => setForm((f) => ({ ...f, unitQty: e.target.value }))}
              placeholder="e.g. 10 (tablets in strip)"
              style={{ width: "100%", padding: "8px 12px", border: "1px solid #d1d5db", borderRadius: 8, fontSize: 14, boxSizing: "border-box", outline: "none" }}
            />
          </div>
        </div>

        {/* Per-unit result banner */}
        {salePrice > 0 && units > 1 && (
          <div style={{ background: "#dbeafe", borderRadius: 8, padding: "8px 14px", marginBottom: 12, display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontSize: 16 }}>🔢</span>
            <span style={{ fontSize: 14, fontWeight: 700, color: "#1e40af" }}>
              Per Unit Sale Price: <span style={{ color: "#1d4ed8", fontSize: 16 }}>Rs. {perUnitSalePrice.toFixed(2)}</span>
              <span style={{ color: "#6b7280", fontWeight: 400 }}> &nbsp;({fmt(salePrice)} ÷ {units} units)</span>
            </span>
          </div>
        )}

        {/* Margin % */}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 16px" }}>
          <div style={{ marginBottom: 14 }}>
            <label style={{ display: "block", marginBottom: 4, fontSize: 13, fontWeight: 600, color: "#374151" }}>
              Profit Margin %
            </label>
            <div style={{ position: "relative" }}>
              <input
                type="number" value={form.margin || ""}
                onChange={(e) => handleMarginChange(e.target.value)}
                placeholder="e.g. 25"
                style={{ width: "100%", padding: "8px 36px 8px 12px", border: "2px solid #10b981", borderRadius: 8, fontSize: 14, boxSizing: "border-box", outline: "none", background: "#fff", fontWeight: 700 }}
              />
              <span style={{ position: "absolute", right: 10, top: "50%", transform: "translateY(-50%)", fontSize: 14, color: "#10b981", fontWeight: 700 }}>%</span>
            </div>
            <div style={{ fontSize: 11, color: "#6b7280", marginTop: 3 }}>
              Margin % = (Sale − Cost) ÷ Sale × 100
            </div>
          </div>

          {/* Cost Price — auto or manual */}
          <div style={{ marginBottom: 14 }}>
            <label style={{ display: "block", marginBottom: 4, fontSize: 13, fontWeight: 600, color: "#374151" }}>
              Cost Price (Rs.) — auto from margin
            </label>
            <input
              type="number" value={form.cost || ""}
              onChange={(e) => handleCostChange(e.target.value)}
              placeholder="Auto-calculated"
              style={{ width: "100%", padding: "8px 12px", border: "1px solid #d1d5db", borderRadius: 8, fontSize: 14, boxSizing: "border-box", outline: "none", background: "#f9fafb" }}
            />
            <div style={{ fontSize: 11, color: "#6b7280", marginTop: 3 }}>
              Edit cost → margin updates automatically
            </div>
          </div>
        </div>

        {/* Live Summary Boxes */}
        {salePrice > 0 && autoCost > 0 && (
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 6 }}>
            <InfoBox label="Sale / Pack" value={fmt(salePrice)} />
            <InfoBox label="Cost / Pack" value={fmt(autoCost)} />
            <InfoBox label="Profit / Pack" value={fmt(profitPerPack)} highlight />
            <InfoBox label="Margin %" value={`${marginPct > 0 ? marginPct : (salePrice > 0 && autoCost > 0 ? (((salePrice - autoCost) / salePrice) * 100).toFixed(1) : 0)}%`} highlight />
            {units > 1 && <InfoBox label={`Profit / Unit`} value={fmt(profitPerUnit)} />}
            {units > 1 && <InfoBox label={`Cost / Unit`} value={fmt(perUnitCost)} />}
          </div>
        )}
      </div>

      {/* ── Stock Info ── */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "0 16px" }}>
        <Input label="Current Stock (Packs)" type="number" value={form.stock || ""} onChange={(v) => setForm((f) => ({ ...f, stock: v }))} />
        <Input label="Reorder Level" type="number" value={form.reorder || ""} onChange={(v) => setForm((f) => ({ ...f, reorder: v }))} />
        <Input label="Expiry Date" type="date" value={form.expiry || ""} onChange={(v) => setForm((f) => ({ ...f, expiry: v }))} />
      </div>
    </div>
  );
}

// ─── BARCODE SCANNER COMPONENT ───────────────────────────────────────────────
function BarcodeScanner({ onDetected, onClose }) {
  const videoRef   = useRef(null);
  const canvasRef  = useRef(null);
  const streamRef  = useRef(null);
  const rafRef     = useRef(null);
  const doneRef    = useRef(false);
  const [status, setStatus]   = useState("starting");
  const [errMsg, setErrMsg]   = useState("");
  const [manualCode, setManualCode] = useState("");
  const [scanMethod, setScanMethod] = useState(""); // "native" | "canvas"

  useEffect(() => {
    let cancelled = false;

    const done = (code) => {
      if (doneRef.current || cancelled) return;
      doneRef.current = true;
      cancelAnimationFrame(rafRef.current);
      if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop());
      onDetected(code);
    };

    const startCamera = async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: "environment" }, width: { ideal: 1280 }, height: { ideal: 720 } }
        });
        if (cancelled) { stream.getTracks().forEach(t => t.stop()); return; }
        streamRef.current = stream;
        if (videoRef.current) {
          videoRef.current.srcObject = stream;
          await new Promise(r => { videoRef.current.onloadedmetadata = r; });
          videoRef.current.play();
        }

        // --- Method 1: Native BarcodeDetector (Chrome/Edge/Android) ---
        if ("BarcodeDetector" in window) {
          setScanMethod("native");
          setStatus("scanning");
          const detector = new window.BarcodeDetector({
            formats: ["ean_13","ean_8","code_128","code_39","qr_code","upc_a","upc_e","codabar","itf","data_matrix","pdf417","aztec"]
          });
          const scan = async () => {
            if (cancelled || doneRef.current) return;
            try {
              const results = await detector.detect(videoRef.current);
              if (results.length > 0) { done(results[0].rawValue); return; }
            } catch {}
            rafRef.current = requestAnimationFrame(scan);
          };
          rafRef.current = requestAnimationFrame(scan);
        }
        // --- Method 2: Canvas + ZXing via jsDelivr (more reliable CDN) ---
        else {
          setScanMethod("canvas");
          setStatus("loading_lib");
          // Load from jsDelivr — more reliable than cdnjs for this package
          const loaded = await new Promise(res => {
            if (window.ZXing) { res(true); return; }
            const s = document.createElement("script");
            s.src = "https://cdn.jsdelivr.net/npm/@zxing/library@0.19.1/umd/index.min.js";
            s.onload = () => res(true);
            s.onerror = () => {
              // Fallback to unpkg
              const s2 = document.createElement("script");
              s2.src = "https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js";
              s2.onload = () => res(true);
              s2.onerror = () => res(false);
              document.head.appendChild(s2);
            };
            document.head.appendChild(s);
          });

          if (!loaded || !window.ZXing) {
            // Library failed — still show camera, just no auto decode
            setStatus("scanning_manual");
            return;
          }

          setStatus("scanning");
          const hints = new Map();
          hints.set(window.ZXing.DecodeHintType.TRY_HARDER, true);
          const reader = new window.ZXing.BrowserMultiFormatReader(hints, 400);
          try {
            await reader.decodeFromVideoElement(videoRef.current, (result, err) => {
              if (cancelled || doneRef.current) return;
              if (result) done(result.getText());
            });
          } catch {}
        }
      } catch (e) {
        if (cancelled) return;
        setStatus("error");
        if (e.name === "NotAllowedError")  setErrMsg("Camera permission deny ho gayi. Browser address bar mein camera allow karein.");
        else if (e.name === "NotFoundError") setErrMsg("Koi camera nahi mila. Manual barcode enter karein.");
        else setErrMsg(e.message || "Camera start nahi ho saka.");
      }
    };

    startCamera();
    return () => {
      cancelled = true;
      cancelAnimationFrame(rafRef.current);
      if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop());
    };
  }, []);

  const statusLabel = {
    starting:       "📷 Camera start ho raha hai...",
    loading_lib:    "⏳ Scanner load ho raha hai...",
    scanning:       "✅ Scanner ready — barcode frame mein lao",
    scanning_manual:"📷 Camera on hai — ya manual barcode enter karein",
    error:          null,
  };

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.88)", zIndex:9998, display:"flex", alignItems:"center", justifyContent:"center" }} onClick={e => e.target===e.currentTarget && onClose()}>
      <div style={{ background:"#0f172a", borderRadius:20, padding:22, width:380, maxWidth:"96vw", color:"#fff", boxShadow:"0 32px 80px rgba(0,0,0,.6)" }}>

        {/* Header */}
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
          <div style={{ fontWeight:800, fontSize:17 }}>📷 Barcode / QR Scanner</div>
          <button onClick={onClose} style={{ background:"rgba(255,255,255,.12)", border:"none", color:"#fff", borderRadius:8, padding:"5px 12px", cursor:"pointer", fontSize:18, lineHeight:1 }}>✕</button>
        </div>

        {/* Camera box */}
        <div style={{ position:"relative", borderRadius:14, overflow:"hidden", background:"#000", marginBottom:14, height:240 }}>
          <video ref={videoRef} style={{ width:"100%", height:"100%", objectFit:"cover", display:"block" }} muted playsInline />
          <canvas ref={canvasRef} style={{ display:"none" }} />

          {/* Scanning frame overlay */}
          {(status === "scanning" || status === "scanning_manual") && (
            <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center", pointerEvents:"none" }}>
              <div style={{ width:230, height:145, position:"relative" }}>
                {/* Corner L-shapes */}
                {[{t:0,l:0},{t:0,r:0},{b:0,l:0},{b:0,r:0}].map((c,i) => (
                  <div key={i} style={{ position:"absolute", width:22, height:22, ...c,
                    borderTop:    c.t===0 ? "3px solid #22d3ee" : "none",
                    borderBottom: c.b===0 ? "3px solid #22d3ee" : "none",
                    borderLeft:   c.l===0 ? "3px solid #22d3ee" : "none",
                    borderRight:  c.r===0 ? "3px solid #22d3ee" : "none",
                  }} />
                ))}
                <div style={{ position:"absolute", left:0, right:0, height:2, top:"50%",
                  background:"linear-gradient(90deg,transparent 0%,#22d3ee 30%,#22d3ee 70%,transparent 100%)",
                  animation:"scanPulse 1.8s ease-in-out infinite" }} />
              </div>
              <div style={{ position:"absolute", bottom:8, fontSize:11, color:"rgba(255,255,255,.7)" }}>
                Barcode ko frame ke beech rakhein
              </div>
            </div>
          )}

          {/* Status overlay */}
          {status !== "scanning" && status !== "scanning_manual" && (
            <div style={{ position:"absolute", inset:0, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:10, padding:16, textAlign:"center", background:"rgba(0,0,0,.5)" }}>
              <div style={{ fontSize:36 }}>{status==="error" ? "📵" : "⏳"}</div>
              <div style={{ fontSize:13, color: status==="error" ? "#f87171" : "#94a3b8" }}>
                {status==="error" ? errMsg : statusLabel[status]}
              </div>
            </div>
          )}
        </div>

        {/* Supported formats pill */}
        <div style={{ fontSize:11, color:"#475569", marginBottom:12, textAlign:"center" }}>
          Supports: EAN-13 · EAN-8 · Code128 · QR · UPC-A · UPC-E · Code39 · DataMatrix
        </div>

        {/* Divider */}
        <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:12 }}>
          <div style={{ flex:1, height:1, background:"rgba(255,255,255,.1)" }} />
          <span style={{ fontSize:12, color:"#64748b" }}>ya manually type karein</span>
          <div style={{ flex:1, height:1, background:"rgba(255,255,255,.1)" }} />
        </div>

        {/* Manual entry */}
        <div style={{ display:"flex", gap:8 }}>
          <input value={manualCode} onChange={e=>setManualCode(e.target.value)}
            onKeyDown={e=>e.key==="Enter" && manualCode.trim() && onDetected(manualCode.trim())}
            placeholder="Barcode number (e.g. 8901030865466)"
            style={{ flex:1, padding:"10px 12px", borderRadius:9, border:"1px solid rgba(255,255,255,.18)", background:"rgba(255,255,255,.07)", color:"#fff", fontSize:14, outline:"none" }} />
          <button onClick={()=>manualCode.trim() && onDetected(manualCode.trim())}
            style={{ padding:"10px 18px", background:"#1d4ed8", border:"none", borderRadius:9, color:"#fff", fontWeight:800, cursor:"pointer", fontSize:16 }}>→</button>
        </div>
      </div>
      <style>{`@keyframes scanPulse{0%,100%{opacity:.4;transform:scaleX(.7)}50%{opacity:1;transform:scaleX(1)}}`}</style>
    </div>
  );
}

// ─── BARCODE LOOKUP — fetch product info from Open Food Facts / OpenFDA ───────
async function lookupBarcode(barcode) {
  const result = { barcode, name: "", brand: "", category: "", found: false, source: "" };
  try {
    // 1. Try Open Food Facts (great for pharma/FMCG)
    const r1 = await fetch(`https://world.openfoodfacts.org/api/v0/product/${barcode}.json`);
    const d1 = await r1.json();
    if (d1.status === 1 && d1.product) {
      const p = d1.product;
      result.name     = p.product_name || p.product_name_en || "";
      result.brand    = p.brands || "";
      result.category = p.categories?.split(",")[0]?.trim() || "";
      result.found    = true;
      result.source   = "Open Food Facts";
      return result;
    }
  } catch {}
  try {
    // 2. Try Open Beauty Facts (cosmetics/pharma)
    const r2 = await fetch(`https://world.openbeautyfacts.org/api/v0/product/${barcode}.json`);
    const d2 = await r2.json();
    if (d2.status === 1 && d2.product) {
      const p = d2.product;
      result.name     = p.product_name || "";
      result.brand    = p.brands || "";
      result.category = p.categories?.split(",")[0]?.trim() || "";
      result.found    = true;
      result.source   = "Open Beauty Facts";
      return result;
    }
  } catch {}
  try {
    // 3. Try UPC Item DB
    const r3 = await fetch(`https://api.upcitemdb.com/prod/trial/lookup?upc=${barcode}`);
    const d3 = await r3.json();
    if (d3.code === "OK" && d3.items?.length > 0) {
      const item = d3.items[0];
      result.name     = item.title || "";
      result.brand    = item.brand || "";
      result.category = item.category || "";
      result.found    = true;
      result.source   = "UPC Item DB";
      return result;
    }
  } catch {}
  return result; // not found — manual fill karo
}

// ─── PRODUCTS ─────────────────────────────────────────────────────────────────
function Products({ data, setData }) {
  const toast = useToast();
  const [search, setSearch]       = useState("");
  const [modal, setModal]         = useState(null);
  const [form, setForm]           = useState({});
  const [showScanner, setShowScanner] = useState(false);
  const [lookupStatus, setLookupStatus] = useState(null);
  const [lookupSource, setLookupSource] = useState("");
  const [page, setPage]           = useState(1);
  const PAGE_SIZE = 15;

  const filtered = data.products.filter((p) =>
    p.name.toLowerCase().includes(search.toLowerCase()) ||
    p.category.toLowerCase().includes(search.toLowerCase()) ||
    (p.supplier||"").toLowerCase().includes(search.toLowerCase()) ||
    (p.barcode||"").toLowerCase().includes(search.toLowerCase())
  );

  // Reset to page 1 when search changes
  React.useEffect(() => { setPage(1); }, [search]);

  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  // Show all results when searching, paginate when not
  const displayed = search.trim()
    ? filtered
    : filtered.slice((page-1)*PAGE_SIZE, page*PAGE_SIZE);

  const EMPTY = { name: "", category: "", unit: "Tablets", unitQty: "", price: "", cost: "", margin: "", stock: "", reorder: "", expiry: "", supplier: "", barcode: "" };

  const openAdd  = () => { setForm({ ...EMPTY }); setModal("add"); setLookupStatus(null); };
  const openEdit = (p) => {
    const sp = p.price || 0, cost = p.cost || 0;
    const margin = sp > 0 && cost > 0 ? (((sp - cost) / sp) * 100).toFixed(1) : "";
    setForm({ ...EMPTY, ...p, margin: p.margin || margin });
    setModal("edit"); setLookupStatus(null);
  };

  const handleBarcode = async (code) => {
    setShowScanner(false);
    setLookupStatus("loading");
    setForm(f => ({ ...f, barcode: code }));
    toast(`🔍 Barcode ${code} lookup ho raha hai...`, "info");

    const result = await lookupBarcode(code);
    if (result.found) {
      setForm(f => ({
        ...f,
        barcode: code,
        name:     result.name     || f.name,
        supplier: result.brand    || f.supplier,
        category: result.category || f.category,
      }));
      setLookupStatus("found");
      setLookupSource(result.source);
      toast(`✅ Product info mili! (${result.source}) — Baki details manually fill karein`, "success");
    } else {
      setLookupStatus("notfound");
      toast(`⚠️ Barcode ${code} ki info nahi mili online — manually fill karein`, "warning");
    }
  };

  const save = () => {
    if (!form.name || !form.price) return toast("Name aur price zaroori hain!", "error");
    const product = {
      ...form,
      price: +form.price, cost: +form.cost, margin: +form.margin,
      unitQty: +form.unitQty || 1, stock: +form.stock, reorder: +form.reorder,
    };
    if (modal === "add") {
      setData((d) => ({ ...d, products: [...d.products, { ...product, id: Date.now() }] }));
      toast(`✅ Product "${product.name}" successfully add ho gaya!`, "success");
    } else {
      setData((d) => ({ ...d, products: d.products.map((p) => p.id === form.id ? product : p) }));
      toast(`✅ Product "${product.name}" update ho gaya!`, "success");
    }
    setModal(null);
  };

  const del = (id) => {
    const p = data.products.find((x) => x.id === id);
    setData((d) => ({ ...d, products: d.products.filter((p) => p.id !== id) }));
    toast(`🗑️ "${p?.name}" delete ho gaya`, "warning");
  };

  // Truncate helper
  const trunc = (str, n=22) => str && str.length > n ? str.slice(0,n)+"…" : (str||"—");

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
        <h2 style={{ margin: 0, fontSize: 22, fontWeight: 800 }}>💊 Products Management</h2>
        <div style={{ display: "flex", gap: 10 }}>
          <Btn color="gray" onClick={() => { setForm({ ...EMPTY }); setModal("add"); setShowScanner(true); setLookupStatus(null); }}>
            📷 Scan & Add

          <Btn onClick={openAdd}>+ Add Product</Btn>
        </div>
      </div>
      <Card>
        {/* Search + counter */}
        <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:12}}>
          <input value={search} onChange={(e) => setSearch(e.target.value)} placeholder="🔍 Search by name, category, supplier, barcode..." style={{ flex:1, padding: "10px 14px", border: "1px solid #d1d5db", borderRadius: 8, fontSize: 14, outline:"none" }} />
          <div style={{fontSize:12,color:"#6b7280",fontWeight:600,whiteSpace:"nowrap",flexShrink:0}}>
            {search.trim()
              ? <span style={{background:"#dbeafe",color:"#1e40af",padding:"4px 10px",borderRadius:20}}>{filtered.length} results</span>
              : <span style={{color:"#9ca3af"}}>{data.products.length} total · page {page}/{totalPages}</span>
            }

        </div>

        <div className="tbl-wrap" style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
            <thead>
              <tr style={{ background: "#f8fafc" }}>
                {["Product Name", "Per Unit", "Profit", "Stock", "Actions"].map((h) => (

            </thead>
            <tbody>
              {displayed.length === 0 && (
                <tr><td colSpan={10} style={{padding:40,textAlign:"center",color:"#9ca3af"}}>

                </td></tr>
              )}
              {displayed.map((p) => {
                const days = daysUntil(p.expiry);
                const _expThresh = 195;
                const expColor = days <= 0 ? "#dc2626" : days <= _expThresh ? "#d97706" : "#16a34a";
                const units = p.unitQty || 1;
                const perUnit = units > 1 ? p.price / units : null;
                const margin = p.margin || (p.price > 0 && p.cost > 0 ? (((p.price - p.cost) / p.price) * 100).toFixed(1) : 0);
                const profit = p.price - p.cost;
                const marginColor = margin >= 30 ? "#16a34a" : margin >= 15 ? "#d97706" : "#dc2626";
                return (

                      <div style={{ fontSize: 10, color: "#9ca3af" }} title={`${p.category} · ${p.supplier}`}>{trunc(p.supplier||p.category, 20)}</div>
                    </td>
                    <td style={{ padding: "9px 10px" }}>
                      {perUnit
                        ? <span style={{ background: "#dbeafe", color: "#1e40af", padding: "2px 7px", borderRadius: 6, fontSize: 11, fontWeight: 700, whiteSpace:"nowrap" }}>Rs. {perUnit.toFixed(2)}</span>
                        : <span style={{ color: "#9ca3af", fontSize: 11 }}>—</span>}
                    </td>
                    <td style={{ padding: "9px 10px", fontWeight: 700, color: profit > 0 ? "#16a34a" : "#dc2626", whiteSpace:"nowrap", fontSize:12 }}>{fmt(profit)}</td>
                    <td style={{ padding: "9px 10px" }}>
                      <span style={{ color: p.stock <= (p.reorder||50) ? "#dc2626" : "#111", fontWeight: p.stock <= (p.reorder||50) ? 700 : 400 }}>{p.stock}</span>
                    </td>
                    <td style={{ padding: "9px 10px" }}>
                      <div style={{ display: "flex", gap: 4, flexWrap: "nowrap" }}>
                        <Btn small color="primary" onClick={() => openEdit(p)}>✏️</Btn>
                        <Btn small color="danger" onClick={() => del(p.id)}>🗑</Btn>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>

        {/* Pagination — only when not searching */}
        {!search.trim() && totalPages > 1 && (
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:14,paddingTop:12,borderTop:"1px solid #f3f4f6"}}>
            <div style={{fontSize:12,color:"#6b7280"}}>
              Showing {(page-1)*PAGE_SIZE+1}–{Math.min(page*PAGE_SIZE, filtered.length)} of {filtered.length} products
            </div>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <button onClick={()=>setPage(p=>Math.max(1,p-1))} disabled={page===1}
                style={{padding:"5px 12px",borderRadius:7,border:"1.5px solid #e5e7eb",background:page===1?"#f9fafb":"#fff",color:page===1?"#9ca3af":"#374151",cursor:page===1?"not-allowed":"pointer",fontWeight:700,fontSize:13}}>
                ← Prev
              </button>
              {Array.from({length:Math.min(5,totalPages)},(_,i)=>{
                // Show pages around current
                let start = Math.max(1, page-2);
                let end = Math.min(totalPages, start+4);
                start = Math.max(1, end-4);
                return start+i <= end ? start+i : null;
              }).filter(Boolean).map(pg=>(
                <button key={pg} onClick={()=>setPage(pg)}
                  style={{padding:"5px 10px",borderRadius:7,border:"1.5px solid",minWidth:34,
                    borderColor: pg===page?"#1d4ed8":"#e5e7eb",
                    background: pg===page?"#1d4ed8":"#fff",
                    color: pg===page?"#fff":"#374151",
                    cursor:"pointer",fontWeight:700,fontSize:13}}>

                Next →

            </div>
          </div>

      {/* Barcode scanner overlay */}

        <BarcodeScanner

                style={{ flex: 1, padding: "9px 12px", border: "1.5px solid #d1d5db", borderRadius: 8, fontSize: 14, outline: "none", fontFamily: "monospace" }}
              />
              {/* Lookup button for manual entry */}

            </div>
            <div style={{ fontSize: 11, color: "#9ca3af", marginTop: 6 }}>
              Camera se scan karein ya barcode number type kar ke Lookup dabayein — name, brand auto fill ho jaega
            </div>
          </div>

          <PriceCalculator form={form} setForm={setForm} />
          <div style={{ display: "flex", justifyContent: "flex-end", gap: 10, marginTop: 8 }}>
            <Btn color="gray" onClick={() => setModal(null)}>Cancel</Btn>

  );
}

// ─── STOCK / EXPIRY ───────────────────────────────────────────────────────────

  const toast = useToast();
  const [tab, setTab] = useState("stock");
  const [adjModal, setAdjModal] = useState(null);
  const [adjQty, setAdjQty] = useState("");
  const [adjNote, setAdjNote] = useState("");

  const adjust = () => {
    if (!adjQty) return;
    setData((d) => ({ ...d, products: d.products.map((p) => p.id === adjModal.id ? { ...p, stock: Math.max(0, p.stock + parseInt(adjQty)) } : p) }));
    setAdjModal(null); setAdjQty(""); setAdjNote("");
  };

  const expired = data.products.filter((p) => daysUntil(p.expiry) <= 0);
  const expiring = data.products.filter((p) => { const d=daysUntil(p.expiry); return d>0 && d<=(settings?.app?.expiryAlertDays||195); });
  const safe = data.products.filter((p) => daysUntil(p.expiry) > (settings?.app?.expiryAlertDays||195));

  return (
    <div>

        <Card>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 14 }}>
            <thead>
              <tr style={{ background: "#f8fafc" }}>
                {["Product", "Category", "Current Stock", "Reorder Level", "Status", "Adjust"].map((h) => (
                  <th key={h} style={{ padding: "10px 12px", textAlign: "left", fontWeight: 700, borderBottom: "2px solid #e5e7eb" }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {data.products.map((p) => {
                const status = p.stock === 0 ? ["Out of Stock", "red"] : p.stock <= p.reorder ? ["Low Stock", "yellow"] : ["In Stock", "green"];

      {tab === "expiry" && (
        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          {[["🔴 Expired Products", expired, "red"], ["🟡 Expiring Soon (≤30 days)", expiring, "yellow"], ["🟢 Safe Products (>30 days)", safe, "green"]].map(([title, items, color]) => (

                <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 14 }}>
                  <thead>
                    <tr style={{ background: "#f8fafc" }}>
                      {["Product", "Category", "Stock", "Expiry Date", "Days Left"].map((h) => (
                        <th key={h} style={{ padding: "8px 12px", textAlign: "left", fontWeight: 700, borderBottom: "2px solid #e5e7eb" }}>{h}</th>
                      ))}

                    {items.map((p) => (
                      <tr key={p.id} style={{ borderBottom: "1px solid #f3f4f6" }}>
                        <td style={{ padding: "8px 12px", fontWeight: 600 }}>{p.name}</td>
                        <td style={{ padding: "8px 12px" }}>{p.category}</td>

          ))}

      )}

      {adjModal && (
        <Modal title={`Adjust Stock: ${adjModal.name}`} onClose={() => setAdjModal(null)}>
          <p style={{ color: "#6b7280", margin: "0 0 16px" }}>Current stock: <strong>{adjModal.stock}</strong> {adjModal.unit}</p>
          <Input label="Quantity Change (use + or - number)" type="number" value={adjQty} onChange={setAdjQty} placeholder="e.g. 50 or -10" />
          <Input label="Note (optional)" value={adjNote} onChange={setAdjNote} placeholder="Reason for adjustment" />
          <div style={{ display: "flex", justifyContent: "flex-end", gap: 10 }}>

        </Modal>
      )}

  );
}

    setData((d) => ({ ...d, customers: d.customers.filter((c) => c.id !== id) }));
    toast(`🗑️ Customer "${c?.name}" delete ho gaya`, "warning");
  };

  const receivePayment = () => {
    if (!payAmt || +payAmt <= 0) return toast("Amount likhein!", "error");
    const pm = form._payMethod;
    if (!pm?.method) return toast("Payment method select karein!", "error");
    if (pm.method !== "cash" && (!pm.accountDesc || !pm.accountName))
      return toast("Account details likhein!", "error");
    const c = form;
    const amt = +payAmt;
    const pmDetail = pm.method !== "cash"
      ? ` | ${pm.label} — ${pm.accountDesc} (${pm.accountName})`
      : " | Cash";
    setData(d => ({
      ...d,
      customers: d.customers.map(x => x.id===c.id ? {...x, balance: (x.balance||0) + amt} : x),
      accounts: [...d.accounts, {
        id: Date.now(), date: new Date().toISOString().split("T")[0],
        type: "income", category: "Customer Payment",
        paymentMethod: pm.method, paymentDetail: pm.accountDesc, paymentName: pm.accountName,
        description: `Payment received — ${c.name}${pmDetail}${payNote ? ` | ${payNote}` : ""}`,
        amount: amt,
      }],
    }));
    toast(`✅ ${fmt(amt)} payment received (${pm.label}) from ${c.name}!`, "success");
    setPayAmt(""); setPayNote(""); setModal(null);
  };

  const custInvoices = (cid) => data.invoices.filter(i => String(i.customerId) === String(cid));

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:16, gap:8, flexWrap:"wrap" }}>
        <h2 style={{ margin:0, fontSize:20, fontWeight:800 }}>👥 Customers</h2>
        <Btn onClick={() => { setForm({ name:"", phone:"", email:"", address:"" }); setModal("add"); }}>+ Add Customer</Btn>
      </div>

      {/* Summary */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(100px,1fr))",gap:8,marginBottom:12}}>
        <Card style={{background:"#dbeafe",boxShadow:"none",padding:"12px 16px"}}>
          <div style={{fontSize:12,color:"#1e40af",fontWeight:600}}>Total Customers</div>
          <div style={{fontSize:24,fontWeight:800,color:"#1d4ed8"}}>{data.customers.length}</div>
        </Card>
        <Card style={{background:"#fee2e2",boxShadow:"none",padding:"12px 16px"}}>
          <div style={{fontSize:12,color:"#991b1b",fontWeight:600}}>Total Receivable</div>
          <div style={{fontSize:18,fontWeight:800,color:"#dc2626"}}>
            {fmt(Math.abs(data.customers.filter(c=>c.balance<0).reduce((s,c)=>s+c.balance,0)))}
          </div>
        </Card>
        <Card style={{background:"#d1fae5",boxShadow:"none",padding:"12px 16px"}}>
          <div style={{fontSize:12,color:"#065f46",fontWeight:600}}>Total Revenue</div>
          <div style={{fontSize:18,fontWeight:800,color:"#16a34a"}}>
            {fmt(data.customers.reduce((s,c)=>s+(c.totalPurchases||0),0))}
          </div>
        </Card>
      </div>

      <Card>
        <input value={search} onChange={(e) => setSearch(e.target.value)}
          placeholder="🔍 Search customers..."
          style={{ width:"100%", padding:"10px 14px", border:"1px solid #d1d5db", borderRadius:8, fontSize:14, marginBottom:16, boxSizing:"border-box" }} />
        {(() => {
          const PAGE_SIZE_C = 15;
          const [custPage, setCustPage] = React.useState(1);
          React.useEffect(()=>setCustPage(1),[search]);
          const totalPagesC = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE_C));
          const dispC = filtered.slice((custPage-1)*PAGE_SIZE_C, custPage*PAGE_SIZE_C);
          return (<>
          <div style={{overflowX:"auto"}}>
            <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
              <thead>
                <tr style={{ background:"#f8fafc" }}>
                  {["Name","Mobile","Balance","Actions"].map((h) => (
                    <th key={h} style={{ padding:"7px 8px", textAlign:"left", fontWeight:700, fontSize:11, borderBottom:"2px solid #e5e7eb", whiteSpace:"nowrap" }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {dispC.map((c) => (
                  <tr key={c.id} style={{ borderBottom:"1px solid #f3f4f6" }}>
                    <td style={{ padding:"6px 8px", fontWeight:700, maxWidth:130, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }} title={c.name}>{c.name}</td>
                    <td style={{ padding:"6px 8px", color:"#374151", whiteSpace:"nowrap", fontSize:12 }}>{c.phone}</td>
                    <td style={{ padding:"6px 8px", fontWeight:700, whiteSpace:"nowrap", fontSize:12,
                      color: c.balance < 0 ? "#dc2626" : c.balance > 0 ? "#16a34a" : "#9ca3af" }}>
                      {fmt(Math.abs(c.balance||0))}
                    </td>
                    <td style={{ padding:"6px 8px" }}>
                      <div style={{display:"flex",gap:4}}>
                        <Btn small color="primary" onClick={()=>{setForm({...c});setModal("view");}}>View</Btn>
                        <Btn small onClick={()=>{setForm({...c});setModal("edit");}}>Edit</Btn>
                        <Btn small color="danger" onClick={()=>del(c.id)}>Del</Btn>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          {totalPagesC > 1 && (
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:10,paddingTop:10,borderTop:"1px solid #f3f4f6"}}>
              <div style={{fontSize:11,color:"#6b7280"}}>{(custPage-1)*PAGE_SIZE_C+1}–{Math.min(custPage*PAGE_SIZE_C,filtered.length)} / {filtered.length}</div>
              <div style={{display:"flex",gap:4}}>
                <button onClick={()=>setCustPage(p=>Math.max(1,p-1))} disabled={custPage===1}
                  style={{padding:"4px 10px",borderRadius:6,border:"1.5px solid #e5e7eb",background:custPage===1?"#f9fafb":"#fff",color:custPage===1?"#9ca3af":"#374151",cursor:custPage===1?"not-allowed":"pointer",fontWeight:700,fontSize:12}}>←</button>
                <span style={{padding:"4px 8px",fontSize:12,fontWeight:700,color:"#374151"}}>{custPage}/{totalPagesC}</span>
                <button onClick={()=>setCustPage(p=>Math.min(totalPagesC,p+1))} disabled={custPage===totalPagesC}
                  style={{padding:"4px 10px",borderRadius:6,border:"1.5px solid #e5e7eb",background:custPage===totalPagesC?"#f9fafb":"#fff",color:custPage===totalPagesC?"#9ca3af":"#374151",cursor:custPage===totalPagesC?"not-allowed":"pointer",fontWeight:700,fontSize:12}}>→</button>
              </div>
            </div>
          )}
          </>);
        })()}
      </Card>

      {/* Add/Edit Modal */}
      {(modal==="add"||modal==="edit") && (
        <Modal title={modal==="add"?"➕ Add Customer":"✏️ Edit Customer"} onClose={()=>setModal(null)}>
          <Input label="Full Name *" value={form.name||""} onChange={(v)=>setForm(f=>({...f,name:v}))} />
          <Input label="Phone *" value={form.phone||""} onChange={(v)=>setForm(f=>({...f,phone:v}))} />
          <Input label="Email" value={form.email||""} onChange={(v)=>setForm(f=>({...f,email:v}))} />
          <Input label="Address" value={form.address||""} onChange={(v)=>setForm(f=>({...f,address:v}))} />
          <div style={{display:"flex",justifyContent:"flex-end",gap:10}}>
            <Btn color="gray" onClick={()=>setModal(null)}>Cancel</Btn>
            <Btn onClick={save}>💾 Save</Btn>
          </div>
        </Modal>
      )}

      {/* View Modal */}
      {modal==="view" && (
        <Modal wide title={`👤 ${form.name}`} onClose={()=>setModal(null)}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
            {[["📞 Phone",form.phone],["📧 Email",form.email||"—"],["📍 Address",form.address||"—"]].map(([l,v])=>(
              <div key={l} style={{background:"#f8fafc",borderRadius:9,padding:"10px 14px"}}>
                <div style={{fontSize:12,color:"#6b7280"}}>{l}</div>
                <div style={{fontWeight:700,marginTop:2}}>{v}</div>
              </div>
            ))}
            <div style={{background: (form.balance||0)<0?"#fee2e2":"#d1fae5",borderRadius:9,padding:"10px 14px"}}>
              <div style={{fontSize:12,color:"#6b7280"}}>Balance</div>
              <div style={{fontWeight:800,fontSize:18,color:(form.balance||0)<0?"#dc2626":"#16a34a"}}>
                {(form.balance||0)<0?"⚠️ Owes: ":"✅ Credit: "}{fmt(Math.abs(form.balance||0))}
              </div>
            </div>
          </div>
          {/* Customer invoices */}
          <div style={{fontWeight:700,marginBottom:8}}>Invoice History</div>
          <div style={{overflowX:"auto",maxHeight:250,overflowY:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead><tr style={{background:"#f8fafc"}}>
                {["Invoice","Date","Total","Paid","Balance","Status"].map(h=>(
                  <th key={h} style={{padding:"7px 10px",textAlign:"left",fontWeight:700,borderBottom:"2px solid #e5e7eb"}}>{h}</th>
                ))}
              </tr></thead>
              <tbody>
                {custInvoices(form.id).map(inv=>(
                  <tr key={inv.id} style={{borderBottom:"1px solid #f3f4f6"}}>
                    <td style={{padding:"7px 10px",fontWeight:700,color:"#1d4ed8"}}>{inv.id}</td>
                    <td style={{padding:"7px 10px"}}>{inv.date}</td>
                    <td style={{padding:"7px 10px",fontWeight:700}}>{fmt(inv.total)}</td>
                    <td style={{padding:"7px 10px",color:"#16a34a"}}>{fmt(inv.paid)}</td>
                    <td style={{padding:"7px 10px",color:"#dc2626",fontWeight:700}}>{fmt(inv.total-inv.paid)}</td>
                    <td style={{padding:"7px 10px"}}>{badge(inv.status,{paid:"green",partial:"yellow",unpaid:"red"}[inv.status])}</td>
                  </tr>
                ))}
                {custInvoices(form.id).length===0 && <tr><td colSpan={6} style={{textAlign:"center",padding:20,color:"#9ca3af"}}>Koi invoice nahi</td></tr>}
              </tbody>
            </table>
          </div>
          <div style={{display:"flex",justifyContent:"flex-end",gap:10,marginTop:12}}>
            <Btn color="success" onClick={()=>{setPayAmt("");setPayNote("");setModal("payment");}}>💰 Receive Payment</Btn>
            <Btn color="gray" onClick={()=>setModal(null)}>Close</Btn>
          </div>
        </Modal>
      )}

      {/* Payment Modal */}
      {modal==="payment" && (
        <Modal title={`💰 Payment — ${form.name}`} onClose={()=>setModal(null)}>
          <div style={{background:(form.balance||0)<0?"#fee2e2":"#d1fae5",borderRadius:9,padding:"12px 16px",marginBottom:16}}>
            <div style={{fontSize:13,fontWeight:600,color:"#374151"}}>Current Balance</div>
            <div style={{fontWeight:800,fontSize:20,color:(form.balance||0)<0?"#dc2626":"#16a34a"}}>
              {(form.balance||0)<0?`Owes: ${fmt(Math.abs(form.balance||0))}`:`Credit: ${fmt(form.balance||0)}`}
            </div>
          </div>
          <div style={{marginBottom:12}}>
            <label style={{display:"block",fontSize:13,fontWeight:700,marginBottom:5}}>Payment Amount (Rs.) *</label>
            <input type="number" min="1" value={payAmt} onChange={e=>setPayAmt(e.target.value)}
              placeholder={`e.g. ${Math.abs(form.balance||0)||500}`}
              style={{width:"100%",padding:"11px 14px",border:"2px solid #1d4ed8",borderRadius:9,fontSize:16,outline:"none",fontWeight:700}}/>
          </div>
          {payAmt>0 && (
            <div style={{background:"#eff6ff",borderRadius:8,padding:"8px 14px",marginBottom:12,fontSize:13}}>
              After payment: <b style={{color:(form.balance||0)+Number(payAmt)>=0?"#16a34a":"#dc2626"}}>
                {fmt((form.balance||0)+Number(payAmt))}
              </b>
            </div>
          )}
          <PaymentMethodPicker value={form._payMethod} direction="receive"
            onChange={pm=>setForm(f=>({...f,_payMethod:pm}))} required />
          <div style={{marginBottom:14}}>
            <label style={{display:"block",fontSize:13,fontWeight:700,marginBottom:5}}>Note (optional)</label>
            <input value={payNote} onChange={e=>setPayNote(e.target.value)} placeholder="Additional note..."
              style={{width:"100%",padding:"9px 12px",border:"1.5px solid #d1d5db",borderRadius:8,fontSize:14,outline:"none"}}/>
          </div>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
            <Btn color="gray" onClick={()=>setModal(null)}>Cancel</Btn>
            <Btn color="success" onClick={receivePayment}>✅ Receive Payment</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── SMART PRODUCT SEARCH for Invoice ────────────────────────────────────────
function ProductSearchRow({ products, onAdd }) {
  const [query, setQuery]         = useState("");
  const [results, setResults]     = useState([]);
  const [selected, setSelected]   = useState(null);
  const [qty, setQty]             = useState("");
  const [showDrop, setShowDrop]   = useState(false);
  const [rowErr, setRowErr]       = useState("");

  // Live search as user types
  const handleQuery = (v) => {
    setQuery(v);
    setSelected(null);
    setQty("");
    if (v.trim().length === 0) { setResults([]); setShowDrop(false); return; }
    const hits = products.filter((p) =>
      p.name.toLowerCase().includes(v.toLowerCase()) ||
      (p.category || "").toLowerCase().includes(v.toLowerCase())
    );
    setResults(hits);
    setShowDrop(true);
  };

  const pickProduct = (p) => {
    setSelected(p);
    setQuery(p.name);
    setResults([]);
    setShowDrop(false);
    setQty("");
  };

  // Per-unit price of selected product
  const unitQty      = selected ? (selected.unitQty || 1) : 1;
  const packPrice    = selected ? selected.price : 0;
  const perUnitPrice = unitQty > 1 ? packPrice / unitQty : packPrice;

  // How many pieces entered → convert to packs for stock deduction, but bill by pieces
  const piecesEntered = parseFloat(qty) || 0;
  const lineTotal     = piecesEntered * perUnitPrice;

  const handleAdd = () => {
    if (!selected) return setRowErr("Pehle product select karein");
    if (!qty || piecesEntered <= 0) return setRowErr("Quantity zaroor likhein");
    setRowErr("");
    onAdd({
      productId    : String(selected.id),
      name         : selected.name,
      unit         : selected.unit || "pcs",
      unitQty      : unitQty,
      packPrice    : packPrice,
      perUnitPrice,
      qty          : piecesEntered,
      price        : perUnitPrice,
    });
    setSelected(null);
    setQuery("");
    setQty("");
  };

  return (
    <div style={{ marginBottom: 4 }}>
      <div style={{ display: "flex", gap: 8, alignItems: "flex-end", flexWrap: "wrap" }}>

        {/* ── Search Input + Dropdown ── */}
        <div style={{ flex: 2, minWidth: 220, position: "relative" }}>
          <label style={{ display: "block", fontSize: 12, fontWeight: 600, color: "#374151", marginBottom: 4 }}>
            🔍 Product Search (naam ya category likhein)
          </label>
          <input
            value={query}
            onChange={(e) => handleQuery(e.target.value)}
            onFocus={() => query && setShowDrop(results.length > 0)}
            placeholder="e.g. Paracetamol, Antibiotic..."
            style={{
              width: "100%", padding: "9px 12px",
              border: selected ? "2px solid #16a34a" : "2px solid #3b82f6",
              borderRadius: 9, fontSize: 14, boxSizing: "border-box", outline: "none",
              background: selected ? "#f0fdf4" : "#fff",
            }}
          />

          {/* Live dropdown */}
          {showDrop && results.length > 0 && (
            <div style={{
              position: "absolute", top: "100%", left: 0, right: 0, zIndex: 999,
              background: "#fff", border: "1px solid #d1d5db", borderRadius: 10,
              boxShadow: "0 8px 24px rgba(0,0,0,.12)", maxHeight: 240, overflowY: "auto",
              marginTop: 2,
            }}>
              {results.map((p) => {
                const uq = p.unitQty || 1;
                const pup = uq > 1 ? p.price / uq : p.price;
                const stockStatus = p.stock === 0 ? "#dc2626" : p.stock <= p.reorder ? "#d97706" : "#16a34a";
                return (
                  <div
                    key={p.id}
                    onClick={() => pickProduct(p)}
                    style={{
                      padding: "10px 14px", cursor: "pointer", borderBottom: "1px solid #f3f4f6",
                      display: "flex", justifyContent: "space-between", alignItems: "center",
                    }}
                    onMouseEnter={(e) => e.currentTarget.style.background = "#f0f9ff"}
                    onMouseLeave={(e) => e.currentTarget.style.background = "#fff"}
                  >
                    <div>
                      <div style={{ fontWeight: 700, fontSize: 14, color: "#111827" }}>{p.name}</div>
                      <div style={{ fontSize: 12, color: "#6b7280" }}>
                        {p.category} &nbsp;·&nbsp;
                        Pack: <strong>{fmt(p.price)}</strong>
                        {uq > 1 && <span style={{ color: "#1d4ed8" }}> &nbsp;·&nbsp; Per unit: Rs.{pup.toFixed(2)}</span>}
                        {uq > 1 && <span style={{ color: "#7c3aed" }}> ({uq} pcs/pack)</span>}
                      </div>
                    </div>
                    <div style={{ textAlign: "right", flexShrink: 0 }}>
                      <div style={{ fontSize: 12, color: stockStatus, fontWeight: 700 }}>
                        Stock: {p.stock} packs
                      </div>
                      {p.stock === 0 && <div style={{ fontSize: 11, color: "#dc2626" }}>Out of Stock</div>}
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* No results hint */}
          {showDrop && results.length === 0 && query.length > 0 && (
            <div style={{ position: "absolute", top: "100%", left: 0, right: 0, zIndex: 999, background: "#fff", border: "1px solid #d1d5db", borderRadius: 10, padding: "12px 14px", marginTop: 2 }}>
              <span style={{ color: "#6b7280", fontSize: 13 }}>❌ "{query}" se koi product nahi mila</span>
            </div>
          )}
        </div>

        {/* ── Quantity Input ── */}
        <div style={{ flex: 1, minWidth: 130 }}>
          <label style={{ display: "block", fontSize: 12, fontWeight: 600, color: "#374151", marginBottom: 4 }}>
            Quantity ({selected && unitQty > 1 ? "Pieces" : "Units"})
          </label>
          <input
            type="number" min="1"
            value={qty}
            onChange={(e) => setQty(e.target.value)}
            placeholder={selected && unitQty > 1 ? `e.g. 5 pieces` : "Qty"}
            disabled={!selected}
            style={{
              width: "100%", padding: "9px 12px",
              border: "1px solid #d1d5db", borderRadius: 9, fontSize: 14,
              boxSizing: "border-box", outline: "none",
              background: selected ? "#fff" : "#f9fafb",
              cursor: selected ? "text" : "not-allowed",
            }}
          />
        </div>

        {/* ── Add Button ── */}
        <div>
          <label style={{ display: "block", fontSize: 12, fontWeight: 600, color: "transparent", marginBottom: 4 }}>_</label>
          <Btn color="success" onClick={handleAdd} style={{ padding: "9px 20px" }}>+ Add</Btn>
        </div>
      </div>

      {/* ── Row Error ── */}
      {rowErr && <div style={{ color: "#dc2626", fontSize: 12, fontWeight: 600, marginTop: 4 }}>⚠️ {rowErr}</div>}

      {/* ── Live Price Preview ── */}
      {selected && (
        <div style={{ background: "#f0fdf4", border: "1px solid #86efac", borderRadius: 8, padding: "8px 14px", marginTop: 8, fontSize: 13, display: "flex", gap: 20, flexWrap: "wrap" }}>
          <span>✅ <strong>{selected.name}</strong></span>
          <span>Pack Price: <strong>{fmt(packPrice)}</strong></span>
          {unitQty > 1 && <span style={{ color: "#1d4ed8" }}>Per Piece: <strong>Rs. {perUnitPrice.toFixed(2)}</strong> ({unitQty} pcs/pack)</span>}
          {piecesEntered > 0 && (
            <span style={{ color: "#16a34a", fontWeight: 700 }}>
              {piecesEntered} {unitQty > 1 ? "pieces" : "units"} × Rs.{perUnitPrice.toFixed(2)} = <strong>{fmt(lineTotal)}</strong>
            </span>
          )}
        </div>
      )}
    </div>
  );
}
